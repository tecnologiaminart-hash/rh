          </label>`).join('')}
      </div>`).join('')}
    <div id="avaliacao-aluno-aviso" style="display:none;color:var(--danger);font-size:13px;font-weight:600;margin-bottom:12px"></div>
    <button class="btn btn-primary" onclick="enviarAvaliacaoAluno()">Enviar Avaliação</button>
  </div>`;
}

window.responderPerguntaAluno = function(idPergunta, altIdx) {
  if (!window._respostasAvaliacaoAluno) window._respostasAvaliacaoAluno = {};
  window._respostasAvaliacaoAluno[idPergunta] = altIdx;
};

window.enviarAvaliacaoAluno = async function() {
  const idCurso = window._playerCursoId;
  const perguntas = (window._cursoAvaliacaoPerguntas || []).filter(p => p.id_curso === idCurso);
  const respostas = window._respostasAvaliacaoAluno || {};
  const avisoEl = document.getElementById('avaliacao-aluno-aviso');

  // Trava extra (além da normal, que já joga aprovados pro modo revisão sem
  // passar pela avaliação): impede reenviar se já foi aprovado nesta avaliação.
  const progressoAtual = (window._cursoProgresso || []).find(p => p.id_curso === idCurso);
  if (progressoAtual && progressoAtual.resultado_avaliacao === 'Aprovado') {
    showToast('Você já foi aprovado nesta avaliação.');
    return;
  }

  if (Object.keys(respostas).length < perguntas.length) {
    if (avisoEl) { avisoEl.textContent = 'Responda todas as perguntas antes de enviar.'; avisoEl.style.display = ''; }
    return;
  }

  let acertos = 0;
  perguntas.forEach(p => {
    const alt = (p.alternativas || [])[respostas[p.id]];
    if (alt && alt.correta) acertos += 1;
  });
  const percentual = perguntas.length > 0 ? Math.round((acertos / perguntas.length) * 100) : 100;
  const aprovado = percentual >= NOTA_MINIMA_APROVACAO_CURSO;

  try {
    const progresso = (window._cursoProgresso || []).find(p => p.id_curso === idCurso);
    if (!progresso) return; // não deveria acontecer — abrirPlayerCurso já garante essa linha
    const payload = {
      // Só vira "concluido" se for aprovado (>= NOTA_MINIMA_APROVACAO_CURSO);
      // reprovado continua "em_andamento", pra poder refazer a avaliação.
      status: aprovado ? 'concluido' : 'em_andamento',
      resultado_avaliacao: aprovado ? 'Aprovado' : 'Reprovado',
      percentual_acerto: percentual,
      concluido_em: aprovado ? new Date().toISOString() : null,
    };
    const { error } = await supaClient.from('curso_progresso').update(payload).eq('id', progresso.id);
    if (error) throw error;
    Object.assign(progresso, payload);

    window._resultadoAvaliacaoAluno = { acertos, total: perguntas.length, percentual, aprovado };
    window._playerModo = 'resultado';
    navigate('meus-cursos', 'Cursos');
  } catch (e) {
    console.error('Erro ao enviar avaliação:', e);
    showToast('Erro ao enviar avaliação: ' + (e.message || e), 'danger');
  }
};

function renderResultadoAvaliacaoHtml() {
  const r = window._resultadoAvaliacaoAluno;
  if (!r) return '';
  return `
  <div class="table-card" style="padding:40px;text-align:center">
    <div style="font-size:40px;margin-bottom:16px">${r.aprovado ? '✅' : '❌'}</div>

    <div style="font-size:14px;color:var(--text3);margin-bottom:8px">Você acertou ${r.acertos} de ${r.total} perguntas (${r.percentual}%).</div>

// TREINAMENTOS > CADASTRO DE USUÁRIO — cria o login (Supabase Auth) de um
// colaborador com perfil Treinamento (perfil_id fixo = 3) e grava a linha
// correspondente em `usuarios`. A criação do login em si roda num webhook do
// n8n (N8N_CRIAR_USUARIO_WEBHOOK_URL), porque exige a service_role key do
// Supabase — uma credencial que nunca pode ficar exposta no código do site.
// ------------------------------------------------------------
async function loadUsuariosCadastrados() {
  if (!supaClient) {
    console.error('Supabase client não inicializado para usuarios.');
    window._usuariosCadastrados = [];
    return;
  }
  const { data, error } = await supaClient
    .from('usuarios')
    .select('id, auth_user_id, colaborador_id, email, ativo, created_at, perfil_id, usuario_convidado, perfis(nome)')
    .order('created_at', { ascending: false });
  if (error) {
    console.error('Erro ao carregar usuários cadastrados:', error.message);
    window._usuariosCadastrados = [];
  } else {
    window._usuariosCadastrados = data;
  }
}

// Monta o link de WhatsApp avisando o colaborador que o acesso ao Treinamento
// foi criado, já com e-mail, senha inicial e o aviso de troca no 1º acesso.
function linkWhatsappAcessoTreinamento(numero, nomeColaborador, email) {
  let digits = String(numero || '').replace(/\D/g, '');
  if (!digits) return null;
  if (!digits.startsWith('55')) digits = '55' + digits;
  const link = `${location.origin}${location.pathname}`;
  const mensagem = `Olá, ${nomeColaborador || ''}! Seu acesso ao Treinamento da Minart Móveis foi criado.\n\nAcesse: ${link}\nE-mail: ${email || ''}\nSenha inicial: 12345678\n\nNo primeiro acesso, o sistema vai pedir para você trocar essa senha.`;
  return `https://wa.me/${digits}?text=${encodeURIComponent(mensagem)}`;
}

window.salvarEdicaoEmailUsuario = async function() {
  const novoEmail = document.getElementById('eeu-email').value.trim();
  if (!novoEmail) return showToast('Informe o novo e-mail.');
  if (!N8N_CRIAR_USUARIO_WEBHOOK_URL || N8N_CRIAR_USUARIO_WEBHOOK_URL.startsWith('COLE_AQUI')) {
    return showToast('Webhook de usuários não configurado.', 'danger');
  }

  const btn = document.getElementById('eeu-btn-salvar');
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }

  try {
    const res = await fetch(N8N_CRIAR_USUARIO_WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token: N8N_WEBHOOK_TOKEN,
        acao: 'editar_email',
        usuario_id: window._eeuUsuarioId,
        auth_user_id: window._eeuAuthUserId,
        novo_email: novoEmail,
      }),
    });
    let result = {};
    try { result = await res.json(); } catch (e) { /* resposta sem corpo JSON */ }
    if (!res.ok || result.success === false) {
      throw new Error(result.error || `Falha ao editar e-mail (status ${res.status}).`);
    }

    document.getElementById('editar-email-usuario-modal').style.display = 'none';
    await loadUsuariosCadastrados();
    if (window._renderCadastroUsuario) window._renderCadastroUsuario();
    showToast('E-mail atualizado!');
  } catch (e) {
    console.error('Erro ao editar e-mail do usuário:', e);
    showToast('Erro ao editar e-mail: ' + (e.message || e), 'danger');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Salvar'; }
  }
};

// Ao selecionar o colaborador, puxa o e-mail já cadastrado em Dados Pessoais
// (continua editável depois de preenchido, caso precise usar outro e-mail).
window.preencherEmailCadastroUsuario = function(idColaborador) {
  const el = document.getElementById('cu-email');
  if (!el) return;
  if (!idColaborador) { el.value = ''; return; }
  const dados = (window._dadosPessoaisEpi || []).find(d => String(d.id_colaborador) === String(idColaborador));
  el.value = (dados && dados.email) || '';
};

window.salvarCadastroUsuario = async function() {
  const colaboradorId = document.getElementById('cu-colaborador').value;
  const email = document.getElementById('cu-email').value.trim();
  const senha = document.getElementById('cu-senha').value;
  if (!colaboradorId) return showToast('Selecione o colaborador.');
  if (!email) return showToast('Informe o e-mail.');
  if (!senha) return showToast('Informe a senha.');
  if (!N8N_CRIAR_USUARIO_WEBHOOK_URL || N8N_CRIAR_USUARIO_WEBHOOK_URL.startsWith('COLE_AQUI')) {
    return showToast('Webhook de criação de usuário não configurado.', 'danger');
  }

  const btn = document.getElementById('cu-btn-salvar');
  if (btn) { btn.disabled = true; btn.textContent = 'Cadastrando...'; }

  try {
    const res = await fetch(N8N_CRIAR_USUARIO_WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token: N8N_WEBHOOK_TOKEN,
        acao: 'criar',
        email,
        senha,
        colaborador_id: colaboradorId,
        perfil_id: 3, // Treinamento
      }),
    });
    let result = {};
    try { result = await res.json(); } catch (e) { /* resposta sem corpo JSON */ }
    if (!res.ok || result.success === false) {
      throw new Error(result.error || `Falha ao cadastrar usuário (status ${res.status}).`);
    }

    document.getElementById('cadastro-usuario-modal').style.display = 'none';
    await loadUsuariosCadastrados();
    if (window._renderCadastroUsuario) window._renderCadastroUsuario();
    showToast('Usuário cadastrado! Peça para a pessoa entrar com a senha inicial e trocar no primeiro acesso.');
  } catch (e) {
    console.error('Erro ao cadastrar usuário:', e);
    showToast('Erro ao cadastrar usuário: ' + (e.message || e), 'danger');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Cadastrar'; }
  }
};

// LIBERAÇÃO DE CURSOS PARA USUÁRIO — vincula um curso Interno a um
// colaborador (ou usuário convidado, sem colaborador) que já tem login de
// Treinamento, com status Liberado/Bloqueado (ver sql/criar-curso-liberacoes.sql
// e sql/adicionar-usuario-convidado.sql).
// ------------------------------------------------------------
async function loadCursoLiberacoesForApp() {
  if (!supaClient) {
    console.error('Supabase client não inicializado para curso_liberacoes.');
    window._cursoLiberacoes = [];
    return;
  }
  const { data, error } = await supaClient.from('curso_liberacoes').select('*').order('created_at', { ascending: false });
  if (error) {
    console.error('Erro ao carregar liberações de curso:', error.message);
    window._cursoLiberacoes = [];
  } else {
    window._cursoLiberacoes = data;
  }
}

// Cores do select de Status: Liberado = verde, Bloqueado = vermelho.
function corSelectLiberacao(status) {
  return status === 'Liberado' ? 'background:#e8f5ec;color:#1a7a3c' : 'background:#f5e8e8;color:#a03030';
}
window.aplicarCorLiberacao = function(selectEl) {
  selectEl.style.cssText += ';' + corSelectLiberacao(selectEl.value);
};

window.alterarStatusLiberacao = async function(id, novoStatus) {
  try {
    const { error } = await supaClient.from('curso_liberacoes').update({ status: novoStatus }).eq('id', id);
    if (error) throw error;
    const registro = (window._cursoLiberacoes || []).find(l => l.id === id);
    if (registro) registro.status = novoStatus;
    showToast('Status atualizado!');
  } catch (e) {
    console.error('Erro ao atualizar status da liberação:', e);
    showToast('Erro ao atualizar status: ' + (e.message || e), 'danger');
  }
};

window.excluirLiberacaoCurso = async function(id) {
  if (!confirm('Excluir esta liberação?')) return;
  try {
    const { error } = await supaClient.from('curso_liberacoes').delete().eq('id', id);
    if (error) throw error;
    await loadCursoLiberacoesForApp();
    if (window._renderLiberacoesCursos) window._renderLiberacoesCursos();
    showToast('Liberação excluída!');
  } catch (e) {
    console.error('Erro ao excluir liberação:', e);
    showToast('Erro ao excluir liberação: ' + (e.message || e), 'danger');
  }
};

          <div style="font-size:15px;font-weight:700">Nova Liberação</div>
          <button type="button" class="btn btn-sm" onclick="document.getElementById('nova-liberacao-modal').style.display='none'">✕</button>
        </div>
        <div style="padding:24px">
          <div class="form-group" style="margin-bottom:16px">

            <select class="form-select" id="nl-colaborador"><option value="">— Selecione —</option></select>
          </div>

            <label class="form-label">Curso (Interno)</label>

          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn" onclick="document.getElementById('nova-liberacao-modal').style.display='none'">Cancelar</button>

        </div>
      </div>`;
    document.body.appendChild(modal);
  }

  const usuariosTreinamento = (window._usuariosCadastrados || []).filter(u => u.perfil_id === 3);
  const selColab = document.getElementById('nl-colaborador');
  selColab.innerHTML = '<option value="">— Selecione —</option>' +
    usuariosTreinamento.map(u => {
      const nome = u.colaborador_id ? nomeColaboradorPorId(u.colaborador_id) : `${u.usuario_convidado || u.email || '—'} (Convidado)`;
      return `<option value="${u.id}">${nome}</option>`;
    }).join('');

  const cursosInternos = (window._cursos || []).filter(c => c.tipo === 'Interno');
  const selCurso = document.getElementById('nl-curso');
  selCurso.innerHTML = '<option value="">— Selecione —</option>' +

window.salvarNovaLiberacao = async function() {
  const idUsuarioSelecionado = document.getElementById('nl-colaborador').value;
  const idCurso = document.getElementById('nl-curso').value;
  if (!idUsuarioSelecionado) return showToast('Selecione o colaborador/convidado.');
  if (!idCurso) return showToast('Selecione o curso.');

  const usuario = (window._usuariosCadastrados || []).find(u => String(u.id) === String(idUsuarioSelecionado));
  if (!usuario) return showToast('Usuário não encontrado.');

  const btn = document.getElementById('nl-btn-salvar');
  if (btn) { btn.disabled = true; btn.textContent = 'Liberando...'; }

  try {
    // Colaborador grava em id_colaborador (comportamento de sempre); convidado
    // (sem colaborador_id) grava em id_usuario — ver
    // sql/adicionar-usuario-convidado.sql pras duas colunas/constraints.
    const payload = usuario.colaborador_id
      ? { id_curso: idCurso, id_colaborador: usuario.colaborador_id, id_usuario: null, status: 'Liberado' }
      : { id_curso: idCurso, id_colaborador: null, id_usuario: usuario.id, status: 'Liberado' };
    const onConflict = usuario.colaborador_id ? 'id_curso,id_colaborador' : 'id_curso,id_usuario';

    const { error } = await supaClient.from('curso_liberacoes').upsert(payload, { onConflict });
    if (error) throw error;

    await loadCursoLiberacoesForApp();
    if (window._renderLiberacoesCursos) window._renderLiberacoesCursos();
    document.getElementById('nova-liberacao-modal').style.display = 'none';
    showToast('Curso liberado!');
  } catch (e) {
    console.error('Erro ao liberar curso:', e);
    showToast('Erro ao liberar curso: ' + (e.message || e), 'danger');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Liberar'; }
  }
};

  return (window._usuariosCadastrados || []).some(u => u.perfil_id === 3 && String(u.colaborador_id) === String(idColaborador));
}

function pageTreinAcompanhamento() {
  document.getElementById('topbar-actions').innerHTML = '';

  if (!window._acompFiltros) window._acompFiltros = { status: 'ativos_pendentes' };
  if (!window._acompOrdem) window._acompOrdem = 'nome';

  const renderTabela = () => {
    const tbody = document.getElementById('trein-acompanhamento-tbody');
    if (!tbody) return;

    let lista = [...(_colaboradoresSupabase || [])].filter(c => {
      if (window._acompFiltros.status === 'ativos_pendentes') return c.status_colaborador === 'Ativo' || c.status_colaborador === 'Pendente Documentação';
      if (window._acompFiltros.status) return c.status_colaborador === window._acompFiltros.status;
      return true;
    });

    lista.sort((a, b) => {
      if (window._acompOrdem === 'cargo') {
        return (a.cargos ? a.cargos.nome_cargo : '').localeCompare(b.cargos ? b.cargos.nome_cargo : '');
      }
      if (window._acompOrdem === 'status-usuario') {
        const temA = temUsuarioTreinamento(a.id_colaborador) ? 1 : 0;
        const temB = temUsuarioTreinamento(b.id_colaborador) ? 1 : 0;
        return temB - temA;
      }
      return (a.nome_colaborador || '').localeCompare(b.nome_colaborador || '');
    });

    tbody.innerHTML = lista.length === 0
      ? '<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--text3)">Nenhum colaborador encontrado.</td></tr>'
      : lista.map(c => {
          const cargoNome = c.cargos ? c.cargos.nome_cargo : '—';
          const statusBadgeClass = c.status_colaborador === 'Ativo' ? 'badge-active'
            : c.status_colaborador === 'Pendente Documentação' ? 'badge-inactive'
            : c.status_colaborador === 'Inativo' ? 'badge-gray'
            : 'badge-inactive';
          const temUsuario = temUsuarioTreinamento(c.id_colaborador);
          return `
          <tr style="cursor:pointer" onclick="clicarLinhaAcompanhamento(${c.id_colaborador})" title="Ver acompanhamento de cursos">
            <td><strong>${c.nome_colaborador || '—'}</strong></td>
            <td>${cargoNome}</td>
            <td><span class="badge ${statusBadgeClass}">${c.status_colaborador || '—'}</span></td>
            <td><span class="badge ${temUsuario ? 'badge-active' : 'badge-gray'}">${temUsuario ? 'Criado' : 'Não criado'}</span></td>
          </tr>`;
        }).join('');
  };

  window._renderTreinAcompanhamento = renderTabela;
  Promise.all([
    (!_colaboradoresSupabase || _colaboradoresSupabase.length === 0) ? loadColaboradoresFromSupabase() : Promise.resolve(),
    (!window._usuariosCadastrados) ? loadUsuariosCadastrados() : Promise.resolve(),
    loadCursoLiberacoesForApp(),
    (!window._cursos || window._cursos.length === 0) ? loadCursosForApp() : Promise.resolve(),
  ]).then(renderTabela);

  return `
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Acompanhamento e Registros</span>
      <input class="search-input" placeholder="Buscar colaborador..." oninput="filtrarTabelaGenerica('trein-acompanhamento-tbody', this.value)" style="margin-left:12px">
    </div>
    <div style="padding:12px 20px;border-bottom:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--bg2)">
      <span style="font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase">Status do Colaborador:</span>
      <select class="form-select" style="width:auto" onchange="filtrarStatusAcompanhamento(this.value)">
        <option value="ativos_pendentes" ${window._acompFiltros.status === 'ativos_pendentes' ? 'selected' : ''}>Ativos e Pendente Documentação</option>
        <option value="" ${window._acompFiltros.status === '' ? 'selected' : ''}>Todos os status</option>
        <option value="Ativo" ${window._acompFiltros.status === 'Ativo' ? 'selected' : ''}>Ativo</option>
        <option value="Inativo" ${window._acompFiltros.status === 'Inativo' ? 'selected' : ''}>Inativo</option>
        <option value="Férias" ${window._acompFiltros.status === 'Férias' ? 'selected' : ''}>Férias</option>
        <option value="Afastado" ${window._acompFiltros.status === 'Afastado' ? 'selected' : ''}>Afastado</option>
        <option value="Pendente Documentação" ${window._acompFiltros.status === 'Pendente Documentação' ? 'selected' : ''}>Pendente Documentação</option>
      </select>
      <span style="font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;margin-left:12px">Ordenar:</span>
      <select class="form-select" style="width:auto" onchange="ordenarAcompanhamento(this.value)">
        <option value="nome" ${window._acompOrdem === 'nome' ? 'selected' : ''}>Nome (A-Z)</option>
        <option value="cargo" ${window._acompOrdem === 'cargo' ? 'selected' : ''}>Cargo (A-Z)</option>
        <option value="status-usuario" ${window._acompOrdem === 'status-usuario' ? 'selected' : ''}>Status do Usuário</option>
      </select>
    </div>
    <table>
      <thead>
        <tr>
          <th>Colaborador</th>
          <th>Cargo</th>
          <th>Status</th>
          <th>Usuário de Treinamento</th>
        </tr>
      </thead>
      <tbody id="trein-acompanhamento-tbody">
        <tr><td colspan="4" style="text-align:center;padding:24px;color:var(--text3)">Carregando...</td></tr>
      </tbody>
    </table>
  </div>`;
}

window.filtrarStatusAcompanhamento = function(valor) {
  if (!window._acompFiltros) window._acompFiltros = { status: 'ativos_pendentes' };
  window._acompFiltros.status = valor;
  if (window._renderTreinAcompanhamento) window._renderTreinAcompanhamento();
};

window.ordenarAcompanhamento = function(valor) {
  window._acompOrdem = valor;
  if (window._renderTreinAcompanhamento) window._renderTreinAcompanhamento();
};

// Ao clicar na linha: sem usuário criado ou sem nenhum curso liberado, só
// avisa (não faz sentido abrir a tela de acompanhamento vazia); com usuário
// e ao menos uma liberação, abre o modal de acompanhamento de cursos.
window.clicarLinhaAcompanhamento = async function(idColaborador) {
  await Promise.all([
    (!window._usuariosCadastrados) ? loadUsuariosCadastrados() : Promise.resolve(),
    loadCursoLiberacoesForApp(),
  ]);

  if (!temUsuarioTreinamento(idColaborador)) {
    showToast(`${nomeColaboradorPorId(idColaborador)} ainda não tem usuário de Treinamento cadastrado.`, 4000);
    return;
  }

  // Abre o acompanhamento mesmo sem nenhuma liberação: cursos Externo são
  // registrados manualmente ("Registrar curso concluído") e não dependem de
  // curso_liberacoes, então mesmo sem liberação pode já haver progresso pra
  // mostrar — e sem nenhum dos dois, a tela só mostra as listas vazias.
  abrirAcompanhamentoCursosModal(idColaborador);
};

// Progresso (curso_progresso) de UM colaborador específico — separado de
// window._cursoProgresso (usado em "Meus Cursos" para o colaborador logado)
// pra não colidir cache quando RH/Admin navega entre colaboradores diferentes.
async function loadCursoProgressoColabAcomp(idColaborador) {
  if (!supaClient) {
    console.error('Supabase client não inicializado para curso_progresso.');
    window._acompCursoProgresso = [];
    return;
  }
  const { data, error } = await supaClient.from('curso_progresso').select('*').eq('id_colaborador', idColaborador);
  if (error) {
    console.error('Erro ao carregar progresso de cursos (acompanhamento):', error.message);
    window._acompCursoProgresso = [];
  } else {
    window._acompCursoProgresso = data;
  }
}

// Percentual concluído do curso a partir de aulas_concluidas — cursos Interno
// usam a proporção de aulas marcadas; cursos Externo (sem aulas cadastradas)
// não têm como medir aula a aula, então mostram 100% quando já registrados
// como concluídos.
function percentualConcluidoCurso(idCurso, progresso) {
  const totalAulas = (window._cursoAulas || []).filter(a => a.id_curso === idCurso).length;
  if (totalAulas > 0) {
    const concluidas = (progresso && progresso.aulas_concluidas) || [];
    return Math.round((concluidas.length / totalAulas) * 100);
  }
  return progresso && progresso.status === 'concluido' ? 100 : 0;
}

window.abrirAcompanhamentoCursosModal = async function(idColaborador) {
  await Promise.all([
    (!window._cursos || window._cursos.length === 0) ? loadCursosForApp() : Promise.resolve(),
    (!window._cursoAulas) ? loadCursoAulasForApp() : Promise.resolve(),
    loadCursoLiberacoesForApp(),
    loadCursoProgressoColabAcomp(idColaborador),
  ]);

  window._acompColaboradorId = idColaborador;
  if (!window._acompCursosAba) window._acompCursosAba = 'andamento';

  if (!document.getElementById('acomp-cursos-modal')) {
    const modal = document.createElement('div');
    modal.id = 'acomp-cursos-modal';
    modal.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;';
    modal.innerHTML = `
      <div style="background:#fff;border-radius:6px;width:720px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)">
        <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:15px;font-weight:700" id="acomp-cursos-modal-title">Acompanhamento de Cursos</div>
          <div style="display:flex;gap:8px">
            <button type="button" class="btn btn-sm btn-primary" onclick="abrirRegistrarCursoConcluidoModal()">+ Registrar Curso Concluído</button>
            <button type="button" class="btn btn-sm" onclick="document.getElementById('acomp-cursos-modal').style.display='none'">✕ Fechar</button>
          </div>
        </div>
        <div style="padding:16px 24px 0;display:flex;gap:8px">
          <button class="btn btn-sm" id="acomp-tab-andamento" onclick="mudarAbaAcompanhamento('andamento')">Cursos em Andamento</button>
          <button class="btn btn-sm" id="acomp-tab-concluidos" onclick="mudarAbaAcompanhamento('concluidos')">Cursos Concluídos</button>
        </div>
        <div style="padding:20px 24px" id="acomp-cursos-body"></div>
      </div>`;
    document.body.appendChild(modal);
  }

  document.getElementById('acomp-cursos-modal-title').textContent = `Acompanhamento de Cursos — ${nomeColaboradorPorId(idColaborador)}`;
  window._renderAcompCursosModal = renderAcompCursosModal;
  renderAcompCursosModal();
  document.getElementById('acomp-cursos-modal').style.display = 'flex';
};

window.mudarAbaAcompanhamento = function(aba) {
  window._acompCursosAba = aba;
  renderAcompCursosModal();
};

function renderAcompCursosModal() {
  const body = document.getElementById('acomp-cursos-body');
  if (!body) return;
  const idColaborador = window._acompColaboradorId;

  const btnAndamento = document.getElementById('acomp-tab-andamento');
  const btnConcluidos = document.getElementById('acomp-tab-concluidos');
  if (btnAndamento) btnAndamento.className = `btn btn-sm ${window._acompCursosAba === 'andamento' ? 'btn-primary' : ''}`;
  if (btnConcluidos) btnConcluidos.className = `btn btn-sm ${window._acompCursosAba === 'concluidos' ? 'btn-primary' : ''}`;

  const progressos = (window._acompCursoProgresso || []).filter(p => p.id_colaborador === idColaborador);

  if (window._acompCursosAba === 'concluidos') {
    const concluidos = progressos.filter(p => p.status === 'concluido');
    body.innerHTML = concluidos.length === 0
      ? '<div style="text-align:center;padding:24px;color:var(--text3)">Nenhum curso concluído ainda.</div>'
      : `<table style="width:100%">
          <thead><tr>
            <th style="text-align:left;font-size:11px;color:var(--text3);padding:6px 0;border-bottom:1px solid var(--border)">Curso</th>
            <th style="text-align:left;font-size:11px;color:var(--text3);padding:6px 0;border-bottom:1px solid var(--border)">% Concluído</th>
            <th style="text-align:left;font-size:11px;color:var(--text3);padding:6px 0;border-bottom:1px solid var(--border)">Período Início</th>
            <th style="text-align:left;font-size:11px;color:var(--text3);padding:6px 0;border-bottom:1px solid var(--border)">Período Fim</th>
            <th style="text-align:left;font-size:11px;color:var(--text3);padding:6px 0;border-bottom:1px solid var(--border)">% de Acerto</th>
          </tr></thead>
          <tbody>
            ${concluidos.map(p => {
              const curso = (window._cursos || []).find(c => c.id === p.id_curso);
              return `
              <tr>
                <td style="padding:8px 0;font-size:13px">${curso ? curso.nome : '—'}</td>
                <td style="padding:8px 0;font-size:13px">${percentualConcluidoCurso(p.id_curso, p)}%</td>
                <td style="padding:8px 0;font-size:13px">${p.iniciado_em ? new Date(p.iniciado_em).toLocaleDateString('pt-BR') : '—'}</td>
                <td style="padding:8px 0;font-size:13px">${p.concluido_em ? new Date(p.concluido_em).toLocaleDateString('pt-BR') : '—'}</td>
                <td style="padding:8px 0;font-size:13px">${p.percentual_acerto !== null && p.percentual_acerto !== undefined ? p.percentual_acerto + '%' : '—'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`;
    return;
  }

  // Em andamento: cursos Interno liberados que ainda não foram concluídos —
  // "Não iniciado" quando ainda não existe linha de progresso, "Em andamento"
  // quando já existe mas o status ainda não virou "concluido".
  const liberacoes = (window._cursoLiberacoes || []).filter(l => l.id_colaborador === idColaborador && l.status === 'Liberado');
  const itens = liberacoes
    .map(l => ({ curso: (window._cursos || []).find(c => c.id === l.id_curso), progresso: progressos.find(p => p.id_curso === l.id_curso) }))
    .filter(item => item.curso && (!item.progresso || item.progresso.status !== 'concluido'));

  body.innerHTML = itens.length === 0
    ? '<div style="text-align:center;padding:24px;color:var(--text3)">Nenhum curso em andamento.</div>'
    : itens.map(({ curso, progresso }) => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:13px;font-weight:600">${curso.nome}</div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:12px;color:var(--text3)">${percentualConcluidoCurso(curso.id, progresso)}% concluído</span>
            ${progresso ? '<span class="badge badge-pending">Em andamento</span>' : '<span class="badge badge-gray">Não iniciado</span>'}
          </div>
        </div>`).join('');
}

// Registro manual de conclusão — só faz sentido pra cursos Externo (Interno
// é concluído pelo próprio colaborador jogando o player até o fim, ver
// finalizarCursoSemAvaliacao/enviarAvaliacaoAluno). Usa upsert porque
// curso_progresso tem unique(id_curso, id_colaborador): se já existir uma
// linha (ex.: corrigindo as datas de um registro anterior), atualiza em vez
// de tentar duplicar.
window.abrirRegistrarCursoConcluidoModal = function() {
  if (!document.getElementById('registrar-curso-concluido-modal')) {
    const modal = document.createElement('div');
    modal.id = 'registrar-curso-concluido-modal';
    modal.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1100;align-items:center;justify-content:center;';
    modal.innerHTML = `
      <div style="background:#fff;border-radius:6px;width:440px;max-width:95vw;box-shadow:0 8px 40px rgba(0,0,0,.2)">
        <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:15px;font-weight:700">Registrar Curso Concluído</div>
          <button type="button" class="btn btn-sm" onclick="document.getElementById('registrar-curso-concluido-modal').style.display='none'">✕</button>
        </div>
        <div style="padding:24px">
          <div class="form-group" style="margin-bottom:16px">
            <label class="form-label">Curso (Externo)</label>
            <select class="form-select" id="rcc-curso"><option value="">— Selecione —</option></select>
          </div>
          <div class="form-group" style="margin-bottom:16px">
            <label class="form-label">Período Início</label>
            <input class="form-input" type="date" id="rcc-inicio">
          </div>
          <div class="form-group">
            <label class="form-label">Período Fim</label>
            <input class="form-input" type="date" id="rcc-fim">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn" onclick="document.getElementById('registrar-curso-concluido-modal').style.display='none'">Cancelar</button>
          <button type="button" class="btn btn-primary" id="rcc-btn-salvar" onclick="salvarRegistroCursoConcluido()">Registrar</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  }

  const cursosExternos = (window._cursos || []).filter(c => c.tipo === 'Externo');
  const sel = document.getElementById('rcc-curso');
  sel.innerHTML = '<option value="">— Selecione —</option>' + cursosExternos.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
  document.getElementById('rcc-inicio').value = '';
  document.getElementById('rcc-fim').value = '';

  document.getElementById('registrar-curso-concluido-modal').style.display = 'flex';
};

window.salvarRegistroCursoConcluido = async function() {
  const idCurso = document.getElementById('rcc-curso').value;
  const inicio = document.getElementById('rcc-inicio').value;
  const fim = document.getElementById('rcc-fim').value;
  const idColaborador = window._acompColaboradorId;
  if (!idCurso) return showToast('Selecione o curso.');
  if (!inicio) return showToast('Informe o período de início.');
  if (!fim) return showToast('Informe o período de fim.');
  if (!idColaborador) return showToast('Colaborador não identificado.');

  const btn = document.getElementById('rcc-btn-salvar');
  if (btn) { btn.disabled = true; btn.textContent = 'Registrando...'; }

  try {
    const payload = {
      id_curso: idCurso,
      id_colaborador: idColaborador,
      status: 'concluido',
      aulas_concluidas: [],
      resultado_avaliacao: null,
      percentual_acerto: null,
      iniciado_em: inicio,
      concluido_em: fim,
    };
    const { error } = await supaClient.from('curso_progresso').upsert(payload, { onConflict: 'id_curso,id_colaborador' });
    if (error) throw error;

    await loadCursoProgressoColabAcomp(idColaborador);
    window._acompCursosAba = 'concluidos';
    if (window._renderAcompCursosModal) window._renderAcompCursosModal();
    document.getElementById('registrar-curso-concluido-modal').style.display = 'none';
    showToast('Curso concluído registrado!');
  } catch (e) {
    console.error('Erro ao registrar curso concluído:', e);
    showToast('Erro ao registrar curso concluído: ' + (e.message || e), 4000);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Registrar'; }
  }
};

// ------------------------------------------------------------
// PERMISSÕES DE ACESSO — grade perfil × página, só para Administrador
// (temPermissao/podeGerenciarPermissoes já travam isso na sidebar e no
// renderPage; a policy do Supabase também só deixa Administrador
// inserir/apagar em `permissoes`).
// ------------------------------------------------------------
// Ids que nunca aparecem nesta grade porque são travados direto no código,
// não dependem só da tabela permissoes (ver temPermissao()).
const PAGINAS_FORA_DA_GRADE = ['trein-cadastro-usuario', 'permissoes-acesso'];

// Deriva a lista de páginas "gerenciáveis" a partir do próprio NAV — evita
// manter uma segunda lista duplicada que poderia ficar desatualizada.
function paginasParaGrade() {
  const grupos = [];
  NAV.forEach(item => {
    if (item.subs && item.subs.length) {
      const subs = item.subs.filter(s => !PAGINAS_FORA_DA_GRADE.includes(s.id));
      if (subs.length) grupos.push({ label: item.label, paginas: subs });
    } else if (!PAGINAS_FORA_DA_GRADE.includes(item.id)) {
      grupos.push({ label: item.label, paginas: [{ id: item.id, label: item.label }] });
    }
  });
  return grupos;
}

async function loadPerfisEPermissoesParaGrade() {
  const [{ data: perfis, error: errPerfis }, { data: permissoes, error: errPermissoes }] = await Promise.all([
    supaClient.from('perfis').select('id, nome').order('id'),
    supaClient.from('permissoes').select('perfil_id, pagina_id'),
  ]);
  if (errPerfis) console.error('Erro ao carregar perfis:', errPerfis.message);
  if (errPermissoes) console.error('Erro ao carregar permissões:', errPermissoes.message);
  window._perfisGrade = perfis || [];
  window._permissoesGradeSet = new Set((permissoes || []).map(p => `${p.perfil_id}:${p.pagina_id}`));
}

function pagePermissoesAcesso() {
  document.getElementById('topbar-actions').innerHTML = '';

  const renderGrade = () => {
    const container = document.getElementById('permissoes-grade-container');
    if (!container) return;
    const perfis = window._perfisGrade || [];
    const grupos = paginasParaGrade();
    const marcado = (perfilId, paginaId) => (window._permissoesGradeSet || new Set()).has(`${perfilId}:${paginaId}`);

    container.innerHTML = `
      <div style="overflow-x:auto">
      <table style="white-space:nowrap">
        <thead>
          <tr>
            <th style="text-align:left">Página</th>
            ${perfis.map(p => `<th style="text-align:center">${p.nome}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${grupos.map(g => `
            <tr><td colspan="${perfis.length + 1}" style="background:var(--bg2);font-weight:700;font-size:12px;padding:8px 10px">${g.label}</td></tr>
            ${g.paginas.map(pg => `
              <tr>
                <td style="padding-left:20px">${pg.label}</td>
                ${perfis.map(p => `
                  <td style="text-align:center">
                    <input type="checkbox" ${marcado(p.id, pg.id) ? 'checked' : ''}
                      onchange="alterarPermissaoGrade(${p.id}, '${pg.id}', this.checked)">
                  </td>`).join('')}
              </tr>`).join('')}
          `).join('')}
        </tbody>
      </table>
      </div>
      <p style="font-size:12px;color:var(--text3);margin-top:16px">
        "Cadastro de Usuário" (dentro de Treinamentos) e esta própria página, "Permissões de Acesso", não aparecem
        aqui de propósito: ficam sempre restritas a Administrador — e, no caso de Cadastro de Usuário, também RH —
        direto no código, independente do que estiver marcado nesta tabela.
      </p>`;
  };

  window._renderPermissoesGrade = renderGrade;
  loadPerfisEPermissoesParaGrade().then(renderGrade);

  return `
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Permissões de Acesso</span>
    </div>
    <div style="padding:20px" id="permissoes-grade-container">
      <div style="text-align:center;padding:24px;color:var(--text3)">Carregando...</div>
    </div>
  </div>`;
}

window.alterarPermissaoGrade = async function(perfilId, paginaId, marcar) {
  try {
    if (marcar) {
      const { error } = await supaClient.from('permissoes').insert([{ perfil_id: perfilId, pagina_id: paginaId }]);
      if (error) throw error;
      window._permissoesGradeSet.add(`${perfilId}:${paginaId}`);
    } else {
      const { error } = await supaClient.from('permissoes').delete().eq('perfil_id', perfilId).eq('pagina_id', paginaId);
      if (error) throw error;
      window._permissoesGradeSet.delete(`${perfilId}:${paginaId}`);
    }
    showToast('Permissão atualizada!');
  } catch (e) {
    console.error('Erro ao atualizar permissão:', e);
    showToast('Erro ao atualizar permissão: ' + (e.message || e), 'danger');
    // Reverte o checkbox visualmente, já que window._permissoesGradeSet não mudou.
    if (window._renderPermissoesGrade) window._renderPermissoesGrade();
  }
};

function secoesRelatorioSelecionadas() {
  const checks = document.querySelectorAll('.rel-secao-check:checked');
  return Array.from(checks).map(c => c.value);
}

window.filtrarSelectColaboradorRelatorio = function(query) {
  const sel = document.getElementById('rel-colaborador');
  const painel = document.getElementById('rel-colaborador-sugestoes');
  if (!sel) return;
  const q = String(query || '').trim().toLowerCase();
  const valorAtual = sel.value;
  const filtrados = (_colaboradoresSupabase || []).filter(c => !q || (c.nome_colaborador || '').toLowerCase().includes(q));

  sel.innerHTML = '<option value="">— Selecione um colaborador —</option>' +
    filtrados.map(c => `<option value="${c.id_colaborador}">${c.nome_colaborador}</option>`).join('');
  if (valorAtual && filtrados.some(c => String(c.id_colaborador) === String(valorAtual))) {
    sel.value = valorAtual;
  }

  if (!painel) return;
  if (!q) {
    painel.classList.remove('open');
    painel.innerHTML = '';
    return;
  }
  painel.innerHTML = filtrados.length === 0
    ? '<div style="padding:8px;color:var(--text3);font-size:12px">Nenhum colaborador encontrado.</div>'
    : filtrados.slice(0, 30).map(c => `<div class="ms-option" onclick="selecionarColaboradorRelatorio(${c.id_colaborador}, '${(c.nome_colaborador || '').replace(/'/g, "\\'")}')">${c.nome_colaborador}</div>`).join('');
  painel.classList.add('open');
};

window.selecionarColaboradorRelatorio = function(idColaborador, nome) {
  const sel = document.getElementById('rel-colaborador');
  const busca = document.getElementById('rel-colaborador-busca');
  const painel = document.getElementById('rel-colaborador-sugestoes');
  if (sel) sel.value = idColaborador;
  if (busca) busca.value = nome;
  if (painel) { painel.classList.remove('open'); painel.innerHTML = ''; }
  window.gerarRelatorioColaborador(idColaborador);
};

window.toggleTodasSecoes = function(marcado) {
  document.querySelectorAll('.rel-secao-check').forEach(c => { c.checked = marcado; });
  const master = document.getElementById('rel-secao-todas');
  if (master) master.indeterminate = false;
  atualizarRelatorioAposMudarSecoes();
};

window.onChangeSecaoRelatorio = function() {
  const checks = Array.from(document.querySelectorAll('.rel-secao-check'));
  const todasMarcadas = checks.every(c => c.checked);
  const nenhumaMarcada = checks.every(c => !c.checked);
  const master = document.getElementById('rel-secao-todas');
  if (master) {
    master.checked = todasMarcadas;
    master.indeterminate = !todasMarcadas && !nenhumaMarcada;
  }
  atualizarRelatorioAposMudarSecoes();
};

// Sem isso, marcar/desmarcar uma seção não atualizava nem a pré-visualização
// nem window._relatorioAtual — então o PDF/XLSX baixado continuava refletindo
// as seções de antes da mudança, exigindo recarregar a página pra corrigir.
function atualizarRelatorioAposMudarSecoes() {
  if (!window._relatorioAtual) return;
  if (window._relatorioAtual.tipo === 'todos') {
    window.gerarRelatorioTodos();
    return;
  }
  const sel = document.getElementById('rel-colaborador');
  if (sel && sel.value) window.gerarRelatorioColaborador(sel.value);
}

function montarDadosRelatorioColaborador(idColaborador) {
  const colab = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador) === String(idColaborador));
  if (!colab) return null;
  const historico = (window._colaboradorHistorico || [])
    .filter(h => String(h.id_colaborador) === String(idColaborador))
    .sort((a, b) => new Date(b.periodo_inicio || 0) - new Date(a.periodo_inicio || 0));
  const dadosPessoais = (window._dadosPessoaisEpi || []).find(d => String(d.id_colaborador) === String(idColaborador));
  const perfil = (window._mapeamentoPerfil || []).find(m => String(m.id_colaborador) === String(idColaborador));
  const ocorrencias = (_ocorrenciasSupabase || [])
    .filter(o => String(o.id_colaborador) === String(idColaborador))
    .sort((a, b) => (b.data_ocorrencia || '').localeCompare(a.data_ocorrencia || ''));
  return { colab, historico, dadosPessoais, perfil, ocorrencias };
}

window.gerarRelatorioColaborador = function(idColaborador) {
  const view = document.getElementById('relatorio-colaborador-view');
  if (!view) return;
  if (!idColaborador) { view.innerHTML = ''; window._relatorioAtual = null; return; }

  const dadosColab = montarDadosRelatorioColaborador(idColaborador);
  if (!dadosColab) {
    view.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🤔</div><div class="empty-state-title">Colaborador não encontrado</div></div>`;
    return;

  const secoes = secoesRelatorioSelecionadas();

  view.innerHTML = `
  ${cabecalhoRelatorioHtml()}

window.gerarRelatorioTodos = function() {
  const view = document.getElementById('relatorio-colaborador-view');
  if (!view) return;

  const secoes = secoesRelatorioSelecionadas();
  const statusSel = document.getElementById('rel-status-todos');
  const modoStatus = statusSel ? statusSel.value : 'ativos_pendentes';
  let lista = [...(_colaboradoresSupabase || [])];
  if (modoStatus === 'ativos_pendentes') {
    lista = lista.filter(c => c.status_colaborador === 'Ativo' || c.status_colaborador === 'Pendente Documentação');
  }
  lista.sort((a, b) => (a.nome_colaborador || '').localeCompare(b.nome_colaborador || ''));
  if (lista.length === 0) {
    view.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-title">Nenhum colaborador encontrado para o status selecionado</div></div>`;
    return;

  const sel = document.getElementById('rel-colaborador');
  if (sel) sel.value = '';

  const colaboradoresDados = lista.map(c => montarDadosRelatorioColaborador(c.id_colaborador)).filter(Boolean);
  window._relatorioAtual = { tipo: 'todos', colaboradores: colaboradoresDados, secoes };

  view.innerHTML = `
  ${cabecalhoRelatorioHtml()}
  <div class="table-card" style="margin-bottom:16px">

      <span class="table-title">Relatório Completo — Todos os Colaboradores (${colaboradoresDados.length})</span>

    </div>

  ${colaboradoresDados.map(d => `
    <div class="table-card" style="margin-bottom:16px">
      <div class="table-header"><span class="table-title">${d.colab.nome_colaborador}</span></div>
      <div style="padding:24px">
        ${construirHtmlSecoesColaborador(d, secoes)}
      </div>
    </div>`).join('')}`;
};

// Escreve as seções de um colaborador no documento PDF, usando state.y como cursor
// vertical compartilhado (objeto mutável, já que números não passam por referência).
function escreverColaboradorNoPdf(doc, state, dadosColab, secoes, margemEsq) {
  const { colab, historico, dadosPessoais, perfil, ocorrencias } = dadosColab;

  const checarQuebra = (qtdLinhas) => { if (state.y + qtdLinhas * 6 > 280) { doc.addPage(); state.y = 18; } };
  const titulo = (texto) => {
    checarQuebra(2);
    doc.setFont(undefined, 'bold');
    doc.setFontSize(13);
    doc.text(texto, margemEsq, state.y);
    state.y += 8;
    doc.setFont(undefined, 'normal');
    doc.setFontSize(10);
  };
  const campo = (label, valor) => {
    const linhasQuebradas = doc.splitTextToSize(`${label}: ${valor || '—'}`, 180);
    checarQuebra(linhasQuebradas.length);
    doc.text(linhasQuebradas, margemEsq, state.y);
    state.y += linhasQuebradas.length * 6;
  };

  doc.setFontSize(16);
  doc.setFont(undefined, 'bold');
  doc.text(`Relatório — ${colab.nome_colaborador}`, margemEsq, state.y);
  state.y += 10;
  doc.setFont(undefined, 'normal');
  doc.setFontSize(10);

  const salarioNum = salarioBaseDoColaborador(colab);

  if (secoes.includes('contratuais')) {
    titulo('Dados Contratuais');
    campo('Cargo', colab.cargos ? colab.cargos.nome_cargo : '—');
    campo('Status', colab.status_colaborador);
    campo('Tipo de Contrato', colab.tipo_de_contrato);
    if (colab.tipo_de_contrato === 'Temporária') {
      campo('Período do Contrato', colab.periodo_contrato);
      campo('Prorrogação', colab.prorrogacao_contrato);
    }
    campo('Salário Base', salarioNum !== null ? new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(salarioNum) : '—');
    campo('Data de Admissão', formatarDataBR(colab.desde));
    campo('Data de Efetivação', formatarDataBR(colab.desde_efetivo));
  }

  if (secoes.includes('historico')) {
    titulo('Histórico de Carreira');
    if (historico.length === 0) {

// Carrega a logo como base64 (necessário pro jsPDF, que não busca URLs sozinho)
// e guarda em cache para não converter de novo a cada PDF gerado.
function obterLogoBase64() {
  if (window._logoBase64) return Promise.resolve(window._logoBase64);
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      canvas.getContext('2d').drawImage(img, 0, 0);
      window._logoBase64 = canvas.toDataURL('image/png');
      resolve(window._logoBase64);
    };
    img.onerror = reject;
    img.src = 'assets/logo-minart.png';
  });
}

// Nome padrão dos arquivos exportados (PDF/XLSX): data-relatório-<colaborador ou todos>-minart.
function nomeBaseArquivoRelatorio(tipo, colaboradores) {
  const hoje = new Date();
  const dataStr = `${String(hoje.getDate()).padStart(2, '0')}-${String(hoje.getMonth() + 1).padStart(2, '0')}-${hoje.getFullYear()}`;
  const alvo = tipo === 'todos'
    ? 'todos'
    : (colaboradores[0].colab.nome_colaborador || 'colaborador').trim().replace(/\s+/g, '-').toLowerCase();
  return `${dataStr}-relatorio-${alvo}-minart`;
}

window.baixarRelatorioPdf = async function() {
  if (!window.jspdf || !window._relatorioAtual || !window._relatorioAtual.colaboradores || window._relatorioAtual.colaboradores.length === 0) {
    showToast('Gere o relatório antes de baixar o PDF.');
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const margemEsq = 14;
  const state = { y: 18 };
  const { colaboradores, secoes, tipo } = window._relatorioAtual;

  try {
    const logoBase64 = await obterLogoBase64();
    doc.addImage(logoBase64, 'PNG', margemEsq, state.y, 45, 10.85);
    state.y += 16;
  } catch (e) {
    console.warn('Não foi possível incluir a logo no PDF:', e);
  }

  doc.setFontSize(9);
  doc.setFont(undefined, 'normal');
  doc.setTextColor(120);
  doc.text(`Impresso em: ${new Date().toLocaleString('pt-BR')}`, margemEsq, state.y);

  colaboradores.forEach((dadosColab, idx) => {

  contratuais: 'Dados Contratuais',
  historico: 'Histórico de Carreira',
  pessoais: 'Dados Pessoais',
  epis: 'EPIs',
  perfil: 'Mapeamento de Perfil',

// Empilha os blocos das seções escolhidas numa única lista de linhas (aoa),
// com o título da seção antes de cada tabela — usado pra gerar 1 guia só.
function montarLinhasConsolidadas(secoes, blocos) {
  const linhas = [];
  secoes.forEach(chave => {
    const bloco = blocos[chave];
    if (!bloco) return;
    linhas.push([bloco.titulo]);
    bloco.linhas.forEach(l => linhas.push(l));
    linhas.push([]);
    // "Temporários" é um detalhe de "Dados Contratuais" (só existe pra quem é
    // Temporária), então entra logo em seguida, sem precisar de seção própria.
    if (chave === 'contratuais' && blocos.temporarios && blocos.temporarios.linhas.length > 1) {
      linhas.push([blocos.temporarios.titulo]);
      blocos.temporarios.linhas.forEach(l => linhas.push(l));
      linhas.push([]);
    }
  });
  return linhas;
}

// Calcula, para cada coluna, a largura (em caracteres) do maior conteúdo entre
// todas as linhas, para a planilha se auto-ajustar em vez de ficar com colunas
// de largura fixa/padrão.
function largurasAutoAjustadas(linhas) {
  const larguras = [];
  linhas.forEach(row => {
    row.forEach((cel, idx) => {
      const texto = (cel === null || cel === undefined) ? '' : String(cel);
      if (texto.length > (larguras[idx] || 0)) larguras[idx] = texto.length;
    });
  });
  return larguras.map(l => ({ wch: Math.min(Math.max(l + 2, 8), 60) }));
}

// Monta a planilha a partir do aoa e, para toda linha de título de seção
// (linha com uma única célula, seguida de uma linha de cabeçalho com mais de
// uma coluna), mescla essa célula até a largura da tabela correspondente e
// centraliza o texto. Aplica também bordas em volta de todo o conteúdo e,
// opcionalmente (autoWidth, default true), o auto-ajuste de largura das colunas.
function construirPlanilhaComTitulos(linhas, opts) {
  const autoWidth = !opts || opts.autoWidth !== false;
  const ws = XLSX.utils.aoa_to_sheet(linhas);
  const merges = [];
  const bordaFina = { style: 'thin', color: { rgb: '000000' } };
  linhas.forEach((row, r) => {
    const proxima = linhas[r + 1];
    const ehTitulo = row.length === 1 && row[0] && proxima && proxima.length > 1;
    if (ehTitulo) merges.push({ s: { r, c: 0 }, e: { r, c: proxima.length - 1 } });
    row.forEach((_, c) => {
      const endereco = XLSX.utils.encode_cell({ r, c });
      if (!ws[endereco]) return;
      const estiloTitulo = ehTitulo && c === 0 ? { alignment: { horizontal: 'center', vertical: 'center' }, font: { bold: true } } : {};
      ws[endereco].s = { ...estiloTitulo, border: { top: bordaFina, bottom: bordaFina, left: bordaFina, right: bordaFina } };
    });
  });
  if (merges.length) ws['!merges'] = merges;
  if (autoWidth) ws['!cols'] = largurasAutoAjustadas(linhas);
  return ws;
}

window.baixarRelatorioXlsx = function() {
  if (!window.XLSX || !window._relatorioAtual || !window._relatorioAtual.colaboradores || window._relatorioAtual.colaboradores.length === 0) {
    showToast('Gere o relatório antes de baixar o XLSX.');
    return;
  }
  const { colaboradores, secoes, tipo } = window._relatorioAtual;
  if (secoes.length === 0) {
    showToast('Selecione ao menos uma seção para gerar o XLSX.');
    return;
  }

  const blocos = construirBlocosSecoesRelatorio(colaboradores);
  const wb = XLSX.utils.book_new();

  if (tipo === 'todos') {
    // Guia consolidada primeiro, seguida de uma guia por seção (como já era).
    XLSX.utils.book_append_sheet(wb, construirPlanilhaComTitulos(montarLinhasConsolidadas(secoes, blocos), { autoWidth: false }), 'Todos - Completo');
    secoes.forEach(chave => {
      const bloco = blocos[chave];
      if (bloco) XLSX.utils.book_append_sheet(wb, construirPlanilhaComTitulos(bloco.linhas), NOME_ABA_SECAO_RELATORIO[chave] || chave);
      if (chave === 'contratuais' && blocos.temporarios && blocos.temporarios.linhas.length > 1) {
        XLSX.utils.book_append_sheet(wb, construirPlanilhaComTitulos(blocos.temporarios.linhas), 'Temporários');
      }
    });
  } else {
    // Um único colaborador: tudo numa guia só.
    XLSX.utils.book_append_sheet(wb, construirPlanilhaComTitulos(montarLinhasConsolidadas(secoes, blocos)), 'Relatório Completo');
  }

  const nomeArquivo = `${nomeBaseArquivoRelatorio(tipo, colaboradores)}.xlsx`;
  XLSX.writeFile(wb, nomeArquivo);
};

function toDrivePreviewUrl(url) {
  if (!url) return '';
  const m = url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);
  if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
  return url;
}

async function loadInternosIframe(pageId) {
  const nomeMap = {
    'int-cultura':     'Manual de Cultura',
    'int-regulamento': 'Regulamento interno',
    'int-convencao':   'Convenção Siman',
  };
  const loading = document.getElementById(`${pageId}-loading`);
  const iframe  = document.getElementById(`${pageId}-iframe`);
  if (!iframe || !supaClient) return;
  try {
    const { data, error } = await supaClient.from('internos').select('id_drive').eq('nome', nomeMap[pageId]).maybeSingle();
    if (error) throw error;
    const url = toDrivePreviewUrl(data?.id_drive || '');
    if (url) {
      iframe.src = url;
      iframe.style.display = 'block';
      if (loading) loading.style.display = 'none';
    } else {
      if (loading) loading.textContent = 'Documento não encontrado.';
    }
  } catch(e) {
    if (loading) loading.textContent = 'Erro ao carregar documento.';
    console.error('Erro ao carregar internos:', e);
  }
}

window.enviarCandidatura = async function(token) {
  const nome          = (document.getElementById('pub-nome')?.value || '').trim();
  const cpf           = (document.getElementById('pub-cpf')?.value || '').trim();
  const dataNascimento = (document.getElementById('pub-nascimento')?.value || '').trim();
  const nomeMae       = (document.getElementById('pub-nome-mae')?.value || '').trim();
  const numero        = (document.getElementById('pub-numero')?.value || '').trim();
  const instagram      = (document.getElementById('pub-instagram')?.value || '').trim();
  const currFile      = document.getElementById('pub-curriculo')?.files[0];
  const msgEl         = document.getElementById('pub-msg');
  const btnEl         = document.getElementById('pub-submit-btn');

  if (!nome)           { msgEl.textContent = 'Informe seu nome.'; msgEl.className = 'pub-msg pub-error'; return; }
  if (!cpf)            { msgEl.textContent = 'Informe seu CPF.'; msgEl.className = 'pub-msg pub-error'; return; }
  if (!dataNascimento) { msgEl.textContent = 'Informe sua data de nascimento.'; msgEl.className = 'pub-msg pub-error'; return; }
  if (!nomeMae)        { msgEl.textContent = 'Informe o nome da sua mãe.'; msgEl.className = 'pub-msg pub-error'; return; }
  if (!currFile)       { msgEl.textContent = 'Anexe seu currículo.'; msgEl.className = 'pub-msg pub-error'; return; }

  const vaga = window._pubVagaAtual;
  if (!vaga) { msgEl.textContent = 'Vaga não encontrada.'; msgEl.className = 'pub-msg pub-error'; return; }

  btnEl.disabled = true;
  msgEl.textContent = 'Enviando...';
  msgEl.className = 'pub-msg';

  let urlCurriculo = null;
  if (currFile) {
    try {
      urlCurriculo = await window.enviarCurriculoParaDrive(currFile, { nomeCandidato: nome, vagaCargo: window._pubCargoNome || '—' });
    } catch (error) {
      console.error('Erro ao enviar currículo:', error);
      msgEl.textContent = 'Falha ao enviar o currículo. Tente novamente.';
      msgEl.className = 'pub-msg pub-error';
      btnEl.disabled = false;
      return;
    }
  }

  // Grava a candidatura via RPC (vaga resolvida e validada server-side pelo
  // token — o cliente não escolhe id_vagas/id_cargos diretamente), que já
  // incrementa o contador da vaga na mesma transação. Ver
  // sql/rpc-candidatura-publica.sql.
  const { error } = await supaClient.rpc('enviar_candidatura', {
    p_token: token,
    p_nome: nome,
    p_cpf: cpf,
    p_data_nascimento: dataNascimento,
    p_nome_mae: nomeMae,
    p_numero: numero || null,
    p_instagram: instagram || null,
    p_url_curriculo: urlCurriculo,
  });

  if (error) {
    console.error('Erro ao salvar candidatura:', error.message);
    msgEl.textContent = 'Erro ao enviar candidatura. Tente novamente mais tarde.';
    msgEl.className = 'pub-msg pub-error';
    btnEl.disabled = false;
    return;
  }

  // Feedback visual
  document.getElementById('pub-box').innerHTML = `
    <div style="text-align:center;padding:32px 0">
      <div style="font-size:40px;margin-bottom:16px">✅</div>
      <div style="font-size:18px;font-weight:700;color:#111;margin-bottom:8px">Candidatura enviada!</div>
      <div style="font-size:14px;color:#666">Obrigado, <strong>${nome}</strong>. Entraremos em contato em breve.</div>
    </div>`;
};

window.iniciarAvaliacaoDisc = function() {
  const pa = window._pubAval;
  pa.discMatriz = gerarMatrizDisc();
  pa.discTeste = { tela: 0, respostas: Array.from({ length: 10 }, () => [null, null, null, null]) };

function renderAvaliacaoDiscQuiz() {
  const pa = window._pubAval;
  const container = document.getElementById('aval-disc-quiz');
  if (!container) return;
  const st = pa.discTeste;
  const linha = pa.discMatriz[st.tela];
  const respostasTela = st.respostas[st.tela];

  const blocoHtml = linha.map((item, i) => `
    <div class="table-card" style="display:flex;align-items:center;gap:16px;padding:14px 18px;margin-bottom:10px">
      <div style="flex:1;font-size:14px">${item.texto}</div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        ${[1, 2, 3, 4].map(n => `
          <button type="button" onclick="selecionarNotaAvaliacaoDisc(${i}, ${n})"
            style="width:36px;height:36px;border-radius:4px;border:1px solid var(--border);font-weight:700;font-size:14px;cursor:pointer;background:${respostasTela[i] === n ? '#111' : '#fff'};color:${respostasTela[i] === n ? '#fff' : '#111'}">${n}</button>`).join('')}
      </div>
    </div>`).join('');

  container.innerHTML = `
    <div class="form-card">
      <div style="font-size:16px;font-weight:700;margin-bottom:4px">Exibição ${st.tela + 1} de 10</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:16px">Atribua as notas de 1 a 4 sem repetir entre os 4 blocos abaixo.</div>
      ${blocoHtml}
      <div id="aval-disc-aviso" style="display:none;color:var(--danger);font-size:13px;font-weight:600;margin:12px 0"></div>
      <div style="display:flex;justify-content:space-between;margin-top:16px">
        <button class="btn" onclick="voltarAvaliacaoDisc()" ${st.tela === 0 ? 'disabled style="opacity:.4;cursor:not-allowed"' : ''}>← Voltar</button>
        ${st.tela < 9
          ? `<button class="btn btn-primary" onclick="avancarAvaliacaoDisc()">Próxima Exibição →</button>`
          : `<button class="btn btn-primary" onclick="finalizarAvaliacaoDisc()">Concluir Avaliação</button>`}
      </div>
    </div>`;
}

function validarTelaAvaliacaoDiscAtual() {
  const pa = window._pubAval;
  const respostas = pa.discTeste.respostas[pa.discTeste.tela];
  const avisoEl = document.getElementById('aval-disc-aviso');
  if (respostas.some(v => v === null)) {
    if (avisoEl) { avisoEl.textContent = 'Preencha as 4 notas antes de continuar.'; avisoEl.style.display = ''; }
    return false;
  }
  if (new Set(respostas).size !== 4) {
    if (avisoEl) { avisoEl.textContent = 'Repetição de números não é permitido.'; avisoEl.style.display = ''; }
    return false;
  }
  if (avisoEl) avisoEl.style.display = 'none';
  return true;
}

window.selecionarNotaAvaliacaoDisc = function(blocoIdx, nota) {
  const pa = window._pubAval;
  pa.discTeste.respostas[pa.discTeste.tela][blocoIdx] = nota;
  renderAvaliacaoDiscQuiz();
};

window.avancarAvaliacaoDisc = function() {
  if (!validarTelaAvaliacaoDiscAtual()) return;
  const pa = window._pubAval;
  if (pa.discTeste.tela < 9) { pa.discTeste.tela++; renderAvaliacaoDiscQuiz(); }
};

window.voltarAvaliacaoDisc = function() {
  const avisoEl = document.getElementById('aval-disc-aviso');
  if (avisoEl) avisoEl.style.display = 'none';
  const pa = window._pubAval;
  if (pa.discTeste.tela > 0) { pa.discTeste.tela--; renderAvaliacaoDiscQuiz(); }
};

// Calcula o perfil e chama a RPC finalizar_avaliacao_disc (sem nunca exibir o
// resultado na tela), que grava em testes_avaliacoes.resultado_perfil_disc_1/2
// e marca a avaliação como concluída — o processo de aprovação usa somente o
// Perfil DISC, sem Competências/Entrevista.
window.finalizarAvaliacaoDisc = async function() {
  if (!validarTelaAvaliacaoDiscAtual()) return;
  const pa = window._pubAval;

  const rotulos = ['Executor', 'Comunicador', 'Planejador', 'Analista'];
  const somas = [0, 0, 0, 0];
  pa.discTeste.respostas.forEach(respostasTela => { respostasTela.forEach((nota, i) => { somas[i] += (nota || 0); }); });
  const ranking = rotulos.map((rotulo, i) => ({ rotulo, soma: somas[i] })).sort((a, b) => b.soma - a.soma);

  const container = document.getElementById('aval-disc-quiz');
  if (container) container.innerHTML = `<div class="form-card" style="text-align:center;padding:48px 24px"><div style="font-size:40px;margin-bottom:16px">⏳</div><div style="font-size:15px;color:var(--text3)">Salvando sua avaliação...</div></div>`;

  // Chama a função no Postgres (RPC) em vez de dar update/insert direto nas
  // tabelas: só quem tem o token consegue fechar ESSA avaliação específica,
  // mesmo que alguém tente usar a chave anon direto na API (ver
  // sql/rpc-finalizar-avaliacao-disc.sql). A função já cuida de gravar o
  // resultado em testes_avaliacoes e, se for colaborador interno, replicar
  // em mapeamento_perfil.perfil_disc_1/2.
  try {
    const { error } = await supaClient.rpc('finalizar_avaliacao_disc', {
      p_token: pa.token,
      p_perfil_1: ranking[0].rotulo,
      p_perfil_2: ranking[1].rotulo,
    });
    if (error) throw error;
  } catch (e) {
    console.error('Erro ao salvar resultado do Perfil DISC:', e?.message || e, e?.details || '', e?.hint || '');
    if (container) container.innerHTML = `<div class="form-card" style="text-align:center;padding:48px 24px"><div style="color:var(--danger);font-weight:600">Erro ao salvar sua avaliação. Tente novamente.</div></div>`;
    return;
  }

  renderAvaliacaoConcluida();
};

  renderAvaliacaoShell(`
    <div class="form-card" style="text-align:center;padding:48px 24px">

      <div style="font-size:18px;font-weight:700;margin-bottom:8px">Avaliação concluída!</div>

}

// Executa ao carregar a página
document.addEventListener('DOMContentLoaded', async () => {
  // Detecta o link de recuperação de senha lendo a URL crua, ANTES de qualquer
  // outra coisa (antes até de criar o supaClient). O supabase-js lê e depois
  // apaga esse token da URL durante sua própria inicialização assíncrona; se
  // checássemos depois de criar o client e dar algum await (ex.: loadCargosForApp),
  // o hash já podia estar limpo e a detecção falhava — foi exatamente o bug de
  // "abre o app e só depois volta pra tela de senha". O Supabase manda o token
  // como #...&type=recovery (fluxo implícito, padrão deste projeto) ou, em
  // outras configurações, como ?...&type=recovery.
  const emRecuperacaoSenha =
    new URLSearchParams((window.location.hash || '').replace(/^#/, '')).get('type') === 'recovery' ||
    new URLSearchParams(window.location.search || '').get('type') === 'recovery';
  if (emRecuperacaoSenha) {
    mostrarTelaRedefinirSenha();
  }

  const sbUrlEl = document.getElementById('sb-url');
  const sbKeyEl = document.getElementById('sb-key');

  // Carrega SUPA_URL e SUPA_KEY aqui, após o DOM estar pronto
  SUPA_URL = localStorage.getItem('supa_url') || (sbUrlEl ? sbUrlEl.value : '');
  SUPA_KEY = localStorage.getItem('supa_key') || (sbKeyEl ? sbKeyEl.value : '');

  // Preenche os inputs ocultos com os valores carregados (útil para debug ou para o saveConfig)
  if (sbUrlEl) sbUrlEl.value = SUPA_URL;
  if (sbKeyEl) sbKeyEl.value = SUPA_KEY;

  // Agora que SUPA_URL e SUPA_KEY estão definidos, podemos inicializar supaClient
  // (é aqui que o supabase-js lê o token de recuperação da URL, se houver, e
  // monta a sessão temporária que o updateUser() vai usar mais adiante).
  supaClient = initSupabase();
    await loadCargosForApp(); // <-- Carrega os cargos antes de tentar logar ou renderizar qualquer coisa que dependa deles
  // FIM DA LINHA ADICIONADA

  if (emRecuperacaoSenha) {
    // Só limpa a URL agora (depois do supaClient já ter processado o token):
    // limpar antes disso apagaria o token antes do supabase-js conseguir lê-lo.
    history.replaceState(null, '', window.location.pathname);
  }

  // Se houver uma sessão Supabase ativa, entra no app
 // Verifica sessão ativa (Supabase Auth v2)
if (supaClient) {
  const { data: { session } } = await supaClient.auth.getSession();
  // Sessão de recuperação de senha não deve logar no app — o usuário precisa
  // primeiro definir a nova senha na tela mostrada acima.
  if (session?.user && !emRecuperacaoSenha) {
    const perfilInfo = await carregarUsuarioLogado(session.user);
    if (perfilInfo) {
      currentUser = {
        email: session.user.email,
        name: session.user.user_metadata?.nome || session.user.email,
        ...perfilInfo,
      };
      if (session.user.user_metadata?.must_change_password) {
        window._modoTrocaSenhaObrigatoria = true;
        mostrarTelaRedefinirSenha();
      } else {
        entrarNoDestinoCorreto();
      }
    } else {
      // Sessão válida no Supabase Auth, mas sem usuário/perfil ativo cadastrado
      // em `usuarios` — não deixa entrar no app com a sessão antiga.
      await supaClient.auth.signOut();
    }
  }
}

// Carrega os cargos do Supabase antes de qualquer página que os utilize
  await loadCargosForApp();
  await loadVagasForApp();
  await loadCandidaturasForApp();

  // Inicializa arrays vazios para as variáveis que ainda não foram migradas para o Supabase
  // Isso evita erros de "undefined" se alguma página tentar acessá-las antes de serem preenchidas
  carregarDescricoesLocal();
  if (!window._cargosDescricao) window._cargosDescricao = [];
  if (!window._documentosPorColab) window._documentosPorColab = {};
  if (!window._vagas) window._vagas = [];
  if (!window._candidaturas) window._candidaturas = []; // Já existe, mas bom reforçar
  
  await checkCandidaturaLink();
  await checkAvaliacaoLink();
});
</script>

</html>
