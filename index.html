      </div>
    </div>`).join('');

  container.innerHTML = `
    <div class="form-card">
      <div style="font-size:16px;font-weight:700;margin-bottom:4px">Exibição ${st.tela + 1} de 10</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:16px">Atribua as notas de 1 a 4 sem repetir entre os 4 blocos abaixo.</div>
      ${blocoHtml}
      <div id="aval-disc-aviso" style="display:none;color:var(--danger);font-size:13px;font-weight:600;margin:12px 0"></div>
      <div style="display:flex;justify-content:space-between;margin-top:16px">
        <button class="btn" onclick="voltarAvaliacaoDisc()" ${st.tela === 0 ? 'disabled style="opacity:.4;cursor:not-allowed"' : ''}>← Voltar</button>
        ${st.tela < 9
          ? `<button class="btn btn-primary" onclick="avancarAvaliacaoDisc()">Próxima Exibição →</button>`
          : `<button class="btn btn-primary" onclick="finalizarAvaliacaoDisc()">Concluir Etapa 1</button>`}
      </div>
    </div>`;
}

function validarTelaAvaliacaoDiscAtual() {
  const pa = window._pubAval;
  const respostas = pa.discTeste.respostas[pa.discTeste.tela];
  const avisoEl = document.getElementById('aval-disc-aviso');
  if (respostas.some(v => v === null)) {
    if (avisoEl) { avisoEl.textContent = 'Preencha as 4 notas antes de continuar.'; avisoEl.style.display = ''; }
    return false;
  }
  if (new Set(respostas).size !== 4) {
    if (avisoEl) { avisoEl.textContent = 'Repetição de números não é permitido.'; avisoEl.style.display = ''; }
    return false;
  }
  if (avisoEl) avisoEl.style.display = 'none';
  return true;
}

window.selecionarNotaAvaliacaoDisc = function(blocoIdx, nota) {
  const pa = window._pubAval;
  pa.discTeste.respostas[pa.discTeste.tela][blocoIdx] = nota;
  renderAvaliacaoDiscQuiz();
};

window.avancarAvaliacaoDisc = function() {
  if (!validarTelaAvaliacaoDiscAtual()) return;
  const pa = window._pubAval;
  if (pa.discTeste.tela < 9) { pa.discTeste.tela++; renderAvaliacaoDiscQuiz(); }
};

window.voltarAvaliacaoDisc = function() {
  const avisoEl = document.getElementById('aval-disc-aviso');
  if (avisoEl) avisoEl.style.display = 'none';
  const pa = window._pubAval;
  if (pa.discTeste.tela > 0) { pa.discTeste.tela--; renderAvaliacaoDiscQuiz(); }
};

// Calcula o perfil, salva SOMENTE o resultado em testes_avaliacoes.resultado_perfil_disk
// (sem nunca exibir o resultado na tela) e avança direto para a Etapa 2.
window.finalizarAvaliacaoDisc = async function() {
  if (!validarTelaAvaliacaoDiscAtual()) return;
  const pa = window._pubAval;

  const rotulos = ['Executor', 'Comunicador', 'Planejador', 'Analista'];
  const somas = [0, 0, 0, 0];
  pa.discTeste.respostas.forEach(respostasTela => { respostasTela.forEach((nota, i) => { somas[i] += (nota || 0); }); });
  const ranking = rotulos.map((rotulo, i) => ({ rotulo, soma: somas[i] })).sort((a, b) => b.soma - a.soma);
  const perfil = `${ranking[0].rotulo} + ${ranking[1].rotulo}`;

  const container = document.getElementById('aval-disc-quiz');
  if (container) container.innerHTML = `<div class="form-card" style="text-align:center;padding:48px 24px"><div style="font-size:40px;margin-bottom:16px">⏳</div><div style="font-size:15px;color:var(--text3)">Salvando e avançando para a próxima etapa...</div></div>`;

  try {
    const { error } = await supaClient.from('testes_avaliacoes').update({ resultado_perfil_disk: perfil }).eq('token', pa.token);
    if (error) console.error('Erro ao salvar resultado do Perfil DISC:', error.message);
  } catch (e) {
    console.error('Erro ao salvar resultado do Perfil DISC:', e);
  }

  renderAvaliacaoEtapaCompetencias();
};

// Algumas linhas de "Perguntas comportamentais" trazem mais de uma pergunta numerada
// na mesma célula (ex.: "1. ... 2. ..."). Quebra cada célula em perguntas individuais,
// uma pergunta por campo de resposta na tela.
function splitPerguntasComportamentais(texto) {
  const partes = String(texto || '')
    .split(/(?<!\d)(?=\d+\.\s*)/)
    .map(p => p.trim())
    .filter(Boolean);
  return partes.length ? partes : [String(texto || '').trim()].filter(Boolean);
}

// --- Etapa 2: Perguntas por Competências (somente a coluna "Perguntas comportamentais") ---
function renderAvaliacaoEtapaCompetencias() {
  const perguntas = PERGUNTAS_COMPETENCIAS.flatMap(item => splitPerguntasComportamentais(item.perguntas));
  window._pubAval.competenciasPerguntas = perguntas;

  renderAvaliacaoShell(`
    ${avaliacaoStepsHtml(2)}
    <div class="form-card">
      <div style="font-size:18px;font-weight:700;margin-bottom:8px">Etapa 2 de 3 — Perguntas por Competências</div>
      <p style="font-size:13px;color:var(--text3);margin-bottom:20px">Responda as perguntas abaixo com a maior sinceridade possível.</p>
      ${perguntas.map((p, i) => `
        <div style="margin-bottom:18px">
          <label class="form-label" style="display:block;margin-bottom:6px">${p}</label>
          <textarea class="form-input" id="aval-comp-resp-${i}" style="width:100%;min-height:80px;box-sizing:border-box"></textarea>
        </div>`).join('')}
      <div id="aval-comp-aviso" style="display:none;color:var(--danger);font-size:13px;font-weight:600;margin-bottom:12px"></div>
      <button class="btn btn-primary" id="aval-comp-btn" onclick="finalizarAvaliacaoCompetencias()">Concluir Etapa 2</button>
    </div>`);
}

window.finalizarAvaliacaoCompetencias = async function() {
  const avisoEl = document.getElementById('aval-comp-aviso');
  const perguntas = window._pubAval.competenciasPerguntas || [];
  const respostas = perguntas.map((p, i) => ({
    pergunta: p,
    resposta: (document.getElementById(`aval-comp-resp-${i}`)?.value || '').trim()
  }));
  if (respostas.some(r => !r.resposta)) {
    if (avisoEl) { avisoEl.textContent = 'Responda todas as perguntas antes de continuar.'; avisoEl.style.display = ''; }
    return;
  }
  if (avisoEl) avisoEl.style.display = 'none';

  const btn = document.getElementById('aval-comp-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Enviando...'; }

  try {
    const blob = await window.gerarDocxPerguntasRespostas('Respostas — Perguntas por Competências', respostas);
    const url = await window.enviarDocxAvaliacaoParaDrive(blob, { nomeCandidato: window._pubAval.nomeCandidato, tipoAvaliacao: 'Competências' });
    const { error } = await supaClient.from('testes_avaliacoes').update({ url_respostas_competencias: url }).eq('token', window._pubAval.token);
    if (error) throw error;
    renderAvaliacaoEtapaEntrevista();
  } catch (e) {
    console.error('Erro ao concluir etapa de competências:', e);
    if (avisoEl) { avisoEl.textContent = 'Erro ao enviar suas respostas. Tente novamente.'; avisoEl.style.display = ''; }
    if (btn) { btn.disabled = false; btn.textContent = 'Concluir Etapa 2'; }
  }
};

// --- Etapa 3: Formulário de Entrevista (a partir de cargos.formulario_entrevista) ---
function renderAvaliacaoEtapaEntrevista() {
  const pa = window._pubAval;
  const perguntas = String(pa.formularioEntrevista || '').split('\n').map(l => l.trim()).filter(Boolean);
  pa.entrevistaPerguntas = perguntas;

  renderAvaliacaoShell(`
    ${avaliacaoStepsHtml(3)}
    <div class="form-card">
      <div style="font-size:18px;font-weight:700;margin-bottom:8px">Etapa 3 de 3 — Formulário de Entrevista</div>
      <p style="font-size:13px;color:var(--text3);margin-bottom:20px">Última etapa! Responda as perguntas da entrevista para a vaga de <strong>${pa.cargoNome}</strong>.</p>
      ${perguntas.length === 0
        ? `<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-title">Nenhuma pergunta cadastrada</div><div class="empty-state-desc">O RH ainda não cadastrou o formulário de entrevista para este cargo.</div></div>`
        : perguntas.map((p, i) => `
          <div style="margin-bottom:18px">
            <label class="form-label" style="display:block;margin-bottom:6px">${p}</label>
            <textarea class="form-input" id="aval-entr-resp-${i}" style="width:100%;min-height:80px;box-sizing:border-box"></textarea>
          </div>`).join('')}
      <div id="aval-entr-aviso" style="display:none;color:var(--danger);font-size:13px;font-weight:600;margin-bottom:12px"></div>
      <button class="btn btn-primary" id="aval-entr-btn" onclick="finalizarAvaliacaoEntrevista()">Concluir Avaliação</button>
    </div>`);
}

window.finalizarAvaliacaoEntrevista = async function() {
  const pa = window._pubAval;
  const perguntas = pa.entrevistaPerguntas || [];
  const avisoEl = document.getElementById('aval-entr-aviso');
  const respostas = perguntas.map((p, i) => ({
    pergunta: p,
    resposta: (document.getElementById(`aval-entr-resp-${i}`)?.value || '').trim()
  }));
  if (perguntas.length > 0 && respostas.some(r => !r.resposta)) {
    if (avisoEl) { avisoEl.textContent = 'Responda todas as perguntas antes de continuar.'; avisoEl.style.display = ''; }
    return;
  }
  if (avisoEl) avisoEl.style.display = 'none';

  const btn = document.getElementById('aval-entr-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Enviando...'; }

  try {
    let url = null;
    if (perguntas.length > 0) {
      const blob = await window.gerarDocxPerguntasRespostas('Respostas — Formulário de Entrevista', respostas);
      url = await window.enviarDocxAvaliacaoParaDrive(blob, { nomeCandidato: pa.nomeCandidato, tipoAvaliacao: 'Entrevista' });
    }
    const { error } = await supaClient.from('testes_avaliacoes').update({
      url_respostas_entrevista: url,
      status_realizacao: 'concluido',
      respondido_em: new Date().toISOString()
    }).eq('token', pa.token);
    if (error) throw error;
    renderAvaliacaoConcluida();
  } catch (e) {
    console.error('Erro ao concluir avaliação:', e);
    if (avisoEl) { avisoEl.textContent = 'Erro ao enviar suas respostas. Tente novamente.'; avisoEl.style.display = ''; }
    if (btn) { btn.disabled = false; btn.textContent = 'Concluir Avaliação'; }
  }
};

function renderAvaliacaoConcluida() {
  renderAvaliacaoShell(`
    ${avaliacaoStepsHtml(4)}
    <div class="form-card" style="text-align:center;padding:48px 24px">
      <div style="font-size:40px;margin-bottom:16px">✅</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px">Avaliação concluída!</div>
      <div style="font-size:14px;color:var(--text3)">Obrigado por completar todas as etapas. Em breve entraremos em contato.</div>
    </div>`);
}

// Executa ao carregar a página

  if (sbUrlEl) sbUrlEl.value = SUPA_URL;
  if (sbKeyEl) sbKeyEl.value = SUPA_KEY;

  // Agora que SUPA_URL e SUPA_KEY estão definidos, podemos inicializar supaClient
  supaClient = initSupabase();
    await loadCargosForApp(); // <-- Carrega os cargos antes de tentar logar ou renderizar qualquer coisa que dependa deles
  // FIM DA LINHA ADICIONADA

  // Se houver uma sessão Supabase ativa, entra no app
 // Verifica sessão ativa (Supabase Auth v2)
if (supaClient) {
  const { data: { session } } = await supaClient.auth.getSession();
  if (session?.user) {
    currentUser = {
      email: session.user.email,
      name: session.user.user_metadata?.nome || session.user.email,
      role: session.user.user_metadata?.perfil || 'user'
    };
    enterApp();
  }
}

// Carrega os cargos do Supabase antes de qualquer página que os utilize
  await loadCargosForApp();
  await loadVagasForApp();
  await loadCandidaturasForApp();

  // Inicializa arrays vazios para as variáveis que ainda não foram migradas para o Supabase
  // Isso evita erros de "undefined" se alguma página tentar acessá-las antes de serem preenchidas
  carregarDescricoesLocal();
  if (!window._cargosDescricao) window._cargosDescricao = [];
  if (!window._documentosPorColab) window._documentosPorColab = {};
  if (!window._ocorrencias) window._ocorrencias = [];
  if (!window._vagas) window._vagas = [];
  if (!window._candidaturas) window._candidaturas = []; // Já existe, mas bom reforçar
  
  await checkCandidaturaLink();
  await checkAvaliacaoLink();
});
</script>
