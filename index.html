// ============================================================
async function checkCandidaturaLink() {
  const params = new URLSearchParams(location.search);
  const token  = params.get('candidatura');
  if (!token) return; // não é link de candidatura, carrega normalmente

  // Esconde tudo e mostra o formulário público
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'none';

  if (!window._vagas) window._vagas = [];

  // Renderiza o formulário público no body
  const vaga = window._vagas.find(v => v['link-token'] === token);

  // Busca só as colunas públicas do cargo (sem salario_base) — visitantes anônimos
  // só têm GRANT de SELECT nessas colunas, então não dá pra reaproveitar window._cargos aqui.
  let cargoNome = '—';
  let cargoDescricao = '';
  if (vaga && supaClient) {
    const { data: cargoData, error: cargoError } = await supaClient
      .from('cargos')
      .select('id_cargos,nome_cargo,descricao_cargo')
      .eq('id_cargos', vaga.id_cargos)
      .maybeSingle();
    if (cargoError) console.error('Erro ao carregar cargo da vaga:', cargoError.message);
    if (cargoData) {
      cargoNome = cargoData.nome_cargo || '—';
      cargoDescricao = cargoData.descricao_cargo || '';
    }
  }
  window._pubCargoNome = cargoNome;

  document.body.innerHTML = `
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .pub-box { background: #fff; border-radius: 6px; padding: 40px; width: 480px; max-width: 100%; border: 1px solid #ddd; }
    .pub-logo { font-size: 18px; font-weight: 700; color: #111; margin-bottom: 4px; }
    .pub-sub { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 28px; }
    .pub-cargo { font-size: 20px; font-weight: 700; color: #111; margin-bottom: 4px; }
    .pub-depto { font-size: 13px; color: #888; margin-bottom: 28px; }
    .pub-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #555; margin-bottom: 6px; margin-top: 16px; }
    .pub-input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 3px; font-size: 14px; outline: none; background: #fafafa; }
    .pub-input:focus { border-color: #111; background: #fff; }
    .pub-btn { width: 100%; padding: 12px; background: #111; color: #fff; border: none; border-radius: 3px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 24px; }
    .pub-btn:hover { background: #333; }
    .pub-msg { text-align: center; margin-top: 16px; font-size: 13px; min-height: 20px; }
    .pub-success { color: #1a7a3c; }
    .pub-error { color: #c0392b; }
    .pub-not-found { text-align: center; padding: 48px 0; color: #888; }
  </style>
  <div class="pub-box" id="pub-box">
    ${!vaga
      ? `<div class="pub-not-found">
          <div style="font-size:32px;margin-bottom:12px">🔒</div>
          <div style="font-size:16px;font-weight:600;color:#333;margin-bottom:8px">Vaga não encontrada</div>
          <div style="font-size:13px">Este link pode estar incorreto ou a vaga foi encerrada.</div>
        </div>`
      : vaga.status !== 'aberta'
        ? `<div class="pub-not-found">
            <div style="font-size:32px;margin-bottom:12px">🔒</div>
            <div style="font-size:16px;font-weight:600;color:#333;margin-bottom:8px">Vaga encerrada</div>
            <div style="font-size:13px">Esta vaga não está mais recebendo candidaturas.</div>
          </div>`
        : `<div class="pub-logo">MINART MÓVEIS</div>
           <div class="pub-sub">Candidatura Online</div>
           <div class="pub-cargo">${cargoNome}</div>
           <div class="pub-depto">${cargoDescricao || 'Minart Móveis'}</div>
           <label class="pub-label">Nome Completo *</label>
           <input class="pub-input" id="pub-nome" placeholder="Seu nome completo">
           <label class="pub-label">E-mail *</label>
           <input class="pub-input" id="pub-email" type="email" placeholder="seu@email.com">
           <label class="pub-label">Número</label>
           <input class="pub-input" id="pub-numero" placeholder="(00) 00000-0000">
           <label class="pub-label">Instagram</label>
           <input class="pub-input" id="pub-instagram" placeholder="@seuusuario">
           <label class="pub-label">Currículo (PDF ou Word) *</label>
           <input class="pub-input" id="pub-curriculo" type="file" accept=".pdf,.doc,.docx" style="padding:8px">
           <button class="pub-btn" id="pub-submit-btn" onclick="enviarCandidatura('${token}')">Enviar Candidatura</button>
           <div class="pub-msg" id="pub-msg"></div>`}
  </div>`;
}

window.enviarCandidatura = async function(token) {
  const nome      = (document.getElementById('pub-nome')?.value || '').trim();
  const email     = (document.getElementById('pub-email')?.value || '').trim();
  const numero    = (document.getElementById('pub-numero')?.value || '').trim();
  const instagram = (document.getElementById('pub-instagram')?.value || '').trim();
  const currFile  = document.getElementById('pub-curriculo')?.files[0];
  const msgEl     = document.getElementById('pub-msg');
  const btnEl     = document.getElementById('pub-submit-btn');

  if (!nome)     { msgEl.textContent = 'Informe seu nome.'; msgEl.className = 'pub-msg pub-error'; return; }
  if (!email)    { msgEl.textContent = 'Informe seu e-mail.'; msgEl.className = 'pub-msg pub-error'; return; }
  if (!currFile) { msgEl.textContent = 'Anexe seu currículo.'; msgEl.className = 'pub-msg pub-error'; return; }

  if (!window._vagas) window._vagas = [];
  const vaga = window._vagas.find(v => v['link-token'] === token);
  if (!vaga) { msgEl.textContent = 'Vaga não encontrada.'; msgEl.className = 'pub-msg pub-error'; return; }

  btnEl.disabled = true;
  msgEl.textContent = 'Enviando...';
  msgEl.className = 'pub-msg';

  let urlCurriculo = null;
  if (currFile) {
    try {
      urlCurriculo = await window.enviarCurriculoParaDrive(currFile, { nomeCandidato: nome, vagaCargo: window._pubCargoNome || '—' });
    } catch (error) {
      console.error('Erro ao enviar currículo:', error);
      msgEl.textContent = 'Falha ao enviar o currículo. Tente novamente.';
      msgEl.className = 'pub-msg pub-error';
      btnEl.disabled = false;
      return;
    }
  }

  const { error } = await supaClient.from('candidaturas').insert([{
    id_vagas: vaga.id_vagas,
    nome_candidato: nome,
    email_candidato: email,
    numero: numero || null,
    instagram: instagram || null,
    url_curriculo: urlCurriculo,
    data_envio_candidatura: new Date().toISOString().slice(0, 10)
  }]);

  if (error) {
    console.error('Erro ao salvar candidatura:', error.message);
    msgEl.textContent = 'Erro ao enviar candidatura. Tente novamente mais tarde.';
    msgEl.className = 'pub-msg pub-error';
    btnEl.disabled = false;
    return;
  }

  // Incrementa contador da vaga (melhor esforço)
  supaClient.from('vagas').update({ candidatos_count: (vaga.candidatos_count || 0) + 1 }).eq('id_vagas', vaga.id_vagas)
    .then(({ error }) => { if (error) console.error('Erro ao atualizar contador de candidatos:', error.message); });

  // Feedback visual
  document.getElementById('pub-box').innerHTML = `
    <div style="text-align:center;padding:32px 0">
      <div style="font-size:40px;margin-bottom:16px">✅</div>
      <div style="font-size:18px;font-weight:700;color:#111;margin-bottom:8px">Candidatura enviada!</div>
      <div style="font-size:14px;color:#666">Obrigado, <strong>${nome}</strong>. Entraremos em contato em breve.</div>
    </div>`;
};

// Carrega os cargos do Supabase antes de qualquer página que os utilize
