<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f5;
    --bg3: #ebebeb;
    --text: #111111;
    --text2: #555555;
    --text3: #888888;
    --border: #dddddd;
    --accent: #111111;
    --accent-light: #f0f0f0;
    --sidebar-bg: #111111;
    --sidebar-text: #cccccc;
    --sidebar-active: #ffffff;
    --sidebar-hover: #222222;
    --danger: #c0392b;
    --success: #1a7a3c;
    --warning: #b07d00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); font-size: 14px; line-height: 1.5; }

  /* LOGIN */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #111; position: fixed; inset: 0; z-index: 999;
  }
  .login-box {
    background: #fff; border-radius: 4px; padding: 48px 40px; width: 360px;
    border: 1px solid #e0e0e0;
  }
  .login-logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; color: #111; }
  .login-sub { font-size: 12px; color: #888; margin-bottom: 32px; text-transform: uppercase; letter-spacing: 1px; }
  .login-box label { display: block; font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .login-box input {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 3px;
    font-size: 14px; margin-bottom: 16px; outline: none; background: #fafafa;
    transition: border-color 0.15s;
  }
  .login-box input:focus { border-color: #111; background: #fff; }
  .login-btn {
    width: 100%; padding: 11px; background: #111; color: #fff; border: none;
    border-radius: 3px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px;
    transition: background 0.15s;
  }
  .login-btn:hover { background: #333; }
  .login-error { color: var(--danger); font-size: 12px; margin-top: 8px; text-align: center; min-height: 18px; }
  .login-config { margin-top: 24px; padding-top: 20px; border-top: 1px solid #eee; }
  .login-config details summary { font-size: 11px; color: #888; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
  .login-config input { margin-bottom: 8px; }

  /* APP SHELL */
  #app { display: none; height: 100vh; overflow: hidden; }
  #app.visible { display: flex; }

  /* SIDEBAR */
  .sidebar {
    width: 240px; min-width: 240px; background: var(--sidebar-bg); display: flex;
    flex-direction: column; height: 100vh; overflow-y: auto; overflow-x: hidden;
  }
  .sidebar-header {
    padding: 20px 16px 16px; border-bottom: 1px solid #222;
  }
  .sidebar-logo { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .sidebar-tagline { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .sidebar-user { padding: 12px 16px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; }
  .sidebar-avatar { width: 30px; height: 30px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #aaa; flex-shrink: 0; }
  .sidebar-uname { font-size: 12px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sidebar-nav { flex: 1; padding: 8px 0; }
  .nav-group { }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 16px; cursor: pointer;
    color: var(--sidebar-text); font-size: 13px; user-select: none;
    transition: background 0.1s, color 0.1s; border-left: 2px solid transparent;
  }
  .nav-item:hover { background: var(--sidebar-hover); color: #fff; }
  .nav-item.active { color: var(--sidebar-active); border-left-color: #fff; background: #1a1a1a; }
  .nav-item .nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
  .nav-item .nav-arrow { margin-left: auto; font-size: 10px; transition: transform 0.2s; }
  .nav-item.open .nav-arrow { transform: rotate(90deg); }
  .sub-nav { background: #0a0a0a; }
  .sub-nav-item {
    display: flex; align-items: center; gap: 10px; padding: 7px 16px 7px 36px;
    cursor: pointer; color: #777; font-size: 12px; user-select: none;
    transition: background 0.1s, color 0.1s; border-left: 2px solid transparent;
  }
  .sub-nav-item:hover { background: #161616; color: #bbb; }
  .sub-nav-item.active { color: #fff; border-left-color: #555; background: #161616; }
  .sidebar-footer { padding: 12px 16px; border-top: 1px solid #222; }
  .logout-btn {
    display: flex; align-items: center; gap: 8px; color: #666; font-size: 12px;
    cursor: pointer; padding: 6px 0; background: none; border: none; width: 100%;
    transition: color 0.15s;
  }
  .logout-btn:hover { color: #ccc; }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    background: #fff; border-bottom: 1px solid var(--border); padding: 0 24px;
    height: 52px; display: flex; align-items: center; gap: 16px; flex-shrink: 0;
  }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .topbar-breadcrumb { font-size: 12px; color: var(--text3); }
  .topbar-actions { margin-left: auto; display: flex; gap: 8px; }
  .btn {
    padding: 7px 14px; border-radius: 3px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border); background: #fff; color: var(--text);
    transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: #111; color: #fff; border-color: #111; }
  .btn-primary:hover { background: #333; border-color: #333; }
  .btn-danger { background: #fff; color: var(--danger); border-color: #f0c0b0; }
  .btn-danger:hover { background: #fff5f5; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .content { flex: 1; overflow-y: auto; padding: 24px; }

  /* DASHBOARD */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .kpi-card {
    background: #fff; border: 1px solid var(--border); border-radius: 4px;
    padding: 18px 20px;
  }
  .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 8px; }
  .kpi-value { font-size: 28px; font-weight: 700; color: var(--text); letter-spacing: -1px; }
  .kpi-delta { font-size: 12px; margin-top: 4px; }
  .delta-up { color: var(--success); }
  .delta-down { color: var(--danger); }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-card {
    background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 20px;
  }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 16px; }
  .mini-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
  .bar { background: #111; border-radius: 2px 2px 0 0; min-width: 18px; flex: 1; transition: background 0.15s; }
  .bar:hover { background: #555; }
  .bar-labels { display: flex; gap: 6px; margin-top: 6px; }
  .bar-lbl { flex: 1; text-align: center; font-size: 10px; color: var(--text3); }
  .pie-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .pie-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .pie-name { font-size: 12px; color: var(--text2); flex: 1; }
  .pie-pct { font-size: 12px; font-weight: 600; color: var(--text); }
  .pie-bar-wrap { flex: 2; background: var(--bg3); border-radius: 2px; height: 6px; overflow: hidden; }
  .pie-bar-fill { height: 100%; border-radius: 2px; }

  /* TABLES */
  .table-card { background: #fff; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .table-title { font-size: 13px; font-weight: 600; }
  .search-input {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 3px; font-size: 13px;
    outline: none; background: var(--bg2); width: 220px; transition: border-color 0.15s;
  }
  .search-input:focus { border-color: #111; background: #fff; }
  .table-actions { margin-left: auto; display: flex; gap: 8px; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--bg2); }
  thead th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--bg2); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg2); }
  tbody td { padding: 11px 16px; font-size: 13px; color: var(--text); }
  .badge {
    display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-active { background: #e8f5ec; color: #1a7a3c; }
  .badge-inactive { background: #f5e8e8; color: #a03030; }
  .badge-pending { background: #fef5e0; color: #9a6800; }
  .badge-info { background: #e8eef8; color: #2050a0; }
  .badge-gray { background: var(--bg3); color: var(--text2); }
  .action-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; padding: 2px 6px; border-radius: 3px; transition: background 0.1s, color 0.1s; }
  .action-btn:hover { background: var(--bg3); color: var(--text); }
  .table-pagination { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--text3); }

  /* FORMS */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .form-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-full { grid-column: 1 / -1; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); }
  .form-input, .form-select, .form-textarea {
    padding: 9px 12px; border: 1px solid var(--border); border-radius: 3px;
    font-size: 13px; outline: none; background: #fafafa; transition: border-color 0.15s;
    color: var(--text); font-family: inherit;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #111; background: #fff; }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-section { margin-bottom: 24px; }
  .form-section-title {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text3); padding-bottom: 8px; margin-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .form-card { background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 24px; }
  .form-footer { display: flex; gap: 10px; padding-top: 16px; border-top: 1px solid var(--border); margin-top: 8px; }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab {
    padding: 10px 18px; font-size: 13px; cursor: pointer; color: var(--text3);
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: #111; font-weight: 500; }

  /* PROFILE CARD */
  .profile-header {
    background: #fff; border: 1px solid var(--border); border-radius: 4px;
    padding: 24px; display: flex; align-items: center; gap: 20px; margin-bottom: 20px;
  }
  .profile-avatar {
    width: 64px; height: 64px; border-radius: 50%; background: #111;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .profile-name { font-size: 20px; font-weight: 700; color: var(--text); }
  .profile-role { font-size: 13px; color: var(--text3); margin-top: 2px; }
  .profile-meta { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
  .profile-meta-item { font-size: 12px; color: var(--text3); }
  .profile-meta-item strong { color: var(--text2); }

  /* STAT ROW */
  .stat-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-box { background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 14px 18px; min-width: 120px; }
  .stat-box-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 4px; }
  .stat-box-value { font-size: 20px; font-weight: 700; color: var(--text); }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-state-icon { font-size: 32px; margin-bottom: 12px; }
  .empty-state-title { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .empty-state-desc { font-size: 13px; max-width: 300px; margin: 0 auto 16px; }

  /* DISC CHART */
  .disc-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .disc-item { background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 16px; text-align: center; }
  .disc-letter { font-size: 32px; font-weight: 800; margin-bottom: 4px; }
  .disc-D { color: #c0392b; }
  .disc-I { color: #e67e22; }
  .disc-S { color: #27ae60; }
  .disc-C { color: #2980b9; }
  .disc-name { font-size: 11px; color: var(--text3); margin-bottom: 10px; }
  .disc-bar-wrap { background: var(--bg3); border-radius: 2px; height: 8px; overflow: hidden; margin-bottom: 6px; }
  .disc-fill-D { background: #c0392b; }
  .disc-fill-I { background: #e67e22; }
  .disc-fill-S { background: #27ae60; }
  .disc-fill-C { background: #2980b9; }
  .disc-pct { font-size: 18px; font-weight: 700; }

  /* TIMELINE */
  .timeline { position: relative; padding-left: 24px; }
  .timeline::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 1px; background: var(--border); }
  .timeline-item { position: relative; margin-bottom: 20px; }
  .timeline-dot { position: absolute; left: -24px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: #111; border: 2px solid #fff; box-shadow: 0 0 0 1px #ddd; }
  .timeline-date { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .timeline-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .timeline-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: #fff; border-radius: 4px; width: 560px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border); }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 15px; font-weight: 700; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 20px; line-height: 1; padding: 2px; }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; right: 24px; background: #111; color: #fff; padding: 12px 20px; border-radius: 4px; font-size: 13px; z-index: 999; display: none; }
  #toast.show { display: block; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
  }
  .hidden { display: none !important; }
</style>
</head>

<script>
  // Inicializa cargos globalmente para estar disponível em qualquer página
if (!window._cargos) window._cargos = [ ];
  if (!window._statusEmployees) window._statusEmployees = [ ];
  
// ============================================================
// CONFIG & SUPABASE
// ============================================================
let SUPA_URL = null;
let SUPA_KEY = null;
let supaClient = null;
let currentUser = null;

// Webhook do n8n responsável por enviar o arquivo para a pasta do Google Drive.
// Após importar n8n/upload-documento-drive.workflow.json e ativar o workflow,
// copie a "Production URL" do node Webhook e cole abaixo.
const N8N_WEBHOOK_URL = 'https://automatiza.minart.com.br/webhook/upload-documento-drive';
// Mesmo valor configurado no node "Token válido?" (campo rightValue) dos workflows do n8n.
const N8N_WEBHOOK_TOKEN = '1222314';
// Webhook do n8n que verifica se um arquivo ainda existe no Drive (usado para
// remover da lista documentos que foram apagados direto no Drive).
// Após importar n8n/check-documento-drive.workflow.json e ativar o workflow,
// copie a "Production URL" do node Webhook e cole abaixo.
const N8N_CHECK_WEBHOOK_URL = 'https://automatiza.minart.com.br/webhook/check-documento-drive';
// Webhook do n8n dedicado ao upload de currículos enviados pelo formulário público
// de candidatura (Webhook -> Google Drive -> Respond to Webhook devolvendo { url }).
// Após importar n8n/upload-curriculo-drive.workflow.json, preencher o folderId do
// Drive e a credencial do Google Drive nos nodes, ativar o workflow e copiar a
// "Production URL" do node Webhook para cá.
const N8N_CURRICULO_WEBHOOK_URL = 'https://automatiza.minart.com.br/webhook/upload-curriculo-drive';

let _colaboradoresSupabase = [];
let _editingStatusColabId = null;
let _historicoColaboradoresSupabase = [];
let _editingHistoricoColabId = null;
let _cargos = []; // Para armazenar os cargos do Supabase
let _statusEmployees = [];
  
async function loadVagasForApp() {
  if (!supaClient) {
    console.error('Supabase client não inicializado para vagas.');
    window._vagas = [];
    return;
  }
  const { data, error } = await supaClient
    .from('vagas')
    .select('*')
    .order('id_vagas', { ascending: false });

  if (error) {
    console.error('Erro ao carregar vagas:', error.message);
    window._vagas = [];
  } else {
    window._vagas = data;
  }
}

function nomeCargoPorId(idCargo) {
  const cargo = (window._cargos || []).find(c => String(c[window._cargoIdField]) === String(idCargo));
  return cargo ? (cargo[window._cargoNameField] || cargo.nome_cargo || cargo.nome || '—') : '—';
}

function carregarDescricoesLocal() {
  try {
    const salvo = localStorage.getItem('rh_cargos_descricao');
    window._cargosDescricao = salvo ? JSON.parse(salvo) : [];
  } catch(e) {
    window._cargosDescricao = [];
    console.warn('Erro ao carregar descrições do localStorage:', e);
  }
}

window._salvarStorage = function() {
  try {
    localStorage.setItem('rh_cargos_descricao', JSON.stringify(window._cargosDescricao || []));
  } catch(e) {

async function loadCargosForApp() {
  console.log('[DEBUG loadCargosForApp] supaClient:', supaClient ? 'EXISTS' : 'NULL');
  if (!supaClient) {
    console.error('Supabase client não inicializado para cargos.');
    return;
  }
  console.log('[DEBUG loadCargosForApp] Iniciando select(*) de cargos...');
  const { data, error } = await supaClient
    .from('cargos')
    .select('*');
  console.log('[DEBUG loadCargosForApp] Resposta completa:', { data, error });

  if (error) {
    console.error('Erro ao carregar cargos:', error.message);
    console.error('[DEBUG] Erro detalhado:', error);
    _cargos = [];
    window._cargos = [];
  } else {
    _cargos = data;
    window._cargos = data;
    // Detecta o campo de id e o campo de nome utilizado na tabela cargos
    if (data && data.length > 0) {
      const sample = data[0];
      const idField = ['id', 'id_cargo', 'id_cargos', 'codigo'].find(k => k in sample) || Object.keys(sample)[0];
      const nameField = ['nome_cargo', 'nome', 'cargo', 'title', 'name'].find(k => k in sample) || Object.keys(sample).find(k => typeof sample[k] === 'string') || Object.keys(sample)[0];
      window._cargoIdField = idField;
      window._cargoNameField = nameField;
      // Ordena localmente pelo campo de nome detectado
      try {
        window._cargos.sort((a,b)=>{
          const va = (a[window._cargoNameField] || '').toString().toLowerCase();
          const vb = (b[window._cargoNameField] || '').toString().toLowerCase();
          return va<vb ? -1 : va>vb ? 1 : 0;
        });
      } catch(e) {
        console.warn('Não foi possível ordenar cargos localmente:', e);
      }
    } else {
      window._cargoIdField = 'id';
      window._cargoNameField = 'nome_cargo';
    }
    console.log('Cargos carregados:', _cargos, 'idField=', window._cargoIdField, 'nameField=', window._cargoNameField);
  }
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';

  if (!email || !pass) {
    errEl.textContent = 'Preencha e-mail e senha.';
    return;
  }

  if (!supaClient) {
    errEl.textContent = 'Erro de configuração: Supabase não inicializado.';
    return;
  }

  const { data, error } = await supaClient.auth.signInWithPassword({ email, password: pass });

  if (error || !data?.user) {
    errEl.textContent = 'E-mail ou senha incorretos.';
    return;
  }

  currentUser = {
    email,
    name: data.user.user_metadata?.nome || data.user.email,
    role: data.user.user_metadata?.perfil || 'user'
  };
  enterApp();
}

document.getElementById('l-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('user-name').textContent = currentUser.name;
  document.getElementById('user-avatar').textContent = (currentUser.name || 'U')[0].toUpperCase();
  buildSidebar();
  navigate('dashboard', 'Dashboard');
}

function doLogout() {
  currentUser = null;
  if (supaClient) supaClient.auth.signOut().catch(()=>{});
  document.getElementById('login-screen').style.display = '';
  document.getElementById('app').classList.remove('visible');
}

let openMenus = {};
let activeId = 'dashboard';

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  NAV.forEach(item => {
    const el = document.createElement('div');
    el.className = 'nav-group';
    const hasSubs = item.subs && item.subs.length;
    const itemEl = document.createElement('div');
    itemEl.className = 'nav-item' + (activeId === item.id ? ' active' : '') + (openMenus[item.id] ? ' open' : '');
    itemEl.innerHTML = `<span class="nav-icon">${item.icon}</span><span>${item.label}</span>${hasSubs ? '<span class="nav-arrow">›</span>' : ''}`;
    itemEl.onclick = () => {
      if (hasSubs) {
        openMenus[item.id] = !openMenus[item.id];
        buildSidebar();
      } else {
        activeId = item.id;
        if (item.action) item.action();
        else navigate(item.id, item.label);
        buildSidebar();
      }
    };
    el.appendChild(itemEl);
    if (hasSubs && openMenus[item.id]) {
      const subEl = document.createElement('div');
      subEl.className = 'sub-nav';
      item.subs.forEach(sub => {
        const s = document.createElement('div');
        s.className = 'sub-nav-item' + (activeId === sub.id ? ' active' : '');
        s.textContent = sub.label;
        s.onclick = () => { activeId = sub.id; navigate(sub.id, sub.label, item.label); buildSidebar(); };
        subEl.appendChild(s);
      });
      el.appendChild(subEl);
    }
    nav.appendChild(el);
  });
}

function pageHistoricoCarreiraDetalhe(colabIdx) {
  if (!window._historicoCarreira) window._historicoCarreira = [];
  const emp = window._statusEmployees || [];
  const cargos = window._cargos || [];

  const colaborador = emp[colabIdx];
  if (!colaborador) {
    return `<div class="empty-state">
              <div class="empty-state-icon">🤔</div>
              <div class="empty-state-title">Colaborador não encontrado</div>
              <div class="empty-state-desc">Não foi possível carregar o histórico para este colaborador.</div>
              <button class="btn" onclick="navigate('col-historico','Histórico','Colaboradores')">← Voltar para a lista</button>
            </div>`;
  }

  const nomeColab = colaborador[0];
  const cargoAtualColab = colaborador[1];
  const dataAdmissaoColab = colaborador[3]; // Assumindo que o índice 3 é a data de admissão

  // --- Lógica para criar o primeiro registro automaticamente ---
  // Filtra os registros para o colaborador atual
  let registrosDoColaborador = window._historicoCarreira.filter(reg => reg.colabIdx == colabIdx);

  // Se não houver registros para este colaborador, cria o primeiro
  if (registrosDoColaborador.length === 0) {
    const salarioAtual = (cargos.find(obj => (obj[window._cargoNameField] || obj.nome_cargo || obj.nome) === cargoAtualColab) || {}).salario_base || '';
    const novoRegistroInicial = {
      colabIdx: colabIdx,
      periodoInicio: dataAdmissaoColab,
      periodoFim: null, // Vazio
      cargo: cargoAtualColab,
      salario: salarioAtual,
      motivo: 'Admissão', // Ou 'Registro Inicial'
      originalIndex: window._historicoCarreira.length > 0 ? Math.max(...window._historicoCarreira.map(r => r.originalIndex)) + 1 : 0
    };
    window._historicoCarreira.push(novoRegistroInicial);
    window._salvarStorage(); // Salva imediatamente para persistir o novo registro
    registrosDoColaborador.push(novoRegistroInicial); // Adiciona ao array local para renderizar
  }
  // --- Fim da lógica de criação automática ---

  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary" onclick="openCarreiraModal(${colabIdx})">+ Adicionar Registro</button>`;

  const renderCarreiraTabelaDetalhe = () => {
    const tbody = document.getElementById('carreira-tbody-detalhe');
    if (!tbody) return;

    // Re-filtra e ordena para garantir que o registro recém-criado seja incluído e ordenado
    const registrosParaRenderizar = window._historicoCarreira
      .filter(reg => reg.colabIdx == colabIdx)
      .sort((a, b) => {
        // Converte datas para objetos Date para comparação, tratando null/vazio
        const dateA = a.periodoInicio ? new Date(a.periodoInicio.split('/').reverse().join('-')) : new Date(0); // Epoch para null
        const dateB = b.periodoInicio ? new Date(b.periodoInicio.split('/').reverse().join('-')) : new Date(0);
        return dateB - dateA; // Mais recente primeiro
      });

    let htmlContent = '';
    if (registrosParaRenderizar.length === 0) {
      htmlContent = `<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text3)">Nenhum registro de carreira para ${nomeColab}.</td></tr>`;
    } else {
      registrosParaRenderizar.forEach((reg) => {
        htmlContent += `
          <tr>
            <td>${reg.periodoInicio || '—'}</td>
            <td>${reg.periodoFim || 'Atual'}</td>
            <td>${reg.cargo || '—'}</td>
            <td>${reg.salario || '—'}</td>
            <td>${reg.motivo || '—'}</td>
            <td>
              <button class="action-btn" title="Editar" onclick="openCarreiraModal(${colabIdx}, ${reg.originalIndex})">✎</button>
              <button class="action-btn" title="Excluir" style="color:var(--danger)" onclick="deletarCarreira(${colabIdx}, ${reg.originalIndex})">✕</button>
            </td>
          </tr>`;
      });
    }
    tbody.innerHTML = htmlContent;
  };

  // Torna a função de renderização global para ser chamada após salvar/deletar
  window.renderCarreiraTabelaDetalhe = renderCarreiraTabelaDetalhe;
  setTimeout(renderCarreiraTabelaDetalhe, 0); // Renderiza a tabela após o HTML ser inserido

  // Pega a data atual para preencher o campo de data no modal
  const hoje = new Date().toISOString().split('T')[0];

  return `
  <div id="carreira-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:6px;padding:32px;width:560px;max-width:95vw;box-shadow:0 8px 40px rgba(0,0,0,.18)">
      <div style="font-size:15px;font-weight:700;margin-bottom:20px" id="carreira-modal-title">Adicionar Registro de Carreira</div>
      <div class="form-grid">
        <div class="form-group form-full">
          <label class="form-label">Colaborador</label>
          <select class="form-select" id="carreira-colab" disabled>
            <option value="${colabIdx}">${nomeColab}</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Período Início</label>
          <input class="form-input" type="date" id="carreira-inicio" value="${hoje}">
        </div>
        <div class="form-group">
          <label class="form-label">Período Fim</label>
          <input class="form-input" type="date" id="carreira-fim">
        </div>
        <div class="form-group">
          <label class="form-label">Cargo</label>
          <select class="form-select" id="carreira-cargo">
            <option value="">— Selecione o Cargo —</option>
            ${cargos.map(cargo => {
              const nome = cargo[window._cargoNameField] || cargo.nome_cargo || cargo.nome || '';
              return `<option value="${nome}">${nome}</option>`;
            }).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Salário</label>
          <input class="form-input" type="text" id="carreira-salario" placeholder="R$ 0.000,00">

// Variável global para saber qual colaborador está sendo editado no modal
async function loadColaboradoresFromSupabase() {
  if (!supaClient) {
    console.error('Supabase client não inicializado.');
    return;
  }
  const { data, error } = await supaClient
    .from('colaboradores')
    .select('*, cargos(nome_cargo), salario_base') // Seleciona o nome do cargo; salario_base vem da própria tabela colaboradores
    .order('nome_colaborador', { ascending: true });

  if (error) {
    console.error('Erro ao carregar colaboradores:', error.message);
    showToast('Erro ao carregar colaboradores.', 'danger');
    _colaboradoresSupabase = [];
  } else {
    _colaboradoresSupabase = data;
  }
  renderStatusTable();
  if (activeId === 'col-documentos') {
    navigate('col-documentos', 'Documentos', 'Colaboradores');
  }
}

function renderStatusTable() {
  const tbody = document.getElementById('status-table-body');
  if (!tbody) return;

  tbody.innerHTML = ''; // Limpa a tabela

  if (_colaboradoresSupabase.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text3);">Nenhum colaborador encontrado.</td></tr>`;
    return;
  }

  _colaboradoresSupabase.forEach(colab => {
    const cargoNome = colab.cargos ? colab.cargos.nome_cargo : 'N/A';
    const salarioRaw = (colab.salario_base !== undefined && colab.salario_base !== null && colab.salario_base !== '')
              ? colab.salario_base
              : (colab.cargos && colab.cargos.salario_base ? colab.cargos.salario_base : null);
    const salarioBase = salarioRaw !== null && salarioRaw !== undefined && String(salarioRaw) !== ''
              ? new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(parseFloat(salarioRaw))
              : 'N/A';
    const statusBadgeClass = colab.status_colaborador === 'Ativo' ? 'badge-active' : 'badge-inactive';

    tbody.innerHTML += `
      <tr>
        <td>${colab.nome_colaborador}</td>
        <td>${cargoNome}</td>
        <td>${colab.desde ? new Date(colab.desde).toLocaleDateString('pt-BR') : 'N/A'}</td>
        <td>${salarioBase}</td>
        <td><span class="badge ${statusBadgeClass}">${colab.status_colaborador}</span></td>

          <button class="action-btn" onclick="openStatusModal('${colab.id_colaborador}')">✎</button>

  });
}

async function openStatusModal(colabId = null) {
  console.log('[EDIT] Abrindo modal, colabId:', colabId);
  
  // Garante que colaboradores estejam carregados ANTES de tudo
  if (!_colaboradoresSupabase || _colaboradoresSupabase.length === 0) {
    console.log('[EDIT] Colaboradores vazios, carregando...');
    await loadColaboradoresFromSupabase();
  }
  console.log('[EDIT] Após loadColaboradores, temos:', _colaboradoresSupabase.length, 'colaboradores');
  
  _editingStatusColabId = colabId;
  const modal = document.getElementById('status-modal');
  const modalTitle = document.getElementById('status-modal-title');
  const smNome = document.getElementById('sm-nome');
  const smCargo = document.getElementById('sm-cargo');
  const smDesde = document.getElementById('sm-desde');
  const smStatus = document.getElementById('sm-status');
  const smSalarioBase = document.getElementById('sm-salario-base'); // Novo campo

  // Garante que cargos estejam carregados e popula o select de cargos
  if (!window._cargos || window._cargos.length === 0) {
    await loadCargosForApp();
  }
  smCargo.innerHTML = '<option value="">— Selecione o Cargo —</option>';
  window._cargos.forEach(cargo => {
    const cid = cargo[window._cargoIdField] !== undefined ? cargo[window._cargoIdField] : (cargo.id_cargo || cargo.id || cargo.id_cargos || '');
    const nome = cargo.nome_cargo || cargo.nome || cargo.cargo || cid;
    smCargo.innerHTML += `<option value="${cid}">${nome}</option>`;
  });

  // Não preencher automaticamente o salário a partir dos cargos.
  // O salário base deve vir da coluna `salario_base` da tabela `colaboradores`.
  smCargo.onchange = () => {
    const selectedCargoId = smCargo.value;
    const selectedCargo = window._cargos.find(c => String(c[window._cargoIdField] || c.id_cargo || c.id || c.id_cargos) === String(selectedCargoId));
    if (selectedCargo && selectedCargo.salario_base !== undefined && selectedCargo.salario_base !== null && String(selectedCargo.salario_base) !== '') {
      smSalarioBase.value = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(selectedCargo.salario_base);
    } else {
      // limpa o campo para permitir preenchimento manual
      smSalarioBase.value = '';
    }
  };

  if (colabId) {
    console.log('[EDIT] colabId recebido:', colabId, 'tipo:', typeof colabId);
    console.log('[EDIT] _colaboradoresSupabase.length:', _colaboradoresSupabase.length);
    if (_colaboradoresSupabase.length > 0) {
      console.log('[EDIT] Primeiro colaborador id:', _colaboradoresSupabase[0].id_colaborador, 'tipo:', typeof _colaboradoresSupabase[0].id_colaborador);
    }
    modalTitle.textContent = 'Editar Colaborador';
    const colab = _colaboradoresSupabase.find(c => {
      const match = String(c.id_colaborador) === String(colabId);
      if (!match) console.log('[EDIT] Não encontrado:', c.id_colaborador, '!==', colabId);
      return match;
    });
    console.log('[EDIT] Colaborador encontrado:', colab);
    if (colab) {
      console.log('[EDIT] Preenchendo modal com dados de:', colab.nome_colaborador);
      smNome.value = colab.nome_colaborador;
      smCargo.value = colab.id_cargos;
      smDesde.value = colab.desde;
      smStatus.value = colab.status_colaborador;
      console.log('[EDIT] Dados preenchidos. Salário base:', colab.salario_base);
      // Preenche o salário base a partir da coluna `salario_base` de colaboradores (ou fallback para cargos)
      if (colab.salario_base !== undefined && colab.salario_base !== null && String(colab.salario_base) !== '') {
        smSalarioBase.value = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(colab.salario_base);
      } else if (colab.cargos && colab.cargos.salario_base) {
        smSalarioBase.value = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(colab.cargos.salario_base);
      } else {
        smSalarioBase.value = '';
      }
      // Se colaborador não tem salario_base, preenche a partir do cargo selecionado
      if (colab.salario_base === undefined || colab.salario_base === null || String(colab.salario_base) === '') {
        smCargo.dispatchEvent(new Event('change'));
      }
      showToast('Editando: ' + colab.nome_colaborador);
    } else {
      console.error('[EDIT] Colaborador NÃO encontrado! Ids no array:', _colaboradoresSupabase.map(c => c.id_colaborador));
    }
  } else {
    modalTitle.textContent = 'Novo Colaborador';
    smNome.value = '';
    smCargo.value = '';
    smDesde.value = '';
    smStatus.value = 'Ativo';
    smSalarioBase.value = ''; // Limpa o salário base
  }
  modal.style.display = 'flex';
}

function closeStatusModal() {

async function saveStatusEmployee() {
  const smNome = document.getElementById('sm-nome').value.trim();
  const smCargoId = document.getElementById('sm-cargo').value;
  const smDesde = document.getElementById('sm-desde').value;
  const smStatus = document.getElementById('sm-status').value;
  const smSalarioRaw = document.getElementById('sm-salario-base').value;
  // Converte formato BRL (ex: 1.234,56) para número (1234.56)
  const smSalarioNum = smSalarioRaw ? parseFloat(String(smSalarioRaw).replace(/\./g,'').replace(/,/g,'.').replace(/[^0-9.\-]/g,'')) : null;

  if (!smNome || !smCargoId || !smDesde || !smStatus) {
    showToast('Preencha todos os campos obrigatórios.', 'danger');
    return;
  }

  const newColabData = {
    nome_colaborador: smNome,
    id_cargos: smCargoId,
    desde: smDesde,
    status_colaborador: smStatus,
  };
  if (smSalarioNum !== null && !isNaN(smSalarioNum)) newColabData.salario_base = smSalarioNum;

  if (_editingStatusColabId) {
    // Editar colaborador existente
    const { error } = await supaClient
      .from('colaboradores')
      .update(newColabData)
      .eq('id_colaborador', _editingStatusColabId);

    if (error) {
      console.error('Erro ao atualizar colaborador:', error.message);
      showToast('Erro ao atualizar colaborador.', 'danger');
    } else {
      showToast('Colaborador atualizado com sucesso!', 'success');
      closeStatusModal();
      loadColaboradoresFromSupabase(); // Recarrega a lista
    }
  } else {
    // Adicionar novo colaborador
    const { error } = await supaClient
      .from('colaboradores')
      .insert([newColabData]);

    if (error) {
      console.error('Erro ao adicionar colaborador:', error.message);
      showToast('Erro ao adicionar colaborador.', 'danger');
    } else {
      showToast('Colaborador adicionado com sucesso!', 'success');
      closeStatusModal();
      loadColaboradoresFromSupabase(); // Recarrega a lista
    }
  }
}

// Função de filtro para a tabela (opcional, mas útil)
function filterStatusTable(searchTerm) {
  const filter = searchTerm.toUpperCase();
  const tbody = document.getElementById('status-table-body');
  if (!tbody) return;
  const tr = tbody.getElementsByTagName('tr');

  for (let i = 0; i < tr.length; i++) {
    let tdNome = tr[i].getElementsByTagName('td')[0]; // Colaborador
    let tdCargo = tr[i].getElementsByTagName('td')[1]; // Cargo
    let tdStatus = tr[i].getElementsByTagName('td')[5]; // Status

    if (tdNome || tdCargo || tdStatus) {
      const textValue = (tdNome ? tdNome.textContent : '') +
                        (tdCargo ? tdCargo.textContent : '') +
                        (tdStatus ? tdStatus.textContent : '');
      if (textValue.toUpperCase().indexOf(filter) > -1) {
        tr[i].style.display = '';
      } else {
        tr[i].style.display = 'none';
      }
    }
  }
}

// Carrega os documentos reais da tabela `documentos` no Supabase e agrupa por id_colaborador.
async function loadDocumentosFromSupabase() {
  if (!supaClient) return;
  const { data, error } = await supaClient.from('documentos').select('*');
  if (error) {
    console.error('Erro ao carregar documentos:', error.message);
    return;
  }
  const porColab = {};
  (data || []).forEach(doc => {
    const cid = doc.id_colaborador;
    if (!porColab[cid]) porColab[cid] = [];
    porColab[cid].push({
      id_doc: doc.id_doc,
      tipo: doc.tipo_doc,
      data: doc.data_envio_doc ? new Date(doc.data_envio_doc).toLocaleDateString('pt-BR') : '',
      url: doc.url_arquivo
    });
  });
  window._documentosPorColab = porColab;
}

function renderDocColabRows() {
  const emp = _colaboradoresSupabase || [];
  return emp.map(colab => {
    const cid = colab.id_colaborador || colab.id || colab.id_colab || colab.id_colaboradores || colab.codigo || '';
    const nome = colab.nome_colaborador || colab.nome || colab.name || '—';
    const cargo = colab.cargos ? (colab.cargos.nome_cargo || colab.cargos.nome || '') : '';
    const status = colab.status_colaborador || colab.status || colab.situacao || '—';
    const docs = window._documentosPorColab[cid] || [];
    const qtd = docs.length;
    return `
      <tr onclick="openDocColabModal('${cid}')">
        <td>${nome}</td>
        <td>${cargo}</td>
        <td><span class="badge ${String(status).toLowerCase().includes('ativo') ? 'badge-active' : 'badge-inactive'}">${status}</span></td>
        <td>${qtd>0?`<span class="badge badge-info">${qtd} doc${qtd>1?'s':''}</span>`:'<span style="color:var(--text3);font-size:12px">Nenhum</span>'}</td>
        <td><button class="btn btn-sm" onclick="event.stopPropagation();openDocColabModal('${cid}')">Ver</button></td>
      </tr>`;
  }).join('');
}

window.renderDocColabTable = function() {

// Extrai o ID do arquivo a partir de um link do Google Drive (ex: .../file/d/ID/view ou ...?id=ID).
function extrairDriveFileId(url) {
  if (!url) return null;
  const m = String(url).match(/\/d\/([a-zA-Z0-9_-]+)/) || String(url).match(/[?&]id=([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}

window.driveDownloadUrl = function(url) {
  const id = extrairDriveFileId(url);
  return id ? `https://drive.google.com/uc?export=download&id=${id}` : url;
};

// Consulta o webhook do n8n para saber se o arquivo ainda existe no Drive.
// Se a verificação não estiver configurada ou falhar, assume que existe
// (não esconde documentos por causa de uma falha de rede).
window.verificarDocumentoExisteNoDrive = async function(fileId) {
  if (!fileId) return true;
  if (!N8N_CHECK_WEBHOOK_URL || N8N_CHECK_WEBHOOK_URL.startsWith('COLE_AQUI')) return true;
  try {
    const formData = new FormData();
    formData.append('file_id', fileId);
    formData.append('token', N8N_WEBHOOK_TOKEN);
    const res = await fetch(N8N_CHECK_WEBHOOK_URL, { method: 'POST', body: formData });
    if (!res.ok) return true;
    const result = await res.json();
    return result.exists !== false;
  } catch (e) {
    console.warn('Falha ao verificar existência do arquivo no Drive:', e);
    return true;
  }
};

window.openDocColabModal = async function(colabId) {
  const colab = (_colaboradoresSupabase||[]).find(c => String(c.id_colaborador||c.id||c.codigo) === String(colabId));
  const nome = colab ? (colab.nome_colaborador||colab.nome||colab.name) : 'Colaborador';

  // cria modal se não existir
  if (!document.getElementById('doc-colab-modal')) {
    const modal = document.createElement('div'); modal.id='doc-colab-modal'; modal.style.cssText='display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;';
    modal.innerHTML = `<div style="background:#fff;border-radius:6px;width:620px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)"><div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between"><div style="font-size:15px;font-weight:700" id="doc-colab-title">Documentos</div><button class="btn btn-sm" onclick="document.getElementById('doc-colab-modal').style.display='none'">✕ Fechar</button></div><div style="padding:24px" id="doc-colab-body"></div></div>`;
    document.body.appendChild(modal);
  }
  document.getElementById('doc-colab-title').textContent = `Documentos — ${nome}`;
  document.getElementById('doc-colab-body').innerHTML = `<div style="text-align:center;padding:24px;color:var(--text3)">Carregando...</div>`;
  document.getElementById('doc-colab-modal').style.display = 'flex';

  // Busca a lista de documentos sempre fresca do Supabase, para refletir uploads recentes.
  if (supaClient) {
    const { data, error } = await supaClient
      .from('documentos')
      .select('*')
      .eq('id_colaborador', colabId)
      .order('data_envio_doc', { ascending: false });
    if (!error) {
      const docsCarregados = (data || []).map(doc => ({
        id_doc: doc.id_doc,
        tipo: doc.tipo_doc,
        data: doc.data_envio_doc ? new Date(doc.data_envio_doc).toLocaleDateString('pt-BR') : '',
        url: doc.url_arquivo
      }));

      // Confere no Drive se cada arquivo ainda existe; remove do Supabase os que
      // foram apagados direto no Drive, para não ficarem listados indevidamente.
      const verificados = await Promise.all(docsCarregados.map(async d => {
        const fileId = extrairDriveFileId(d.url);
        const existe = await window.verificarDocumentoExisteNoDrive(fileId);
        return { ...d, existe };
      }));

      const removidos = verificados.filter(d => !d.existe);
      for (const d of removidos) {
        if (d.id_doc) await supaClient.from('documentos').delete().eq('id_doc', d.id_doc);
      }
      if (removidos.length > 0) {
        showToast(`${removidos.length} documento(s) removido(s): arquivo não encontrado no Drive.`);
        window.renderDocColabTable();
      }

      window._documentosPorColab[colabId] = verificados.filter(d => d.existe);
    }
  }

  const docs = window._documentosPorColab[colabId] || [];
  const body = docs.length === 0
    ? `<div class="empty-state"><div class="empty-state-icon">📂</div><div class="empty-state-title">Nenhum documento enviado</div><div class="empty-state-desc">Use "Enviar Documento" para anexar.</div></div>`
    : `<table style="width:100%"><thead><tr><th>Tipo</th><th>Data de Envio</th><th>Ações</th></tr></thead><tbody>${docs.map((d,i)=>`
        <tr>
          <td><span class="badge badge-gray">${d.tipo || '—'}</span></td>
          <td style="color:var(--text3);font-size:12px">${d.data || '—'}</td>
          <td>
            ${d.url ? `<button class="action-btn" title="Visualizar" onclick="visualizarDocumento('${d.url}')">👁</button>
            <a class="action-btn" title="Baixar" href="${driveDownloadUrl(d.url)}" target="_blank" rel="noopener" style="text-decoration:none;display:inline-block">⬇</a>` : '<span style="color:var(--text3);font-size:12px">Sem arquivo</span>'}
          </td>
        </tr>`).join('')}</tbody></table>`;

  document.getElementById('doc-colab-title').textContent = `Documentos — ${nome}`;
  document.getElementById('doc-colab-body').innerHTML = body;
};

window.obterDriveFolderIdParaColaborador = async function(cid) {
  if (!supaClient) throw new Error('Supabase não inicializado.');

    .from('mapeamento_pasta_doc_drive.colaborador')
    .select('drive_folder_id')
    .eq('id_colaborador', cid)
    .limit(1)
    .single();

  }
  return data?.drive_folder_id || null;
};

// Envia o arquivo para o webhook do n8n, que fica responsável por gravá-lo
// na pasta do Google Drive identificada por driveFolderId. Espera de volta um
// JSON contendo o link do arquivo criado (ex: { "url": "https://drive.google.com/..." }).
window.enviarArquivoParaDrive = async function(file, { cid, tipo, driveFolderId }) {
  if (!N8N_WEBHOOK_URL || N8N_WEBHOOK_URL.startsWith('COLE_AQUI')) {
    throw new Error('Webhook do n8n não configurado: defina N8N_WEBHOOK_URL no index.html.');
  }

  const formData = new FormData();
  formData.append('file', file, file.name);
  formData.append('id_colaborador', cid);
  formData.append('drive_folder_id', driveFolderId);
  formData.append('tipo_doc', tipo);
  formData.append('nome_arquivo', file.name);
  // O token vai como campo do form (não como header customizado) para que o
  // navegador trate isso como requisição "simples" e não dispare preflight CORS,
  // que o n8n não responde por padrão e travaria a chamada silenciosamente.
  formData.append('token', N8N_WEBHOOK_TOKEN);

  const res = await fetch(N8N_WEBHOOK_URL, {
    method: 'POST',
    body: formData
  });

  if (!res.ok) {
    throw new Error(`Webhook respondeu com status ${res.status}`);
  }

  let result = {};
  try { result = await res.json(); } catch (e) { /* resposta sem corpo JSON */ }

  if (result.success === false) {
    throw new Error(result.error || 'Falha reportada pelo webhook do n8n.');
  }

  return result.url || result.webViewLink || result.link || null;
};

// Envia o currículo do formulário público de candidatura para o webhook n8n

  formData.append('vaga_cargo', vagaCargo);

  });

  let result = {};

  if (result.success === false) {

  }

  return result.url || result.webViewLink || result.link || null;
};

window.salvarDocumento = async function() {
  const cid = document.getElementById('enviar-doc-colab').value;
  const tipo = document.getElementById('enviar-doc-tipo').value;
  const file = document.getElementById('enviar-doc-arquivo').files[0];
  if (!cid) return showToast('Selecione um colaborador.');
  if (!tipo) return showToast('Selecione o tipo de documento.');
  if (!file) return showToast('Selecione um arquivo.');
  if (!supaClient) return showToast('Supabase não está configurado.');

  let driveFolderId;
  try {
    driveFolderId = await window.obterDriveFolderIdParaColaborador(cid);
  } catch (error) {
    console.error('Erro ao buscar pasta de documentos:', error);
    return showToast('Erro ao localizar pasta do colaborador.', 'danger');
  }

  if (!driveFolderId) {
    return showToast('Pasta de documentos não encontrada para este colaborador.', 'danger');
  }

  let urlArquivo;
  try {
    urlArquivo = await window.enviarArquivoParaDrive(file, { cid, tipo, driveFolderId });
  } catch (error) {
    console.error('Erro ao enviar arquivo para o Drive via n8n:', error);
    return showToast('Falha ao enviar arquivo para o Drive.', 'danger');
  }

  const hoje = new Date().toISOString().slice(0, 10); // data_envio_doc é coluna "date"
  const payload = {
    id_colaborador: cid,
    tipo_doc: tipo,
    data_envio_doc: hoje,
  };
  if (urlArquivo) payload.url_arquivo = urlArquivo;

  const { data: insertedDoc, error: insertError } = await supaClient
    .from('documentos')
    .insert([payload])
    .select()
    .single();

  if (insertError) {
    console.error('Erro ao inserir documento:', insertError);
    return showToast('Erro ao salvar registro de documento.', 'danger');
  }

  if (!window._documentosPorColab[cid]) window._documentosPorColab[cid] = [];
  window._documentosPorColab[cid].push({
    id_doc: insertedDoc?.id_doc,
    tipo,
    data: new Date().toLocaleDateString('pt-BR'),
    url: urlArquivo
  });

  document.getElementById('enviar-doc-modal').style.display='none';
  showToast('Documento enviado com sucesso!');
  navigate('col-documentos','Documentos','Colaboradores');
};

function postRender(id) {
  // Tab handling
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      const group = t.closest('.tabs');
      group.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const target = t.dataset.target;
      const panel = document.getElementById(target);
      if (panel) {
        document.querySelectorAll('[data-panel]').forEach(p => p.style.display='none');
        panel.style.display = '';
      }
    });
  });
  // Forms
  document.querySelectorAll('form').forEach(f => f.addEventListener('submit', e => { e.preventDefault(); showToast('Salvo com sucesso!'); }));
  // Buttons with data-toast
  document.querySelectorAll('[data-toast]').forEach(b => {
    b.addEventListener('click', () => showToast(b.dataset.toast));

  // Print
  document.querySelectorAll('.btn-print').forEach(b => b.addEventListener('click', () => window.print()));
  // Ocorrências
  if (id === 'ficha-ocorrencias') {
    setTimeout(() => { if (window.renderOcorrenciasTabela) renderOcorrenciasTabela(); }, 0);
  }
}

window.salvarFormularioEntrevistaLinha = async function(cargoId, i) {
  const textarea = document.getElementById(`fe-text-${i}`);
  if (!textarea) return;
  const valor = textarea.value.trim();
  const cargosArr = Array.isArray(window._cargos) ? window._cargos : (window._cargos ? Object.values(window._cargos) : []);
  const cargo = cargosArr[i];
  const cid = cargoId || (cargo ? (cargo[window._cargoIdField] || cargo.id || cargo.id_cargo || cargo.id_cargos || '') : '');
  if (!cid) return showToast('Falha ao identificar o cargo.');
  try {
    const payload = { formulario_entrevista: valor };
    const { error } = await supaClient.from('cargos').update(payload).eq(window._cargoIdField, cid);
    if (error) throw error;
    await loadCargosForApp();
    textarea.value = valor;
    showToast('Formulário de entrevista salvo no banco de dados!');
  } catch (e) {
    console.error('Erro ao salvar formulário de entrevista:', e);
    showToast('Erro ao salvar formulário no banco.');
  }
};

    const visible = !q || cargo.includes(q) || texto.includes(q);

    if (visible) count++;
  });

  if (pag) pag.textContent = `${count} cargo${count !== 1 ? 's' : ''}`;
};

window.toggleDispatoTesteDisc = function() {
  const intro = document.getElementById('disc-teste-intro');
  if (!intro) return;
  const visivel = intro.style.display !== 'none';
  intro.style.display = visivel ? 'none' : '';
  if (!visivel) intro.scrollIntoView({ behavior: 'smooth', block: 'start' });
};

// Quebra o texto numerado de uma coluna do Perfil DISC em um array de frases (sem o "N. " na frente)
function discLinhasPorCor(texto) {
  return String(texto || '').split('\n').map(l => l.replace(/^\s*\d+\.\s*/, '').trim()).filter(Boolean);
}

// Monta as 10 exibições (linhas) do teste, cada uma com os 4 blocos (um de cada cor) e
// o número original da frase (1–10 Executor, 11–20 Comunicador, 21–30 Planejador, 31–40 Analista)
function gerarMatrizDisc() {
  const cores = [
    { cor: 'executor',    base: 0,  rotulo: 'Executor',    bg: '#e74c3c', fg: '#fff', linhas: discLinhasPorCor(DISC_PADRAO.executor) },
    { cor: 'comunicador', base: 10, rotulo: 'Comunicador', bg: '#f1c40f', fg: '#111', linhas: discLinhasPorCor(DISC_PADRAO.comunicador) },
    { cor: 'planejador',  base: 20, rotulo: 'Planejador',  bg: '#27ae60', fg: '#fff', linhas: discLinhasPorCor(DISC_PADRAO.planejador) },
    { cor: 'analista',    base: 30, rotulo: 'Analista',    bg: '#2980b9', fg: '#fff', linhas: discLinhasPorCor(DISC_PADRAO.analista) },
  ];
  const matriz = [];
  for (let i = 0; i < 10; i++) {
    matriz.push(cores.map(c => ({
      cor: c.cor,
      rotulo: c.rotulo,
      bg: c.bg,
      fg: c.fg,
      numero: c.base + i + 1,
      texto: c.linhas[i] || ''
    })));
  }
  return matriz;
}

window.iniciarTesteDisc = function() {
  window._discMatriz = gerarMatrizDisc();
  window._discTeste = { tela: 0, respostas: Array.from({ length: 10 }, () => [null, null, null, null]) };

  const intro = document.getElementById('disc-teste-intro');
  const colunasView = document.getElementById('disc-colunas-view');
  const quiz = document.getElementById('disc-teste-quiz');
  if (intro) intro.style.display = 'none';
  if (colunasView) colunasView.style.display = 'none';
  if (quiz) quiz.style.display = '';
  window.renderDiscTeste();
};

function validarTelaDiscAtual() {
  const st = window._discTeste;
  const respostas = st.respostas[st.tela];
  const avisoEl = document.getElementById('disc-teste-aviso');
  if (respostas.some(v => v === null)) {
    if (avisoEl) { avisoEl.textContent = 'Preencha as 4 notas antes de continuar.'; avisoEl.style.display = ''; }
    return false;
  }
  if (new Set(respostas).size !== 4) {
    if (avisoEl) { avisoEl.textContent = 'Repetição de números não é permitido'; avisoEl.style.display = ''; }
    return false;
  }
  if (avisoEl) avisoEl.style.display = 'none';
  return true;
}

window.selecionarNotaDisc = function(blocoIdx, nota) {
  const st = window._discTeste;
  st.respostas[st.tela][blocoIdx] = nota;
  window.renderDiscTeste();
};

window.avancarDiscTeste = function() {
  if (!validarTelaDiscAtual()) return;
  if (window._discTeste.tela < 9) {
    window._discTeste.tela++;
    window.renderDiscTeste();
  }
};

window.voltarDiscTeste = function() {
  const avisoEl = document.getElementById('disc-teste-aviso');
  if (avisoEl) avisoEl.style.display = 'none';
  if (window._discTeste.tela > 0) {
    window._discTeste.tela--;
    window.renderDiscTeste();
  }
};

window.enviarTesteDisc = function() {
  if (!validarTelaDiscAtual()) return;
  const container = document.getElementById('disc-teste-quiz');
  if (container) {
    container.innerHTML = `
      <div class="form-card" style="text-align:center;padding:48px 24px">

      </div>`;
  }
  showToast('Teste DISC enviado!');
};

window.renderDiscTeste = function() {
  const container = document.getElementById('disc-teste-quiz');
  if (!container) return;
  const st = window._discTeste;
  const linha = window._discMatriz[st.tela];
  const respostasTela = st.respostas[st.tela];

  const blocoHtml = linha.map((item, i) => `
    <div class="table-card" style="display:flex;align-items:center;gap:16px;padding:14px 18px;margin-bottom:10px">
      <div style="background:${item.bg};color:${item.fg};font-weight:700;font-size:13px;border-radius:4px;padding:8px 10px;min-width:42px;text-align:center;flex-shrink:0">Nº ${item.numero}</div>
      <div style="flex:1;font-size:14px">${item.texto}</div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        ${[1, 2, 3, 4].map(n => `
          <button type="button" onclick="selecionarNotaDisc(${i}, ${n})"
            style="width:36px;height:36px;border-radius:4px;border:1px solid var(--border);font-weight:700;font-size:14px;cursor:pointer;background:${respostasTela[i] === n ? '#111' : '#fff'};color:${respostasTela[i] === n ? '#fff' : '#111'}">${n}</button>`).join('')}
      </div>
    </div>`).join('');

  container.innerHTML = `
    <div class="form-card">
      <div style="font-size:16px;font-weight:700;margin-bottom:4px">Exibição ${st.tela + 1} de 10</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:16px">Atribua as notas de 1 a 4 sem repetir entre os 4 blocos abaixo.</div>
      ${blocoHtml}
      <div id="disc-teste-aviso" style="display:none;color:var(--danger);font-size:13px;font-weight:600;margin:12px 0"></div>
      <div style="display:flex;justify-content:space-between;margin-top:16px">
        <button class="btn" onclick="voltarDiscTeste()" ${st.tela === 0 ? 'disabled style="opacity:.4;cursor:not-allowed"' : ''}>← Voltar</button>
        ${st.tela < 9
          ? `<button class="btn btn-primary" onclick="avancarDiscTeste()">Próxima Exibição →</button>`
          : `<button class="btn btn-primary" onclick="enviarTesteDisc()">Enviar Teste</button>`}
      </div>
    </div>`;
};

window.filtrarVagas = function(query) {
  const q = String(query || '').trim().toLowerCase();
  const rows = document.querySelectorAll('#vagas-tbody tr');
  let count = 0;
  rows.forEach(row => {
    const vaga = row.querySelector('td:first-child')?.textContent?.toLowerCase() || '';
    const visible = !q || vaga.includes(q);
    row.style.display = visible ? '' : 'none';
    if (visible) count++;
  });
  const pag = document.querySelector('#vagas-pagination span');
  if (pag) pag.textContent = `${count} vagas`;
};

window.copiarLinkVaga = function(id) {
  const v = window._vagas.find(v => v.id_vagas === id);
  if (!v) return;
  const link = `${location.origin}${location.pathname}?candidatura=${v['link-token']}`;
  navigator.clipboard.writeText(link).then(() => {
    showToast('Link copiado para a área de transferência!');
  }).catch(() => {
    // fallback para navegadores sem suporte
    const el = document.createElement('textarea');
    el.value = link;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('Link copiado!');
  });
};

window.salvarVaga = async function() {
  const idCargo = document.getElementById('vaga-cargo').value;
  const prazo = document.getElementById('vaga-prazo').value;
  if (!idCargo) return showToast('Selecione um cargo.');

  // Gera token único para o link público
  const token = Math.random().toString(36).substring(2, 10) + Date.now().toString(36);

  const { error } = await supaClient.from('vagas').insert([{
    id_cargos: idCargo,
    prazo: prazo || null,
    data_abertura: new Date().toISOString().slice(0, 10),

  }]);

  if (error) {
    console.error('Erro ao abrir vaga:', error.message);

window.saveCargo=async function(){
  const nome = document.getElementById('cm-cargo').value.trim();
  const salarioRaw = document.getElementById('cm-salario').value.trim();
  if(!nome) return alert('Preencha o nome do cargo.');
  // tenta converter salário para número
  const salarioNum = salarioRaw ? parseFloat(String(salarioRaw).replace(/\./g,'').replace(/,/g,'.').replace(/[^0-9.\-]/g,'')) : null;
  try{
    if(window._editingCargoId){
      const upd = { [window._cargoNameField]: nome };
      if(salarioNum !== null && !isNaN(salarioNum)) upd.salario_base = salarioNum;
      const { error } = await supaClient.from('cargos').update(upd).eq(window._cargoIdField, window._editingCargoId);
      if(error) throw error;
      showToast('Cargo atualizado.');
    } else {
      const insertObj = { [window._cargoNameField]: nome };
      if(salarioNum !== null && !isNaN(salarioNum)) insertObj.salario_base = salarioNum;
      const { error } = await supaClient.from('cargos').insert([insertObj]);
      if(error) throw error;
      showToast('Cargo criado.');
    }
    document.getElementById('cargo-modal').style.display='none';
    await loadCargosForApp();
    navigate('dep-tabela','Cargos e Salários Atual');

    console.error('Erro ao salvar cargo:', e);
    showToast('Erro ao salvar cargo.');
  }
};

window.openHistoricoCargoModal = function(idx=null) {
  window._editingHCargoIdx = idx;
  if (idx !== null) {
    const h = window._cargosHistorico[idx];
    document.getElementById('hcargo-cargo').value   = h.cargo;
    document.getElementById('hcargo-salario').value = h.salario;
    document.getElementById('hcargo-revisao').value = h.revisao.split('/').reverse().join('-');
    document.getElementById('hcargo-motivo').value  = h.motivo;
    document.getElementById('hcargo-modal-title').textContent = 'Editar Registro';
  } else {
    ['hcargo-cargo','hcargo-salario','hcargo-revisao','hcargo-motivo'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('hcargo-modal-title').textContent = 'Adicionar Registro';
  }
  document.getElementById('historico-cargo-modal').style.display = 'flex';
};

window.editHistoricoCargo = function(i) { openHistoricoCargoModal(i); };

window.deleteHistoricoCargo = function(i) {
  if (!confirm('Excluir este registro?')) return;
  window._cargosHistorico.splice(i, 1);
  navigate('dep-historico', 'Cargos e Salários Histórico', 'Departamentos');
};

window.saveHistoricoCargo = function() {
  const cargo   = document.getElementById('hcargo-cargo').value;
  const salario = document.getElementById('hcargo-salario').value.trim();
  const revisao = document.getElementById('hcargo-revisao').value;
  const motivo  = document.getElementById('hcargo-motivo').value.trim();
  if (!cargo)   return showToast('Selecione um cargo.');
  if (!salario) return showToast('Informe o salário.');
  const registro = {
    cargo,
    salario,
    revisao: revisao ? revisao.split('-').reverse().join('/') : '—',
    motivo: motivo || '—'
  };
  const idx = window._editingHCargoIdx;
  if (idx !== null) window._cargosHistorico[idx] = registro;
  else window._cargosHistorico.push(registro);
  document.getElementById('historico-cargo-modal').style.display = 'none';
  showToast('Registro salvo!');
  navigate('dep-historico', 'Cargos e Salários Histórico', 'Departamentos');
};

window.salvarDadosPessoais = function() {

  const dados = {};
  campos.forEach(c => {
    const el = document.getElementById(`dp-${c}`);
    if (el) dados[c] = el.value;
  });
  window._dadosPessoais[idx] = dados;
  const preenchido = dados.cpf;
  document.getElementById('dp-status-label').textContent = preenchido ? '✅ Preenchido' : '⬜ Não preenchido';

};

function pageCarreira() {

    const tbody = document.getElementById('carreira-tbody');
    if (!tbody) return;

    const registrosAgrupados = {};
    window._historicoCarreira.forEach(reg => {
      if (!registrosAgrupados[reg.colabIdx]) {
        registrosAgrupados[reg.colabIdx] = [];
      }
      registrosAgrupados[reg.colabIdx].push(reg);
    });

    let htmlContent = '';
    if (Object.keys(registrosAgrupados).length === 0) {
      htmlContent = `<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text3)">Nenhum registro de carreira.</td></tr>`;
    } else {
      for (const colabIdx in registrosAgrupados) {
        const nomeColab = emp[colabIdx] ? emp[colabIdx][0] : 'Colaborador Desconhecido';
        const registros = registrosAgrupados[colabIdx].sort((a, b) => new Date(b.periodoInicio) - new Date(a.periodoInicio)); // Ordena por data mais recente

        registros.forEach((reg, i) => {
          htmlContent += `
            <tr>
              <td>${reg.periodoInicio}</td>
              <td>${reg.periodoFim || 'Atual'}</td>
              <td>${reg.cargo}</td>
              <td>${reg.salario}</td>

        </div>
        <div class="form-group">
          <label class="form-label">Período Início</label>
          <input class="form-input" type="date" id="carreira-inicio">
        </div>
        <div class="form-group">
          <label class="form-label">Período Fim (opcional)</label>

          <label class="form-label">Cargo</label>

            <option value="">— Selecione o Cargo —</option>

              return `<option value="${nome}">${nome}</option>`;

        </div>

      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
        <button class="btn" onclick="document.getElementById('carreira-modal').style.display='none'">Cancelar</button>

          <th>Motivo</th>

// Funções globais para o modal e ações
window.openCarreiraModal = function(colabIdx = null, originalIndex = null) {
  window._editingCarreiraColabIdx = colabIdx;
  window._editingCarreiraRegOriginalIndex = originalIndex; // Usamos originalIndex para identificar o registro
  const modal = document.getElementById('carreira-modal');
  if (!modal) return;

  const hoje = new Date().toISOString().split('T')[0];

  // Se estamos editando, preenche os campos
  if (colabIdx !== null && originalIndex !== null) {
    const registro = window._historicoCarreira.find(r => r.colabIdx == colabIdx && r.originalIndex == originalIndex);
    if (registro) {
      document.getElementById('carreira-colab').value = registro.colabIdx;
      document.getElementById('carreira-inicio').value = registro.periodoInicio;
      document.getElementById('carreira-fim').value = registro.periodoFim;
      document.getElementById('carreira-cargo').value = registro.cargo;
      document.getElementById('carreira-salario').value = registro.salario;
      document.getElementById('carreira-motivo').value = registro.motivo;
      document.getElementById('carreira-modal-title').textContent = `Editar Registro de Carreira para ${window._statusEmployees[colabIdx][0]}`;
      // Desabilita o campo de seleção de colaborador na edição
      document.getElementById('carreira-colab').disabled = true;
    }
  } else {
    // Novo registro
    document.getElementById('carreira-colab').value = colabIdx !== null ? colabIdx : ''; // Pré-seleciona se veio de uma página de detalhes
    document.getElementById('carreira-inicio').value = hoje;
    document.getElementById('carreira-fim').value = '';
    document.getElementById('carreira-cargo').value = '';
    document.getElementById('carreira-salario').value = '';
    document.getElementById('carreira-motivo').value = '';
    document.getElementById('carreira-modal-title').textContent = 'Adicionar Registro de Carreira';
    // Habilita/desabilita o campo de seleção de colaborador
    document.getElementById('carreira-colab').disabled = (colabIdx !== null);

window.salvarCarreira = function() {
  const colabSelect = document.getElementById('carreira-colab');
  const colabIdx = colabSelect.value; // Pega o valor do select, que pode estar desabilitado
  const periodoInicio = document.getElementById('carreira-inicio').value;
  const periodoFim = document.getElementById('carreira-fim').value;
  const cargo = document.getElementById('carreira-cargo').value;
  const salario = document.getElementById('carreira-salario').value.trim();
  const motivo = document.getElementById('carreira-motivo').value.trim();

  if (!colabIdx) return showToast('Selecione um colaborador.');
  if (!periodoInicio) return showToast('Informe a data de início.');
  if (!cargo) return showToast('Selecione o cargo.');
  if (!salario) return showToast('Informe o salário.');

  const novoRegistro = {
    colabIdx: parseInt(colabIdx), // Garante que seja um número
    periodoInicio: periodoInicio,
    periodoFim: periodoFim,
    cargo: cargo,
    salario: salario,
    motivo: motivo,
  };

  if (window._editingCarreiraColabIdx !== null && window._editingCarreiraRegOriginalIndex !== null) {
    // Edição de um registro existente
    const originalIndex = window._editingCarreiraRegOriginalIndex;
    const existingRecord = window._historicoCarreira.find(r => r.colabIdx == window._editingCarreiraColabIdx && r.originalIndex == originalIndex);
    if (existingRecord) {
      Object.assign(existingRecord, novoRegistro); // Atualiza o registro
    }
  } else {
    // Novo registro
    // Atribui um originalIndex único para o novo registro
    novoRegistro.originalIndex = window._historicoCarreira.length > 0 ? Math.max(...window._historicoCarreira.map(r => r.originalIndex)) + 1 : 0;
    window._historicoCarreira.push(novoRegistro);
  }

  window._salvarStorage();
  document.getElementById('carreira-modal').style.display = 'none';
  showToast('Registro de carreira salvo!');

  // Chama a função de renderização apropriada
  if (document.getElementById('carreira-tbody-detalhe')) { // Se estiver na página de detalhes
    window.renderCarreiraTabelaDetalhe();
  } else if (document.getElementById('colaboradores-historico-tbody')) { // Se estiver na lista geral de colaboradores
    window.renderColaboradoresHistorico();
  }
};
  
window.editarCarreira = function(colabIdx, regIdx) {
  openCarreiraModal(colabIdx, regIdx);
};

window.deletarCarreira = function(colabIdx, originalIndex) {
  if (!confirm('Excluir este registro de carreira?')) return;

  // Encontra o índice real do registro no array _historicoCarreira
  const indexToDelete = window._historicoCarreira.findIndex(r => r.colabIdx == colabIdx && r.originalIndex == originalIndex);

  if (indexToDelete !== -1) {
    window._historicoCarreira.splice(indexToDelete, 1);
    window._salvarStorage();
    showToast('Registro de carreira removido.');
// Chama a função de renderização apropriada
if (document.getElementById('carreira-tbody-detalhe')) { // Se estiver na página de detalhes
  window.renderCarreiraTabelaDetalhe();
} else if (document.getElementById('colaboradores-historico-tbody')) { // Se estiver na lista geral de colaboradores
  window.renderColaboradoresHistorico();
}

};

  const tbody = document.getElementById('ocorrencias-tbody');

  tbody.innerHTML = (window._ocorrencias||[]).length === 0
    ? '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text3)">Nenhuma ocorrência registrada</td></tr>'
    : window._ocorrencias.map((o,i) => {
        const nomeColab = emp[o.colab] ? emp[o.colab][0] : '—';
        return `
        <tr>
          <td><strong>${nomeColab}</strong></td>
          <td>${o.data}</td>
          <td><span class="badge ${o.tipo==='Elogio'?'badge-active':o.tipo==='Observação'?'badge-pending':'badge-inactive'}">${o.tipo}</span></td>
          <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${o.descricao}</td>
          <td>${o.registrado}</td>
          <td>${o.gravidade}</td>
          <td>
            <button class="action-btn" onclick="editarOcorrencia(${i})">✎</button>
            <button class="action-btn" style="color:var(--danger)" onclick="deletarOcorrencia(${i})">✕</button>
          </td>
        </tr>`;
      }).join('');
};

window.openOcorrenciaModal = function(idx=null) {
  window._editingOcorrenciaIdx = idx;
  const hoje = new Date().toISOString().split('T')[0];
  if (idx !== null) {
    const o = window._ocorrencias[idx];
    document.getElementById('oc-colab').value      = o.colab;
    document.getElementById('oc-tipo').value       = o.tipo;
    document.getElementById('oc-data').value       = o.data.split('/').reverse().join('-');
    document.getElementById('oc-descricao').value  = o.descricao;
    document.getElementById('oc-registrado').value = o.registrado;
    document.getElementById('oc-gravidade').value  = o.gravidade;
    document.getElementById('oc-modal-title').textContent = 'Editar Ocorrência';
  } else {
    document.getElementById('oc-colab').value      = '';
    document.getElementById('oc-tipo').value       = 'Elogio';
    document.getElementById('oc-data').value       = hoje;
    document.getElementById('oc-descricao').value  = '';
    document.getElementById('oc-registrado').value = '';
    document.getElementById('oc-gravidade').value  = '—';
    document.getElementById('oc-modal-title').textContent = 'Registrar Ocorrência';
  }
  document.getElementById('ocorrencia-modal').style.display = 'flex';
};

window.editarOcorrencia = function(i) { openOcorrenciaModal(i); };

window.salvarOcorrencia = function() {
  const colab     = document.getElementById('oc-colab').value;
  const tipo      = document.getElementById('oc-tipo').value;
  const data      = document.getElementById('oc-data').value;
  const descricao = document.getElementById('oc-descricao').value.trim();
  const registrado= document.getElementById('oc-registrado').value.trim();
  const gravidade = document.getElementById('oc-gravidade').value;
  if (colab === '') return showToast('Selecione um colaborador.');
  if (!descricao)  return showToast('Informe a descrição.');
  const registro = {
    colab,
    tipo,
    data: data ? data.split('-').reverse().join('/') : new Date().toLocaleDateString('pt-BR'),
    descricao,
    registrado: registrado || '—',
    gravidade
  };
  const idx = window._editingOcorrenciaIdx;
  if (idx !== null) window._ocorrencias[idx] = registro;
  else window._ocorrencias.push(registro);
  window._salvarStorage();
  document.getElementById('ocorrencia-modal').style.display = 'none';
  showToast('Ocorrência salva!');
  renderOcorrenciasTabela();
};

window.deletarOcorrencia = function(i) {
  if (!confirm('Excluir esta ocorrência?')) return;
  window._ocorrencias.splice(i, 1);
  renderOcorrenciasTabela();
  showToast('Ocorrência removida.');
};
