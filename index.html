<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minart Móveis - RH</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f5;
    --bg3: #ebebeb;
    --text: #111111;
    --text2: #555555;
    --text3: #888888;
    --border: #dddddd;
    --accent: #111111;
    --accent-light: #f0f0f0;
    --sidebar-bg: #111111;
    --sidebar-text: #cccccc;
    --sidebar-active: #ffffff;
    --sidebar-hover: #222222;
    --danger: #c0392b;
    --success: #1a7a3c;
    --warning: #b07d00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); font-size: 14px; line-height: 1.5; }

  /* LOGIN */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #111; position: fixed; inset: 0; z-index: 999;
  }
  .login-box {
    background: #fff; border-radius: 4px; padding: 48px 40px; width: 360px;
    border: 1px solid #e0e0e0;
  }
  .login-logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; color: #111; }
  .login-sub { font-size: 12px; color: #888; margin-bottom: 32px; text-transform: uppercase; letter-spacing: 1px; }
  .login-box label { display: block; font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .login-box input {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 3px;
    font-size: 14px; margin-bottom: 16px; outline: none; background: #fafafa;
    transition: border-color 0.15s;
  }
  .login-box input:focus { border-color: #111; background: #fff; }
  .login-btn {
    width: 100%; padding: 11px; background: #111; color: #fff; border: none;
    border-radius: 3px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px;
    transition: background 0.15s;
  }
  .login-btn:hover { background: #333; }
  .login-error { color: var(--danger); font-size: 12px; margin-top: 8px; text-align: center; min-height: 18px; }
  .login-config { margin-top: 24px; padding-top: 20px; border-top: 1px solid #eee; }
  .login-config details summary { font-size: 11px; color: #888; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
  .login-config input { margin-bottom: 8px; }

  /* APP SHELL */
  #app { display: none; height: 100vh; overflow: hidden; }
  #app.visible { display: flex; }

  /* SIDEBAR */
  .sidebar {
    width: 240px; min-width: 240px; background: var(--sidebar-bg); display: flex;
    flex-direction: column; height: 100vh; overflow-y: auto; overflow-x: hidden;
  }
  .sidebar-header {
    padding: 20px 16px 16px; border-bottom: 1px solid #222;
  }
  .sidebar-logo { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .sidebar-tagline { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .sidebar-user { padding: 12px 16px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; }
  .sidebar-avatar { width: 30px; height: 30px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #aaa; flex-shrink: 0; }
  .sidebar-uname { font-size: 12px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sidebar-nav { flex: 1; padding: 8px 0; }
  .nav-group { }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 16px; cursor: pointer;
    color: var(--sidebar-text); font-size: 13px; user-select: none;
    transition: background 0.1s, color 0.1s; border-left: 2px solid transparent;
  }
  .nav-item:hover { background: var(--sidebar-hover); color: #fff; }
  .nav-item.active { color: var(--sidebar-active); border-left-color: #fff; background: #1a1a1a; }
  .nav-item .nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
  .nav-item .nav-arrow { margin-left: auto; font-size: 10px; transition: transform 0.2s; }
  .nav-item.open .nav-arrow { transform: rotate(90deg); }
  .sub-nav { background: #0a0a0a; }
  .sub-nav-item {
    display: flex; align-items: center; gap: 10px; padding: 7px 16px 7px 36px;
    cursor: pointer; color: #777; font-size: 12px; user-select: none;
    transition: background 0.1s, color 0.1s; border-left: 2px solid transparent;
  }
  .sub-nav-item:hover { background: #161616; color: #bbb; }
  .sub-nav-item.active { color: #fff; border-left-color: #555; background: #161616; }
  .sidebar-footer { padding: 12px 16px; border-top: 1px solid #222; }
  .logout-btn {
    display: flex; align-items: center; gap: 8px; color: #666; font-size: 12px;
    cursor: pointer; padding: 6px 0; background: none; border: none; width: 100%;
    transition: color 0.15s;
  }
  .logout-btn:hover { color: #ccc; }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    background: #fff; border-bottom: 1px solid var(--border); padding: 0 24px;
    height: 52px; display: flex; align-items: center; gap: 16px; flex-shrink: 0;
  }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .topbar-breadcrumb { font-size: 12px; color: var(--text3); }
  .topbar-actions { margin-left: auto; display: flex; gap: 8px; }
  .btn {
    padding: 7px 14px; border-radius: 3px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border); background: #fff; color: var(--text);
    transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: #111; color: #fff; border-color: #111; }
  .btn-primary:hover { background: #333; border-color: #333; }
  .btn-danger { background: #fff; color: var(--danger); border-color: #f0c0b0; }
  .btn-danger:hover { background: #fff5f5; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .content { flex: 1; overflow-y: auto; padding: 24px; }

  /* DASHBOARD */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .kpi-card {
    background: #fff; border: 1px solid var(--border); border-radius: 4px;
    padding: 18px 20px;
  }
  .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 8px; }
  .kpi-value { font-size: 28px; font-weight: 700; color: var(--text); letter-spacing: -1px; }
  .kpi-delta { font-size: 12px; margin-top: 4px; }
  .delta-up { color: var(--success); }
  .delta-down { color: var(--danger); }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-card {
    background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 20px;
  }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 16px; }
  .mini-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
  .bar { background: #111; border-radius: 2px 2px 0 0; min-width: 18px; flex: 1; transition: background 0.15s; }
  .bar:hover { background: #555; }
  .bar-labels { display: flex; gap: 6px; margin-top: 6px; }
  .bar-lbl { flex: 1; text-align: center; font-size: 10px; color: var(--text3); }
  .pie-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .pie-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .pie-name { font-size: 12px; color: var(--text2); flex: 1; }
  .pie-pct { font-size: 12px; font-weight: 600; color: var(--text); }
  .pie-bar-wrap { flex: 2; background: var(--bg3); border-radius: 2px; height: 6px; overflow: hidden; }
  .pie-bar-fill { height: 100%; border-radius: 2px; }

  /* TABLES */
  .table-card { background: #fff; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .table-title { font-size: 13px; font-weight: 600; }
  .search-input {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 3px; font-size: 13px;
    outline: none; background: var(--bg2); width: 220px; transition: border-color 0.15s;
  }
  .search-input:focus { border-color: #111; background: #fff; }
  .table-actions { margin-left: auto; display: flex; gap: 8px; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--bg2); }
  thead th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--bg2); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg2); }
  tbody td { padding: 11px 16px; font-size: 13px; color: var(--text); }
  .badge {
    display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-active { background: #e8f5ec; color: #1a7a3c; }
  .badge-inactive { background: #f5e8e8; color: #a03030; }
  .badge-pending { background: #fef5e0; color: #9a6800; }
  .badge-info { background: #e8eef8; color: #2050a0; }
  .badge-gray { background: var(--bg3); color: var(--text2); }
  .action-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; padding: 2px 6px; border-radius: 3px; transition: background 0.1s, color 0.1s; }
  .action-btn:hover { background: var(--bg3); color: var(--text); }
  .table-pagination { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--text3); }

  /* FORMS */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .form-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-full { grid-column: 1 / -1; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); }
  .form-input, .form-select, .form-textarea {
    padding: 9px 12px; border: 1px solid var(--border); border-radius: 3px;
    font-size: 13px; outline: none; background: #fafafa; transition: border-color 0.15s;
    color: var(--text); font-family: inherit;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #111; background: #fff; }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-section { margin-bottom: 24px; }
  .form-section-title {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text3); padding-bottom: 8px; margin-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .form-card { background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 24px; }
  .form-footer { display: flex; gap: 10px; padding-top: 16px; border-top: 1px solid var(--border); margin-top: 8px; }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab {
    padding: 10px 18px; font-size: 13px; cursor: pointer; color: var(--text3);
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: #111; font-weight: 500; }

  /* PROFILE CARD */
  .profile-header {
    background: #fff; border: 1px solid var(--border); border-radius: 4px;
    padding: 24px; display: flex; align-items: center; gap: 20px; margin-bottom: 20px;
  }
  .profile-avatar {
    width: 64px; height: 64px; border-radius: 50%; background: #111;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .profile-name { font-size: 20px; font-weight: 700; color: var(--text); }
  .profile-role { font-size: 13px; color: var(--text3); margin-top: 2px; }
  .profile-meta { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
  .profile-meta-item { font-size: 12px; color: var(--text3); }
  .profile-meta-item strong { color: var(--text2); }

  /* STAT ROW */
  .stat-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-box { background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 14px 18px; min-width: 120px; }
  .stat-box-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 4px; }
  .stat-box-value { font-size: 20px; font-weight: 700; color: var(--text); }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-state-icon { font-size: 32px; margin-bottom: 12px; }
  .empty-state-title { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .empty-state-desc { font-size: 13px; max-width: 300px; margin: 0 auto 16px; }

  /* DISC CHART */
  .disc-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .disc-item { background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 16px; text-align: center; }
  .disc-letter { font-size: 32px; font-weight: 800; margin-bottom: 4px; }
  .disc-D { color: #c0392b; }
  .disc-I { color: #e67e22; }
  .disc-S { color: #27ae60; }
  .disc-C { color: #2980b9; }
  .disc-name { font-size: 11px; color: var(--text3); margin-bottom: 10px; }
  .disc-bar-wrap { background: var(--bg3); border-radius: 2px; height: 8px; overflow: hidden; margin-bottom: 6px; }
  .disc-fill-D { background: #c0392b; }
  .disc-fill-I { background: #e67e22; }
  .disc-fill-S { background: #27ae60; }
  .disc-fill-C { background: #2980b9; }
  .disc-pct { font-size: 18px; font-weight: 700; }

  /* TIMELINE */
  .timeline { position: relative; padding-left: 24px; }
  .timeline::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 1px; background: var(--border); }
  .timeline-item { position: relative; margin-bottom: 20px; }
  .timeline-dot { position: absolute; left: -24px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: #111; border: 2px solid #fff; box-shadow: 0 0 0 1px #ddd; }
  .timeline-date { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .timeline-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .timeline-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: #fff; border-radius: 4px; width: 560px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border); }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 15px; font-weight: 700; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 20px; line-height: 1; padding: 2px; }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; right: 24px; background: #111; color: #fff; padding: 12px 20px; border-radius: 4px; font-size: 13px; z-index: 999; display: none; }
  #toast.show { display: block; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
  }
  .hidden { display: none !important; }
</style>
</head>

<script>
// ============================================================
// CONFIG & SUPABASE
// ============================================================
let SUPA_URL = localStorage.getItem('supa_url') || '';
let SUPA_KEY = localStorage.getItem('supa_key') || '';
let supaClient = null;
let currentUser = null;

function saveConfig() {
  SUPA_URL = document.getElementById('sb-url').value.trim();
  SUPA_KEY = document.getElementById('sb-key').value.trim();
  localStorage.setItem('supa_url', SUPA_URL);
  localStorage.setItem('supa_key', SUPA_KEY);
  showToast('Configuração salva!');
}

function initSupabase() {
  if (!SUPA_URL || !SUPA_KEY) return null;
  try {
    return supabase.createClient(SUPA_URL, SUPA_KEY);
  } catch(e) { return null; }
}

// ============================================================
// AUTH — login via tabela "users" no Supabase
// (também suporta Supabase Auth nativo como fallback)
// ============================================================
async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';

  if (!email || !pass) { errEl.textContent = 'Preencha e-mail e senha.'; return; }

  supaClient = initSupabase();

  if (!supaClient) {
    // modo demo sem Supabase
    if (email === 'admin@rh.com' && pass === 'admin123') {
      currentUser = { email, name: 'Admin Demo', role: 'admin' };
      enterApp();
    } else {
      errEl.textContent = 'Credenciais inválidas. (Demo: admin@rh.com / admin123)';
    }
    return;
  }

  // Tentativa 1: tabela custom "usuarios"
  try {
    const { data, error } = await supaClient
      .from('usuarios')
      .select('*')
      .eq('email', email)
      .eq('senha', pass) // hash ideal; aqui demo plaintext
      .eq('ativo', true)
      .single();

    if (data && !error) {
      currentUser = { email, name: data.nome || data.name || email, role: data.perfil || 'user' };
      enterApp(); return;
    }
  } catch(e) {}

  // Tentativa 2: Supabase Auth nativo
  try {
    const { data, error } = await supaClient.auth.signInWithPassword({ email, password: pass });
    if (data?.user && !error) {
      currentUser = { email, name: data.user.email, role: 'user' };
      enterApp(); return;
    }
  } catch(e) {}

  errEl.textContent = 'E-mail ou senha incorretos.';
}

document.getElementById('l-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('user-name').textContent = currentUser.name;
  document.getElementById('user-avatar').textContent = (currentUser.name || 'U')[0].toUpperCase();
  buildSidebar();
  navigate('dashboard', 'Dashboard');
}

function doLogout() {
  currentUser = null;
  if (supaClient) supaClient.auth.signOut().catch(()=>{});
  document.getElementById('login-screen').style.display = '';
  document.getElementById('app').classList.remove('visible');
}

// ============================================================
// SIDEBAR NAVIGATION
// ============================================================
const NAV = [

let openMenus = {};
let activeId = 'dashboard';

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  NAV.forEach(item => {
    const el = document.createElement('div');
    el.className = 'nav-group';
    const hasSubs = item.subs && item.subs.length;
    const itemEl = document.createElement('div');
    itemEl.className = 'nav-item' + (activeId === item.id ? ' active' : '') + (openMenus[item.id] ? ' open' : '');
    itemEl.innerHTML = `<span class="nav-icon">${item.icon}</span><span>${item.label}</span>${hasSubs ? '<span class="nav-arrow">›</span>' : ''}`;
    itemEl.onclick = () => {
      if (hasSubs) {
        openMenus[item.id] = !openMenus[item.id];
        buildSidebar();
      } else {
        activeId = item.id;
        if (item.action) item.action();
        else navigate(item.id, item.label);
        buildSidebar();
      }
    };
    el.appendChild(itemEl);
    if (hasSubs && openMenus[item.id]) {
      const subEl = document.createElement('div');
      subEl.className = 'sub-nav';
      item.subs.forEach(sub => {
        const s = document.createElement('div');
        s.className = 'sub-nav-item' + (activeId === sub.id ? ' active' : '');
        s.textContent = sub.label;
        s.onclick = () => { activeId = sub.id; navigate(sub.id, sub.label, item.label); buildSidebar(); };
        subEl.appendChild(s);
      });
      el.appendChild(subEl);
    }
    nav.appendChild(el);
  });
}

function navigate(id, title, parent) {
  document.getElementById('page-title').textContent = title;
  document.getElementById('page-breadcrumb').textContent = parent ? `RH Sistema › ${parent} › ${title}` : `RH Sistema › ${title}`;
  document.getElementById('topbar-actions').innerHTML = '';
  renderPage(id);
}

function showToast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function postRender(id) {
  // Tab handling
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      const group = t.closest('.tabs');
      group.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const target = t.dataset.target;
      const panel = document.getElementById(target);
      if (panel) {
        document.querySelectorAll('[data-panel]').forEach(p => p.style.display='none');
        panel.style.display = '';
      }
    });
  });
  // Forms
  document.querySelectorAll('form').forEach(f => f.addEventListener('submit', e => { e.preventDefault(); showToast('Salvo com sucesso!'); }));
  // Buttons with data-toast
  document.querySelectorAll('[data-toast]').forEach(b => {
    b.addEventListener('click', () => showToast(b.dataset.toast));
  });
  // Print
  document.querySelectorAll('.btn-print').forEach(b => b.addEventListener('click', () => window.print()));
}

        ${[['Carlos Souza','02/01/2024','v3.0','192.168.1.10'],['Ana Lima','02/01/2024','v3.0','192.168.1.11'],['Pedro Silva','15/01/2024','v3.0','192.168.1.15']].map(([c,d,v,ip])=>`
