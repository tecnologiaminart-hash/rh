window.toggleDispatoTesteDisc = function() {
  const intro = document.getElementById('disc-teste-intro');
  const colunasView = document.getElementById('disc-colunas-view');
  if (!intro) return;
  if (colunasView) colunasView.style.display = 'none';
  intro.style.display = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

// Quebra o texto numerado de uma coluna do Perfil DISC em um array de frases (sem o "N. " na frente)
function discLinhasPorCor(texto) {
  return String(texto || '').split('\n').map(l => l.replace(/^\s*\d+\.\s*/, '').trim()).filter(Boolean);
}

// Monta as 10 exibições (linhas) do teste, cada uma com os 4 blocos (um de cada cor) e
// o número original da frase (1–10 Executor, 11–20 Comunicador, 21–30 Planejador, 31–40 Analista)
function gerarMatrizDisc() {
  const cores = [
    { cor: 'executor',    base: 0,  rotulo: 'Executor',    bg: '#e74c3c', fg: '#fff', linhas: discLinhasPorCor(DISC_PADRAO.executor) },
    { cor: 'comunicador', base: 10, rotulo: 'Comunicador', bg: '#f1c40f', fg: '#111', linhas: discLinhasPorCor(DISC_PADRAO.comunicador) },
    { cor: 'planejador',  base: 20, rotulo: 'Planejador',  bg: '#27ae60', fg: '#fff', linhas: discLinhasPorCor(DISC_PADRAO.planejador) },
    { cor: 'analista',    base: 30, rotulo: 'Analista',    bg: '#2980b9', fg: '#fff', linhas: discLinhasPorCor(DISC_PADRAO.analista) },
  ];
  const matriz = [];
  for (let i = 0; i < 10; i++) {
    matriz.push(cores.map(c => ({
      cor: c.cor,
      rotulo: c.rotulo,
      bg: c.bg,
      fg: c.fg,
      numero: c.base + i + 1,
      texto: c.linhas[i] || ''
    })));
  }
  return matriz;
}

window.iniciarTesteDisc = function() {
  window._discMatriz = gerarMatrizDisc();
  window._discTeste = { tela: 0, respostas: Array.from({ length: 10 }, () => [null, null, null, null]) };

  const intro = document.getElementById('disc-teste-intro');
  const colunasView = document.getElementById('disc-colunas-view');
  const quiz = document.getElementById('disc-teste-quiz');
  if (intro) intro.style.display = 'none';
  if (colunasView) colunasView.style.display = 'none';
  if (quiz) quiz.style.display = '';
  window.renderDiscTeste();
};

function validarTelaDiscAtual() {
  const st = window._discTeste;
  const respostas = st.respostas[st.tela];
  const avisoEl = document.getElementById('disc-teste-aviso');
  if (respostas.some(v => v === null)) {
    if (avisoEl) { avisoEl.textContent = 'Preencha as 4 notas antes de continuar.'; avisoEl.style.display = ''; }
    return false;
  }
  if (new Set(respostas).size !== 4) {
    if (avisoEl) { avisoEl.textContent = 'Repetição de números não é permitido'; avisoEl.style.display = ''; }
    return false;
  }
  if (avisoEl) avisoEl.style.display = 'none';
  return true;
}

window.selecionarNotaDisc = function(blocoIdx, nota) {
  const st = window._discTeste;
  st.respostas[st.tela][blocoIdx] = nota;
  window.renderDiscTeste();
};

window.avancarDiscTeste = function() {
  if (!validarTelaDiscAtual()) return;
  if (window._discTeste.tela < 9) {
    window._discTeste.tela++;
    window.renderDiscTeste();
  }
};

window.voltarDiscTeste = function() {
  const avisoEl = document.getElementById('disc-teste-aviso');
  if (avisoEl) avisoEl.style.display = 'none';
  if (window._discTeste.tela > 0) {
    window._discTeste.tela--;
    window.renderDiscTeste();
  }
};

window.enviarTesteDisc = function() {
  if (!validarTelaDiscAtual()) return;

  // Soma as notas por tipo: bloco 0=Executor (linhas 1–10), 1=Comunicador (11–20),
  // 2=Planejador (21–30), 3=Analista (31–40) — mesma ordem usada em gerarMatrizDisc()
  const rotulos = ['Executor', 'Comunicador', 'Planejador', 'Analista'];
  const somas = [0, 0, 0, 0];
  window._discTeste.respostas.forEach(respostasTela => {
    respostasTela.forEach((nota, i) => { somas[i] += (nota || 0); });
  });

  const ranking = rotulos
    .map((rotulo, i) => ({ rotulo, soma: somas[i] }))
    .sort((a, b) => b.soma - a.soma);

  const perfil = `${ranking[0].rotulo} + ${ranking[1].rotulo}`;

  // Guarda o resultado para o PDF de "Baixar Respostas"
  window._discResultado = { perfil, ranking };

  const container = document.getElementById('disc-teste-quiz');
  if (container) {
    container.innerHTML = `
      <div class="form-card" style="text-align:center;padding:48px 24px">
        <div style="font-size:40px;margin-bottom:16px">✅</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:8px">Teste enviado!</div>
        <div style="font-size:14px;color:var(--text3);margin-bottom:20px">Obrigado por concluir a avaliação de Perfil DISC.</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:20px">Seu Perfil Disc é ${perfil}</div>
        <button class="btn btn-primary" onclick="baixarRespostasDisc()">⬇ Baixar Respostas</button>
      </div>`;
  }
  showToast('Teste DISC enviado!');
};

window.baixarRespostasDisc = function() {
  if (!window.jspdf || !window._discMatriz || !window._discTeste || !window._discResultado) {
    showToast('Não foi possível gerar o PDF.');
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const margemEsq = 14;
  let y = 18;

  doc.setFontSize(16);
  doc.setFont(undefined, 'bold');
  doc.text('Respostas — Teste de Perfil Comportamental DISC', margemEsq, y);
  y += 10;

  doc.setFontSize(11);
  doc.setFont(undefined, 'normal');

  window._discMatriz.forEach((linha, tela) => {
    const respostasTela = window._discTeste.respostas[tela];
    linha.forEach((item, i) => {
      const texto = `Nº ${item.numero} (${item.rotulo}): ${item.texto} — Nota: ${respostasTela[i]}`;
      const linhasQuebradas = doc.splitTextToSize(texto, 180);
      if (y + linhasQuebradas.length * 6 > 280) { doc.addPage(); y = 18; }
      doc.text(linhasQuebradas, margemEsq, y);
      y += linhasQuebradas.length * 6;
    });
    y += 2;
  });

  if (y > 260) { doc.addPage(); y = 18; }
  y += 6;
  doc.setFont(undefined, 'bold');
  doc.setFontSize(13);
  doc.text(`Resultado: Seu Perfil Disc é ${window._discResultado.perfil}`, margemEsq, y);
  y += 8;
  doc.setFont(undefined, 'normal');
  doc.setFontSize(11);
  window._discResultado.ranking.forEach(r => {
    doc.text(`${r.rotulo}: ${r.soma} pontos`, margemEsq, y);
    y += 6;
  });

  doc.save('respostas-teste-disc.pdf');
};

window.renderDiscTeste = function() {
  const container = document.getElementById('disc-teste-quiz');
  if (!container) return;
  const st = window._discTeste;
  const linha = window._discMatriz[st.tela];
  const respostasTela = st.respostas[st.tela];

  const blocoHtml = linha.map((item, i) => `
    <div class="table-card" style="display:flex;align-items:center;gap:16px;padding:14px 18px;margin-bottom:10px">
      <div style="flex:1;font-size:14px">${item.texto}</div>
      <div style="display:flex;gap:6px;flex-shrink:0">
        ${[1, 2, 3, 4].map(n => `
          <button type="button" onclick="selecionarNotaDisc(${i}, ${n})"
            style="width:36px;height:36px;border-radius:4px;border:1px solid var(--border);font-weight:700;font-size:14px;cursor:pointer;background:${respostasTela[i] === n ? '#111' : '#fff'};color:${respostasTela[i] === n ? '#fff' : '#111'}">${n}</button>`).join('')}
      </div>
    </div>`).join('');

  container.innerHTML = `
    <div class="form-card">
      <div style="font-size:16px;font-weight:700;margin-bottom:4px">Exibição ${st.tela + 1} de 10</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:16px">Atribua as notas de 1 a 4 sem repetir entre os 4 blocos abaixo.</div>
      ${blocoHtml}
      <div id="disc-teste-aviso" style="display:none;color:var(--danger);font-size:13px;font-weight:600;margin:12px 0"></div>
      <div style="display:flex;justify-content:space-between;margin-top:16px">
        <button class="btn" onclick="voltarDiscTeste()" ${st.tela === 0 ? 'disabled style="opacity:.4;cursor:not-allowed"' : ''}>← Voltar</button>
        ${st.tela < 9
          ? `<button class="btn btn-primary" onclick="avancarDiscTeste()">Próxima Exibição →</button>`
          : `<button class="btn btn-primary" onclick="enviarTesteDisc()">Enviar Teste</button>`}
      </div>
    </div>`;
};

function pagePerfilDiscInterno() {
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary" onclick="abrirDisparoColaboradorInternoModal()">+ Disparo para Colaborador interno</button>`;

  const renderTabela = () => {

    tbody.innerHTML = lista.length === 0
      ? '<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text3)">Nenhum teste Disk disparado ainda.</td></tr>'

          const link = `${location.origin}${location.pathname}?avaliacao=${t.token}`;

          const colab = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador) === String(t.id_colaborador));

          const cargoNome = colab && colab.cargos ? colab.cargos.nome_cargo : '';

          </tr>`;
        }).join('');
  };

  window._renderDiscInterno = renderTabela;
  Promise.all([
    loadTestesAvaliacoesForApp(),
    (!_colaboradoresSupabase || _colaboradoresSupabase.length === 0) ? loadColaboradoresFromSupabase() : Promise.resolve(),
    loadDadosPessoaisEpiForApp(),

      <tbody id="disc-interno-tbody">
        <tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text3)">Carregando...</td></tr>
      </tbody>

window.copiarLinkDiscInterno = function(link) {
  navigator.clipboard.writeText(link).then(() => showToast('Link copiado!')).catch(() => showToast('Não foi possível copiar o link.', 'danger'));
};

// Monta o link de WhatsApp convidando o colaborador interno a responder a
// avaliação de Perfil DISC (mesma mensagem usada para candidatos, adaptada).
function linkWhatsappAvaliacaoColaborador(numero, nomeColaborador, cargoNome, link) {
  let digits = String(numero || '').replace(/\D/g, '');
  if (!digits) return null;
  if (!digits.startsWith('55')) digits = '55' + digits;
  const mensagem = `Olá, ${nomeColaborador || ''}! Para seguir com sua avaliação interna${cargoNome ? ` de ${cargoNome}` : ''} na Minart Móveis, acesse o link abaixo e responda a avaliação de Perfil DISC — o link só pode ser respondido uma vez:\n${link}`;
  return `https://wa.me/${digits}?text=${encodeURIComponent(mensagem)}`;

window.salvarDisparoColaboradorInterno = async function() {
  const idColaborador = document.getElementById('disp-disc-colaborador').value;
  if (!idColaborador) return showToast('Selecione o colaborador.');

  const colab = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador) === String(idColaborador));
  if (!colab) return showToast('Colaborador não encontrado.', 'danger');

  const btn = document.getElementById('disp-disc-btn-salvar');
  if (btn) { btn.disabled = true; btn.textContent = 'Disparando...'; }

  try {
    const token = await gerarTokenUnico('testes_avaliacoes', 'token', () => crypto.randomUUID());
    const { error } = await supaClient.from('testes_avaliacoes').insert([{
      token,
      id_colaborador: colab.id_colaborador,
      id_cargo: colab.id_cargos,
      nome_colaborador: colab.nome_colaborador,
      status_realizacao: 'pendente'
    }]);
    if (error) throw error;

    document.getElementById('disparo-disc-interno-modal').style.display = 'none';
    await loadTestesAvaliacoesForApp();
    if (window._renderDiscInterno) window._renderDiscInterno();
    showToast('Disparo criado! Copie o link na tabela para enviar ao colaborador.');
  } catch (e) {
    console.error('Erro ao disparar avaliação para colaborador interno:', e);
    showToast('Erro ao disparar avaliação: ' + (e.message || e));
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Disparar'; }
  }
};

function aplicarFiltrosCandidatos(lista, filtro) {
  if (!filtro) return lista;
  return lista.filter(c => {
    if (filtro.busca) {
      const q = filtro.busca.trim().toLowerCase();
      if (q && !(c.nome_candidato || '').toLowerCase().includes(q)) return false;
    }
    if (filtro.vaga && String(c.id_vagas) !== String(filtro.vaga)) return false;
    if (filtro.status) {
      const valor = c.status_antecedente || '';
      if (filtro.status === '__sem_status__') {
        if (valor) return false;
      } else if (filtro.status === 'Outro') {
        if (!valor || valor === 'Nada Consta') return false;
      } else if (valor !== filtro.status) {
        return false;
      }
    }
    if (filtro.dataIni) {
      const d = c.data_envio_candidatura ? new Date(c.data_envio_candidatura) : null;
      if (!d || d < new Date(filtro.dataIni)) return false;
    }
    if (filtro.dataFim) {
      const d = c.data_envio_candidatura ? new Date(c.data_envio_candidatura) : null;
      if (!d || d > new Date(filtro.dataFim + 'T23:59:59')) return false;
    }
    return true;
  });
}

// Os filtros de candidatos são reaproveitados pelas 3 abas (Candidatos,
// Candidatos para Avaliação, Candidatos para Entrevista) — esses 3 helpers
// resolvem qual filtro/prefixo/render usar a partir do "escopo" de cada aba,
// em vez de duplicar a barra de filtros e a lógica de estado em cada página.
function filtroCandidatosDoEscopo(escopo) {
  if (escopo === 'aprovados') return window._candidatosAprovadosFiltro;
  if (escopo === 'entrevista') return window._candidatosEntrevistaFiltro;
  return window._candidatosFiltro;
}
function prefixFiltroCandidatos(escopo) {
  if (escopo === 'aprovados') return 'cand-aprov-filtro';
  if (escopo === 'entrevista') return 'cand-entr-filtro';
  return 'cand-filtro';
}
function rerenderCandidatosDoEscopo(escopo) {
  if (escopo === 'aprovados') { if (window._renderCandidatosAprovados) window._renderCandidatosAprovados(); }
  else if (escopo === 'entrevista') { if (window._renderCandidatosEntrevista) window._renderCandidatosEntrevista(); }
  else { if (window._renderCandidatos) window._renderCandidatos(); }
}

window.atualizarFiltroCandidatos = function(escopo, campo, valor) {
  const filtro = filtroCandidatosDoEscopo(escopo);
  if (!filtro) return;
  filtro[campo] = valor;
  rerenderCandidatosDoEscopo(escopo);
};

window.limparFiltrosCandidatos = function(escopo) {
  const filtro = filtroCandidatosDoEscopo(escopo);
  if (!filtro) return;
  filtro.busca = '';
  filtro.vaga = '';
  filtro.status = '';
  filtro.dataIni = '';
  filtro.dataFim = '';
  const prefix = prefixFiltroCandidatos(escopo);
  ['busca', 'vaga', 'status', 'data-ini', 'data-fim'].forEach(campo => {
    const el = document.getElementById(`${prefix}-${campo}`);
    if (el) el.value = '';
  });
  rerenderCandidatosDoEscopo(escopo);
};

window.filtrarCandidatosAntecedente = function(query) {
  const resultados = document.getElementById('emitir-antecedente-resultados');
  if (!resultados) return;
  const q = String(query || '').trim().toLowerCase();
  const todos = [...(window._candidaturas || [])].sort((a, b) => (a.nome_candidato || '').localeCompare(b.nome_candidato || '', 'pt-BR'));
  const matches = q ? todos.filter(c => (c.nome_candidato || '').toLowerCase().includes(q)) : todos;
  resultados.innerHTML = matches.length
    ? matches.map(c => `<div style="padding:8px 12px;cursor:pointer;font-size:13px" onmouseover="this.style.background='var(--bg2, #f5f5f5)'" onmouseout="this.style.background=''" onclick="selecionarCandidatoAntecedente(${c.id_candidaturas})">${c.nome_candidato || 'Sem nome'}</div>`).join('')
    : `<div style="padding:8px 12px;color:var(--text3);font-size:13px">Nenhum candidato encontrado.</div>`;

};

  if (!cand) return;

  if (busca) busca.value = cand.nome_candidato || '';
  const resultados = document.getElementById('emitir-antecedente-resultados');
  if (resultados) { resultados.style.display = 'none'; resultados.innerHTML = ''; }

  const dados = document.getElementById('emitir-antecedente-dados');
  document.getElementById('emitir-ant-nome').textContent = cand.nome_candidato || '—';
  document.getElementById('emitir-ant-cpf').textContent = cand.cpf || '—';
  document.getElementById('emitir-ant-nascimento').textContent = cand.data_nascimento ? new Date(cand.data_nascimento).toLocaleDateString('pt-BR') : '—';

    if (data && data.id_drive) {

    } else {
      showToast('Link de busca de antecedentes não encontrado em Internos.');

    console.error('Erro ao buscar link de antecedentes:', e);

};

window.aprovarCandidatoAvaliacao = async function(idCandidatura) {
  try {
    const { data, error } = await supaClient.from('candidaturas').update({ aprovado_avaliacao: true }).eq('id_candidaturas', idCandidatura).select();
    if (error) throw error;
    if (!data || data.length === 0) throw new Error('Nenhuma linha foi atualizada (verifique a policy de UPDATE da tabela candidaturas no Supabase).');
    await loadCandidaturasForApp();
    if (window._renderCandidatos) window._renderCandidatos();

    const cand = data[0];
    const vaga = (window._vagas || []).find(v => v.id_vagas === cand.id_vagas);
    const idCargo = cand.id_cargos || (vaga ? vaga.id_cargos : null);

    // Cria o registro da avaliação (token de acesso único, sem login) já existente
    // ou cria um novo caso ainda não exista para este candidato.
    const { data: existente } = await supaClient.from('testes_avaliacoes').select('token').eq('id_candidato', cand.id_candidaturas).limit(1).maybeSingle();
    let token = existente?.token;
    if (!token) {
      token = await gerarTokenUnico('testes_avaliacoes', 'token', () => crypto.randomUUID());
      const { error: insertError } = await supaClient.from('testes_avaliacoes').insert([{
        token,
        id_candidato: cand.id_candidaturas,
        id_cargo: idCargo,
        nome_candidato: cand.nome_candidato || null,
        status_realizacao: 'pendente'
      }]);
      if (insertError) throw insertError;
    } else {
      // Registro já existia (ex.: criado antes desta coluna existir): garante que
      // nome_candidato/id_cargo fiquem preenchidos para a geração dos .docx.
      await supaClient.from('testes_avaliacoes')
        .update({ nome_candidato: cand.nome_candidato || null, id_cargo: idCargo })
        .eq('token', token);
    }

    window.showAcoesEnvioBanner();
  } catch (e) {
    console.error('Erro ao aprovar candidato para avaliação:', e);
    showToast('Erro ao aprovar candidato: ' + (e.message || e));
  }
};

}

function pageCandidatosAprovados() {

  document.getElementById('topbar-actions').innerHTML = '';

  const renderAprovados = () => {
    const container = document.getElementById('candidatos-aprovados-container');
    if (!container) return;

    const aprovados = window._candidaturas.filter(c => candidatoAprovado(c));
    const aprovadosFiltrados = aplicarFiltrosCandidatos(aprovados, window._candidatosAprovadosFiltro);

    const grupos = window._vagas.map((v) => {
      const cands = aprovadosFiltrados.filter(c => c.id_vagas === v.id_vagas);
      return { vaga: v, cands };
    }).filter(g => g.cands.length > 0);

    if (grupos.length === 0) {
      const filtroAtivo = window._candidatosAprovadosFiltro && (window._candidatosAprovadosFiltro.busca || window._candidatosAprovadosFiltro.vaga || window._candidatosAprovadosFiltro.status || window._candidatosAprovadosFiltro.dataIni || window._candidatosAprovadosFiltro.dataFim);

      </div>`;
      return;
    }

    container.innerHTML = grupos.map(g => {
      const aberta = g.vaga.status === 'aberta';
      return `
      <div class="table-card" style="margin-bottom:16px">
        <div class="table-header" style="cursor:pointer" onclick="toggleCandidatosAprovadosVaga(${g.vaga.id_vagas})">

        </div>
        <div id="candidatos-aprovados-tabela-${g.vaga.id_vagas}" style="display:none">
        <div style="overflow-x:auto">
        <table style="white-space:nowrap">
          <thead>${theadCandidatosAprovadosHtml()}</thead>
          <tbody>${corpoTabelaCandidatosAprovados(g.cands, g.vaga)}</tbody>
        </table>
        </div>
        </div>
      </div>
    `;
    }).join('');
  };

  window._renderCandidatosAprovados = renderAprovados;
  Promise.all([loadVagasForApp(), loadCandidaturasForApp(), loadTestesAvaliacoesForApp()]).then(renderAprovados);

  return `
  ${candidatoDetalheModalHtml()}

  ${filtrosCandidatosBarHtml('cand-aprov-filtro', 'aprovados', window._candidatosAprovadosFiltro)}

  <div id="candidatos-aprovados-container">
    <div class="empty-state">
      <div class="empty-state-icon">📋</div>
      <div class="empty-state-title">Carregando...</div>
    </div>
  </div>`;
}

window.toggleCandidatosAprovadosVaga = function(idVaga) {

window.removerCandidatoAvaliacao = async function(idCandidatura) {
  try {
    const { data, error } = await supaClient.from('candidaturas').update({ aprovado_avaliacao: false }).eq('id_candidaturas', idCandidatura).select();
    if (error) throw error;
    if (!data || data.length === 0) throw new Error('Nenhuma linha foi atualizada (verifique a policy de UPDATE da tabela candidaturas no Supabase).');

    const { error: delError } = await supaClient.from('testes_avaliacoes').delete().eq('id_candidato', idCandidatura);
    if (delError) throw delError;

    await loadCandidaturasForApp();
    await loadTestesAvaliacoesForApp();
    if (window._renderCandidatosAprovados) window._renderCandidatosAprovados();
    if (window._renderCandidatosEntrevista) window._renderCandidatosEntrevista();
    if (window._renderCandidatos) window._renderCandidatos();
    showToast('Candidato removido da avaliação.');
  } catch (e) {
    console.error('Erro ao remover candidato da avaliação:', e);
    showToast('Erro ao remover candidato: ' + (e.message || e));
  }
};

window.abrirDadosPessoaisDoColaborador = async function(idColaborador) {
  const registro = (window._dadosPessoaisEpi || []).find(d => String(d.id_colaborador) === String(idColaborador));
  if (registro) {
    await openDadosPessoaisModal(registro.id);
  } else {
    await openDadosPessoaisModal();
    const sel = document.getElementById('dp-colaborador');
    if (sel) { sel.value = idColaborador; preencherSalarioDadosPessoais(idColaborador); }
  }
};

window.ativarColaboradorAdmissao = async function(idColaborador) {
  if (!confirm('Marcar este colaborador como Ativo? Confirme antes que os dados e documentos já foram conferidos.')) return;
  try {
    const { error } = await supaClient.from('colaboradores').update({ status_colaborador: 'Ativo' }).eq('id_colaborador', idColaborador);
    if (error) throw error;
    await loadColaboradoresFromSupabase();
    if (window._renderAdmissoes) window._renderAdmissoes();
    showToast('Colaborador marcado como Ativo!');
  } catch (e) {
    console.error('Erro ao ativar colaborador:', e);
    showToast('Erro ao ativar colaborador: ' + (e.message || e));
  }
};

  if (!sel || !nomeEl) return;
  if (value === 'candidato') {
    sel.style.display = '';
  } else {
    sel.style.display = 'none';
    sel.value = '';
    nomeEl.value = '';
  }
};

window.onCargoChangeAdmissao = function() {
  const selCargo = document.getElementById('adm-cargo');
  const salarioEl = document.getElementById('adm-salario');
  const cargo = (window._cargos || []).find(c => String(c[window._cargoIdField] || c.id_cargo || c.id || c.id_cargos) === String(selCargo.value));
  if (cargo && cargo.salario_base !== undefined && cargo.salario_base !== null && String(cargo.salario_base) !== '') {
    salarioEl.value = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(cargo.salario_base);
  } else {
    salarioEl.value = '';
  }
};

window.toggleTipoContratoAdmissao = function(value) {
  const periodoWrap = document.getElementById('adm-periodo-wrap');
  const prorrogacaoWrap = document.getElementById('adm-prorrogacao-wrap');
  const mostrar = value === 'Temporária';
  periodoWrap.style.display = mostrar ? '' : 'none';
  prorrogacaoWrap.style.display = mostrar ? '' : 'none';
  if (!mostrar) {
    document.getElementById('adm-periodo').value = '';

window.preencherAdmissaoDoCandidato = function(idTeste) {
  if (!idTeste) return;
  const teste = (window._testesAvaliacoes || []).find(t => String(t.id) === String(idTeste));
  if (!teste) return;
  const cand = (window._candidaturas || []).find(c => c.id_candidaturas === teste.id_candidato);

  document.getElementById('adm-nome').value = teste.nome_candidato || (cand ? cand.nome_candidato : '') || '';

  if (teste.id_cargo) {
    const selCargo = document.getElementById('adm-cargo');
    selCargo.value = teste.id_cargo;
    onCargoChangeAdmissao();
  }
  if (cand) {
    document.getElementById('adm-telefone').value = cand.numero || '';
    document.getElementById('adm-cpf').value = cand.cpf || '';
    document.getElementById('adm-nascimento').value = cand.data_nascimento || '';
  }
};

window.salvarCriarAdmissao = async function() {
  const nome = document.getElementById('adm-nome').value.trim();
  const idCargo = document.getElementById('adm-cargo').value;
  const desde = document.getElementById('adm-desde').value;
  const tipoContrato = document.getElementById('adm-tipo-contrato').value;
  const salarioRaw = document.getElementById('adm-salario').value;
  const salarioNum = salarioRaw ? parseFloat(String(salarioRaw).replace(/\./g,'').replace(/,/g,'.').replace(/[^0-9.\-]/g,'')) : null;

  if (!nome || !idCargo || !desde || !tipoContrato) {
    return showToast('Preencha Nome, Cargo, Data de Admissão e Tipo de Contrato.');
  }

  const novoColaborador = {
    nome_colaborador: nome,
    id_cargos: idCargo,
    desde,
    status_colaborador: 'Pendente Documentação',
    tipo_de_contrato: tipoContrato,
    periodo_contrato: tipoContrato === 'Temporária' ? (document.getElementById('adm-periodo').value || null) : null,
    prorrogacao_contrato: tipoContrato === 'Temporária' ? (document.getElementById('adm-prorrogacao').value || null) : null,
  };
  if (salarioNum !== null && !isNaN(salarioNum)) novoColaborador.salario_base = salarioNum;

  const btn = document.getElementById('adm-btn-salvar');
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }

  let novoId;
  try {
    const { data, error } = await supaClient.from('colaboradores').insert([novoColaborador]).select().single();
    if (error) throw error;
    if (!data) throw new Error('Nenhum colaborador retornado após o insert (verifique a policy de SELECT/INSERT da tabela colaboradores no Supabase).');
    novoId = data.id_colaborador;
  } catch (e) {
    console.error('Erro ao criar colaborador da admissão:', e);
    showToast('Erro ao criar colaborador: ' + (e.message || e));
    if (btn) { btn.disabled = false; btn.textContent = 'Salvar Admissão'; }
    return;
  }

  const dadosPayload = {
    id_colaborador: novoId,
    cpf: document.getElementById('adm-cpf').value || null,
    rg: document.getElementById('adm-rg').value || null,
    data_nascimento: document.getElementById('adm-nascimento').value || null,
    telefone: document.getElementById('adm-telefone').value || null,
    email: document.getElementById('adm-email').value || null,
    endereco: document.getElementById('adm-endereco').value || null,
    telefone_emergencia: document.getElementById('adm-tel-emergencia').value || null,
    estado_civil: document.getElementById('adm-estado-civil').value || null,
    escolaridade: document.getElementById('adm-escolaridade').value || null,
    pix: document.getElementById('adm-pix').value || null,
    funcao: document.querySelector('#adm-cargo option:checked')?.textContent || null,
    epi_camisa: document.getElementById('adm-epi-camisa').value || null,
    epi_calca: document.getElementById('adm-epi-calca').value || null,
    epi_botina: document.getElementById('adm-epi-botina').value || null,
    epi_jaleco: document.getElementById('adm-epi-jaleco').value || null,
    epi_luva_raspa: document.getElementById('adm-epi-luva-raspa').value || null,
    epi_luva_lavagem: document.getElementById('adm-epi-luva-lavagem').value || null,
  };

  try {
    const { data: insertedDados, error: errorDados } = await supaClient.from('dados_pessoais_epi').insert([dadosPayload]).select();
    if (errorDados) throw errorDados;
    if (!insertedDados || insertedDados.length === 0) {
      throw new Error('Nenhuma linha foi inserida em dados_pessoais_epi (verifique a policy de INSERT dessa tabela no Supabase).');
    }
  } catch (e) {
    console.error('Erro ao salvar dados pessoais/EPIs da admissão:', e);
    showToast('Colaborador criado, mas falhou ao salvar Dados Pessoais/EPIs: ' + (e.message || e));
    if (btn) { btn.disabled = false; btn.textContent = 'Salvar Admissão'; }
    return;
  }

  await loadColaboradoresFromSupabase();
  await loadDadosPessoaisEpiForApp();

  showToast('Admissão criada! Agora envie os documentos do colaborador.');

  // Trava os dados já salvos e libera a seção de Documentos (precisa do colaborador já existir)
  document.querySelectorAll('#content-area input, #content-area select').forEach(el => el.disabled = true);
  if (btn) btn.style.display = 'none';
  const docCard = document.getElementById('adm-documentos-card');
  docCard.style.display = '';
  document.getElementById('adm-btn-enviar-doc').onclick = () => openEnviarDocModal(novoId);
  document.getElementById('adm-btn-ver-docs').onclick = () => openDocColabModal(novoId);
};

window.filtrarVagas = function(query) {
  const q = String(query || '').trim().toLowerCase();
  const rows = document.querySelectorAll('#vagas-tbody tr');
  let count = 0;
  rows.forEach(row => {
    const vaga = row.querySelector('td:first-child')?.textContent?.toLowerCase() || '';
    const visible = !q || vaga.includes(q);
    row.style.display = visible ? '' : 'none';
    if (visible) count++;
  });
  const pag = document.querySelector('#vagas-pagination span');
  if (pag) pag.textContent = `${count} vagas`;
};

window.copiarLinkVaga = function(id) {
  const v = window._vagas.find(v => v.id_vagas === id);
  if (!v) return;
  const link = `${location.origin}${location.pathname}?candidatura=${v['link-token']}`;
  navigator.clipboard.writeText(link).then(() => {
    showToast('Link copiado para a área de transferência!');
  }).catch(() => {
    // fallback para navegadores sem suporte
    const el = document.createElement('textarea');
    el.value = link;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('Link copiado!');
  });
};

window.encerrarVaga = async function(id) {
  const { error } = await supaClient.from('vagas').update({ status: 'fechado' }).eq('id_vagas', id);

window.reabrirVaga = async function(id) {

window.salvarVaga = async function() {
  const idCargo = document.getElementById('vaga-cargo').value;
  const prazo = document.getElementById('vaga-prazo').value;
  if (!idCargo) return showToast('Selecione um cargo.');

  // Gera token único para o link público, conferindo na tabela que ainda não existe
  let token;
  try {
    token = await gerarTokenUnico('vagas', 'link-token', () => Math.random().toString(36).substring(2, 10) + Date.now().toString(36));
  } catch (e) {
    console.error(e);
    return showToast('Erro ao gerar token único da vaga. Tente novamente.');
  }

  const { error } = await supaClient.from('vagas').insert([{
    id_cargos: idCargo,
    prazo: prazo || null,
    data_abertura: new Date().toISOString().slice(0, 10),
    candidatos_count: 0,
    status: 'aberta',

  }]);

  if (error) {
    console.error('Erro ao abrir vaga:', error.message);
    showToast('Erro ao abrir vaga.');
    return;
  }

  document.getElementById('vaga-modal').style.display = 'none';
  showToast('Vaga aberta com sucesso!');
  await loadVagasForApp();
  window._renderVagasTabela();
  document.getElementById('vagas-pagination').innerHTML =
    `<span>${window._vagas.length} vagas</span>`;
};

window.ordenarCargosTabela = function(valor) {
  window._cargosOrdem = valor;

window.renderCargosTabela = function renderCargosTabela() {
  const tbody = document.getElementById('cargos-tbody');
  if (!tbody) return;
  if (!window._cargosOrdem) window._cargosOrdem = 'cargo';

  const cargosArr = [...(Array.isArray(window._cargos) ? window._cargos : (window._cargos ? Object.values(window._cargos) : []))];
  const nomeDe = (cargo) => cargo[window._cargoNameField] || cargo.nome_cargo || cargo.nome || '';
  const salarioDe = (cargo) => (cargo.salario_base !== undefined && cargo.salario_base !== null && String(cargo.salario_base) !== '') ? parseFloat(cargo.salario_base) : null;

  cargosArr.sort((a, b) => {
    if (window._cargosOrdem === 'salario-desc' || window._cargosOrdem === 'salario-asc') {
      const sa = salarioDe(a), sb = salarioDe(b);
      if (sa === null && sb === null) return 0;
      if (sa === null) return 1;
      if (sb === null) return -1;
      return window._cargosOrdem === 'salario-desc' ? sb - sa : sa - sb;
    }
    return nomeDe(a).localeCompare(nomeDe(b));
  });

  tbody.innerHTML = cargosArr.map((cargo) => {
    const cid = cargo[window._cargoIdField] || cargo.id || cargo.id_cargo || '';
    const nome = nomeDe(cargo);
    const salarioNum = salarioDe(cargo);
    const salario = salarioNum !== null ? new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(salarioNum) : '';
    return `<tr data-cargo-id="${cid}"><td><strong>${nome}</strong></td><td style="font-weight:600">${salario}</td>
      <td>
        <button class="action-btn" title="Editar" onclick="editCargo('${cid}')">✎</button>
        <button class="action-btn btn-danger" title="Excluir" onclick="deleteCargo('${cid}')">✕</button>
      </td></tr>`;
  }).join('');
};

window.openCargoModal = async function(id=null){
  window._editingCargoId = id;
  const m=document.getElementById('cargo-modal');
  // garante cargos carregados
  if(!window._cargos || window._cargos.length===0) await loadCargosForApp();
  if(id){
    const cargo = (window._cargos||[]).find(c=> String(c[window._cargoIdField]||c.id||c.id_cargo)===String(id));
    document.getElementById('cm-cargo').value = cargo ? (cargo[window._cargoNameField]||cargo.nome_cargo||cargo.nome||'') : '';
    document.getElementById('cm-salario').value = cargo && cargo.salario_base !== undefined && cargo.salario_base !== null ? String(cargo.salario_base) : '';
    document.getElementById('cargo-modal-title').textContent='Editar Cargo';
  } else {
    document.getElementById('cm-cargo').value='';
    document.getElementById('cm-salario').value='';
    document.getElementById('cargo-modal-title').textContent='Novo Cargo';
  }
  m.style.display='flex';
};
window.editCargo=function(id){openCargoModal(id);};
window.deleteCargo=async function(id){
  if(!confirm('Excluir este cargo?')) return;
  // deleta no Supabase
  try{
    const { error } = await supaClient.from('cargos').delete().eq(window._cargoIdField, id);
    if(error) throw error;
    showToast('Cargo excluído.');
    await loadCargosForApp();
    navigate('dep-tabela','Cargos e Salários Atual');
  } catch(e){
    console.error('Erro ao excluir cargo:', e);
    showToast('Erro ao excluir cargo.');
  }
};
window.saveCargo=async function(){
  const nome = document.getElementById('cm-cargo').value.trim();
  const salarioRaw = document.getElementById('cm-salario').value.trim();
  if(!nome) return alert('Preencha o nome do cargo.');
  // tenta converter salário para número
  const salarioNum = salarioRaw ? parseFloat(String(salarioRaw).replace(/\./g,'').replace(/,/g,'.').replace(/[^0-9.\-]/g,'')) : null;
  try{
    if(window._editingCargoId){
      const upd = { [window._cargoNameField]: nome };
      if(salarioNum !== null && !isNaN(salarioNum)) upd.salario_base = salarioNum;
      const { error } = await supaClient.from('cargos').update(upd).eq(window._cargoIdField, window._editingCargoId);
      if(error) throw error;
      showToast('Cargo atualizado.');
    } else {
      const insertObj = { [window._cargoNameField]: nome };
      if(salarioNum !== null && !isNaN(salarioNum)) insertObj.salario_base = salarioNum;
      const { error } = await supaClient.from('cargos').insert([insertObj]);
      if(error) throw error;
      showToast('Cargo criado.');
    }
    document.getElementById('cargo-modal').style.display='none';
    await loadCargosForApp();
    navigate('dep-tabela','Cargos e Salários Atual');
  } catch(e){
    console.error('Erro ao salvar cargo:', e);
    showToast('Erro ao salvar cargo.');
  }
};

// DADOS PESSOAIS (Ficha e EPIs) — registros em Supabase (dados_pessoais_epi)
// ------------------------------------------------------------
// dados_pessoais_epi não guarda mais o nome do colaborador (era redundante com a FK
// id_colaborador); o nome é sempre resolvido em colaboradores, fonte única de verdade.
function nomeColaboradorPorId(idColaborador) {
  const colab = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador || c.id || c.codigo) === String(idColaborador));
  return colab ? (colab.nome_colaborador || colab.nome || colab.name || '—') : '—';
}

// Busca a Foto de Perfil do colaborador em documentos (tipo_doc = 'Foto de Perfil'),
// já carregada/agrupada por id_colaborador em window._documentosPorColab.
function fotoPerfilUrl(idColaborador) {
  const docs = (window._documentosPorColab && window._documentosPorColab[idColaborador]) || [];
  const foto = docs.find(d => d.tipo === 'Foto de Perfil');
  return foto ? foto.url : null;
}

// Atualiza o quadrado grande de Foto de Perfil no topo do modal de Dados Pessoais.
window.atualizarFotoGrandeDadosPessoais = function(idColaborador) {
  const el = document.getElementById('dp-foto-grande');
  if (!el) return;
  const url = idColaborador ? fotoPerfilUrl(idColaborador) : null;
  el.innerHTML = url
    ? `<img src="${driveThumbnailUrl(url)}" alt="Foto de perfil" style="width:100%;height:100%;object-fit:cover;cursor:pointer" onclick="visualizarDocumento('${url}')">`
    : 'Sem foto de perfil';
};

// Envia a Foto de Perfil para o Drive (mesmo fluxo do "Enviar Documento") e grava
// em documentos com tipo_doc = 'Foto de Perfil', substituindo a anterior se houver.
window.uploadFotoPerfilDadosPessoais = async function(file) {
  const cid = document.getElementById('dp-colaborador').value;
  if (!cid) return showToast('Selecione o colaborador antes de enviar a foto.');
  if (!file) return;
  if (!supaClient) return showToast('Supabase não está configurado.');

  let driveFolderId;
  try {
    driveFolderId = await window.obterDriveFolderIdParaColaborador(cid);
  } catch (error) {
    console.error('Erro ao buscar pasta de documentos:', error);
    return showToast('Erro ao localizar pasta do colaborador.', 'danger');
  }
  if (!driveFolderId) return showToast('Pasta de documentos não encontrada para este colaborador.', 'danger');

  let urlArquivo;
  try {
    urlArquivo = await window.enviarArquivoParaDrive(file, { cid, tipo: 'Foto de Perfil', driveFolderId });
  } catch (error) {
    console.error('Erro ao enviar foto de perfil para o Drive via n8n:', error);
    return showToast('Falha ao enviar foto para o Drive.', 'danger');
  }
  if (!urlArquivo) return showToast('A foto foi enviada mas o Drive não retornou a URL.', 'danger');

  if (!window._documentosPorColab) window._documentosPorColab = {};
  const existente = (window._documentosPorColab[cid] || []).find(d => d.tipo === 'Foto de Perfil');
  if (existente?.id_doc) {
    await supaClient.from('documentos').delete().eq('id_doc', existente.id_doc);
    window._documentosPorColab[cid] = window._documentosPorColab[cid].filter(d => d !== existente);
  }

  const hoje = new Date().toISOString().slice(0, 10);
  const { data: insertedRows, error: insertError } = await supaClient
    .from('documentos')
    .insert([{ id_colaborador: cid, tipo_doc: 'Foto de Perfil', data_envio_doc: hoje, url_arquivo: urlArquivo }])
    .select();
  if (insertError) {
    console.error('Erro ao salvar foto de perfil:', insertError);
    return showToast('Erro ao salvar foto de perfil: ' + (insertError.message || 'verifique o console.'), 'danger');
  }

  const insertedDoc = insertedRows?.[0];
  if (!window._documentosPorColab[cid]) window._documentosPorColab[cid] = [];
  window._documentosPorColab[cid].push({ id_doc: insertedDoc?.id_doc, tipo: 'Foto de Perfil', data: new Date().toLocaleDateString('pt-BR'), url: urlArquivo });

  document.getElementById('dp-foto-upload-input').value = '';
  atualizarFotoGrandeDadosPessoais(cid);
  if (window._renderDadosPessoaisEpi) window._renderDadosPessoaisEpi();
  showToast('Foto de perfil enviada!');
};

window.excluirFotoPerfilDadosPessoais = async function() {
  const cid = document.getElementById('dp-colaborador').value;
  if (!cid) return showToast('Selecione o colaborador.');
  const existente = (window._documentosPorColab && window._documentosPorColab[cid] || []).find(d => d.tipo === 'Foto de Perfil');
  if (!existente) return showToast('Nenhuma foto de perfil cadastrada para este colaborador.');
  if (!confirm('Excluir a foto de perfil deste colaborador?')) return;

  try {
    const { error } = await supaClient.from('documentos').delete().eq('id_doc', existente.id_doc);
    if (error) throw error;
    window._documentosPorColab[cid] = window._documentosPorColab[cid].filter(d => d !== existente);
    atualizarFotoGrandeDadosPessoais(cid);
    if (window._renderDadosPessoaisEpi) window._renderDadosPessoaisEpi();
    showToast('Foto de perfil excluída.');
  } catch (e) {
    console.error('Erro ao excluir foto de perfil:', e);
    showToast('Erro ao excluir foto de perfil: ' + (e.message || e));
  }
};

async function loadDadosPessoaisEpiForApp() {
  if (!supaClient) {
    console.error('Supabase client não inicializado para dados_pessoais_epi.');
    window._dadosPessoaisEpi = [];
    return;
  }
  const { data, error } = await supaClient
    .from('dados_pessoais_epi')
    .select('*');
  if (error) {
    console.error('Erro ao carregar dados pessoais/EPIs:', error.message);
    window._dadosPessoaisEpi = [];
  } else {
    window._dadosPessoaisEpi = data;

function pageDadosPessoais() {
  if (!window._dadosPessoaisEpi) window._dadosPessoaisEpi = [];

  document.getElementById('topbar-actions').innerHTML = '';

  const renderTabela = () => {
    const tbody = document.getElementById('dados-pessoais-tbody');
    if (!tbody) return;
    // Nome do colaborador não é mais gravado em dados_pessoais_epi (coluna removida,
    // era redundante com id_colaborador); resolvemos sempre via colaboradores, fonte única de verdade.
    const lista = [...(window._dadosPessoaisEpi || [])].sort((a, b) =>
      nomeColaboradorPorId(a.id_colaborador).localeCompare(nomeColaboradorPorId(b.id_colaborador)));
    tbody.innerHTML = lista.length === 0
      ? '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text3)">Nenhum registro cadastrado.</td></tr>'
      : lista.map(d => {
          // Salário sempre lido em tempo real de colaboradores.salario_base — fonte
          // única de verdade, evita ficar desatualizado em relação a Informações Contratuais.
          const colab = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador || c.id || c.codigo) === String(d.id_colaborador));
          const salario = colab && colab.salario_base !== undefined && colab.salario_base !== null && String(colab.salario_base) !== ''
            ? new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(parseFloat(colab.salario_base))
            : '—';
          const nomeColab = colab ? (colab.nome_colaborador || colab.nome || colab.name) : '—';
          const status = d.status_dados_pessoais || 'Incompleto';
          const fotoUrl = fotoPerfilUrl(d.id_colaborador);
          const foto = fotoUrl
            ? `<img src="${driveThumbnailUrl(fotoUrl)}" alt="Foto de perfil" style="width:40px;height:40px;object-fit:cover;border-radius:6px;cursor:pointer" onclick="visualizarDocumento('${fotoUrl}')">`
            : `<div style="width:40px;height:40px;border-radius:6px;background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:9px;text-align:center;line-height:1.2">Sem foto</div>`;
          return `
          <tr>
            <td>${foto}</td>
            <td><strong style="cursor:pointer;text-decoration:underline" onclick="openDadosPessoaisModal(${d.id})">${nomeColab}</strong></td>
            <td>${d.cpf || '—'}</td>
            <td>${d.funcao || '—'}</td>
            <td>${salario}</td>
            <td>
              <select class="form-select" style="width:auto;${corSelectStatus(status)}" onchange="aplicarCorStatus(this); alterarStatusDadosPessoais(${d.id}, this.value)">
                <option value="Incompleto" ${status === 'Incompleto' ? 'selected' : ''}>Incompleto</option>
                <option value="Completo" ${status === 'Completo' ? 'selected' : ''}>Completo</option>
              </select>
            </td>
            <td style="white-space:nowrap">
              <button class="action-btn" title="Editar" onclick="openDadosPessoaisModal(${d.id})">✎</button>
            </td>
          </tr>`;
        }).join('');
  };

  window._renderDadosPessoaisEpi = renderTabela;
  Promise.all([

// Ao selecionar/trocar o colaborador no modal, busca o salario_base dele na tabela
// colaboradores (já carregada em _colaboradoresSupabase) e preenche o campo Salário.
window.preencherSalarioDadosPessoais = function(idColaborador) {
  const salarioEl = document.getElementById('dp-salario');
  if (!salarioEl) return;
  if (!idColaborador) { salarioEl.value = ''; return; }
  const colab = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador || c.id || c.codigo) === String(idColaborador));
  if (colab && colab.salario_base !== undefined && colab.salario_base !== null && String(colab.salario_base) !== '') {
    salarioEl.value = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(colab.salario_base);
  } else {
    salarioEl.value = '';
  }
};

window.salvarDadosPessoaisEpi = async function() {
  const idColaborador = document.getElementById('dp-colaborador').value;
  if (!idColaborador) return showToast('Selecione o colaborador.');

  // Salário não é mais gravado aqui: o campo é somente leitura e reflete sempre
  // colaboradores.salario_base (única fonte de verdade, editável em Informações Contratuais).
  const payload = {
    id_colaborador: idColaborador,
    cpf: document.getElementById('dp-cpf').value || null,
    rg: document.getElementById('dp-rg').value || null,
    data_nascimento: document.getElementById('dp-nascimento').value || null,
    telefone: document.getElementById('dp-telefone').value || null,
    email: document.getElementById('dp-email').value || null,
    endereco: document.getElementById('dp-endereco').value || null,
    telefone_emergencia: document.getElementById('dp-tel-emergencia').value || null,
    estado_civil: document.getElementById('dp-estado-civil').value || null,
    escolaridade: document.getElementById('dp-escolaridade').value || null,
    pix: document.getElementById('dp-pix').value || null,
    'vale-transporte': document.getElementById('dp-vale-transporte').value || null,
    funcao: document.getElementById('dp-funcao').value || null,
    epi_camisa: document.getElementById('dp-epi-camisa').value || null,
    epi_calca: document.getElementById('dp-epi-calca').value || null,
    epi_botina: document.getElementById('dp-epi-botina').value || null,
    epi_jaleco: document.getElementById('dp-epi-jaleco').value || null,
    epi_luva_raspa: document.getElementById('dp-epi-luva-raspa').value || null,
    epi_luva_lavagem: document.getElementById('dp-epi-luva-lavagem').value || null,
  };

  try {
    const id = window._editingDadosPessoaisId;
    const { error } = id
      ? await supaClient.from('dados_pessoais_epi').update(payload).eq('id', id)
      : await supaClient.from('dados_pessoais_epi').insert([payload]);
    if (error) throw error;
    await loadDadosPessoaisEpiForApp();
    if (window._renderDadosPessoaisEpi) window._renderDadosPessoaisEpi();
    document.getElementById('dados-pessoais-modal').style.display = 'none';
    showToast(id ? 'Registro atualizado!' : 'Registro criado!');
  } catch (e) {
    console.error('Erro ao salvar dados pessoais/EPIs:', e);
    showToast('Erro ao salvar registro: ' + (e.message || e));
  }
};

window.alterarStatusDadosPessoais = async function(id, novoStatus) {
  try {
    const { error } = await supaClient.from('dados_pessoais_epi').update({ status_dados_pessoais: novoStatus }).eq('id', id);
    if (error) throw error;
    const registro = (window._dadosPessoaisEpi || []).find(d => d.id === id);
    if (registro) registro.status_dados_pessoais = novoStatus;
    showToast('Status atualizado!');
  } catch (e) {
    console.error('Erro ao atualizar status:', e);
    showToast('Erro ao atualizar status: ' + (e.message || e));
  }
};

async function loadMapeamentoPerfilForApp() {
  if (!supaClient) {
    console.error('Supabase client não inicializado para mapeamento_perfil.');
    window._mapeamentoPerfil = [];
    return;
  }
  const { data, error } = await supaClient
    .from('mapeamento_perfil')
    .select('*');
  if (error) {
    console.error('Erro ao carregar mapeamento de perfil:', error.message);
    window._mapeamentoPerfil = [];
  } else {
    window._mapeamentoPerfil = data;
  }
}

function pageMapeamentoPerfil() {
  if (!window._mapeamentoPerfil) window._mapeamentoPerfil = [];

  document.getElementById('topbar-actions').innerHTML = '';

  const renderTabela = () => {
    const tbody = document.getElementById('mapeamento-perfil-tbody');
    if (!tbody) return;
    // Nome do colaborador não é mais gravado em mapeamento_perfil (coluna removida,
    // era redundante com id_colaborador); resolvemos sempre via colaboradores, fonte única de verdade.
    const lista = [...(window._mapeamentoPerfil || [])].sort((a, b) =>
      nomeColaboradorPorId(a.id_colaborador).localeCompare(nomeColaboradorPorId(b.id_colaborador)));
    tbody.innerHTML = lista.length === 0
      ? '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text3)">Nenhum registro cadastrado.</td></tr>'
      : lista.map(m => {
          const status = m.status_mapeamento || 'Incompleto';
          return `
          <tr>
            <td><strong style="cursor:pointer;text-decoration:underline" onclick="openMapeamentoPerfilModal(${m.id})">${nomeColaboradorPorId(m.id_colaborador)}</strong></td>
            <td>${m.como_gosta_ser_chamado || '—'}</td>

            <td>${m.perfil_disc_2 || '—'}</td>
            <td>
              <select class="form-select" style="width:auto;${corSelectStatus(status)}" onchange="aplicarCorStatus(this); alterarStatusMapeamentoPerfil(${m.id}, this.value)">
                <option value="Incompleto" ${status === 'Incompleto' ? 'selected' : ''}>Incompleto</option>
                <option value="Completo" ${status === 'Completo' ? 'selected' : ''}>Completo</option>
              </select>
            </td>
            <td style="white-space:nowrap">
              <button class="action-btn" title="Editar" onclick="openMapeamentoPerfilModal(${m.id})">✎</button>
            </td>
          </tr>`;
        }).join('');
  };

  window._renderMapeamentoPerfil = renderTabela;
  loadMapeamentoPerfilForApp().then(renderTabela);

  return `
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Mapeamento de Perfil</span>

          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="mapeamento-perfil-tbody">
        <tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text3)">Carregando...</td></tr>
      </tbody>

  </div>`;

window.salvarMapeamentoPerfil = async function() {

  const payload = {
    id_colaborador: idColaborador,
    como_gosta_ser_chamado: document.getElementById('mp-apelido').value || null,
    hobbies: document.getElementById('mp-hobbies').value || null,
    prato_doce_preferido: document.getElementById('mp-prato-doce').value || null,
    pretende_ter_filhos: document.getElementById('mp-filhos').value || null,
    grande_sonho_pessoal: document.getElementById('mp-sonho').value || null,
    metas_ano_vigente: document.getElementById('mp-metas').value || null,
    talentos_dons: document.getElementById('mp-talentos').value || null,
    desafios_pessoais: document.getElementById('mp-desafios').value || null,
    expectativa_empresa: document.getElementById('mp-expectativa').value || null,
    pontos_fortes: document.getElementById('mp-pontos-fortes').value || null,
    a_desenvolver: document.getElementById('mp-a-desenvolver').value || null,
    habilidades_profissionais: document.getElementById('mp-habilidades').value || null,
    perfil_disc_1: document.getElementById('mp-disc1').value || null,
    perfil_disc_2: document.getElementById('mp-disc2').value || null,
    comunicacao_ideal: document.getElementById('mp-comunicacao').value || null,
    valores_principais: document.getElementById('mp-valores').value || null,
  };

  try {
    const id = window._editingMapeamentoPerfilId;

      ? await supaClient.from('mapeamento_perfil').update(payload).eq('id', id).select()
      : await supaClient.from('mapeamento_perfil').insert([payload]).select();
    if (error) throw error;
    if (!data || data.length === 0) throw new Error('Nenhuma linha foi salva (verifique as policies da tabela mapeamento_perfil no Supabase).');
    await loadMapeamentoPerfilForApp();
    if (window._renderMapeamentoPerfil) window._renderMapeamentoPerfil();

    showToast(id ? 'Registro atualizado!' : 'Registro criado!');

    console.error('Erro ao salvar mapeamento de perfil:', e);
    showToast('Erro ao salvar registro: ' + (e.message || e));

// TREINAMENTOS > CADASTRO DE USUÁRIO — cria o login (Supabase Auth) de um
// colaborador com perfil Treinamento (perfil_id fixo = 3) e grava a linha
// correspondente em `usuarios`. A criação do login em si roda num webhook do
// n8n (N8N_CRIAR_USUARIO_WEBHOOK_URL), porque exige a service_role key do
// Supabase — uma credencial que nunca pode ficar exposta no código do site.
// ------------------------------------------------------------
async function loadUsuariosCadastrados() {
  if (!supaClient) {
    console.error('Supabase client não inicializado para usuarios.');
    window._usuariosCadastrados = [];
    return;
  }
  const { data, error } = await supaClient
    .from('usuarios')
    .select('id, colaborador_id, email, ativo, created_at, perfil_id, perfis(nome)')
    .order('created_at', { ascending: false });
  if (error) {
    console.error('Erro ao carregar usuários cadastrados:', error.message);
    window._usuariosCadastrados = [];
  } else {
    window._usuariosCadastrados = data;
  }
}

window.salvarCadastroUsuario = async function() {
  const colaboradorId = document.getElementById('cu-colaborador').value;
  const email = document.getElementById('cu-email').value.trim();
  const senha = document.getElementById('cu-senha').value;
  if (!colaboradorId) return showToast('Selecione o colaborador.');
  if (!email) return showToast('Informe o e-mail.');
  if (!senha) return showToast('Informe a senha.');
  if (!N8N_CRIAR_USUARIO_WEBHOOK_URL || N8N_CRIAR_USUARIO_WEBHOOK_URL.startsWith('COLE_AQUI')) {
    return showToast('Webhook de criação de usuário não configurado.', 'danger');
  }

  const btn = document.getElementById('cu-btn-salvar');
  if (btn) { btn.disabled = true; btn.textContent = 'Cadastrando...'; }

  try {
    const res = await fetch(N8N_CRIAR_USUARIO_WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token: N8N_WEBHOOK_TOKEN,
        email,
        senha,
        colaborador_id: colaboradorId,
        perfil_id: 3, // Treinamento
      }),
    });
    let result = {};
    try { result = await res.json(); } catch (e) { /* resposta sem corpo JSON */ }
    if (!res.ok || result.success === false) {
      throw new Error(result.error || `Falha ao cadastrar usuário (status ${res.status}).`);
    }

    document.getElementById('cadastro-usuario-modal').style.display = 'none';
    await loadUsuariosCadastrados();
    if (window._renderCadastroUsuario) window._renderCadastroUsuario();
    showToast('Usuário cadastrado! Peça para a pessoa entrar com a senha inicial e trocar no primeiro acesso.');
  } catch (e) {
    console.error('Erro ao cadastrar usuário:', e);
    showToast('Erro ao cadastrar usuário: ' + (e.message || e), 'danger');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Cadastrar'; }
  }
};

// ------------------------------------------------------------
// PERMISSÕES DE ACESSO — grade perfil × página, só para Administrador
// (temPermissao/podeGerenciarPermissoes já travam isso na sidebar e no
// renderPage; a policy do Supabase também só deixa Administrador
// inserir/apagar em `permissoes`).
// ------------------------------------------------------------
// Ids que nunca aparecem nesta grade porque são travados direto no código,
// não dependem só da tabela permissoes (ver temPermissao()).
const PAGINAS_FORA_DA_GRADE = ['trein-cadastro-usuario', 'permissoes-acesso'];

// Deriva a lista de páginas "gerenciáveis" a partir do próprio NAV — evita
// manter uma segunda lista duplicada que poderia ficar desatualizada.
function paginasParaGrade() {
  const grupos = [];
  NAV.forEach(item => {
    if (item.subs && item.subs.length) {
      const subs = item.subs.filter(s => !PAGINAS_FORA_DA_GRADE.includes(s.id));
      if (subs.length) grupos.push({ label: item.label, paginas: subs });
    } else if (!PAGINAS_FORA_DA_GRADE.includes(item.id)) {
      grupos.push({ label: item.label, paginas: [{ id: item.id, label: item.label }] });
    }
  });
  return grupos;
}

async function loadPerfisEPermissoesParaGrade() {
  const [{ data: perfis, error: errPerfis }, { data: permissoes, error: errPermissoes }] = await Promise.all([
    supaClient.from('perfis').select('id, nome').order('id'),
    supaClient.from('permissoes').select('perfil_id, pagina_id'),
  ]);
  if (errPerfis) console.error('Erro ao carregar perfis:', errPerfis.message);
  if (errPermissoes) console.error('Erro ao carregar permissões:', errPermissoes.message);
  window._perfisGrade = perfis || [];
  window._permissoesGradeSet = new Set((permissoes || []).map(p => `${p.perfil_id}:${p.pagina_id}`));
}

function pagePermissoesAcesso() {
  document.getElementById('topbar-actions').innerHTML = '';

  const renderGrade = () => {
    const container = document.getElementById('permissoes-grade-container');
    if (!container) return;
    const perfis = window._perfisGrade || [];
    const grupos = paginasParaGrade();
    const marcado = (perfilId, paginaId) => (window._permissoesGradeSet || new Set()).has(`${perfilId}:${paginaId}`);

    container.innerHTML = `
      <div style="overflow-x:auto">
      <table style="white-space:nowrap">
        <thead>
          <tr>
            <th style="text-align:left">Página</th>
            ${perfis.map(p => `<th style="text-align:center">${p.nome}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${grupos.map(g => `
            <tr><td colspan="${perfis.length + 1}" style="background:var(--bg2);font-weight:700;font-size:12px;padding:8px 10px">${g.label}</td></tr>
            ${g.paginas.map(pg => `
              <tr>
                <td style="padding-left:20px">${pg.label}</td>
                ${perfis.map(p => `
                  <td style="text-align:center">
                    <input type="checkbox" ${marcado(p.id, pg.id) ? 'checked' : ''}
                      onchange="alterarPermissaoGrade(${p.id}, '${pg.id}', this.checked)">
                  </td>`).join('')}
              </tr>`).join('')}
          `).join('')}
        </tbody>
      </table>
      </div>
      <p style="font-size:12px;color:var(--text3);margin-top:16px">
        "Cadastro de Usuário" (dentro de Treinamentos) e esta própria página, "Permissões de Acesso", não aparecem
        aqui de propósito: ficam sempre restritas a Administrador — e, no caso de Cadastro de Usuário, também RH —
        direto no código, independente do que estiver marcado nesta tabela.
      </p>`;
  };

  window._renderPermissoesGrade = renderGrade;
  loadPerfisEPermissoesParaGrade().then(renderGrade);

  return `
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Permissões de Acesso</span>
    </div>
    <div style="padding:20px" id="permissoes-grade-container">
      <div style="text-align:center;padding:24px;color:var(--text3)">Carregando...</div>
    </div>
  </div>`;
}

window.alterarPermissaoGrade = async function(perfilId, paginaId, marcar) {
  try {
    if (marcar) {
      const { error } = await supaClient.from('permissoes').insert([{ perfil_id: perfilId, pagina_id: paginaId }]);
      if (error) throw error;
      window._permissoesGradeSet.add(`${perfilId}:${paginaId}`);
    } else {
      const { error } = await supaClient.from('permissoes').delete().eq('perfil_id', perfilId).eq('pagina_id', paginaId);
      if (error) throw error;
      window._permissoesGradeSet.delete(`${perfilId}:${paginaId}`);
    }
    showToast('Permissão atualizada!');
  } catch (e) {
    console.error('Erro ao atualizar permissão:', e);
    showToast('Erro ao atualizar permissão: ' + (e.message || e), 'danger');
    // Reverte o checkbox visualmente, já que window._permissoesGradeSet não mudou.
    if (window._renderPermissoesGrade) window._renderPermissoesGrade();
  }
};

function montarDadosRelatorioColaborador(idColaborador) {
  const colab = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador) === String(idColaborador));
  if (!colab) return null;
  const historico = (window._colaboradorHistorico || [])
    .filter(h => String(h.id_colaborador) === String(idColaborador))
    .sort((a, b) => new Date(b.periodo_inicio || 0) - new Date(a.periodo_inicio || 0));
  const dadosPessoais = (window._dadosPessoaisEpi || []).find(d => String(d.id_colaborador) === String(idColaborador));
  const perfil = (window._mapeamentoPerfil || []).find(m => String(m.id_colaborador) === String(idColaborador));
  const documentos = window._documentosPorColab[idColaborador] || window._documentosPorColab[colab.id_colaborador] || [];
  return { colab, historico, dadosPessoais, perfil, documentos };
}

// Monta o miolo HTML (sem o card externo) de um colaborador, respeitando as seções escolhidas.
function construirHtmlSecoesColaborador(dadosColab, secoes) {
  const { colab, historico, dadosPessoais, perfil, documentos } = dadosColab;
  const linha = (label, valor) => `<div style="display:flex;padding:6px 0;border-bottom:1px solid var(--bg2);font-size:13px"><div style="width:240px;color:var(--text3);flex-shrink:0">${label}</div><div style="flex:1">${valor || '—'}</div></div>`;
  const salarioNum = salarioBaseDoColaborador(colab);
  const salarioFmt = salarioNum !== null ? new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(salarioNum) : '—';

  let html = '';

  if (secoes.includes('contratuais')) {
    html += `
      <div class="form-section-title">Dados Contratuais</div>
      ${linha('Nome', colab.nome_colaborador)}
      ${linha('Cargo', colab.cargos ? colab.cargos.nome_cargo : '—')}
      ${linha('Status', colab.status_colaborador)}
      ${linha('Tipo de Contrato', colab.tipo_de_contrato)}
      ${colab.tipo_de_contrato === 'Temporária' ? linha('Período do Contrato', colab.periodo_contrato) : ''}
      ${colab.tipo_de_contrato === 'Temporária' ? linha('Prorrogação', colab.prorrogacao_contrato) : ''}
      ${linha('Salário Base', salarioFmt)}
      ${linha('Data de Admissão', formatarDataBR(colab.desde))}`;
  }

  if (secoes.includes('historico')) {
    html += `
      <div class="form-section-title" style="margin-top:24px">Histórico de Carreira</div>
      ${historico.length === 0 ? '<div style="font-size:13px;color:var(--text3);padding:8px 0">Nenhum registro de histórico.</div>' : `

// Escreve as seções de um colaborador no documento PDF, usando state.y como cursor
// vertical compartilhado (objeto mutável, já que números não passam por referência).
function escreverColaboradorNoPdf(doc, state, dadosColab, secoes, margemEsq) {
  const { colab, historico, dadosPessoais, perfil, documentos } = dadosColab;

  const checarQuebra = (qtdLinhas) => { if (state.y + qtdLinhas * 6 > 280) { doc.addPage(); state.y = 18; } };
  const titulo = (texto) => {
    checarQuebra(2);
    doc.setFont(undefined, 'bold');
    doc.setFontSize(13);
    doc.text(texto, margemEsq, state.y);
    state.y += 8;
    doc.setFont(undefined, 'normal');
    doc.setFontSize(10);
  };
  const campo = (label, valor) => {
    const linhasQuebradas = doc.splitTextToSize(`${label}: ${valor || '—'}`, 180);
    checarQuebra(linhasQuebradas.length);
    doc.text(linhasQuebradas, margemEsq, state.y);
    state.y += linhasQuebradas.length * 6;
  };

  doc.setFontSize(16);
  doc.setFont(undefined, 'bold');
  doc.text(`Relatório — ${colab.nome_colaborador}`, margemEsq, state.y);
  state.y += 10;
  doc.setFont(undefined, 'normal');
  doc.setFontSize(10);

  const salarioNum = salarioBaseDoColaborador(colab);

  if (secoes.includes('contratuais')) {
    titulo('Dados Contratuais');
    campo('Cargo', colab.cargos ? colab.cargos.nome_cargo : '—');
    campo('Status', colab.status_colaborador);
    campo('Tipo de Contrato', colab.tipo_de_contrato);
    if (colab.tipo_de_contrato === 'Temporária') {
      campo('Período do Contrato', colab.periodo_contrato);
      campo('Prorrogação', colab.prorrogacao_contrato);
    }
    campo('Salário Base', salarioNum !== null ? new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(salarioNum) : '—');
    campo('Data de Admissão', formatarDataBR(colab.desde));
  }

  if (secoes.includes('historico')) {
    titulo('Histórico de Carreira');
    if (historico.length === 0) {
      campo('Histórico de Carreira', 'Nenhum registro.');
    } else {
      historico.forEach(h => {
        campo('Período', `${formatarDataBR(h.periodo_inicio) || '—'} – ${formatarDataBR(h.periodo_fim) || 'Atual'}`);
        campo('Cargo', nomeCargoPorId(h.id_cargos));
        campo('Salário', h.salario_hist !== null && h.salario_hist !== undefined ? new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(h.salario_hist) : '—');
        campo('Motivo', h.motivo);
        state.y += 2;
      });
    }
  }

  if (secoes.includes('pessoais')) {
    titulo('Dados Pessoais');
    if (!dadosPessoais) {
      campo('Dados Pessoais', 'Nenhum registro cadastrado.');
    } else {
      campo('CPF', dadosPessoais.cpf);
      campo('RG', dadosPessoais.rg);
      campo('Data de Nascimento', formatarDataBR(dadosPessoais.data_nascimento));
      campo('Telefone', dadosPessoais.telefone);
      campo('E-mail', dadosPessoais.email);
      campo('Endereço', dadosPessoais.endereco);
      campo('Telefone Emergência', dadosPessoais.telefone_emergencia);
      campo('Estado Civil', dadosPessoais.estado_civil);
      campo('Escolaridade', dadosPessoais.escolaridade);
      campo('PIX', dadosPessoais.pix);
      campo('Optante por Vale-Transporte', dadosPessoais['vale-transporte']);
    }
  }

  if (secoes.includes('epis')) {
    titulo('Numeração de EPIs / Tamanhos');
    if (!dadosPessoais) {
      campo('EPIs', 'Sem dados cadastrados.');
    } else {
      campo('Camisa', dadosPessoais.epi_camisa);
      campo('Calça', dadosPessoais.epi_calca);
      campo('Botina', dadosPessoais.epi_botina);
      campo('Jaleco', dadosPessoais.epi_jaleco);
      campo('Luva Raspa', dadosPessoais.epi_luva_raspa);
      campo('Luva Lavagem', dadosPessoais.epi_luva_lavagem);
    }
  }

  if (secoes.includes('perfil')) {
    titulo('Mapeamento de Perfil');
    if (!perfil) {
      campo('Mapeamento de Perfil', 'Nenhum registro cadastrado.');
    } else {
      campo('Como gosta de ser chamado(a)', perfil.como_gosta_ser_chamado);
      campo('Hobbies', perfil.hobbies);
      campo('Prato/Doce preferido', perfil.prato_doce_preferido);
      campo('Pretende ter filhos?', perfil.pretende_ter_filhos);
      campo('Grande sonho pessoal', perfil.grande_sonho_pessoal);
      campo('Metas para o ano vigente', perfil.metas_ano_vigente);
      campo('Talentos e dons', perfil.talentos_dons);
      campo('Desafios pessoais', perfil.desafios_pessoais);
      campo('Expectativa na empresa', perfil.expectativa_empresa);
      campo('Pontos fortes', perfil.pontos_fortes);
      campo('A desenvolver', perfil.a_desenvolver);
      campo('Habilidades profissionais', perfil.habilidades_profissionais);
      campo('Perfil DISC (1ª)', perfil.perfil_disc_1);
      campo('Perfil DISC (2ª)', perfil.perfil_disc_2);
      campo('Comunicação ideal', perfil.comunicacao_ideal);
      campo('3 principais valores', perfil.valores_principais);
    }
  }

  if (secoes.includes('documentos')) {
    titulo('Documentos Enviados');
    if (documentos.length === 0) {
      campo('Documentos', 'Nenhum documento enviado.');
    } else {
      documentos.forEach(d => campo(d.tipo || 'Documento', d.data || '—'));
    }
  }
}

// Carrega a logo como base64 (necessário pro jsPDF, que não busca URLs sozinho)
// e guarda em cache para não converter de novo a cada PDF gerado.
function obterLogoBase64() {
  if (window._logoBase64) return Promise.resolve(window._logoBase64);
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      canvas.getContext('2d').drawImage(img, 0, 0);
      window._logoBase64 = canvas.toDataURL('image/png');
      resolve(window._logoBase64);
    };
    img.onerror = reject;
    img.src = 'assets/logo-minart.png';
  });
}

window.baixarRelatorioPdf = async function() {
  if (!window.jspdf || !window._relatorioAtual || !window._relatorioAtual.colaboradores || window._relatorioAtual.colaboradores.length === 0) {
    showToast('Gere o relatório antes de baixar o PDF.');
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const margemEsq = 14;
  const state = { y: 18 };
  const { colaboradores, secoes, tipo } = window._relatorioAtual;

  try {
    const logoBase64 = await obterLogoBase64();
    doc.addImage(logoBase64, 'PNG', margemEsq, state.y, 45, 10.85);
    state.y += 16;
  } catch (e) {
    console.warn('Não foi possível incluir a logo no PDF:', e);
  }

  doc.setFontSize(9);
  doc.setFont(undefined, 'normal');
  doc.setTextColor(120);
  doc.text(`Impresso em: ${new Date().toLocaleString('pt-BR')}`, margemEsq, state.y);
  doc.setTextColor(0);
  state.y += 10;

  colaboradores.forEach((dadosColab, idx) => {
    if (idx > 0) { doc.addPage(); state.y = 18; }
    escreverColaboradorNoPdf(doc, state, dadosColab, secoes, margemEsq);
  });

  const nomeArquivo = tipo === 'todos'
    ? 'relatorio-todos-colaboradores.pdf'
    : `relatorio-${(colaboradores[0].colab.nome_colaborador || 'colaborador').trim().replace(/\s+/g, '-').toLowerCase()}.pdf`;
  doc.save(nomeArquivo);
};

function toDrivePreviewUrl(url) {
  if (!url) return '';
  const m = url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);
  if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
  return url;
}

async function loadInternosIframe(pageId) {
  const nomeMap = {
    'int-cultura':     'Manual de Cultura',
    'int-regulamento': 'Regulamento interno',
    'int-convencao':   'Convenção Siman',
  };
  const loading = document.getElementById(`${pageId}-loading`);
  const iframe  = document.getElementById(`${pageId}-iframe`);
  if (!iframe || !supaClient) return;
  try {
    const { data, error } = await supaClient.from('internos').select('id_drive').eq('nome', nomeMap[pageId]).maybeSingle();
    if (error) throw error;
    const url = toDrivePreviewUrl(data?.id_drive || '');
    if (url) {
      iframe.src = url;
      iframe.style.display = 'block';
      if (loading) loading.style.display = 'none';
    } else {
      if (loading) loading.textContent = 'Documento não encontrado.';
    }
  } catch(e) {
    if (loading) loading.textContent = 'Erro ao carregar documento.';
    console.error('Erro ao carregar internos:', e);
  }
}

window.enviarCandidatura = async function(token) {
  const nome          = (document.getElementById('pub-nome')?.value || '').trim();
  const cpf           = (document.getElementById('pub-cpf')?.value || '').trim();
  const dataNascimento = (document.getElementById('pub-nascimento')?.value || '').trim();
  const nomeMae       = (document.getElementById('pub-nome-mae')?.value || '').trim();
  const numero        = (document.getElementById('pub-numero')?.value || '').trim();
  const instagram      = (document.getElementById('pub-instagram')?.value || '').trim();
  const currFile      = document.getElementById('pub-curriculo')?.files[0];
  const msgEl         = document.getElementById('pub-msg');
  const btnEl         = document.getElementById('pub-submit-btn');

  if (!nome)           { msgEl.textContent = 'Informe seu nome.'; msgEl.className = 'pub-msg pub-error'; return; }
  if (!cpf)            { msgEl.textContent = 'Informe seu CPF.'; msgEl.className = 'pub-msg pub-error'; return; }
  if (!dataNascimento) { msgEl.textContent = 'Informe sua data de nascimento.'; msgEl.className = 'pub-msg pub-error'; return; }
  if (!nomeMae)        { msgEl.textContent = 'Informe o nome da sua mãe.'; msgEl.className = 'pub-msg pub-error'; return; }
  if (!currFile)       { msgEl.textContent = 'Anexe seu currículo.'; msgEl.className = 'pub-msg pub-error'; return; }

  if (!window._vagas) window._vagas = [];
  const vaga = window._vagas.find(v => v['link-token'] === token);
  if (!vaga) { msgEl.textContent = 'Vaga não encontrada.'; msgEl.className = 'pub-msg pub-error'; return; }

  btnEl.disabled = true;
  msgEl.textContent = 'Enviando...';
  msgEl.className = 'pub-msg';

  let urlCurriculo = null;
  if (currFile) {
    try {
      urlCurriculo = await window.enviarCurriculoParaDrive(currFile, { nomeCandidato: nome, vagaCargo: window._pubCargoNome || '—' });
    } catch (error) {
      console.error('Erro ao enviar currículo:', error);
      msgEl.textContent = 'Falha ao enviar o currículo. Tente novamente.';
      msgEl.className = 'pub-msg pub-error';
      btnEl.disabled = false;
      return;
    }
  }

  const { error } = await supaClient.from('candidaturas').insert([{
    id_vagas: vaga.id_vagas,
    id_cargos: vaga.id_cargos,
    nome_candidato: nome,
    cpf: cpf,
    data_nascimento: dataNascimento,
    nome_da_mae: nomeMae,
    numero: numero || null,
    instagram: instagram || null,
    url_curriculo: urlCurriculo,
    data_envio_candidatura: new Date().toISOString().slice(0, 10)
  }]);

  if (error) {
    console.error('Erro ao salvar candidatura:', error.message);
    msgEl.textContent = 'Erro ao enviar candidatura. Tente novamente mais tarde.';
    msgEl.className = 'pub-msg pub-error';
    btnEl.disabled = false;
    return;
  }

  // Incrementa contador da vaga (melhor esforço)
  supaClient.from('vagas').update({ candidatos_count: (vaga.candidatos_count || 0) + 1 }).eq('id_vagas', vaga.id_vagas)
    .then(({ error }) => { if (error) console.error('Erro ao atualizar contador de candidatos:', error.message); });

  // Feedback visual
  document.getElementById('pub-box').innerHTML = `
    <div style="text-align:center;padding:32px 0">
      <div style="font-size:40px;margin-bottom:16px">✅</div>
      <div style="font-size:18px;font-weight:700;color:#111;margin-bottom:8px">Candidatura enviada!</div>
      <div style="font-size:14px;color:#666">Obrigado, <strong>${nome}</strong>. Entraremos em contato em breve.</div>
    </div>`;
};

async function checkAvaliacaoLink() {
  const params = new URLSearchParams(location.search);
  const token = params.get('avaliacao');
  if (!token) return; // não é link de avaliação, carrega normalmente

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'none';

  if (!supaClient) {
    renderAvaliacaoShell(`<div class="empty-state"><div class="empty-state-icon">🔒</div><div class="empty-state-title">Erro de configuração</div><div class="empty-state-desc">Supabase não inicializado.</div></div>`);
    return;
  }

  const { data: teste, error } = await supaClient
    .from('testes_avaliacoes')
    .select('*')
    .eq('token', token)
    .maybeSingle();

  if (error || !teste) {
    renderAvaliacaoShell(`<div class="empty-state"><div class="empty-state-icon">🔒</div><div class="empty-state-title">Link inválido</div><div class="empty-state-desc">Este link de avaliação não foi encontrado ou está incorreto.</div></div>`);
    return;
  }

  if (teste.status_realizacao === 'concluido' || teste.respondido_em) {
    renderAvaliacaoShell(`<div class="empty-state"><div class="empty-state-icon">✅</div><div class="empty-state-title">Avaliação já respondida</div><div class="empty-state-desc">Esta avaliação já foi concluída anteriormente e não pode ser respondida novamente.</div></div>`);
    return;
  }

  let cargo = null;
  if (teste.id_cargo) {
    const { data: cargoData, error: cargoError } = await supaClient
      .from('cargos')
      .select('id_cargos,nome_cargo')
      .eq('id_cargos', teste.id_cargo)
      .maybeSingle();
    if (cargoError) console.error('Erro ao carregar cargo da avaliação:', cargoError.message);
    cargo = cargoData;
  }

  window._pubAval = {
    token: teste.token,
    idCargo: teste.id_cargo,
    cargoNome: (cargo && cargo.nome_cargo) || '—',
    // Nome vem direto de testes_avaliacoes (gravado no momento da aprovação) em vez
    // de consultar candidaturas, porque o anon normalmente só tem permissão de
    // INSERT nessa tabela (usada pelo formulário público), não de SELECT.
    nomeCandidato: teste.nome_candidato || teste.nome_colaborador || 'Candidato',
  };

  renderAvaliacaoEtapaDisc();
}
