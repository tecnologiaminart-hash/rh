<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minart Móveis - RH</title>
<meta name="description" content="Sistema de RH - Minart Móveis">
<meta property="og:type" content="website">
<meta property="og:title" content="Minart Móveis - RH">
<meta property="og:description" content="Sistema de RH - Minart Móveis">
<meta property="og:url" content="https://tecnologiaminart-hash.github.io/rh/">
<meta property="og:image" content="https://tecnologiaminart-hash.github.io/rh/assets/logo-minart.png">
<link rel="icon" href="data:,">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f5;
    --bg3: #ebebeb;
    --text: #111111;
    --text2: #555555;
    --text3: #888888;
    --border: #dddddd;
    --accent: #111111;
    --accent-light: #f0f0f0;
    --sidebar-bg: #111111;
    --sidebar-text: #cccccc;
    --sidebar-active: #ffffff;
    --sidebar-hover: #222222;
    --danger: #c0392b;
    --success: #1a7a3c;
    --warning: #b07d00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); font-size: 14px; line-height: 1.5; }

  /* LOGIN */
  #login-screen, #reset-password-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #111; position: fixed; inset: 0; z-index: 999;
  }
  .login-box {
    background: #fff; border-radius: 4px; padding: 48px 40px; width: 360px;
    border: 1px solid #e0e0e0;
  }
  .login-logo-img { display: block; max-width: 220px; height: auto; margin-bottom: 32px; }
  .login-box label { display: block; font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .login-box input {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 3px;
    font-size: 14px; margin-bottom: 16px; outline: none; background: #fafafa;
    transition: border-color 0.15s;
  }
  .login-box input:focus { border-color: #111; background: #fff; }
  .login-btn {
    width: 100%; padding: 11px; background: #111; color: #fff; border: none;
    border-radius: 3px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px;
    transition: background 0.15s;
  }
  .login-btn:hover { background: #333; }
  .login-error { color: var(--danger); font-size: 12px; margin-top: 8px; text-align: center; min-height: 18px; }
  .login-config { margin-top: 24px; padding-top: 20px; border-top: 1px solid #eee; }
  .login-config details summary { font-size: 11px; color: #888; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
  .login-config input { margin-bottom: 8px; }

  /* APP SHELL */
  #app { display: none; height: 100vh; overflow: hidden; }
  #app.visible { display: flex; }

  /* SIDEBAR */
  .sidebar {
    width: 240px; min-width: 240px; background: var(--sidebar-bg); display: flex;
    flex-direction: column; height: 100vh; overflow-y: auto; overflow-x: hidden;
  }
  .sidebar-header {
    padding: 20px 16px 16px; border-bottom: 1px solid #222;
  }
  .sidebar-logo-img { display: block; max-width: 170px; height: auto; }
  .sidebar-user { padding: 12px 16px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; }
  .sidebar-avatar { width: 30px; height: 30px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #aaa; flex-shrink: 0; }
  .sidebar-uname { font-size: 12px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sidebar-nav { flex: 1; padding: 8px 0; }
  .nav-group { }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 16px; cursor: pointer;
    color: var(--sidebar-text); font-size: 13px; user-select: none;
    transition: background 0.1s, color 0.1s; border-left: 2px solid transparent;
  }
  .nav-item:hover { background: var(--sidebar-hover); color: #fff; }
  .nav-item.active { color: var(--sidebar-active); border-left-color: #fff; background: #1a1a1a; }
  .nav-item .nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
  .nav-item .nav-arrow { margin-left: auto; font-size: 10px; transition: transform 0.2s; }
  .nav-item.open .nav-arrow { transform: rotate(90deg); }
  .sub-nav { background: #0a0a0a; }
  .sub-nav-item {
    display: flex; align-items: center; gap: 10px; padding: 7px 16px 7px 36px;
    cursor: pointer; color: #777; font-size: 12px; user-select: none;
    transition: background 0.1s, color 0.1s; border-left: 2px solid transparent;
  }
  .sub-nav-item:hover { background: #161616; color: #bbb; }
  .sub-nav-item.active { color: #fff; border-left-color: #555; background: #161616; }
  .sidebar-footer { padding: 12px 16px; border-top: 1px solid #222; }
  .logout-btn {
    display: flex; align-items: center; gap: 8px; color: #666; font-size: 12px;
    cursor: pointer; padding: 6px 0; background: none; border: none; width: 100%;
    transition: color 0.15s;
  }
  .logout-btn:hover { color: #ccc; }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    background: #fff; border-bottom: 1px solid var(--border); padding: 0 24px;
    height: 52px; display: flex; align-items: center; gap: 16px; flex-shrink: 0;
  }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .topbar-breadcrumb { font-size: 12px; color: var(--text3); }
  .topbar-actions { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .menu-toggle-btn {
    display: none; align-items: center; justify-content: center; width: 32px; height: 32px;
    background: none; border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
    color: var(--text); font-size: 16px; flex-shrink: 0;
  }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 150; }
  .sidebar-overlay.show { display: block; }
  .btn {
    padding: 7px 14px; border-radius: 3px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border); background: #fff; color: var(--text);
    transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--bg2); }
  .btn-primary { background: #111; color: #fff; border-color: #111; }
  .btn-primary:hover { background: #333; border-color: #333; }
  .btn-danger { background: #fff; color: var(--danger); border-color: #f0c0b0; }
  .btn-danger:hover { background: #fff5f5; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .content { flex: 1; overflow-y: auto; padding: 24px; }

  /* DASHBOARD */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .kpi-card {
    background: #fff; border: 1px solid var(--border); border-radius: 4px;
    padding: 18px 20px;
  }
  .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 8px; }
  .kpi-value { font-size: 28px; font-weight: 700; color: var(--text); letter-spacing: -1px; }
  .kpi-delta { font-size: 12px; margin-top: 4px; }
  .delta-up { color: var(--success); }
  .delta-down { color: var(--danger); }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-card {
    background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 20px;
  }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 16px; }
  .mini-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
  .bar { background: #111; border-radius: 2px 2px 0 0; min-width: 18px; flex: 1; transition: background 0.15s; }
  .bar:hover { background: #555; }
  .bar-labels { display: flex; gap: 6px; margin-top: 6px; }
  .bar-lbl { flex: 1; text-align: center; font-size: 10px; color: var(--text3); }
  .pie-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .pie-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .pie-name { font-size: 12px; color: var(--text2); flex: 1; }
  .pie-pct { font-size: 12px; font-weight: 600; color: var(--text); }
  .pie-bar-wrap { flex: 2; background: var(--bg3); border-radius: 2px; height: 6px; overflow: hidden; }
  .pie-bar-fill { height: 100%; border-radius: 2px; }

  /* TABLES */
  .table-card { background: #fff; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .table-title { font-size: 13px; font-weight: 600; }
  .search-input {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 3px; font-size: 13px;
    outline: none; background: var(--bg2); width: 220px; transition: border-color 0.15s;
  }
  .search-input:focus { border-color: #111; background: #fff; }
  .table-actions { margin-left: auto; display: flex; gap: 8px; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--bg2); }
  thead th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--bg2); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg2); }
  tbody td { padding: 11px 16px; font-size: 13px; color: var(--text); }
  .badge {
    display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-active { background: #e8f5ec; color: #1a7a3c; }
  .badge-inactive { background: #f5e8e8; color: #a03030; }
  .badge-pending { background: #fef5e0; color: #9a6800; }
  .badge-info { background: #e8eef8; color: #2050a0; }
  .badge-gray { background: var(--bg3); color: var(--text2); }
  .action-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; padding: 2px 6px; border-radius: 3px; transition: background 0.1s, color 0.1s; }
  .action-btn:hover { background: var(--bg3); color: var(--text); }
  .table-pagination { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--text3); }

  /* FORMS */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .form-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-full { grid-column: 1 / -1; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); }
  .form-input, .form-select, .form-textarea {
    padding: 9px 12px; border: 1px solid var(--border); border-radius: 3px;
    font-size: 13px; outline: none; background: #fafafa; transition: border-color 0.15s;
    color: var(--text); font-family: inherit;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #111; background: #fff; }
  .form-textarea { resize: vertical; min-height: 80px; }
  .ms-dropdown { position: relative; display: inline-block; }
  .ms-dropdown-btn {
    padding: 9px 12px; border: 1px solid var(--border); border-radius: 3px;
    font-size: 13px; background: #fafafa; color: var(--text); cursor: pointer;
    display: flex; align-items: center; gap: 8px; min-width: 170px; justify-content: space-between;
  }
  .ms-dropdown-btn:hover { border-color: #111; }
  .ms-dropdown-panel {
    display: none; position: absolute; top: calc(100% + 4px); left: 0; z-index: 50;
    background: #fff; border: 1px solid var(--border); border-radius: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,.14); min-width: 240px; max-height: 260px;
    overflow-y: auto; padding: 6px;
  }
  .ms-dropdown-panel.open { display: block; }
  .ms-option { display: flex; align-items: center; gap: 8px; padding: 6px 8px; font-size: 13px; border-radius: 3px; cursor: pointer; }
  .ms-option:hover { background: var(--bg2); }
  .ms-option input { cursor: pointer; }
  .ms-actions { display: flex; gap: 8px; padding: 6px 8px 2px; margin-top: 4px; border-top: 1px solid var(--border); }
  .form-section { margin-bottom: 24px; }
  .form-section-title {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text3); padding-bottom: 8px; margin-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .form-card { background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 24px; }
  .form-footer { display: flex; gap: 10px; padding-top: 16px; border-top: 1px solid var(--border); margin-top: 8px; }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab {
    padding: 10px 18px; font-size: 13px; cursor: pointer; color: var(--text3);
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: #111; font-weight: 500; }

  /* PROFILE CARD */
  .profile-header {
    background: #fff; border: 1px solid var(--border); border-radius: 4px;
    padding: 24px; display: flex; align-items: center; gap: 20px; margin-bottom: 20px;
  }
  .profile-avatar {
    width: 64px; height: 64px; border-radius: 50%; background: #111;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .profile-name { font-size: 20px; font-weight: 700; color: var(--text); }
  .profile-role { font-size: 13px; color: var(--text3); margin-top: 2px; }
  .profile-meta { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
  .profile-meta-item { font-size: 12px; color: var(--text3); }
  .profile-meta-item strong { color: var(--text2); }

  /* STAT ROW */
  .stat-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-box { background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 14px 18px; min-width: 120px; }
  .stat-box-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 4px; }
  .stat-box-value { font-size: 20px; font-weight: 700; color: var(--text); }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-state-icon { font-size: 32px; margin-bottom: 12px; }
  .empty-state-title { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .empty-state-desc { font-size: 13px; max-width: 300px; margin: 0 auto 16px; }

  /* DISC CHART */
  .disc-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .disc-item { background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 16px; text-align: center; }
  .disc-letter { font-size: 32px; font-weight: 800; margin-bottom: 4px; }
  .disc-D { color: #c0392b; }
  .disc-I { color: #e67e22; }
  .disc-S { color: #27ae60; }
  .disc-C { color: #2980b9; }
  .disc-name { font-size: 11px; color: var(--text3); margin-bottom: 10px; }
  .disc-bar-wrap { background: var(--bg3); border-radius: 2px; height: 8px; overflow: hidden; margin-bottom: 6px; }
  .disc-fill-D { background: #c0392b; }
  .disc-fill-I { background: #e67e22; }
  .disc-fill-S { background: #27ae60; }
  .disc-fill-C { background: #2980b9; }
  .disc-pct { font-size: 18px; font-weight: 700; }

  /* TIMELINE */
  .timeline { position: relative; padding-left: 24px; }
  .timeline::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 1px; background: var(--border); }
  .timeline-item { position: relative; margin-bottom: 20px; }
  .timeline-dot { position: absolute; left: -24px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: #111; border: 2px solid #fff; box-shadow: 0 0 0 1px #ddd; }
  .timeline-date { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .timeline-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .timeline-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: #fff; border-radius: 4px; width: 560px; max-width: 95vw; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border); }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 15px; font-weight: 700; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 20px; line-height: 1; padding: 2px; }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; right: 24px; background: #111; color: #fff; padding: 12px 20px; border-radius: 4px; font-size: 13px; z-index: 999; display: none; }
  #toast.show { display: block; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* ACTION BANNER */
  #action-banner { position: fixed; left: 24px; bottom: 24px; max-width: 480px; background: #fff; border: 1px solid var(--border); border-left: 4px solid #1a7a3c; border-radius: 6px; box-shadow: 0 8px 30px rgba(0,0,0,.15); padding: 16px 20px; display: none; align-items: flex-start; gap: 12px; z-index: 1000; }
  #action-banner.show { display: flex; animation: slideUp 0.2s ease; }
  .action-banner-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .action-banner-line { font-size: 12.5px; color: var(--text2); margin-top: 4px; line-height: 1.4; }
  .action-banner-close { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 14px; flex-shrink: 0; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
  }

  /* Abaixo de 860px a sidebar fixa de 240px não cabe mais junto com o
     conteúdo — vira uma gaveta (drawer) que desliza por cima, aberta pelo
     botão de menu na topbar (ver #menu-toggle-btn / toggleSidebarMobile). */
  @media (max-width: 860px) {
    .menu-toggle-btn { display: flex; }
    .sidebar {
      position: fixed; left: 0; top: 0; z-index: 200; height: 100vh;
      transform: translateX(-100%); transition: transform .2s ease;
      box-shadow: 0 0 30px rgba(0,0,0,.3);
    }
    .sidebar.mobile-open { transform: translateX(0); }
    .content { padding: 14px; }
    .topbar { padding: 0 14px; gap: 10px; }
    .table-header { padding: 12px 14px; }
    .search-input { width: 100%; }
    .table-actions { margin-left: 0; width: 100%; justify-content: flex-start; }
    .form-grid, .form-grid-3 { grid-template-columns: 1fr; }
    .disc-container { grid-template-columns: repeat(2, 1fr); }
    .profile-header { flex-wrap: wrap; text-align: center; justify-content: center; }
    .modal-header, .modal-body, .modal-footer { padding-left: 16px; padding-right: 16px; }
  }

  @media (max-width: 480px) {
    .kpi-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .kpi-card { padding: 14px; }
    .kpi-value { font-size: 22px; }
    .topbar-title { font-size: 14px; }
    .topbar-breadcrumb { display: none; }
    .content { padding: 10px; }
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <img src="assets/logo-minart.png" alt="Minart Móveis" class="login-logo-img">
    <label for="l-email">E-mail</label>
    <input id="l-email" type="email" placeholder="seu@email.com" autocomplete="email">
    <label for="l-pass">Senha</label>
    <input id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
    <div style="text-align:center;margin-top:10px">
      <a href="#" onclick="event.preventDefault(); abrirRecuperarSenha()" style="font-size:12px;color:var(--text3)">Esqueci minha senha</a>
    </div>

// Monta o link de WhatsApp (wa.me) com o número do candidato e uma mensagem
// pronta convidando-o a responder a avaliação.
function linkWhatsappAvaliacao(numero, nomeCandidato, cargoNome, link) {
  let digits = String(numero || '').replace(/\D/g, '');
  if (!digits) return null;
  if (!digits.startsWith('55')) digits = '55' + digits;
  const mensagem = `Olá, ${nomeCandidato || ''}! Tudo bem? Para seguir no seu processo seletivo para a vaga de ${cargoNome || ''} na Minart Móveis, acesse o link abaixo e responda a avaliação de Perfil DISC — o link só pode ser respondido uma vez:\n${link}`;
  return `https://wa.me/${digits}?text=${encodeURIComponent(mensagem)}`;
}

// Gera um token com o "gerador" informado e confere na tabela/coluna se já existe,
// repetindo até achar um valor que ainda não está em uso (evita colisão/repetição).
async function gerarTokenUnico(tabela, coluna, gerador) {
  for (let tentativa = 0; tentativa < 10; tentativa++) {
    const candidato = gerador();
    const { data, error } = await supaClient.from(tabela).select(coluna).eq(coluna, candidato).limit(1).maybeSingle();
    if (error) {
      console.error(`Erro ao verificar unicidade de ${coluna} em ${tabela}:`, error.message);
      return candidato; // não bloqueia o fluxo por falha na verificação
    }
    if (!data) return candidato;
    console.warn(`Token colidiu em ${tabela}.${coluna}, gerando outro (tentativa ${tentativa + 1}).`);
  }
  throw new Error(`Não foi possível gerar um token único para ${tabela}.${coluna} após várias tentativas.`);
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';

  if (!email || !pass) {
    errEl.textContent = 'Preencha e-mail e senha.';
    return;
  }

  if (!supaClient) {
    errEl.textContent = 'Erro de configuração: Supabase não iniciado.';
    return;
  }

  const { data, error } = await supaClient.auth.signInWithPassword({ email, password: pass });

  if (error || !data?.user) {
    errEl.textContent = 'E-mail ou senha incorretos.';
    return;
  }

  const perfilInfo = await carregarUsuarioLogado(data.user);
  if (!perfilInfo) {
    errEl.textContent = 'Seu usuário ainda não tem acesso liberado ao sistema. Contate o administrador.';
    await supaClient.auth.signOut();
    return;
  }

  currentUser = {
    email,
    name: data.user.user_metadata?.nome || data.user.email,
    ...perfilInfo,
  };

  // Usuários criados em "Treinamentos > Cadastro de Usuário" começam com a
  // senha inicial 12345678 e o metadado must_change_password=true — obriga
  // trocar antes de liberar o acesso ao restante do sistema.
  if (data.user.user_metadata?.must_change_password) {
    window._modoTrocaSenhaObrigatoria = true;
    mostrarTelaRedefinirSenha();
    return;
  }

  entrarNoDestinoCorreto();
}

document.getElementById('l-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

    document.getElementById('page-title').textContent = 'Sem acesso';

  }
}

  const msgEl = document.getElementById('rec-senha-msg');
  if (!email) { msgEl.style.color = 'var(--danger)'; msgEl.textContent = 'Informe seu e-mail.'; return; }
  if (!supaClient) { msgEl.style.color = 'var(--danger)'; msgEl.textContent = 'Supabase não inicializado.'; return; }

  const btn = document.getElementById('rec-senha-btn');
  btn.disabled = true; btn.textContent = 'Enviando...';

  // Volta para a própria página (sem query string) — o supabase-js detecta o
  // token de recuperação anexado à URL e dispara o evento PASSWORD_RECOVERY.
  const redirectTo = window.location.origin + window.location.pathname;
  const { error } = await supaClient.auth.resetPasswordForEmail(email, { redirectTo });

  btn.disabled = false; btn.textContent = 'Enviar link';

  if (error) {
    msgEl.style.color = 'var(--danger)';
    msgEl.textContent = 'Não foi possível enviar o link: ' + error.message;
    return;
  }
  msgEl.style.color = '#1a7a3c';
  msgEl.textContent = 'Link enviado! Verifique seu e-mail (inclusive spam) para redefinir a senha.';
};

function mostrarTelaRedefinirSenha() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('reset-password-screen').style.display = '';
}

window.confirmarNovaSenha = async function() {
  const senha = document.getElementById('rp-pass').value;
  const confirmar = document.getElementById('rp-pass-confirm').value;
  const errEl = document.getElementById('reset-password-error');
  errEl.textContent = '';

  if (!senha || senha.length < 6) {
    errEl.textContent = 'A senha precisa ter pelo menos 6 caracteres.';
    return;
  }
  if (senha !== confirmar) {
    errEl.textContent = 'As senhas não coincidem.';
    return;
  }
  if (!supaClient) {
    errEl.textContent = 'Erro de configuração: Supabase não inicializado.';
    return;
  }

  // Fluxo de troca obrigatória (primeiro login com a senha inicial 12345678):
  // além de trocar a senha, limpa o metadado must_change_password para não
  // pedir de novo nos próximos logins.
  const payload = window._modoTrocaSenhaObrigatoria
    ? { password: senha, data: { must_change_password: false } }
    : { password: senha };

  const { error } = await supaClient.auth.updateUser(payload);
  if (error) {
    errEl.textContent = 'Não foi possível salvar a nova senha: ' + error.message;
    return;
  }

  document.getElementById('rp-pass').value = '';
  document.getElementById('rp-pass-confirm').value = '';

  if (window._modoTrocaSenhaObrigatoria) {
    // Já está logado (só precisava trocar a senha) — segue direto para o app,
    // sem precisar fazer login de novo.
    window._modoTrocaSenhaObrigatoria = false;
    document.getElementById('reset-password-screen').style.display = 'none';
    showToast('Senha atualizada!');
    entrarNoDestinoCorreto();
  } else {
    // A sessão criada pelo link de recuperação é só para trocar a senha —
    // encerra ela e devolve para a tela normal de login.
    await supaClient.auth.signOut();
    document.getElementById('reset-password-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = '';
    showToast('Senha atualizada! Faça login com sua nova senha.');
  }
};

// ============================================================
// PERFIS E PERMISSÕES
// ============================================================
// Páginas que não aparecem na sidebar (abertas a partir de outra página) mas
// que precisam de uma checagem de permissão: herdam a permissão da página-mãe,
// já que a tabela `permissoes` só cadastra os ids que aparecem no menu (NAV).
const PAGINA_PAI = {
  'col-historico-detalhe': 'col-historico',
  'cont-admissao-nova': 'cont-admissoes',
  'dep-historico': 'dep-tabela',
  'dep-alteracao': 'dep-tabela',
  'dep-relatorio': 'dep-tabela',
};

function paginaPermissao(id) {
  return PAGINA_PAI[id] || id;
}

// "Cadastro de Usuário" cria login no Supabase Auth e decide o perfil de
// acesso de alguém — sensível demais pra depender só de uma linha correta em
// `permissoes`. Trava a Administrador/RH direto no código, como camada extra
// (além da tabela), pra uma linha errada no banco nunca voltar a expor essa
// página pra outros perfis.
function podeGerenciarUsuarios() {
  return !!currentUser && (currentUser.perfil === 'Administrador' || currentUser.perfil === 'RH');
}

// A tela de Permissões de Acesso decide o que cada perfil (inclusive
// Administrador e RH) enxerga — a mais sensível de todas. Só Administrador,
// sem exceção, e travado direto no código (não só na tabela `permissoes`).
function podeGerenciarPermissoes() {
  return !!currentUser && currentUser.perfil === 'Administrador';
}

function temPermissao(id) {
  if (!currentUser || !currentUser.permissoes) return false;
  const pagina = paginaPermissao(id);
  if (pagina === 'trein-cadastro-usuario' && !podeGerenciarUsuarios()) return false;
  if (pagina === 'permissoes-acesso' && !podeGerenciarPermissoes()) return false;
  return currentUser.permissoes.has(pagina);
}

// Primeira página do menu (respeitando a ordem do NAV) que o perfil logado
// pode ver — usada para abrir algo além do Dashboard quando o perfil não tem
// acesso a ele.
function primeiraPaginaPermitida() {
  for (const item of NAV) {
    if (item.subs) {
      const sub = item.subs.find(s => temPermissao(s.id));
      if (sub) return sub.id;
    } else if (temPermissao(item.id)) {
      return item.id;
    }
  }
  return null;
}

function labelDaPaginaNav(id) {
  for (const item of NAV) {
    if (item.id === id) return item.label;
    if (item.subs) {
      const sub = item.subs.find(s => s.id === id);
      if (sub) return sub.label;
    }
  }
  return '';
}

// Busca o usuário (tabela usuarios) vinculado ao login autenticado, seu perfil
// (tabela perfis) e o conjunto de páginas liberadas para esse perfil (tabela
// permissoes). Retorna null se o usuário não estiver cadastrado/ativo — nesse
// caso o login é bloqueado, mesmo com credenciais válidas no Supabase Auth.
async function carregarUsuarioLogado(authUser) {
  const { data: usuario, error } = await supaClient
    .from('usuarios')
    .select('id, colaborador_id, ativo, perfis(id, nome)')
    .eq('auth_user_id', authUser.id)
    .maybeSingle();

  if (error) {
    console.error('Erro ao carregar usuário/perfil:', error.message);
    return null;
  }
  if (!usuario || !usuario.ativo || !usuario.perfis) return null;

  const { data: permissoes, error: errorPermissoes } = await supaClient
    .from('permissoes')
    .select('pagina_id')
    .eq('perfil_id', usuario.perfis.id);
  if (errorPermissoes) {
    console.error('Erro ao carregar permissões:', errorPermissoes.message);
    return null;
  }

  return {
    colaboradorId: usuario.colaborador_id,
    // Só usado quando não há colaborador vinculado (login de teste/convidado,
    // ver sql/adicionar-usuario-convidado.sql) — identifica o aluno em
    // curso_liberacoes/curso_progresso via id_usuario no lugar de id_colaborador.
    usuarioId: usuario.id,
    perfil: usuario.perfis.nome,
    permissoes: new Set((permissoes || []).map(p => p.pagina_id)),
  };
}

let openMenus = {};
let activeId = 'dashboard';

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  NAV.forEach(item => {
    const hasSubs = item.subs && item.subs.length;
    // Grupo: só aparece se pelo menos uma sub-página estiver liberada para o
    // perfil logado. Item único: só aparece se a própria página estiver liberada.
    const subsVisiveis = hasSubs ? item.subs.filter(sub => temPermissao(sub.id)) : [];
    if (hasSubs && subsVisiveis.length === 0) return;
    if (!hasSubs && !temPermissao(item.id)) return;

    const el = document.createElement('div');
    el.className = 'nav-group';
    const itemEl = document.createElement('div');
    itemEl.className = 'nav-item' + (activeId === item.id ? ' active' : '') + (openMenus[item.id] ? ' open' : '');
    itemEl.innerHTML = `<span class="nav-icon">${item.icon}</span><span>${item.label}</span>${hasSubs ? '<span class="nav-arrow">›</span>' : ''}`;
    itemEl.onclick = () => {
      if (hasSubs) {
        openMenus[item.id] = !openMenus[item.id];
        buildSidebar();
      } else {
        activeId = item.id;
        if (item.action) item.action();
        else navigate(item.id, item.label);
        buildSidebar();
        fecharSidebarMobile();
      }
    };
    el.appendChild(itemEl);
    if (hasSubs && openMenus[item.id]) {
      const subEl = document.createElement('div');
      subEl.className = 'sub-nav';
      subsVisiveis.forEach(sub => {
        const s = document.createElement('div');
        s.className = 'sub-nav-item' + (activeId === sub.id ? ' active' : '');
        s.textContent = sub.label;
        s.onclick = () => { activeId = sub.id; navigate(sub.id, sub.label, item.label); buildSidebar(); fecharSidebarMobile(); };
        subEl.appendChild(s);
      });
      el.appendChild(subEl);
    }
    nav.appendChild(el);
  });
}

    modal.innerHTML = `
      <div style="background:#fff;border-radius:8px;width:100%;max-width:900px;height:100%;box-shadow:0 12px 60px rgba(0,0,0,.3);display:flex;flex-direction:column;overflow:hidden">
        <div style="padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
          <div id="editor-tela-cheia-titulo" style="font-size:15px;font-weight:700"></div>

        <div style="flex:1;overflow:auto;background:#e4e4e4;padding:32px;display:flex;justify-content:center">
          <textarea id="editor-tela-cheia-textarea" spellcheck="true" style="width:100%;max-width:760px;min-height:100%;background:#fff;border:1px solid var(--border);box-shadow:0 1px 8px rgba(0,0,0,.12);padding:56px 64px;font-size:14px;line-height:1.8;font-family:Georgia,'Times New Roman',serif;color:#1a1a1a;resize:none;outline:none"></textarea>

          <button type="button" class="btn btn-primary" id="editor-tela-cheia-btn-salvar">Salvar</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  }

  document.getElementById('editor-tela-cheia-titulo').textContent = titulo;
  const textarea = document.getElementById('editor-tela-cheia-textarea');
  textarea.value = campo.value;

  const btnSalvar = document.getElementById('editor-tela-cheia-btn-salvar');
  btnSalvar.onclick = async () => {
    campo.value = textarea.value;

  };

  modal.style.display = 'flex';
  setTimeout(() => textarea.focus(), 0);
};

function pageDashboard() {
  document.getElementById('topbar-actions').innerHTML = '';

  const render = () => {
    const container = document.getElementById('dashboard-container');
    if (!container) return;

    const colaboradores = _colaboradoresSupabase || [];
    const ativos = colaboradores.filter(c => c.status_colaborador === 'Ativo').length;
    const pendentesDoc = colaboradores.filter(c => c.status_colaborador === 'Pendente Documentação');
    const vagas = window._vagas || [];
    const vagasAbertas = vagas.filter(v => v.status === 'aberta').length;
    const candidaturas = window._candidaturas || [];
    const testes = window._testesAvaliacoes || [];
    const avaliacoesConcluidas = testes.filter(t => t.status_realizacao === 'concluido').length;
    const avaliacoesPendentes = testes.length - avaliacoesConcluidas;

    // Distribuição por status
    const statusCores = { 'Ativo': '#1a7a3c', 'Inativo': '#a03030', 'Férias': '#2050a0', 'Afastado': '#9a6800', 'Pendente Documentação': '#9a6800' };
    const statusCount = {};
    colaboradores.forEach(c => { const s = c.status_colaborador || 'Não definido'; statusCount[s] = (statusCount[s] || 0) + 1; });

    // Distribuição por cargo (top 6)
    const cargoCount = {};
    colaboradores.forEach(c => { const nome = c.cargos ? c.cargos.nome_cargo : 'Sem cargo'; cargoCount[nome] = (cargoCount[nome] || 0) + 1; });
    const cargoEntries = Object.entries(cargoCount).sort((a, b) => b[1] - a[1]).slice(0, 6);
    const maxCargo = Math.max(1, ...cargoEntries.map(([, n]) => n));

    // Admissões por mês (últimos 6 meses), a partir de colaboradores.desde
    const hoje = new Date();
    const meses = Array.from({ length: 6 }, (_, i) => {
      const d = new Date(hoje.getFullYear(), hoje.getMonth() - (5 - i), 1);
      return { label: d.toLocaleDateString('pt-BR', { month: 'short' }), ano: d.getFullYear(), mes: d.getMonth() };
    });
    const admissoesPorMes = meses.map(m => ({
      ...m,
      count: colaboradores.filter(c => {
        if (!c.desde) return false;
        const partes = String(c.desde).match(/^(\d{4})-(\d{2})/);
        return partes && parseInt(partes[1], 10) === m.ano && (parseInt(partes[2], 10) - 1) === m.mes;
      }).length
    }));
    const maxAdm = Math.max(1, ...admissoesPorMes.map(m => m.count));

    // Vagas com mais candidatos
    const vagasComCandidatos = vagas.map(v => ({
      vaga: v,
      total: candidaturas.filter(c => c.id_vagas === v.id_vagas).length
    })).filter(v => v.total > 0).sort((a, b) => b.total - a.total).slice(0, 6);

    const avaliacoesEmAndamento = testes.filter(t => t.status_realizacao !== 'concluido').slice(0, 8);

    container.innerHTML = `

        <div class="kpi-label">Vagas Abertas</div>
        <div class="kpi-value">${vagasAbertas}</div>
        <div class="kpi-delta" style="color:var(--text3)">${vagas.length} no total</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Avaliações Concluídas</div>
        <div class="kpi-value">${avaliacoesConcluidas}</div>
        <div class="kpi-delta" style="color:var(--text3)">${avaliacoesPendentes} pendentes</div>
      </div>
    </div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Admissões por Mês (últimos 6 meses)</div>
        <div class="mini-chart">
          ${admissoesPorMes.map(m => `
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
              <div style="width:100%;display:flex;justify-content:center;align-items:flex-end;height:70px">
                <div class="bar" style="height:${m.count ? (m.count / maxAdm) * 70 : 2}px" title="${m.count} admissão(ões)"></div>

window.salvarHistoricoCarreira = async function() {
  const idColaborador = window._historicoModalColabId;
  const periodoInicio = document.getElementById('historico-inicio').value;
  const periodoFim = document.getElementById('historico-fim').value;
  const idCargo = document.getElementById('historico-cargo').value;
  const salarioRaw = document.getElementById('historico-salario').value;
  const motivo = document.getElementById('historico-motivo').value.trim();
  const salarioNum = salarioRaw ? parseFloat(String(salarioRaw).replace(/\./g,'').replace(/,/g,'.').replace(/[^0-9.\-]/g,'')) : null;

  if (!periodoInicio) return showToast('Informe o Período Início.');
  if (!idCargo) return showToast('Selecione o Cargo.');

  const payload = {
    id_colaborador: idColaborador,
    periodo_inicio: periodoInicio,
    periodo_fim: periodoFim || null,
    id_cargos: idCargo,
    salario_hist: (salarioNum !== null && !isNaN(salarioNum)) ? salarioNum : null,
    motivo: motivo || null,
  };

  try {
    const id = window._editingHistoricoId;
    const { data, error } = id
      ? await supaClient.from('colaborador_historico').update(payload).eq('id_cargos_hist', id).select()
      : await supaClient.from('colaborador_historico').insert([payload]).select();
    if (error) throw error;
    if (!data || data.length === 0) throw new Error('Nenhuma linha foi salva (verifique as policies da tabela colaborador_historico no Supabase).');
    await loadColaboradorHistoricoForApp();
    if (window._renderHistoricoCarreiraDetalhe) window._renderHistoricoCarreiraDetalhe();
    if (window._renderColaboradoresHistorico) window._renderColaboradoresHistorico();
    document.getElementById('historico-modal').style.display = 'none';
    showToast('Registro de carreira salvo!');
  } catch (e) {
    console.error('Erro ao salvar histórico de carreira:', e);
    showToast('Erro ao salvar registro: ' + (e.message || e));
  }
};

window.excluirHistoricoCarreira = async function(id) {
  if (!confirm('Excluir este registro de carreira?')) return;
  try {
    const { error } = await supaClient.from('colaborador_historico').delete().eq('id_cargos_hist', id);
    if (error) throw error;
    await loadColaboradorHistoricoForApp();
    if (window._renderHistoricoCarreiraDetalhe) window._renderHistoricoCarreiraDetalhe();
    if (window._renderColaboradoresHistorico) window._renderColaboradoresHistorico();

  } catch (e) {
    console.error('Erro ao excluir registro de carreira:', e);
    showToast('Erro ao excluir registro: ' + (e.message || e));
  }
};

// Formata uma data "YYYY-MM-DD" (coluna `date` do Postgres) para DD/MM/AAAA sem o bug
// de fuso horário do `new Date(string)`: esse construtor interpreta a string como UTC
// e, em fusos negativos como o do Brasil, o toLocaleDateString acaba exibindo o dia
// anterior ao que está salvo no banco. Aqui a data é montada direto dos números, sem
// passar por conversão de fuso.
function formatarDataBR(dataStr) {
  if (!dataStr) return null;
  const m = String(dataStr).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return new Date(dataStr).toLocaleDateString('pt-BR');
  const [, ano, mes, dia] = m;
  return `${dia}/${mes}/${ano}`;
}

// Soma "dias" a uma data "YYYY-MM-DD" e devolve em DD/MM/AAAA. Usa o construtor
// Date(ano, mes, dia) (sem passar por string ISO) para não sofrer o mesmo bug de
// fuso horário tratado em formatarDataBR.
function adicionarDiasDataBR(dataStr, dias) {
  if (!dataStr) return null;
  const m = String(dataStr).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return null;
  const [, ano, mes, dia] = m;
  const d = new Date(parseInt(ano, 10), parseInt(mes, 10) - 1, parseInt(dia, 10));
  d.setDate(d.getDate() + dias);
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  return `${dd}/${mm}/${d.getFullYear()}`;
}

  }

  let lista = [...(_colaboradoresSupabase || [])];
  if (window._statusFiltros.cargo) lista = lista.filter(c => (c.cargos ? c.cargos.nome_cargo : '') === window._statusFiltros.cargo);
  if (window._statusFiltros.tipoContrato) lista = lista.filter(c => c.tipo_de_contrato === window._statusFiltros.tipoContrato);
  if (window._statusFiltros.status) lista = lista.filter(c => c.status_colaborador === window._statusFiltros.status);

  lista.sort((a, b) => {
    if (window._statusOrdem === 'cargo') {
      return (a.cargos ? a.cargos.nome_cargo : '').localeCompare(b.cargos ? b.cargos.nome_cargo : '');
    }
    if (window._statusOrdem === 'salario-desc' || window._statusOrdem === 'salario-asc') {
      const sa = salarioBaseDoColaborador(a);
      const sb = salarioBaseDoColaborador(b);
      if (sa === null && sb === null) return 0;
      if (sa === null) return 1;
      if (sb === null) return -1;
      return window._statusOrdem === 'salario-desc' ? sb - sa : sa - sb;
    }
    if (window._statusOrdem === 'admissao-desc' || window._statusOrdem === 'admissao-asc') {
      const da = a.desde ? new Date(a.desde).getTime() : null;
      const db = b.desde ? new Date(b.desde).getTime() : null;
      if (da === null && db === null) return 0;
      if (da === null) return 1;
      if (db === null) return -1;
      return window._statusOrdem === 'admissao-desc' ? db - da : da - db;
    }
    return (a.nome_colaborador || '').localeCompare(b.nome_colaborador || '');
  });

  if (lista.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text3);">Nenhum colaborador encontrado.</td></tr>`;
    return;
  }

  tbody.innerHTML = lista.map(colab => {
    const cargoNome = colab.cargos ? colab.cargos.nome_cargo : 'N/A';
    const salarioNum = salarioBaseDoColaborador(colab);
    const salarioBase = salarioNum !== null
      ? new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(salarioNum)
      : 'N/A';
    const statusBadgeClass = colab.status_colaborador === 'Ativo' ? 'badge-active'
      : colab.status_colaborador === 'Pendente Documentação' ? 'badge-inactive'
      : colab.status_colaborador === 'Inativo' ? 'badge-gray'
      : 'badge-inactive';

    return `
      <tr style="cursor:pointer" onclick="openStatusModal('${colab.id_colaborador}')">
        <td>${colab.nome_colaborador}</td>
        <td>${cargoNome}</td>
        <td>${formatarDataBR(colab.desde) || 'N/A'}</td>
        <td>${formatarDataBR(colab.desde_efetivo) || 'N/A'}</td>
        <td>${colab.tipo_de_contrato || 'N/A'}</td>
        <td>${salarioBase}</td>
        <td><span class="badge ${statusBadgeClass}">${colab.status_colaborador}</span></td>
        <td>
          <button class="action-btn" onclick="event.stopPropagation();openStatusModal('${colab.id_colaborador}')">✎</button>
        </td>
      </tr>
    `;
  }).join('');
}

async function openStatusModal(colabId = null) {
  console.log('[EDIT] Abrindo modal, colabId:', colabId);
  
  // Garante que colaboradores estejam carregados ANTES de tudo
  if (!_colaboradoresSupabase || _colaboradoresSupabase.length === 0) {
    console.log('[EDIT] Colaboradores vazios, carregando...');
    await loadColaboradoresFromSupabase();
  }
  console.log('[EDIT] Após loadColaboradores, temos:', _colaboradoresSupabase.length, 'colaboradores');
  
  _editingStatusColabId = colabId;
  const modal = document.getElementById('status-modal');
  const modalTitle = document.getElementById('status-modal-title');
  const smNome = document.getElementById('sm-nome');
  const smCargo = document.getElementById('sm-cargo');
  const smDesde = document.getElementById('sm-desde');
  const smDesdeEfetivo = document.getElementById('sm-desde-efetivo');
  const smStatus = document.getElementById('sm-status');
  const smSalarioBase = document.getElementById('sm-salario-base'); // Novo campo
  const smTipoContrato = document.getElementById('sm-tipo-contrato');

  // Garante que cargos estejam carregados e popula o select de cargos
  if (!window._cargos || window._cargos.length === 0) {
    await loadCargosForApp();
  }
  smCargo.innerHTML = '<option value="">— Selecione o Cargo —</option>';
  window._cargos.forEach(cargo => {
    const cid = cargo[window._cargoIdField] !== undefined ? cargo[window._cargoIdField] : (cargo.id_cargo || cargo.id || cargo.id_cargos || '');
    const nome = cargo.nome_cargo || cargo.nome || cargo.cargo || cid;
    smCargo.innerHTML += `<option value="${cid}">${nome}</option>`;
  });

  // Não preencher automaticamente o salário a partir dos cargos.
  // O salário base deve vir da coluna `salario_base` da tabela `colaboradores`.
  smCargo.onchange = () => {
    const selectedCargoId = smCargo.value;
    const selectedCargo = window._cargos.find(c => String(c[window._cargoIdField] || c.id_cargo || c.id || c.id_cargos) === String(selectedCargoId));
    if (selectedCargo && selectedCargo.salario_base !== undefined && selectedCargo.salario_base !== null && String(selectedCargo.salario_base) !== '') {
      smSalarioBase.value = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(selectedCargo.salario_base);
    } else {
      // limpa o campo para permitir preenchimento manual
      smSalarioBase.value = '';
    }
  };

  if (colabId) {
    console.log('[EDIT] colabId recebido:', colabId, 'tipo:', typeof colabId);
    console.log('[EDIT] _colaboradoresSupabase.length:', _colaboradoresSupabase.length);
    if (_colaboradoresSupabase.length > 0) {
      console.log('[EDIT] Primeiro colaborador id:', _colaboradoresSupabase[0].id_colaborador, 'tipo:', typeof _colaboradoresSupabase[0].id_colaborador);
    }
    modalTitle.textContent = 'Editar Colaborador';
    const colab = _colaboradoresSupabase.find(c => {
      const match = String(c.id_colaborador) === String(colabId);
      if (!match) console.log('[EDIT] Não encontrado:', c.id_colaborador, '!==', colabId);
      return match;
    });
    console.log('[EDIT] Colaborador encontrado:', colab);
    if (colab) {
      console.log('[EDIT] Preenchendo modal com dados de:', colab.nome_colaborador);
      smNome.value = colab.nome_colaborador;
      smCargo.value = colab.id_cargos;
      smDesde.value = colab.desde;
      smDesdeEfetivo.value = colab.desde_efetivo || '';
      smStatus.value = colab.status_colaborador;
      smTipoContrato.value = colab.tipo_de_contrato || '';
      console.log('[EDIT] Dados preenchidos. Salário base:', colab.salario_base);
      // Preenche o salário base a partir da coluna `salario_base` de colaboradores (ou fallback para cargos)
      if (colab.salario_base !== undefined && colab.salario_base !== null && String(colab.salario_base) !== '') {
        smSalarioBase.value = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(colab.salario_base);
      } else if (colab.cargos && colab.cargos.salario_base) {
        smSalarioBase.value = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(colab.cargos.salario_base);
      } else {
        smSalarioBase.value = '';
      }
      // Se colaborador não tem salario_base, preenche a partir do cargo selecionado
      if (colab.salario_base === undefined || colab.salario_base === null || String(colab.salario_base) === '') {
        smCargo.dispatchEvent(new Event('change'));
      }
      showToast('Editando: ' + colab.nome_colaborador);
    } else {
      console.error('[EDIT] Colaborador NÃO encontrado! Ids no array:', _colaboradoresSupabase.map(c => c.id_colaborador));
    }
  } else {
    modalTitle.textContent = 'Novo Colaborador';
    smNome.value = '';
    smCargo.value = '';
    smDesde.value = '';
    smDesdeEfetivo.value = '';
    smStatus.value = 'Ativo';
    smSalarioBase.value = ''; // Limpa o salário base
    smTipoContrato.value = '';
  }
  modal.style.display = 'flex';
}

function closeStatusModal() {
  document.getElementById('status-modal').style.display = 'none';
}

async function saveStatusEmployee() {
  const smNome = document.getElementById('sm-nome').value.trim();
  const smCargoId = document.getElementById('sm-cargo').value;
  const smDesde = document.getElementById('sm-desde').value;
  const smDesdeEfetivo = document.getElementById('sm-desde-efetivo').value;
  const smStatus = document.getElementById('sm-status').value;
  const smSalarioRaw = document.getElementById('sm-salario-base').value;
  const smTipoContrato = document.getElementById('sm-tipo-contrato').value;
  // Converte formato BRL (ex: 1.234,56) para número (1234.56)
  const smSalarioNum = smSalarioRaw ? parseFloat(String(smSalarioRaw).replace(/\./g,'').replace(/,/g,'.').replace(/[^0-9.\-]/g,'')) : null;

  if (!smNome || !smCargoId || !smDesde || !smStatus) {
    showToast('Preencha todos os campos obrigatórios.', 'danger');
    return;
  }

  const newColabData = {
    nome_colaborador: smNome,
    id_cargos: smCargoId,
    desde: smDesde,
    desde_efetivo: smDesdeEfetivo || null,
    status_colaborador: smStatus,
    tipo_de_contrato: smTipoContrato || null,
  };
  if (smSalarioNum !== null && !isNaN(smSalarioNum)) newColabData.salario_base = smSalarioNum;

  if (_editingStatusColabId) {
    // Editar colaborador existente
    const { error } = await supaClient
      .from('colaboradores')
      .update(newColabData)
      .eq('id_colaborador', _editingStatusColabId);

    if (error) {
      console.error('Erro ao atualizar colaborador:', error.message);
      showToast('Erro ao atualizar colaborador.', 'danger');
    } else {
      showToast('Colaborador atualizado com sucesso!', 'success');
      closeStatusModal();
      loadColaboradoresFromSupabase(); // Recarrega a lista
    }
  } else {
    // Adicionar novo colaborador
    const { error } = await supaClient
      .from('colaboradores')
      .insert([newColabData]);

    if (error) {
      console.error('Erro ao adicionar colaborador:', error.message);
      showToast('Erro ao adicionar colaborador.', 'danger');
    } else {
      showToast('Colaborador adicionado com sucesso!', 'success');
      closeStatusModal();
      loadColaboradoresFromSupabase(); // Recarrega a lista
    }
  }
}

  'Advertência Verbal',
  'Advertência Escrita',
  'Suspensão',
  'Elogio',
  'Observação Administrativa',
  'Acompanhamento',

];

async function loadOcorrenciasFromSupabase() {
  if (!supaClient) {
    console.error('Supabase client não inicializado.');
    return;
  }
  const { data, error } = await supaClient
    .from('ocorrencias')
    .select('*')
    .order('data_ocorrencia', { ascending: false });

  if (error) {
    console.error('Erro ao carregar ocorrências:', error.message);
    showToast('Erro ao carregar ocorrências.', 'danger');
    _ocorrenciasSupabase = [];
  } else {
    _ocorrenciasSupabase = data || [];
  }
  if (window._renderOcorrencias) window._renderOcorrencias();
}

function nomeColaboradorPorId(id) {
  const colab = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador) === String(id));
  return colab ? colab.nome_colaborador : 'N/A';
}

function pageOcorrencias() {
  document.getElementById('topbar-actions').innerHTML = `<button type="button" class="btn btn-primary" onclick="openOcorrenciaModal()">+ Registrar</button>`;

  if (!window._ocorrenciasFiltros) window._ocorrenciasFiltros = { colaborador: [], tipo: [] };
  if (!window._ocorrenciasOrdem) window._ocorrenciasOrdem = 'data-desc';

  const renderTabela = () => {
    const tbody = document.getElementById('ocorrencias-tbody');
    if (!tbody) return;

    // Atualiza os rótulos dos dropdowns de filtro e as opções do select de
    // colaborador no modal: no primeiro acesso à página, _colaboradoresSupabase
    // pode ainda estar vazio quando o HTML é montado, então isso garante que
    // fiquem corretos assim que os colaboradores terminarem de carregar.
    ocAtualizarLabelFiltro('colaborador');
    ocAtualizarLabelFiltro('tipo');
    const selModalColab = document.getElementById('oc-colaborador');
    if (selModalColab && selModalColab.options.length <= 1) {
      const valorAtual = selModalColab.value;
      selModalColab.innerHTML = '<option value="">— Selecione —</option>' +
        (_colaboradoresSupabase || []).map(c => `<option value="${c.id_colaborador}">${c.nome_colaborador}</option>`).join('');
      selModalColab.value = valorAtual;
    }

    let lista = [..._ocorrenciasSupabase];
    if (window._ocorrenciasFiltros.colaborador.length) lista = lista.filter(o => window._ocorrenciasFiltros.colaborador.includes(String(o.id_colaborador)));
    if (window._ocorrenciasFiltros.tipo.length) lista = lista.filter(o => window._ocorrenciasFiltros.tipo.includes(o.tipo_ocorrencia));

    lista.sort((a, b) => {
      if (window._ocorrenciasOrdem === 'data-asc') return (a.data_ocorrencia || '').localeCompare(b.data_ocorrencia || '');
      if (window._ocorrenciasOrdem === 'colaborador') return nomeColaboradorPorId(a.id_colaborador).localeCompare(nomeColaboradorPorId(b.id_colaborador));
      if (window._ocorrenciasOrdem === 'tipo') return (a.tipo_ocorrencia || '').localeCompare(b.tipo_ocorrencia || '');
      return (b.data_ocorrencia || '').localeCompare(a.data_ocorrencia || ''); // data-desc (padrão)
    });

    tbody.innerHTML = lista.length === 0
      ? '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text3)">Nenhuma ocorrência registrada.</td></tr>'
      : lista.map(o => `
        <tr>
          <td><strong>${nomeColaboradorPorId(o.id_colaborador)}</strong></td>
          <td>${o.tipo_ocorrencia || '—'}</td>
          <td>${formatarDataBR(o.data_ocorrencia) || '—'}</td>
          <td style="white-space:normal;max-width:320px">${(o.descricao || '—').replace(/</g,'&lt;')}</td>
          <td>${(o.registrado_por || '—').replace(/</g,'&lt;')}</td>
          <td>
            <button class="action-btn" onclick="editarOcorrencia(${o.id_ocorrencia})">✎</button>
            <button class="action-btn btn-danger" onclick="excluirOcorrencia(${o.id_ocorrencia})">✕</button>
          </td>
        </tr>`).join('');

    const contagemEl = document.getElementById('oc-contagem');
    if (contagemEl) {
      const total = _ocorrenciasSupabase.length;
      contagemEl.textContent = lista.length === total
        ? `${total} ocorrência${total === 1 ? '' : 's'}`
        : `${lista.length} de ${total} ocorrência${total === 1 ? '' : 's'}`;
    }
  };

  window._renderOcorrencias = renderTabela;
  Promise.resolve(!_colaboradoresSupabase || _colaboradoresSupabase.length === 0 ? loadColaboradoresFromSupabase() : null)
    .then(() => loadOcorrenciasFromSupabase());

  return `
  <div style="font-size:13px;color:var(--text3);margin-bottom:16px">Registre advertências, licenças, afastamentos e observações administrativas dos colaboradores.</div>

  <!-- Modal: Registrar/Editar Ocorrência -->
  <div id="ocorrencia-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:6px;padding:32px;width:560px;max-width:95vw;box-shadow:0 8px 40px rgba(0,0,0,.18)">
      <div style="font-size:15px;font-weight:700;margin-bottom:20px" id="ocorrencia-modal-title">Registrar Ocorrência</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Tipo de Ocorrência</label>
          <select class="form-select" id="oc-tipo" onchange="ocLimparAviso('oc-tipo')">
            <option value="">— Selecione —</option>
            ${TIPOS_OCORRENCIA.map(t => `<option value="${t}">${t}</option>`).join('')}
          </select>
          <div class="form-error" id="oc-tipo-aviso" style="display:none;color:#c0392b;font-size:12px;margin-top:4px">Selecione o tipo de ocorrência.</div>
        </div>
        <div class="form-group">
          <label class="form-label">Colaborador</label>
          <select class="form-select" id="oc-colaborador" onchange="ocLimparAviso('oc-colaborador')">
            <option value="">— Selecione —</option>
            ${(_colaboradoresSupabase || []).map(c => `<option value="${c.id_colaborador}">${c.nome_colaborador}</option>`).join('')}
          </select>
          <div class="form-error" id="oc-colaborador-aviso" style="display:none;color:#c0392b;font-size:12px;margin-top:4px">Selecione o colaborador.</div>
        </div>
        <div class="form-group">
          <label class="form-label">Data da Ocorrência</label>
          <input class="form-input" type="date" id="oc-data" onchange="ocLimparAviso('oc-data')">
          <div class="form-error" id="oc-data-aviso" style="display:none;color:#c0392b;font-size:12px;margin-top:4px">Informe a data da ocorrência.</div>
        </div>
        <div class="form-group form-full">
          <label class="form-label">Descrição</label>
          <textarea class="form-input" id="oc-descricao" rows="4" placeholder="Detalhe o ocorrido..."></textarea>
        </div>
        <div class="form-group form-full">
          <label class="form-label">Registrado Por</label>
          <textarea class="form-input" id="oc-registrado-por" rows="2" placeholder="Nome de quem está registrando..." oninput="ocLimparAviso('oc-registrado-por')"></textarea>
          <div class="form-error" id="oc-registrado-por-aviso" style="display:none;color:#c0392b;font-size:12px;margin-top:4px">Informe quem está registrando a ocorrência.</div>
        </div>

      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
        <button class="btn" onclick="closeOcorrenciaModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarOcorrencia()">Salvar</button>

  </div>

  <div class="table-card">
    <div class="table-header">

      <input class="search-input" placeholder="Buscar por tipo ou colaborador..." oninput="filtrarTabelaGenerica('ocorrencias-tbody', this.value)">
    </div>
    <div style="padding:12px 20px;border-bottom:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--bg2)">
      <span style="font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase">Filtrar:</span>
      <div class="ms-dropdown">
        <button type="button" class="ms-dropdown-btn" onclick="ocToggleDropdown('colaborador')">
          <span id="oc-ms-label-colaborador">Todos os colaboradores</span><span>▾</span>
        </button>
        <div class="ms-dropdown-panel" id="oc-ms-panel-colaborador"></div>
      </div>
      <div class="ms-dropdown">
        <button type="button" class="ms-dropdown-btn" onclick="ocToggleDropdown('tipo')">
          <span id="oc-ms-label-tipo">Todos os tipos</span><span>▾</span>
        </button>
        <div class="ms-dropdown-panel" id="oc-ms-panel-tipo"></div>
      </div>
      <span style="font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;margin-left:12px">Ordenar:</span>
      <select class="form-select" style="width:auto" onchange="ordenarOcorrencias(this.value)">
        <option value="data-desc" ${window._ocorrenciasOrdem === 'data-desc' ? 'selected' : ''}>Data (mais recente)</option>
        <option value="data-asc" ${window._ocorrenciasOrdem === 'data-asc' ? 'selected' : ''}>Data (mais antiga)</option>
        <option value="colaborador" ${window._ocorrenciasOrdem === 'colaborador' ? 'selected' : ''}>Colaborador (A-Z)</option>
        <option value="tipo" ${window._ocorrenciasOrdem === 'tipo' ? 'selected' : ''}>Tipo (A-Z)</option>
      </select>
    </div>
    <div style="overflow-x:auto">
    <table style="white-space:nowrap">

// Opções disponíveis para cada dropdown de filtro (multi-seleção) de Ocorrências.
function ocOpcoesFiltro(nome) {
  if (nome === 'colaborador') return (_colaboradoresSupabase || []).map(c => ({ value: String(c.id_colaborador), label: c.nome_colaborador }));
  return TIPOS_OCORRENCIA.map(t => ({ value: t, label: t }));
}

function ocAtualizarLabelFiltro(nome) {
  const label = document.getElementById(`oc-ms-label-${nome}`);
  if (!label) return;
  const selecionados = (window._ocorrenciasFiltros && window._ocorrenciasFiltros[nome]) || [];
  const opcoes = ocOpcoesFiltro(nome);
  const padrao = nome === 'colaborador' ? 'Todos os colaboradores' : 'Todos os tipos';
  if (selecionados.length === 0) {
    label.textContent = padrao;
  } else if (selecionados.length === 1) {
    const opt = opcoes.find(o => o.value === selecionados[0]);
    label.textContent = opt ? opt.label : selecionados[0];
  } else {
    label.textContent = `${selecionados.length} selecionados`;
  }
}

function ocRenderPainelFiltro(nome) {
  const panel = document.getElementById(`oc-ms-panel-${nome}`);
  if (!panel) return;
  const opcoes = ocOpcoesFiltro(nome);
  const selecionados = (window._ocorrenciasFiltros && window._ocorrenciasFiltros[nome]) || [];
  panel.innerHTML = `
    ${opcoes.length ? opcoes.map(o => `
      <label class="ms-option">
        <input type="checkbox" value="${o.value}" ${selecionados.includes(o.value) ? 'checked' : ''} onchange="ocToggleOpcaoFiltro('${nome}', this.value, this.checked)">
        <span>${o.label}</span>
      </label>`).join('') : '<div style="padding:8px;color:var(--text3);font-size:12px">Nenhuma opção disponível.</div>'}
    <div class="ms-actions">
      <button type="button" class="btn btn-sm" onclick="ocSelecionarTodosFiltro('${nome}')">Selecionar todos</button>
      <button type="button" class="btn btn-sm" onclick="ocLimparFiltro('${nome}')">Limpar</button>
    </div>
  `;
  ocAtualizarLabelFiltro(nome);
}

window.ocToggleDropdown = function(nome) {
  const panel = document.getElementById(`oc-ms-panel-${nome}`);
  if (!panel) return;
  const estaAberto = panel.classList.contains('open');
  document.querySelectorAll('.ms-dropdown-panel.open').forEach(p => p.classList.remove('open'));
  if (!estaAberto) {
    ocRenderPainelFiltro(nome);
    panel.classList.add('open');
  }
};

// Fecha os dropdowns de filtro ao clicar fora deles.
document.addEventListener('click', (e) => {
  if (!e.target.closest('.ms-dropdown')) {
    document.querySelectorAll('.ms-dropdown-panel.open').forEach(p => p.classList.remove('open'));
  }
});

window.ocToggleOpcaoFiltro = function(nome, valor, marcado) {
  if (!window._ocorrenciasFiltros) window._ocorrenciasFiltros = { colaborador: [], tipo: [] };
  const set = new Set(window._ocorrenciasFiltros[nome] || []);
  if (marcado) set.add(valor); else set.delete(valor);
  window._ocorrenciasFiltros[nome] = [...set];
  ocAtualizarLabelFiltro(nome);
  if (window._renderOcorrencias) window._renderOcorrencias();
};

window.ocSelecionarTodosFiltro = function(nome) {
  if (!window._ocorrenciasFiltros) window._ocorrenciasFiltros = { colaborador: [], tipo: [] };
  window._ocorrenciasFiltros[nome] = ocOpcoesFiltro(nome).map(o => o.value);
  ocRenderPainelFiltro(nome);
  if (window._renderOcorrencias) window._renderOcorrencias();
};

window.ocLimparFiltro = function(nome) {
  if (!window._ocorrenciasFiltros) window._ocorrenciasFiltros = { colaborador: [], tipo: [] };
  window._ocorrenciasFiltros[nome] = [];
  ocRenderPainelFiltro(nome);
  if (window._renderOcorrencias) window._renderOcorrencias();
};

window.ordenarOcorrencias = function(valor) {
  window._ocorrenciasOrdem = valor;
  if (window._renderOcorrencias) window._renderOcorrencias();
};

window.openOcorrenciaModal = function(ocorrenciaId = null) {
  _editingOcorrenciaId = ocorrenciaId;
  const modalTitle = document.getElementById('ocorrencia-modal-title');
  const ocTipo = document.getElementById('oc-tipo');
  const ocColaborador = document.getElementById('oc-colaborador');
  const ocData = document.getElementById('oc-data');
  const ocDescricao = document.getElementById('oc-descricao');
  const ocRegistradoPor = document.getElementById('oc-registrado-por');

  if (ocorrenciaId) {
    const oc = _ocorrenciasSupabase.find(o => String(o.id_ocorrencia) === String(ocorrenciaId));
    if (!oc) return showToast('Ocorrência não encontrada.', 'danger');
    modalTitle.textContent = 'Editar Ocorrência';
    ocTipo.value = oc.tipo_ocorrencia || '';
    ocColaborador.value = oc.id_colaborador || '';
    ocData.value = oc.data_ocorrencia || '';
    ocDescricao.value = oc.descricao || '';
    ocRegistradoPor.value = oc.registrado_por || '';
  } else {
    modalTitle.textContent = 'Registrar Ocorrência';
    ocTipo.value = '';
    ocColaborador.value = '';
    ocData.value = '';
    ocDescricao.value = '';
    ocRegistradoPor.value = '';
  }

  ['oc-tipo', 'oc-colaborador', 'oc-data', 'oc-registrado-por'].forEach(id => window.ocLimparAviso(id));
  document.getElementById('ocorrencia-modal').style.display = 'flex';
};

// Marca (ou limpa) o aviso visual de campo obrigatório não preenchido no form de Ocorrência.
window.ocMarcarAviso = function(id, mostrar) {
  const campo = document.getElementById(id);
  const aviso = document.getElementById(id + '-aviso');
  if (campo) campo.style.borderColor = mostrar ? '#c0392b' : '';
  if (aviso) aviso.style.display = mostrar ? '' : 'none';
};
window.ocLimparAviso = function(id) {
  window.ocMarcarAviso(id, false);
};

window.closeOcorrenciaModal = function() {
  document.getElementById('ocorrencia-modal').style.display = 'none';
};

window.editarOcorrencia = function(ocorrenciaId) {
  window.openOcorrenciaModal(ocorrenciaId);
};

window.salvarOcorrencia = async function() {
  const tipo = document.getElementById('oc-tipo').value;
  const colaboradorId = document.getElementById('oc-colaborador').value;
  const data = document.getElementById('oc-data').value;
  const descricao = document.getElementById('oc-descricao').value.trim();
  const registradoPor = document.getElementById('oc-registrado-por').value.trim();

  window.ocMarcarAviso('oc-tipo', !tipo);
  window.ocMarcarAviso('oc-colaborador', !colaboradorId);
  window.ocMarcarAviso('oc-data', !data);
  window.ocMarcarAviso('oc-registrado-por', !registradoPor);

  if (!tipo || !colaboradorId || !data || !registradoPor) {
    showToast('Preencha os campos obrigatórios destacados em vermelho.', 'danger');
    return;
  }
  if (!supaClient) return showToast('Supabase não está configurado.', 'danger');

  const payload = {
    tipo_ocorrencia: tipo,
    id_colaborador: colaboradorId,
    data_ocorrencia: data,
    descricao: descricao || null,
    registrado_por: registradoPor || null,
  };

  if (_editingOcorrenciaId) {
    const { error } = await supaClient
      .from('ocorrencias')
      .update(payload)
      .eq('id_ocorrencia', _editingOcorrenciaId);

    if (error) {
      console.error('Erro ao atualizar ocorrência:', error.message);
      return showToast('Erro ao atualizar ocorrência.', 'danger');
    }
    showToast('Ocorrência atualizada com sucesso!');
  } else {
    const { error } = await supaClient
      .from('ocorrencias')
      .insert([{ ...payload, created_at: new Date().toISOString() }]);

    if (error) {
      console.error('Erro ao registrar ocorrência:', error.message);
      return showToast('Erro ao registrar ocorrência.', 'danger');
    }
    showToast('Ocorrência registrada com sucesso!');
  }

  window.closeOcorrenciaModal();
  await loadOcorrenciasFromSupabase();
};

window.excluirOcorrencia = async function(ocorrenciaId) {
  if (!confirm('Tem certeza que deseja excluir esta ocorrência? Esta ação não pode ser desfeita.')) return;

  const { error } = await supaClient.from('ocorrencias').delete().eq('id_ocorrencia', ocorrenciaId);
  if (error) {
    console.error('Erro ao excluir ocorrência:', error.message);
    return showToast('Erro ao excluir ocorrência.', 'danger');
  }
  showToast('Ocorrência excluída com sucesso.');
  await loadOcorrenciasFromSupabase();
};

// contratos_registros unifica o histórico de Contrato de Expectativa e de
// Avaliação de Desempenho numa tabela só (coluna "tipo" diferencia as duas) —
// uma consulta só, dividida em dois caches por colaborador como antes.
async function loadContratosRegistrosFromSupabase() {
  if (!supaClient) return;
  const { data, error } = await supaClient
    .from('contratos_registros')
    .select('*')
    .order('data_realizacao', { ascending: false });
  if (error) {
    console.error('Erro ao carregar contratos_registros:', error.message);
    showToast('Erro ao carregar histórico de Contrato de Expectativa / Avaliação de Desempenho: ' + error.message, 'danger');
    _expectativaPorColab = {};
    _desempenhoPorColab = {};
    return;
  }
  const porColabExpectativa = {};
  const porColabDesempenho = {};
  (data || []).forEach(row => {
    const alvo = row.tipo === 'desempenho' ? porColabDesempenho : porColabExpectativa;
    if (!alvo[row.id_colaborador]) alvo[row.id_colaborador] = [];
    alvo[row.id_colaborador].push(row);
  });
  _expectativaPorColab = porColabExpectativa;
  _desempenhoPorColab = porColabDesempenho;
}

        const sf = (ca && ca.status_finalizacao_experiencia) || '—';
        return window._calinFiltros.statusFinalizacao.includes(sf);
      });
    }

    lista.sort((a, b) => {
      const ordem = window._calinOrdem;
      if (ordem === 'cargo') return (a.cargos ? a.cargos.nome_cargo : '').localeCompare(b.cargos ? b.cargos.nome_cargo : '');
      if (ordem === 'status-finalizacao') {
        const sfA = ((_contratosAlinhamentos || []).find(x => String(x.id_colaborador) === String(a.id_colaborador)) || {}).status_finalizacao_experiencia || '—';
        const sfB = ((_contratosAlinhamentos || []).find(x => String(x.id_colaborador) === String(b.id_colaborador)) || {}).status_finalizacao_experiencia || '—';
        return sfA.localeCompare(sfB);

      if (ordem === 'desempenho-desc' || ordem === 'desempenho-asc') {

      if (ordem === 'expectativa-desc' || ordem === 'expectativa-asc') {
        const da = ((_expectativaPorColab[a.id_colaborador] || [])[0] || {}).data_realizacao || '';
        const db = ((_expectativaPorColab[b.id_colaborador] || [])[0] || {}).data_realizacao || '';

        </button>
        <div class="ms-dropdown-panel" id="calin-ms-panel-tipoContrato"></div>

      <div class="ms-dropdown">
        <button type="button" class="ms-dropdown-btn" onclick="calinToggleDropdown('statusFinalizacao')">
          <span id="calin-ms-label-statusFinalizacao">Todos os status de finalização</span><span>▾</span>
        </button>
        <div class="ms-dropdown-panel" id="calin-ms-panel-statusFinalizacao"></div>
      </div>
      <div class="ms-dropdown">
        <button type="button" class="ms-dropdown-btn" onclick="calinToggleDropdown('status')">
          <span id="calin-ms-label-status">Status</span><span>▾</span>
