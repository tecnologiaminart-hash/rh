function calinOpcoesFiltro(nome) {
  if (nome === 'cargo') {
    const nomes = [...new Set((_colaboradoresSupabase || []).map(c => c.cargos ? c.cargos.nome_cargo : null).filter(Boolean))].sort((a, b) => a.localeCompare(b));
    return nomes.map(n => ({ value: n, label: n }));
  }
  if (nome === 'tipoContrato') {
    return ['Efetivo', 'Experiência', 'Temporária'].map(t => ({ value: t, label: t }));
  }
  if (nome === 'statusFinalizacao') {
    return [{ value: '—', label: 'Sem registro' }, ...STATUS_FINALIZACAO_EXPERIENCIA.map(s => ({ value: s, label: s }))];
  }
  if (nome === 'status') {
    return ['Ativo', 'Inativo', 'Férias', 'Afastado', 'Pendente Documentação'].map(s => ({ value: s, label: s }));
  }
  return [];
}

function calinRotuloPadrao(nome) {
  return {
    cargo: 'Todos os cargos',
    tipoContrato: 'Todos os tipos de contrato',
    statusFinalizacao: 'Todos os status de finalização',
    status: 'Nenhum status selecionado',
  }[nome];
}

function calinAtualizarLabelFiltro(nome) {
  const label = document.getElementById(`calin-ms-label-${nome}`);
  if (!label) return;
  const selecionados = (window._calinFiltros && window._calinFiltros[nome]) || [];
  const opcoes = calinOpcoesFiltro(nome);
  if (selecionados.length === 0) {
    label.textContent = calinRotuloPadrao(nome);
  } else if (selecionados.length === 1) {
    const opt = opcoes.find(o => o.value === selecionados[0]);
    label.textContent = opt ? opt.label : selecionados[0];
  } else {
    label.textContent = `${selecionados.length} selecionados`;
  }
}

function calinRenderPainelFiltro(nome) {
  const panel = document.getElementById(`calin-ms-panel-${nome}`);
  if (!panel) return;
  const opcoes = calinOpcoesFiltro(nome);
  const selecionados = (window._calinFiltros && window._calinFiltros[nome]) || [];
  panel.innerHTML = `
    ${opcoes.length ? opcoes.map(o => `
      <label class="ms-option">
        <input type="checkbox" value="${o.value}" ${selecionados.includes(o.value) ? 'checked' : ''} onchange="calinToggleOpcaoFiltro('${nome}', this.value, this.checked)">
        <span>${o.label}</span>
      </label>`).join('') : '<div style="padding:8px;color:var(--text3);font-size:12px">Nenhuma opção disponível.</div>'}
    <div class="ms-actions">
      <button type="button" class="btn btn-sm" onclick="calinSelecionarTodosFiltro('${nome}')">Selecionar todos</button>
      <button type="button" class="btn btn-sm" onclick="calinLimparFiltro('${nome}')">Limpar</button>
    </div>
  `;
  calinAtualizarLabelFiltro(nome);
}

window.calinToggleDropdown = function(nome) {
  const panel = document.getElementById(`calin-ms-panel-${nome}`);
  if (!panel) return;
  const estaAberto = panel.classList.contains('open');
  document.querySelectorAll('.ms-dropdown-panel.open').forEach(p => p.classList.remove('open'));
  if (!estaAberto) {
    calinRenderPainelFiltro(nome);
    panel.classList.add('open');
  }
};

window.calinToggleOpcaoFiltro = function(nome, valor, marcado) {
  if (!window._calinFiltros) window._calinFiltros = { cargo: [], tipoContrato: [], statusFinalizacao: [], status: [] };
  const set = new Set(window._calinFiltros[nome] || []);
  if (marcado) set.add(valor); else set.delete(valor);
  window._calinFiltros[nome] = [...set];
  calinAtualizarLabelFiltro(nome);
  if (window._renderContratosAlinhamentos) window._renderContratosAlinhamentos();
};

window.calinSelecionarTodosFiltro = function(nome) {
  if (!window._calinFiltros) window._calinFiltros = { cargo: [], tipoContrato: [], statusFinalizacao: [], status: [] };
  window._calinFiltros[nome] = calinOpcoesFiltro(nome).map(o => o.value);
  calinRenderPainelFiltro(nome);
  if (window._renderContratosAlinhamentos) window._renderContratosAlinhamentos();
};

window.calinLimparFiltro = function(nome) {
  if (!window._calinFiltros) window._calinFiltros = { cargo: [], tipoContrato: [], statusFinalizacao: [], status: [] };
  window._calinFiltros[nome] = [];
  calinRenderPainelFiltro(nome);
  if (window._renderContratosAlinhamentos) window._renderContratosAlinhamentos();
};

window.calinOrdenar = function(valor) {
  window._calinOrdem = valor;
  if (window._renderContratosAlinhamentos) window._renderContratosAlinhamentos();
};

// Google Drive não deixa forçar download em links "view" comuns (o attribute
// "download" é ignorado em recursos de outra origem); convertendo para o
// endpoint "uc?export=download" o Drive entrega o arquivo direto, sem abrir o
// visualizador — assim dá pra oferecer "Ver" e "Baixar" como ações distintas.
function converterParaLinkDownloadDrive(url) {
  if (!url) return url;
  const m = String(url).match(/\/d\/([a-zA-Z0-9_-]+)/) || String(url).match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m && m[1]) return `https://drive.google.com/uc?export=download&id=${m[1]}`;
  return url;
}

function renderVerLink(url, label) {
  if (!url) return '';
  return `<div style="margin-top:6px"><a href="${url}" target="_blank" rel="noopener" style="font-size:12px">👁 ${label}</a></div>`;
}

// Renderiza o anexo (Contrato de Experiência ou Contrato Efetivo) da Coluna 4:
// esconde o campo de arquivo enquanto já houver um link salvo (só mostra
// Ver/Baixar/Excluir) e volta a exibir o campo assim que o anexo é excluído.
function renderAnexoContratoColuna(campo) {
  const ca = (_contratosAlinhamentos || []).find(x => String(x.id_colaborador) === String(_caModalColabId));
  const url = ca ? ca[campo] : null;
  const sufixo = campo === 'contrato_experiencia_url' ? 'exp' : 'efetivo';
  const inputWrap = document.getElementById(`ca-contrato-${sufixo}-input-wrap`);
  const linkDiv = document.getElementById(`ca-contrato-${sufixo}-link`);
  if (inputWrap) inputWrap.style.display = url ? 'none' : '';
  if (linkDiv) {
    linkDiv.innerHTML = url ? `
      <div style="display:flex;gap:12px;margin-top:6px;align-items:center;flex-wrap:wrap">
        <a href="${url}" target="_blank" rel="noopener" style="font-size:12px">👁 Ver</a>
        <a href="${converterParaLinkDownloadDrive(url)}" style="font-size:12px">⬇ Baixar</a>
        <button type="button" class="btn btn-sm btn-danger" onclick="excluirAnexoContrato('${campo}')">🗑 Excluir</button>
      </div>` : '';
  }
}

window.excluirAnexoContrato = async function(campo) {
  if (!_caModalColabId) return;
  if (!confirm('Tem certeza que deseja excluir este anexo? Esta ação não pode ser desfeita.')) return;
  if (!supaClient) return showToast('Supabase não está configurado.', 'danger');

  const { error } = await supaClient
    .from('contratos_alinhamentos')
    .upsert({ id_colaborador: _caModalColabId, [campo]: null, updated_at: new Date().toISOString() }, { onConflict: 'id_colaborador' });

  if (error) {
    console.error('Erro ao excluir anexo:', error.message);
    return showToast('Erro ao excluir anexo.', 'danger');
  }

  showToast('Anexo excluído com sucesso.');
  await loadContratosAlinhamentosFromSupabase();
  if (window._renderContratosAlinhamentos) window._renderContratosAlinhamentos();
  const sufixo = campo === 'contrato_experiencia_url' ? 'exp' : 'efetivo';
  const arquivoInput = document.getElementById(`ca-contrato-${sufixo}-arquivo`);
  if (arquivoInput) arquivoInput.value = '';

};

// Envia (ou mantém) os anexos de Contrato de Experiência e Contrato Efetivo de
// Trabalho. Cada arquivo é opcional nesse "Salvar": se o campo estiver vazio,
// o link já salvo anteriormente (se houver) é preservado, já que o upsert só
// atualiza as colunas informadas no payload.
window.salvarAnexosContrato = async function() {
  if (!_caModalColabId) return;
  if (!supaClient) return showToast('Supabase não está configurado.', 'danger');

  const caAtual = (_contratosAlinhamentos || []).find(x => String(x.id_colaborador) === String(_caModalColabId));
  const arquivoExperiencia = document.getElementById('ca-contrato-exp-arquivo').files[0];
  const arquivoEfetivo = document.getElementById('ca-contrato-efetivo-arquivo').files[0];

  let contratoExperienciaUrl = caAtual ? (caAtual.contrato_experiencia_url || null) : null;
  let contratoEfetivoUrl = caAtual ? (caAtual.contrato_efetivo_url || null) : null;

  async function enviarAnexo(arquivo, tipo) {
    const driveFolderId = await window.obterDriveFolderIdParaColaborador(_caModalColabId);
    if (!driveFolderId) throw new Error('Pasta de documentos não encontrada para este colaborador.');
    const url = await window.enviarArquivoParaDrive(arquivo, { cid: _caModalColabId, tipo, driveFolderId });
    // Também registra o arquivo na aba Documentos, para ficar no mesmo local de sempre.
    await supaClient.from('documentos').insert([{
      id_colaborador: _caModalColabId,
      tipo_doc: tipo,
      data_envio_doc: new Date().toISOString().slice(0, 10),
      url_arquivo: url,
    }]);
    return url;
  }

  if (!arquivoExperiencia && !arquivoEfetivo) {
    return showToast('Selecione ao menos um arquivo para enviar.', 'danger');
  }

  try {
    if (arquivoExperiencia) contratoExperienciaUrl = await enviarAnexo(arquivoExperiencia, 'Contrato de Experiência');
    if (arquivoEfetivo) contratoEfetivoUrl = await enviarAnexo(arquivoEfetivo, 'Contrato Efetivo de Trabalho');
  } catch (err) {
    console.error('Erro ao enviar anexos de contrato:', err);
    return showToast(err.message || 'Falha ao enviar os anexos.', 'danger');
  }

  const { error } = await supaClient
    .from('contratos_alinhamentos')
    .upsert({
      id_colaborador: _caModalColabId,
      contrato_experiencia_url: contratoExperienciaUrl,
      contrato_efetivo_url: contratoEfetivoUrl,
      updated_at: new Date().toISOString(),
    }, { onConflict: 'id_colaborador' });

  if (error) {
    console.error('Erro ao salvar anexos de contrato:', error.message);
    return showToast('Erro ao salvar anexos de contrato.', 'danger');
  }

  showToast('Anexos salvos com sucesso!');
  await loadContratosAlinhamentosFromSupabase();
  if (window._renderContratosAlinhamentos) window._renderContratosAlinhamentos();

  document.getElementById('ca-contrato-exp-arquivo').value = '';
  document.getElementById('ca-contrato-efetivo-arquivo').value = '';
  renderAnexoContratoColuna('contrato_experiencia_url');
  renderAnexoContratoColuna('contrato_efetivo_url');
};

window.salvarContratoExpectativa = async function() {
  if (!_caModalColabId) return;
  if (!supaClient) return showToast('Supabase não está configurado.', 'danger');

  const statusResultado = document.getElementById('ca-exp-status').value;
  const dataRealizacao = document.getElementById('ca-exp-data').value;
  const observacoes = document.getElementById('ca-exp-obs').value.trim();
  const arquivoInput = document.getElementById('ca-exp-arquivo');
  const arquivo = arquivoInput ? arquivoInput.files[0] : null;

  if (!statusResultado || !dataRealizacao) {
    return showToast('Preencha o status resultado e a data de realização.', 'danger');
  }

  const existente = _editingExpectativaId
    ? (_expectativaPorColab[_caModalColabId] || []).find(x => String(x.id_registro) === String(_editingExpectativaId))
    : null;
  let link = existente ? (existente.link || null) : null;

  if (arquivo) {
    try {
      const driveFolderId = await window.obterDriveFolderIdParaColaborador(_caModalColabId);
      if (!driveFolderId) return showToast('Pasta de documentos não encontrada para este colaborador.', 'danger');
      link = await window.enviarArquivoParaDrive(arquivo, { cid: _caModalColabId, tipo: 'Contrato de Expectativa', driveFolderId });
      // Também registra o arquivo na aba Documentos, para ficar no mesmo local de sempre.
      await supaClient.from('documentos').insert([{
        id_colaborador: _caModalColabId,
        tipo_doc: 'Contrato de Expectativa',
        data_envio_doc: new Date().toISOString().slice(0, 10),
        url_arquivo: link,
      }]);
    } catch (err) {
      console.error('Erro ao enviar contrato de expectativa:', err);
      return showToast('Falha ao enviar o arquivo do contrato de expectativa.', 'danger');
    }
  }

  const payload = {
    id_colaborador: _caModalColabId,
    tipo: 'expectativa',
    status_resultado: statusResultado,
    data_realizacao: dataRealizacao,
    observacoes: observacoes || null,
    link,
  };

  let error;
  if (_editingExpectativaId) {
    ({ error } = await supaClient.from('contratos_registros').update(payload).eq('id_registro', _editingExpectativaId));
  } else {
    ({ error } = await supaClient.from('contratos_registros').insert([{ ...payload, created_at: new Date().toISOString() }]));
  }

  if (error) {
    console.error('Erro ao salvar contrato de expectativa:', error.message);
    return showToast('Erro ao salvar contrato de expectativa.', 'danger');
  }

  showToast('Contrato de Expectativa salvo com sucesso!');
  await loadContratosRegistrosFromSupabase();
  if (window._renderContratosAlinhamentos) window._renderContratosAlinhamentos();
  _editingExpectativaId = null;
  window._caExpectativaView = 'historico';
  renderExpectativaColuna();
};

// ------------------------------------------------------------
// CONTRATOS & ALINHAMENTOS > MODELOS
// ------------------------------------------------------------
// id_cargo = 0 identifica as linhas "fixas" (sem cargo) de avaliação de
// experiência/desempenho — ver comentário em sql/modelos-contratos.sql sobre
// por que não é usado null aqui (UNIQUE trata NULL como sempre distinto).
async function loadModelosRelatoriosFromSupabase() {
  if (!supaClient) return;
  const { data, error } = await supaClient.from('modelos_relatorios').select('*');
  if (error) {
    console.error('Erro ao carregar modelos_relatorios:', error.message);
    showToast('Erro ao carregar modelos: ' + error.message, 'danger');
    _modelosRelatorios = [];
  } else {

  }
}

function obterModeloRelatorio(tipo, idCargo = 0) {
  return (_modelosRelatorios || []).find(m => m.tipo === tipo && Number(m.id_cargo) === Number(idCargo));
}

async function salvarModeloRelatorio(tipo, idCargo, urlLink) {
  if (!supaClient) { showToast('Supabase não está configurado.', 'danger'); return false; }
  const { error } = await supaClient
    .from('modelos_relatorios')
    .upsert({ tipo, id_cargo: idCargo, url_link: urlLink || null, updated_at: new Date().toISOString() }, { onConflict: 'tipo,id_cargo' });
  if (error) {
    console.error(`Erro ao salvar modelo (${tipo}):`, error.message);
    showToast('Erro ao salvar modelo.', 'danger');
    return false;
  }
  await loadModelosRelatoriosFromSupabase();
  return true;
}

function filterStatusTable(searchTerm) {
  const filter = searchTerm.toUpperCase();

  const tr = tbody.getElementsByTagName('tr');

  for (let i = 0; i < tr.length; i++) {
    let tdNome = tr[i].getElementsByTagName('td')[0]; // Colaborador
    let tdCargo = tr[i].getElementsByTagName('td')[1]; // Cargo
    let tdStatus = tr[i].getElementsByTagName('td')[6]; // Status (Nome, Cargo, Admissão, Efetivação, Contrato, Salário, Status, Ações)

    if (tdNome || tdCargo || tdStatus) {
      const textValue = (tdNome ? tdNome.textContent : '') +
                        (tdCargo ? tdCargo.textContent : '') +
                        (tdStatus ? tdStatus.textContent : '');
      if (textValue.toUpperCase().indexOf(filter) > -1) {
        tr[i].style.display = '';
      } else {
        tr[i].style.display = 'none';
      }
    }
  }
}

// Carrega os documentos reais da tabela `documentos` no Supabase e agrupa por id_colaborador.
async function loadDocumentosFromSupabase() {
  if (!supaClient) return;
  const { data, error } = await supaClient.from('documentos').select('*');
  if (error) {
    console.error('Erro ao carregar documentos:', error.message);
    return;
  }
  const porColab = {};
  (data || []).forEach(doc => {
    const cid = doc.id_colaborador;
    if (!porColab[cid]) porColab[cid] = [];
    porColab[cid].push({
      id_doc: doc.id_doc,
      tipo: doc.tipo_doc,
      data: doc.data_envio_doc ? new Date(doc.data_envio_doc).toLocaleDateString('pt-BR') : '',
      url: doc.url_arquivo
    });
  });
  window._documentosPorColab = porColab;
}

// Extrai o ID do arquivo a partir de um link do Google Drive (ex: .../file/d/ID/view ou ...?id=ID).
function extrairDriveFileId(url) {
  if (!url) return null;
  const m = String(url).match(/\/d\/([a-zA-Z0-9_-]+)/) || String(url).match(/[?&]id=([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}

window.driveDownloadUrl = function(url) {
  const id = extrairDriveFileId(url);
  return id ? `https://drive.google.com/uc?export=download&id=${id}` : url;
};

window.driveThumbnailUrl = function(url) {
  const id = extrairDriveFileId(url);
  return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w200` : url;
};

// Consulta o webhook do n8n para saber se o arquivo ainda existe no Drive.
// Se a verificação não estiver configurada ou falhar, assume que existe
// (não esconde documentos por causa de uma falha de rede).
window.verificarDocumentoExisteNoDrive = async function(fileId) {
  if (!fileId) return true;
  if (!N8N_CHECK_WEBHOOK_URL || N8N_CHECK_WEBHOOK_URL.startsWith('COLE_AQUI')) return true;
  try {
    const formData = new FormData();
    formData.append('file_id', fileId);
    formData.append('token', N8N_WEBHOOK_TOKEN);
    const res = await fetch(N8N_CHECK_WEBHOOK_URL, { method: 'POST', body: formData });
    if (!res.ok) return true;
    const result = await res.json();
    return result.exists !== false;
  } catch (e) {
    console.warn('Falha ao verificar existência do arquivo no Drive:', e);
    return true;
  }
};

        tipo: doc.tipo_doc,
        data: doc.data_envio_doc ? new Date(doc.data_envio_doc).toLocaleDateString('pt-BR') : '',
        url: doc.url_arquivo
      }));

      // Confere no Drive se cada arquivo ainda existe; remove do Supabase os que
      // foram apagados direto no Drive, para não ficarem listados indevidamente.
      const verificados = await Promise.all(docsCarregados.map(async d => {
        const fileId = extrairDriveFileId(d.url);
        const existe = await window.verificarDocumentoExisteNoDrive(fileId);
        return { ...d, existe };
      }));

      const removidos = verificados.filter(d => !d.existe);
      for (const d of removidos) {
        if (d.id_doc) await supaClient.from('documentos').delete().eq('id_doc', d.id_doc);
      }
      if (removidos.length > 0) {
        showToast(`${removidos.length} documento(s) removido(s): arquivo não encontrado no Drive.`);
        window.renderDocColabTable();
      }

      window._documentosPorColab[colabId] = verificados.filter(d => d.existe);
    }
  }

  const docs = window._documentosPorColab[colabId] || [];
  const body = docs.length === 0
    ? `<div class="empty-state"><div class="empty-state-icon">📂</div><div class="empty-state-title">Nenhum documento enviado</div><div class="empty-state-desc">Use "Enviar Documento" para anexar.</div></div>`
    : `<table style="width:100%"><thead><tr><th>Tipo</th><th>Data de Envio</th><th>Ações</th></tr></thead><tbody>${docs.map((d,i)=>`
        <tr>
          <td><span class="badge badge-gray">${d.tipo || '—'}</span></td>
          <td style="color:var(--text3);font-size:12px">${d.data || '—'}</td>
          <td>
            ${d.url ? `<button class="action-btn" title="Visualizar" onclick="visualizarDocumento('${d.url}')">👁</button>
            <a class="action-btn" title="Baixar" href="${driveDownloadUrl(d.url)}" target="_blank" rel="noopener" style="text-decoration:none;display:inline-block">⬇</a>` : '<span style="color:var(--text3);font-size:12px">Sem arquivo</span>'}
            ${d.id_doc ? `<button class="action-btn" title="Excluir" style="color:var(--danger)" onclick="excluirDocumento(${d.id_doc}, '${colabId}')">✕</button>` : ''}
          </td>
        </tr>`).join('')}</tbody></table>`;

  document.getElementById('doc-colab-title').textContent = `Documentos — ${nome}`;
  document.getElementById('doc-colab-body').innerHTML = body;
};

    const { error } = await supaClient.from('documentos').delete().eq('id_doc', idDoc);
    if (error) {
      console.error('Erro ao excluir documento:', error);
      return showToast('Erro ao excluir documento.', 'danger');

  if (window._documentosPorColab[colabId]) {
    window._documentosPorColab[colabId] = window._documentosPorColab[colabId].filter(d => String(d.id_doc) !== String(idDoc));
  }

  showToast('Documento excluído com sucesso.');
  window.renderDocColabTable();
  await window.openDocColabModal(colabId);
};

// Envia o arquivo para o webhook do n8n, que fica responsável por gravá-lo
// na pasta do Google Drive identificada por driveFolderId. Espera de volta um
// JSON contendo o link do arquivo criado (ex: { "url": "https://drive.google.com/..." }).
window.enviarArquivoParaDrive = async function(file, { cid, tipo, driveFolderId }) {
  if (!N8N_WEBHOOK_URL || N8N_WEBHOOK_URL.startsWith('COLE_AQUI')) {
    throw new Error('Webhook do n8n não configurado: defina N8N_WEBHOOK_URL no index.html.');
  }

  const formData = new FormData();
  formData.append('file', file, file.name);
  formData.append('id_colaborador', cid);
  formData.append('drive_folder_id', driveFolderId);
  formData.append('tipo_doc', tipo);
  formData.append('nome_arquivo', file.name);
  // O token vai como campo do form (não como header customizado) para que o
  // navegador trate isso como requisição "simples" e não dispare preflight CORS,
  // que o n8n não responde por padrão e travaria a chamada silenciosamente.
  formData.append('token', N8N_WEBHOOK_TOKEN);

  const res = await fetch(N8N_WEBHOOK_URL, {
    method: 'POST',
    body: formData
  });

  if (!res.ok) {
    throw new Error(`Webhook respondeu com status ${res.status}`);
  }

  let result = {};
  try { result = await res.json(); } catch (e) { /* resposta sem corpo JSON */ }

  if (result.success === false) {
    throw new Error(result.error || 'Falha reportada pelo webhook do n8n.');
  }

  return result.url || result.webViewLink || result.link || null;
};

// Gera um arquivo .docx (Word) a partir de uma lista de perguntas e respostas,
// usado pela avaliação pública (Competências e Entrevista). Retorna um Blob.
window.gerarDocxPerguntasRespostas = async function(titulo, perguntasRespostas) {
  const { Document, Packer, Paragraph, TextRun, HeadingLevel } = window.docx;
  const children = [new Paragraph({ text: titulo, heading: HeadingLevel.HEADING_1 })];
  perguntasRespostas.forEach((item, i) => {
    children.push(new Paragraph({
      spacing: { before: 240 },
      children: [new TextRun({ text: `${i + 1}. ${item.pergunta}`, bold: true })]
    }));
    children.push(new Paragraph({ text: item.resposta || '(sem resposta)' }));
  });
  const doc = new Document({ sections: [{ properties: {}, children }] });
  return await Packer.toBlob(doc);
};

window.salvarDocumento = async function() {
  const cid = document.getElementById('enviar-doc-colab').value;
  const tipo = document.getElementById('enviar-doc-tipo').value;
  const file = document.getElementById('enviar-doc-arquivo').files[0];
  if (!cid) return showToast('Selecione um colaborador.');
  if (!tipo) return showToast('Selecione o tipo de documento.');
  if (!file) return showToast('Selecione um arquivo.');
  if (!supaClient) return showToast('Supabase não está configurado.');

  let driveFolderId;
  try {
    driveFolderId = await window.obterDriveFolderIdParaColaborador(cid);
  } catch (error) {
    console.error('Erro ao buscar pasta de documentos:', error);
    return showToast('Erro ao localizar pasta do colaborador.', 'danger');
  }

  if (!driveFolderId) {
    return showToast('Pasta de documentos não encontrada para este colaborador.', 'danger');
  }

  let urlArquivo;
  try {
    urlArquivo = await window.enviarArquivoParaDrive(file, { cid, tipo, driveFolderId });
  } catch (error) {
    console.error('Erro ao enviar arquivo para o Drive via n8n:', error);
    return showToast('Falha ao enviar arquivo para o Drive.', 'danger');
  }

  if (!urlArquivo) {
    return showToast('O arquivo foi enviado mas o Drive não retornou a URL. Verifique o workflow do n8n ou a pasta do colaborador.', 'danger');
  }

  const hoje = new Date().toISOString().slice(0, 10); // data_envio_doc é coluna "date"
  const payload = {
    id_colaborador: cid,
    tipo_doc: tipo,
    data_envio_doc: hoje,
    url_arquivo: urlArquivo,
  };

  const { data: insertedRows, error: insertError } = await supaClient
    .from('documentos')
    .insert([payload])
    .select();

  if (insertError) {
    console.error('Erro ao inserir documento:', insertError.message, '| code:', insertError.code, '| details:', insertError.details);
    return showToast('Erro ao salvar registro de documento: ' + (insertError.message || 'verifique o console.'), 'danger');
  }

  const insertedDoc = insertedRows?.[0];
  if (!window._documentosPorColab[cid]) window._documentosPorColab[cid] = [];
  window._documentosPorColab[cid].push({
    id_doc: insertedDoc?.id_doc,
    tipo,
    data: new Date().toLocaleDateString('pt-BR'),
    url: urlArquivo
  });

  document.getElementById('enviar-doc-modal').style.display='none';
  const _colabInfo = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador || c.id || c.codigo) === String(cid));
  window._docEnviadoSucesso = {
    nome: _colabInfo ? (_colabInfo.nome_colaborador || _colabInfo.nome || 'colaborador') : 'colaborador',
    tipo
  };
  navigate('col-documentos','Documentos','Colaboradores');
};

// Embrulha toda <table> renderizada no conteúdo num container com scroll
// horizontal próprio (.table-scroll) — sem isso, tabelas com muitas colunas
// (comuns nas telas de Colaboradores/Cursos/etc) estouram a tela no mobile
// em vez de rolar só a tabela. Roda depois de cada renderPage(), então cobre
// toda página sem precisar mexer em cada function pageXxx() individualmente.
function habilitarScrollHorizontalTabelas() {
  document.querySelectorAll('#content-area table').forEach(t => {
    if (t.closest('.table-scroll')) return;
    const wrap = document.createElement('div');
    wrap.className = 'table-scroll';
    t.parentNode.insertBefore(wrap, t);
    wrap.appendChild(t);
  });
}

// Quebra o texto numerado de uma coluna do Perfil DISC em um array de frases (sem o "N. " na frente)
function discLinhasPorCor(texto) {
  return String(texto || '').split('\n').map(l => l.replace(/^\s*\d+\.\s*/, '').trim()).filter(Boolean);
}

// Monta as 10 exibições (linhas) do teste, cada uma com os 4 blocos (um de cada cor) e
// o número original da frase (1–10 Executor, 11–20 Comunicador, 21–30 Planejador, 31–40 Analista)
function gerarMatrizDisc() {
  const cores = [
    { cor: 'executor',    base: 0,  rotulo: 'Executor',    bg: '#e74c3c', fg: '#fff', linhas: discLinhasPorCor(DISC_PADRAO.executor) },
    { cor: 'comunicador', base: 10, rotulo: 'Comunicador', bg: '#f1c40f', fg: '#111', linhas: discLinhasPorCor(DISC_PADRAO.comunicador) },
    { cor: 'planejador',  base: 20, rotulo: 'Planejador',  bg: '#27ae60', fg: '#fff', linhas: discLinhasPorCor(DISC_PADRAO.planejador) },
    { cor: 'analista',    base: 30, rotulo: 'Analista',    bg: '#2980b9', fg: '#fff', linhas: discLinhasPorCor(DISC_PADRAO.analista) },
  ];
  const matriz = [];
  for (let i = 0; i < 10; i++) {
    matriz.push(cores.map(c => ({
      cor: c.cor,
      rotulo: c.rotulo,
      bg: c.bg,
      fg: c.fg,
      numero: c.base + i + 1,
      texto: c.linhas[i] || ''
    })));
  }
  return matriz;
}

window.iniciarTesteDisc = function() {
  window._discMatriz = gerarMatrizDisc();
  window._discTeste = { tela: 0, respostas: Array.from({ length: 10 }, () => [null, null, null, null]) };

  const intro = document.getElementById('disc-teste-intro');
  const colunasView = document.getElementById('disc-colunas-view');
  const quiz = document.getElementById('disc-teste-quiz');
  if (intro) intro.style.display = 'none';
  if (colunasView) colunasView.style.display = 'none';
  if (quiz) quiz.style.display = '';
  window.renderDiscTeste();
};

function validarTelaDiscAtual() {
  const st = window._discTeste;
  const respostas = st.respostas[st.tela];
  const avisoEl = document.getElementById('disc-teste-aviso');
  if (respostas.some(v => v === null)) {
    if (avisoEl) { avisoEl.textContent = 'Preencha as 4 notas antes de continuar.'; avisoEl.style.display = ''; }
    return false;
  }
  if (new Set(respostas).size !== 4) {
    if (avisoEl) { avisoEl.textContent = 'Repetição de números não é permitido'; avisoEl.style.display = ''; }
    return false;
  }
  if (avisoEl) avisoEl.style.display = 'none';
  return true;
}

window.selecionarNotaDisc = function(blocoIdx, nota) {
  const st = window._discTeste;
  st.respostas[st.tela][blocoIdx] = nota;
  window.renderDiscTeste();
};

window.avancarDiscTeste = function() {
  if (!validarTelaDiscAtual()) return;
  if (window._discTeste.tela < 9) {
    window._discTeste.tela++;
    window.renderDiscTeste();
  }
};

window.voltarDiscTeste = function() {
  const avisoEl = document.getElementById('disc-teste-aviso');
  if (avisoEl) avisoEl.style.display = 'none';
  if (window._discTeste.tela > 0) {
    window._discTeste.tela--;
    window.renderDiscTeste();
  }
};

window.enviarTesteDisc = function() {
  if (!validarTelaDiscAtual()) return;

  // Soma as notas por tipo: bloco 0=Executor (linhas 1–10), 1=Comunicador (11–20),
  // 2=Planejador (21–30), 3=Analista (31–40) — mesma ordem usada em gerarMatrizDisc()
  const rotulos = ['Executor', 'Comunicador', 'Planejador', 'Analista'];
  const somas = [0, 0, 0, 0];
  window._discTeste.respostas.forEach(respostasTela => {
    respostasTela.forEach((nota, i) => { somas[i] += (nota || 0); });
  });

  const ranking = rotulos
    .map((rotulo, i) => ({ rotulo, soma: somas[i] }))
    .sort((a, b) => b.soma - a.soma);

  const perfil = `${ranking[0].rotulo} + ${ranking[1].rotulo}`;

  // Guarda o resultado para o PDF de "Baixar Respostas"
  window._discResultado = { perfil, ranking };

  const container = document.getElementById('disc-teste-quiz');
  if (container) {
    container.innerHTML = `
      <div class="form-card" style="text-align:center;padding:48px 24px">
        <div style="font-size:40px;margin-bottom:16px">✅</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:8px">Teste enviado!</div>
        <div style="font-size:14px;color:var(--text3);margin-bottom:20px">Obrigado por concluir a avaliação de Perfil DISC.</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:20px">Seu Perfil Disc é ${perfil}</div>
        <button class="btn btn-primary" onclick="baixarRespostasDisc()">⬇ Baixar Respostas</button>
      </div>`;
  }
  showToast('Teste DISC enviado!');
};

window.baixarRespostasDisc = function() {
  if (!window.jspdf || !window._discMatriz || !window._discTeste || !window._discResultado) {
    showToast('Não foi possível gerar o PDF.');
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const margemEsq = 14;
  let y = 18;

  doc.setFontSize(16);
  doc.setFont(undefined, 'bold');
  doc.text('Respostas — Teste de Perfil Comportamental DISC', margemEsq, y);
  y += 10;

  doc.setFontSize(11);
  doc.setFont(undefined, 'normal');

  window._discMatriz.forEach((linha, tela) => {
    const respostasTela = window._discTeste.respostas[tela];
    linha.forEach((item, i) => {
      const texto = `Nº ${item.numero} (${item.rotulo}): ${item.texto} — Nota: ${respostasTela[i]}`;
      const linhasQuebradas = doc.splitTextToSize(texto, 180);
      if (y + linhasQuebradas.length * 6 > 280) { doc.addPage(); y = 18; }
      doc.text(linhasQuebradas, margemEsq, y);
      y += linhasQuebradas.length * 6;
    });
    y += 2;
  });

  if (y > 260) { doc.addPage(); y = 18; }
  y += 6;
  doc.setFont(undefined, 'bold');
  doc.setFontSize(13);
  doc.text(`Resultado: Seu Perfil Disc é ${window._discResultado.perfil}`, margemEsq, y);
  y += 8;
  doc.setFont(undefined, 'normal');
  doc.setFontSize(11);
  window._discResultado.ranking.forEach(r => {
    doc.text(`${r.rotulo}: ${r.soma} pontos`, margemEsq, y);
    y += 6;
  });

  doc.save('respostas-teste-disc.pdf');
};

window.renderDiscTeste = function() {
  const container = document.getElementById('disc-teste-quiz');
  if (!container) return;
  const st = window._discTeste;
  const linha = window._discMatriz[st.tela];
  const respostasTela = st.respostas[st.tela];

  const blocoHtml = linha.map((item, i) => `
    <div class="table-card" style="display:flex;align-items:center;gap:16px;padding:14px 18px;margin-bottom:10px">
      <div style="flex:1;font-size:14px">${item.texto}</div>

            style="width:36px;height:36px;border-radius:4px;border:1px solid var(--border);font-weight:700;font-size:14px;cursor:pointer;background:${respostasTela[i] === n ? '#111' : '#fff'};color:${respostasTela[i] === n ? '#fff' : '#111'}">${n}</button>`).join('')}
      </div>
    </div>`).join('');

  container.innerHTML = `
    <div class="form-card">
      <div style="font-size:16px;font-weight:700;margin-bottom:4px">Exibição ${st.tela + 1} de 10</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:16px">Atribua as notas de 1 a 4 sem repetir entre os 4 blocos abaixo.</div>
      ${blocoHtml}
      <div id="disc-teste-aviso" style="display:none;color:var(--danger);font-size:13px;font-weight:600;margin:12px 0"></div>
      <div style="display:flex;justify-content:space-between;margin-top:16px">
        <button class="btn" onclick="voltarDiscTeste()" ${st.tela === 0 ? 'disabled style="opacity:.4;cursor:not-allowed"' : ''}>← Voltar</button>
        ${st.tela < 9
          ? `<button class="btn btn-primary" onclick="avancarDiscTeste()">Próxima Exibição →</button>`
          : `<button class="btn btn-primary" onclick="enviarTesteDisc()">Enviar Teste</button>`}

    </div>`;
};

window.copiarLinkDiscInterno = function(link) {
  navigator.clipboard.writeText(link).then(() => showToast('Link copiado!')).catch(() => showToast('Não foi possível copiar o link.', 'danger'));
};

// Monta o link de WhatsApp convidando o colaborador interno a responder a
// avaliação de Perfil DISC (mesma mensagem usada para candidatos, adaptada).
function linkWhatsappAvaliacaoColaborador(numero, nomeColaborador, cargoNome, link) {
  let digits = String(numero || '').replace(/\D/g, '');
  if (!digits) return null;
  if (!digits.startsWith('55')) digits = '55' + digits;
  const mensagem = `Olá, ${nomeColaborador || ''}! Para seguir com sua avaliação interna${cargoNome ? ` de ${cargoNome}` : ''} na Minart Móveis, acesse o link abaixo e responda a avaliação de Perfil DISC — o link só pode ser respondido uma vez:\n${link}`;
  return `https://wa.me/${digits}?text=${encodeURIComponent(mensagem)}`;
}

window.salvarDisparoColaboradorInterno = async function() {
  const idColaborador = document.getElementById('disp-disc-colaborador').value;
  if (!idColaborador) return showToast('Selecione o colaborador.');

  const colab = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador) === String(idColaborador));
  if (!colab) return showToast('Colaborador não encontrado.', 'danger');

  const btn = document.getElementById('disp-disc-btn-salvar');
  if (btn) { btn.disabled = true; btn.textContent = 'Disparando...'; }

  try {
    const token = await gerarTokenUnico('testes_avaliacoes', 'token', () => crypto.randomUUID());
    const { error } = await supaClient.from('testes_avaliacoes').insert([{
      token,
      id_colaborador: colab.id_colaborador,
      id_cargo: colab.id_cargos,
      nome_colaborador: colab.nome_colaborador,
      status_realizacao: 'pendente'
    }]);
    if (error) throw error;

    document.getElementById('disparo-disc-interno-modal').style.display = 'none';
    await loadTestesAvaliacoesForApp();
    if (window._renderDiscInterno) window._renderDiscInterno();
    showToast('Disparo criado! Copie o link na tabela para enviar ao colaborador.');
  } catch (e) {
    console.error('Erro ao disparar avaliação para colaborador interno:', e);
    showToast('Erro ao disparar avaliação: ' + (e.message || e));
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Disparar'; }
  }
};

function aplicarFiltrosCandidatos(lista, filtro) {
  if (!filtro) return lista;
  return lista.filter(c => {
    if (filtro.busca) {
      const q = filtro.busca.trim().toLowerCase();
      if (q && !(c.nome_candidato || '').toLowerCase().includes(q)) return false;
    }
    if (filtro.vaga && String(c.id_vagas) !== String(filtro.vaga)) return false;
    if (filtro.status) {
      const valor = c.status_antecedente || '';
      if (filtro.status === '__sem_status__') {
        if (valor) return false;
      } else if (filtro.status === 'Outro') {
        if (!valor || valor === 'Nada Consta') return false;
      } else if (valor !== filtro.status) {
        return false;
      }
    }
    if (filtro.dataIni) {
      const d = c.data_envio_candidatura ? new Date(c.data_envio_candidatura) : null;
      if (!d || d < new Date(filtro.dataIni)) return false;
    }
    if (filtro.dataFim) {
      const d = c.data_envio_candidatura ? new Date(c.data_envio_candidatura) : null;
      if (!d || d > new Date(filtro.dataFim + 'T23:59:59')) return false;
    }
    return true;
  });
}

// Os filtros de candidatos são reaproveitados pelas 3 abas (Candidatos,
// Candidatos para Avaliação, Candidatos para Entrevista) — esses 3 helpers
// resolvem qual filtro/prefixo/render usar a partir do "escopo" de cada aba,
// em vez de duplicar a barra de filtros e a lógica de estado em cada página.
function filtroCandidatosDoEscopo(escopo) {
  if (escopo === 'aprovados') return window._candidatosAprovadosFiltro;
  if (escopo === 'entrevista') return window._candidatosEntrevistaFiltro;
  return window._candidatosFiltro;
}
function prefixFiltroCandidatos(escopo) {
  if (escopo === 'aprovados') return 'cand-aprov-filtro';
  if (escopo === 'entrevista') return 'cand-entr-filtro';
  return 'cand-filtro';
}
function rerenderCandidatosDoEscopo(escopo) {
  if (escopo === 'aprovados') { if (window._renderCandidatosAprovados) window._renderCandidatosAprovados(); }
  else if (escopo === 'entrevista') { if (window._renderCandidatosEntrevista) window._renderCandidatosEntrevista(); }
  else { if (window._renderCandidatos) window._renderCandidatos(); }
}

window.atualizarFiltroCandidatos = function(escopo, campo, valor) {
  const filtro = filtroCandidatosDoEscopo(escopo);
  if (!filtro) return;
  filtro[campo] = valor;
  rerenderCandidatosDoEscopo(escopo);
};

window.limparFiltrosCandidatos = function(escopo) {
  const filtro = filtroCandidatosDoEscopo(escopo);
  if (!filtro) return;
  filtro.busca = '';
  filtro.vaga = '';
  filtro.status = '';
  filtro.dataIni = '';
  filtro.dataFim = '';
  const prefix = prefixFiltroCandidatos(escopo);
  ['busca', 'vaga', 'status', 'data-ini', 'data-fim'].forEach(campo => {
    const el = document.getElementById(`${prefix}-${campo}`);
    if (el) el.value = '';
  });
  rerenderCandidatosDoEscopo(escopo);
};

function pageCandidatos() {
  if (!window._vagas) window._vagas = [];
  if (!window._candidaturas) window._candidaturas = [];
  if (!window._candidatosFiltro) window._candidatosFiltro = { busca: '', vaga: '', status: '', dataIni: '', dataFim: '' };
  if (!window._candidatosOrdem) window._candidatosOrdem = 'recentes';

  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary" onclick="abrirModalEmitirAntecedente()">+ Emitir Antecedente</button>`;

  window.ordenarCandidatos = function(valor) {
    window._candidatosOrdem = valor;
    renderCandidatos();
  };

  const renderCandidatos = () => {
    const container = document.getElementById('candidatos-container');
    if (!container) return;

    const candidaturasFiltradas = aplicarFiltrosCandidatos(window._candidaturas, window._candidatosFiltro);

    const candidaturasOrdenadas = [...candidaturasFiltradas].sort((a, b) => {
      const da = a.data_envio_candidatura ? new Date(a.data_envio_candidatura) : new Date(0);
      const db = b.data_envio_candidatura ? new Date(b.data_envio_candidatura) : new Date(0);
      return window._candidatosOrdem === 'antigas' ? da - db : db - da;
    });

    // Agrupa candidaturas por vaga
    const grupos = window._vagas.map((v) => {
      const cands = candidaturasOrdenadas.filter(c => c.id_vagas === v.id_vagas);
      return { vaga: v, cands };
    }).filter(g => g.cands.length > 0);

    if (grupos.length === 0) {
      const filtroAtivo = window._candidatosFiltro && (window._candidatosFiltro.busca || window._candidatosFiltro.vaga || window._candidatosFiltro.status || window._candidatosFiltro.dataIni || window._candidatosFiltro.dataFim);
      container.innerHTML = `<div class="empty-state">
        <div class="empty-state-icon">📋</div>
        <div class="empty-state-title">${filtroAtivo ? 'Nenhum candidato encontrado' : 'Nenhum candidato ainda'}</div>
        <div class="empty-state-desc">${filtroAtivo ? 'Ajuste ou limpe os filtros para ver outros candidatos.' : 'Quando alguém preencher o formulário de uma vaga, aparecerá aqui agrupado por vaga.'}</div>
      </div>`;
      return;
    }

    container.innerHTML = grupos.map(g => {
      const aberta = g.vaga.status === 'aberta';
      return `
      <div class="table-card" style="margin-bottom:16px">
        <div class="table-header" style="cursor:pointer" onclick="toggleCandidatosVaga(${g.vaga.id_vagas})">
          <div>

window.onChangeStatusAntecedente = async function(idCandidatura, valor) {
  const outroInput = document.getElementById(`status-antecedente-outro-${idCandidatura}`);
  if (valor === 'Outro') {
    if (outroInput) { outroInput.style.display = ''; outroInput.value = ''; outroInput.focus(); }
    return;
  }
  if (outroInput) { outroInput.style.display = 'none'; outroInput.value = ''; }
  await salvarStatusAntecedente(idCandidatura, valor || null);
};

window.salvarStatusAntecedenteOutro = async function(idCandidatura, texto) {
  await salvarStatusAntecedente(idCandidatura, texto.trim() || null);
};

async function salvarStatusAntecedente(idCandidatura, valor) {
  try {
    const { error } = await supaClient.from('candidaturas').update({ status_antecedente: valor }).eq('id_candidaturas', idCandidatura);
    if (error) throw error;
    const cand = (window._candidaturas || []).find(c => c.id_candidaturas === idCandidatura);
    if (cand) cand.status_antecedente = valor;
    showToast('Status de antecedente salvo.');
  } catch (e) {
    console.error('Erro ao salvar status de antecedente:', e);
    showToast('Erro ao salvar status de antecedente: ' + (e.message || e));
  }
}

window.filtrarCandidatosAntecedente = function(query) {
  const resultados = document.getElementById('emitir-antecedente-resultados');
  if (!resultados) return;
  const q = String(query || '').trim().toLowerCase();
  const todos = [...(window._candidaturas || [])].sort((a, b) => (a.nome_candidato || '').localeCompare(b.nome_candidato || '', 'pt-BR'));
  const matches = q ? todos.filter(c => (c.nome_candidato || '').toLowerCase().includes(q)) : todos;
  resultados.innerHTML = matches.length
    ? matches.map(c => `<div style="padding:8px 12px;cursor:pointer;font-size:13px" onmouseover="this.style.background='var(--bg2, #f5f5f5)'" onmouseout="this.style.background=''" onclick="selecionarCandidatoAntecedente(${c.id_candidaturas})">${c.nome_candidato || 'Sem nome'}</div>`).join('')
    : `<div style="padding:8px 12px;color:var(--text3);font-size:13px">Nenhum candidato encontrado.</div>`;
  resultados.style.display = 'block';
};

  if (!cand) return;

  if (busca) busca.value = cand.nome_candidato || '';
  const resultados = document.getElementById('emitir-antecedente-resultados');
  if (resultados) { resultados.style.display = 'none'; resultados.innerHTML = ''; }

  const dados = document.getElementById('emitir-antecedente-dados');
  document.getElementById('emitir-ant-nome').textContent = cand.nome_candidato || '—';
  document.getElementById('emitir-ant-cpf').textContent = cand.cpf || '—';
  document.getElementById('emitir-ant-nascimento').textContent = formatarDataBR(cand.data_nascimento) || '—';
  document.getElementById('emitir-ant-mae').textContent = cand.nome_da_mae || '—';
  if (dados) dados.style.display = 'flex';

  try {
    const { data, error } = await supaClient.from('internos').select('id_drive').eq('nome', 'Busca').maybeSingle();

    if (data && data.id_drive) {

window.aprovarCandidatoAvaliacao = async function(idCandidatura) {
  try {
    const { data, error } = await supaClient.from('candidaturas').update({ aprovado_avaliacao: true }).eq('id_candidaturas', idCandidatura).select();
    if (error) throw error;
    if (!data || data.length === 0) throw new Error('Nenhuma linha foi atualizada (verifique a policy de UPDATE da tabela candidaturas no Supabase).');
    await loadCandidaturasForApp();
    if (window._renderCandidatos) window._renderCandidatos();

    const cand = data[0];
    const vaga = (window._vagas || []).find(v => v.id_vagas === cand.id_vagas);
    const idCargo = cand.id_cargos || (vaga ? vaga.id_cargos : null);

    // Cria o registro da avaliação (token de acesso único, sem login) já existente
    // ou cria um novo caso ainda não exista para este candidato.
    const { data: existente } = await supaClient.from('testes_avaliacoes').select('token').eq('id_candidato', cand.id_candidaturas).limit(1).maybeSingle();
    let token = existente?.token;
    if (!token) {
      token = await gerarTokenUnico('testes_avaliacoes', 'token', () => crypto.randomUUID());
      const { error: insertError } = await supaClient.from('testes_avaliacoes').insert([{
        token,
        id_candidato: cand.id_candidaturas,
        id_cargo: idCargo,
        nome_candidato: cand.nome_candidato || null,
        status_realizacao: 'pendente'
      }]);
      if (insertError) throw insertError;
    } else {
      // Registro já existia (ex.: criado antes desta coluna existir): garante que
      // nome_candidato/id_cargo fiquem preenchidos para a geração dos .docx.
      await supaClient.from('testes_avaliacoes')
        .update({ nome_candidato: cand.nome_candidato || null, id_cargo: idCargo })
        .eq('token', token);
    }

    window.showAcoesEnvioBanner();
  } catch (e) {
    console.error('Erro ao aprovar candidato para avaliação:', e);
    showToast('Erro ao aprovar candidato: ' + (e.message || e));
  }
};

  }
}

function pageCandidatosAprovados() {

  document.getElementById('topbar-actions').innerHTML = '';

    const container = document.getElementById('candidatos-aprovados-container');
    if (!container) return;

    const aprovados = window._candidaturas.filter(c => candidatoAprovado(c));
    const aprovadosFiltrados = aplicarFiltrosCandidatos(aprovados, window._candidatosAprovadosFiltro);

    const grupos = window._vagas.map((v) => {
      const cands = aprovadosFiltrados.filter(c => c.id_vagas === v.id_vagas);
      return { vaga: v, cands };
    }).filter(g => g.cands.length > 0);

    if (grupos.length === 0) {
      const filtroAtivo = window._candidatosAprovadosFiltro && (window._candidatosAprovadosFiltro.busca || window._candidatosAprovadosFiltro.vaga || window._candidatosAprovadosFiltro.status || window._candidatosAprovadosFiltro.dataIni || window._candidatosAprovadosFiltro.dataFim);

      </div>`;
      return;
    }

    container.innerHTML = grupos.map(g => {
      const aberta = g.vaga.status === 'aberta';
      return `
      <div class="table-card" style="margin-bottom:16px">
        <div class="table-header" style="cursor:pointer" onclick="toggleCandidatosAprovadosVaga(${g.vaga.id_vagas})">

        <div id="candidatos-aprovados-tabela-${g.vaga.id_vagas}" style="display:none">
        <div style="overflow-x:auto">
        <table style="white-space:nowrap">
          <thead>${theadCandidatosAprovadosHtml()}</thead>
          <tbody>${corpoTabelaCandidatosAprovados(g.cands, g.vaga)}</tbody>
        </table>
        </div>
        </div>
      </div>
    `;
    }).join('');
  };

  window._renderCandidatosAprovados = renderAprovados;
  Promise.all([loadVagasForApp(), loadCandidaturasForApp(), loadTestesAvaliacoesForApp()]).then(renderAprovados);

  return `
  ${candidatoDetalheModalHtml()}

  ${filtrosCandidatosBarHtml('cand-aprov-filtro', 'aprovados', window._candidatosAprovadosFiltro)}

  <div id="candidatos-aprovados-container">
    <div class="empty-state">
      <div class="empty-state-icon">📋</div>
      <div class="empty-state-title">Carregando...</div>
    </div>
  </div>`;

window.removerCandidatoAvaliacao = async function(idCandidatura) {
  try {
    const { data, error } = await supaClient.from('candidaturas').update({ aprovado_avaliacao: false }).eq('id_candidaturas', idCandidatura).select();
    if (error) throw error;
    if (!data || data.length === 0) throw new Error('Nenhuma linha foi atualizada (verifique a policy de UPDATE da tabela candidaturas no Supabase).');

    const { error: delError } = await supaClient.from('testes_avaliacoes').delete().eq('id_candidato', idCandidatura);
    if (delError) throw delError;

    await loadCandidaturasForApp();
    await loadTestesAvaliacoesForApp();
    if (window._renderCandidatosAprovados) window._renderCandidatosAprovados();
    if (window._renderCandidatosEntrevista) window._renderCandidatosEntrevista();
    if (window._renderCandidatos) window._renderCandidatos();
    showToast('Candidato removido da avaliação.');
  } catch (e) {
    console.error('Erro ao remover candidato da avaliação:', e);
    showToast('Erro ao remover candidato: ' + (e.message || e));
  }
};

window.abrirDadosPessoaisDoColaborador = async function(idColaborador) {
  const registro = (window._dadosPessoaisEpi || []).find(d => String(d.id_colaborador) === String(idColaborador));
  if (registro) {
    await openDadosPessoaisModal(registro.id);
  } else {
    await openDadosPessoaisModal();
    const sel = document.getElementById('dp-colaborador');
    if (sel) { sel.value = idColaborador; preencherSalarioDadosPessoais(idColaborador); }
  }
};

window.ativarColaboradorAdmissao = async function(idColaborador) {
  if (!confirm('Marcar este colaborador como Ativo? Confirme antes que os dados e documentos já foram conferidos.')) return;
  try {
    const { error } = await supaClient.from('colaboradores').update({ status_colaborador: 'Ativo' }).eq('id_colaborador', idColaborador);
    if (error) throw error;
    await loadColaboradoresFromSupabase();
    if (window._renderAdmissoes) window._renderAdmissoes();
    showToast('Colaborador marcado como Ativo!');
  } catch (e) {
    console.error('Erro ao ativar colaborador:', e);
    showToast('Erro ao ativar colaborador: ' + (e.message || e));
  }
};

window.toggleOrigemAdmissao = function(value) {
  const sel = document.getElementById('adm-candidato-select');
  const nomeEl = document.getElementById('adm-nome');
  if (!sel || !nomeEl) return;
  if (value === 'candidato') {
    sel.style.display = '';
  } else {
    sel.style.display = 'none';
    sel.value = '';
    nomeEl.value = '';
    window._admTesteSelecionado = null;
  }
};

window.onCargoChangeAdmissao = function() {
  const selCargo = document.getElementById('adm-cargo');
  const salarioEl = document.getElementById('adm-salario');
  const cargo = (window._cargos || []).find(c => String(c[window._cargoIdField] || c.id_cargo || c.id || c.id_cargos) === String(selCargo.value));
  if (cargo && cargo.salario_base !== undefined && cargo.salario_base !== null && String(cargo.salario_base) !== '') {
    salarioEl.value = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(cargo.salario_base);
  } else {
    salarioEl.value = '';
  }
};

window.toggleTipoContratoAdmissao = function(value) {
  const periodoWrap = document.getElementById('adm-periodo-wrap');
  const prorrogacaoWrap = document.getElementById('adm-prorrogacao-wrap');
  const mostrar = value === 'Temporária';
  periodoWrap.style.display = mostrar ? '' : 'none';
  prorrogacaoWrap.style.display = mostrar ? '' : 'none';
  if (!mostrar) {
    document.getElementById('adm-periodo').value = '';
    document.getElementById('adm-prorrogacao').value = '';
  }
};

window.preencherAdmissaoDoCandidato = function(idTeste) {
  if (!idTeste) { window._admTesteSelecionado = null; return; }
  const teste = (window._testesAvaliacoes || []).find(t => String(t.id) === String(idTeste));
  if (!teste) { window._admTesteSelecionado = null; return; }
  window._admTesteSelecionado = teste;
  const cand = (window._candidaturas || []).find(c => c.id_candidaturas === teste.id_candidato);

  document.getElementById('adm-nome').value = teste.nome_candidato || (cand ? cand.nome_candidato : '') || '';

  if (teste.id_cargo) {
    const selCargo = document.getElementById('adm-cargo');
    selCargo.value = teste.id_cargo;
    onCargoChangeAdmissao();
  }
  if (cand) {
    document.getElementById('adm-telefone').value = cand.numero || '';
    document.getElementById('adm-cpf').value = cand.cpf || '';
    document.getElementById('adm-nascimento').value = cand.data_nascimento || '';
  }
};

window.salvarCriarAdmissao = async function() {
  const nome = document.getElementById('adm-nome').value.trim();
  const idCargo = document.getElementById('adm-cargo').value;
  const desde = document.getElementById('adm-desde').value;
  const tipoContrato = document.getElementById('adm-tipo-contrato').value;
  const salarioRaw = document.getElementById('adm-salario').value;
  const salarioNum = salarioRaw ? parseFloat(String(salarioRaw).replace(/\./g,'').replace(/,/g,'.').replace(/[^0-9.\-]/g,'')) : null;

  if (!nome || !idCargo || !desde || !tipoContrato) {
    return showToast('Preencha Nome, Cargo, Data de Admissão e Tipo de Contrato.');
  }

  const novoColaborador = {
    nome_colaborador: nome,
    id_cargos: idCargo,
    desde,
    status_colaborador: 'Pendente Documentação',
    tipo_de_contrato: tipoContrato,
    periodo_contrato: tipoContrato === 'Temporária' ? (document.getElementById('adm-periodo').value || null) : null,
    prorrogacao_contrato: tipoContrato === 'Temporária' ? (document.getElementById('adm-prorrogacao').value || null) : null,
  };
  if (salarioNum !== null && !isNaN(salarioNum)) novoColaborador.salario_base = salarioNum;

  const btn = document.getElementById('adm-btn-salvar');
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }

  let novoId;
  try {
    const { data, error } = await supaClient.from('colaboradores').insert([novoColaborador]).select().single();
    if (error) throw error;
    if (!data) throw new Error('Nenhum colaborador retornado após o insert (verifique a policy de SELECT/INSERT da tabela colaboradores no Supabase).');
    novoId = data.id_colaborador;
  } catch (e) {
    console.error('Erro ao criar colaborador da admissão:', e);
    showToast('Erro ao criar colaborador: ' + (e.message || e));
    if (btn) { btn.disabled = false; btn.textContent = 'Salvar Admissão'; }
    return;
  }

  const dadosPayload = {
    id_colaborador: novoId,
    cpf: document.getElementById('adm-cpf').value || null,
    rg: document.getElementById('adm-rg').value || null,
    data_nascimento: document.getElementById('adm-nascimento').value || null,
    telefone: document.getElementById('adm-telefone').value || null,
    email: document.getElementById('adm-email').value || null,
    endereco: document.getElementById('adm-endereco').value || null,
    telefone_emergencia: document.getElementById('adm-tel-emergencia').value || null,
    estado_civil: document.getElementById('adm-estado-civil').value || null,
    escolaridade: document.getElementById('adm-escolaridade').value || null,
    pix: document.getElementById('adm-pix').value || null,
    funcao: document.querySelector('#adm-cargo option:checked')?.textContent || null,
    epi_camisa: document.getElementById('adm-epi-camisa').value || null,
    epi_calca: document.getElementById('adm-epi-calca').value || null,
    epi_botina: document.getElementById('adm-epi-botina').value || null,
    epi_jaleco: document.getElementById('adm-epi-jaleco').value || null,
    epi_luva_raspa: document.getElementById('adm-epi-luva-raspa').value || null,
    epi_luva_lavagem: document.getElementById('adm-epi-luva-lavagem').value || null,
  };

  try {
    const { data: insertedDados, error: errorDados } = await supaClient.from('dados_pessoais_epi').insert([dadosPayload]).select();
    if (errorDados) throw errorDados;
    if (!insertedDados || insertedDados.length === 0) {
      throw new Error('Nenhuma linha foi inserida em dados_pessoais_epi (verifique a policy de INSERT dessa tabela no Supabase).');
    }
  } catch (e) {
    console.error('Erro ao salvar dados pessoais/EPIs da admissão:', e);
    showToast('Colaborador criado, mas falhou ao salvar Dados Pessoais/EPIs: ' + (e.message || e));
    if (btn) { btn.disabled = false; btn.textContent = 'Salvar Admissão'; }
    return;
  }

  // Quando a admissão veio de "Selecionar Candidato da Avaliação", replica o
  // resultado do Perfil DISC (testes_avaliacoes.resultado_perfil_disc_1/2)
  // para mapeamento_perfil — o colaborador acabou de ser criado, então não
  // existe registro prévio: é sempre um insert. Falha aqui não desfaz a
  // admissão, que já foi criada com sucesso.
  const testeSelecionado = window._admTesteSelecionado;
  if (testeSelecionado && (testeSelecionado.resultado_perfil_disc_1 || testeSelecionado.resultado_perfil_disc_2)) {
    try {
      const { error: errorPerfil } = await supaClient.from('mapeamento_perfil').insert([{
        id_colaborador: novoId,
        perfil_disc_1: testeSelecionado.resultado_perfil_disc_1 || null,
        perfil_disc_2: testeSelecionado.resultado_perfil_disc_2 || null,
      }]);
      if (errorPerfil) throw errorPerfil;
    } catch (e) {
      console.error('Erro ao replicar Perfil DISC em mapeamento_perfil:', e);
      showToast('Admissão criada, mas falhou ao registrar o Perfil DISC em Mapeamento de Perfil: ' + (e.message || e));
    }
  }
  window._admTesteSelecionado = null;

  await loadColaboradoresFromSupabase();
  await loadDadosPessoaisEpiForApp();

  showToast('Admissão criada! Agora envie os documentos do colaborador.');

  // Trava os dados já salvos e libera a seção de Documentos (precisa do colaborador já existir)
  document.querySelectorAll('#content-area input, #content-area select').forEach(el => el.disabled = true);
  if (btn) btn.style.display = 'none';
  const docCard = document.getElementById('adm-documentos-card');
  docCard.style.display = '';
  document.getElementById('adm-btn-enviar-doc').onclick = () => openEnviarDocModal(novoId);
  document.getElementById('adm-btn-ver-docs').onclick = () => openDocColabModal(novoId);
};

function pageVagas() {
  if (!window._vagas) window._vagas = [];
  if (!window._vagasOrdem) window._vagasOrdem = 'recentes';

  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary" onclick="openVagaModal()">+ Abrir Vaga</button>`;

  window.ordenarVagas = function(valor) {
    window._vagasOrdem = valor;
    renderVagasTabela();
  };

  const renderVagasTabela = () => {
    const tbody = document.getElementById('vagas-tbody');
    if (!tbody) return;
    const lista = [...window._vagas].sort((a, b) => {
      const da = a.data_abertura ? new Date(a.data_abertura) : new Date(0);
      const db = b.data_abertura ? new Date(b.data_abertura) : new Date(0);
      return window._vagasOrdem === 'antigas' ? da - db : db - da;
    });
    tbody.innerHTML = lista.length === 0
      ? '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text3)">Nenhuma vaga cadastrada</td></tr>'
      : lista.map((v) => {
          const link = `${location.origin}${location.pathname}?candidatura=${v['link-token']}`;
          const aberta = v.status === 'aberta';
          const totalCandidatos = (window._candidaturas || []).filter(c => c.id_vagas === v.id_vagas).length;
          return `
            <tr>
              <td><strong>${nomeCargoPorId(v.id_cargos)}</strong></td>
              <td>${v.data_abertura ? new Date(v.data_abertura).toLocaleDateString('pt-BR') : '—'}</td>
              <td>${v.prazo ? new Date(v.prazo).toLocaleDateString('pt-BR') : '—'}</td>
              <td><span class="badge badge-info">${totalCandidatos}</span></td>
              <td><span class="badge ${aberta ? 'badge-active' : 'badge-inactive'}">${v.status}</span></td>
              <td>
                <div style="display:flex;align-items:center;gap:6px">
                  <input
                    type="text"
                    value="${link}"
                    readonly
                    style="font-size:11px;padding:4px 8px;border:1px solid var(--border);border-radius:3px;background:var(--bg2);width:220px;color:var(--text2);cursor:default"
                  >
                  <button class="btn btn-sm" onclick="copiarLinkVaga(${v.id_vagas})" title="Copiar link">📋</button>
                </div>
              </td>
              <td>
                ${aberta
                  ? `<button class="action-btn" title="Encerrar" onclick="encerrarVaga(${v.id_vagas})">🔒</button>`
                  : `<button class="action-btn" title="Reabrir" onclick="reabrirVaga(${v.id_vagas})">🔓</button>`}
                <button class="action-btn" onclick="showToast('Visualizando')">👁</button>
                <button class="action-btn" title="Excluir" onclick="deletarVaga(${v.id_vagas})" style="color:var(--danger)">✕</button>
              </td>
            </tr>`;
        }).join('');
  };

  window._renderVagasTabela = renderVagasTabela;
  Promise.all([loadVagasForApp(), loadCandidaturasForApp()]).then(() => {
    renderVagasTabela();
    document.getElementById('vagas-pagination').innerHTML = `<span>${window._vagas.length} vagas</span>`;
  });

  return `
  <div id="vaga-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:6px;padding:32px;width:480px;max-width:95vw;box-shadow:0 8px 40px rgba(0,0,0,.18)">
      <div style="font-size:15px;font-weight:700;margin-bottom:20px">Abrir Nova Vaga</div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Cargo</label>
        <select class="form-select" id="vaga-cargo">
          <option value="">— Selecione o Cargo —</option>
          ${(window._cargos||[]).map(cargo => {
            const id = cargo[window._cargoIdField];
            const nome = cargo[window._cargoNameField] || cargo.nome_cargo || cargo.nome || '';
            return `<option value="${id}">${nome}</option>`;
          }).join('')}
        </select>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Prazo</label>
        <input class="form-input" type="date" id="vaga-prazo">
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">
        <button class="btn" onclick="document.getElementById('vaga-modal').style.display='none'">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarVaga()">Salvar</button>
      </div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Vagas em Aberto</span>
      <input class="search-input" placeholder="Buscar vaga..." oninput="filtrarVagas(this.value)" style="margin-left:12px">
      <select class="form-select" style="width:auto;margin-left:8px" onchange="ordenarVagas(this.value)">
        <option value="recentes" ${window._vagasOrdem !== 'antigas' ? 'selected' : ''}>Mais recentes</option>
        <option value="antigas" ${window._vagasOrdem === 'antigas' ? 'selected' : ''}>Mais antigas</option>
      </select>
    </div>
    <table>
      <thead>
        <tr>
          <th>Vaga</th>
          <th>Abertura</th>
          <th>Prazo</th>

          <th>Status</th>

          <th>Ações</th>

      </thead>
      <tbody id="vagas-tbody">
        <tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text3)">Carregando...</td></tr>
      </tbody>
    </table>
    <div class="table-pagination" id="vagas-pagination"><span>${window._vagas.length} vagas</span></div>
  </div>`;
}

window.filtrarVagas = function(query) {
  const q = String(query || '').trim().toLowerCase();
  const rows = document.querySelectorAll('#vagas-tbody tr');
  let count = 0;
  rows.forEach(row => {
    const vaga = row.querySelector('td:first-child')?.textContent?.toLowerCase() || '';
    const visible = !q || vaga.includes(q);
    row.style.display = visible ? '' : 'none';
    if (visible) count++;
  });
  const pag = document.querySelector('#vagas-pagination span');
  if (pag) pag.textContent = `${count} vagas`;
};

window.copiarLinkVaga = function(id) {
  const v = window._vagas.find(v => v.id_vagas === id);
  if (!v) return;
  const link = `${location.origin}${location.pathname}?candidatura=${v['link-token']}`;
  navigator.clipboard.writeText(link).then(() => {
    showToast('Link copiado para a área de transferência!');
  }).catch(() => {
    // fallback para navegadores sem suporte
    const el = document.createElement('textarea');
    el.value = link;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('Link copiado!');
  });
};

window.encerrarVaga = async function(id) {
  const { error } = await supaClient.from('vagas').update({ status: 'fechado' }).eq('id_vagas', id);
  if (error) {
    console.error('Erro ao encerrar vaga:', error.message);
    showToast('Erro ao encerrar vaga.');
    return;
  }
  await loadVagasForApp();
  window._renderVagasTabela();
  document.getElementById('vagas-pagination').innerHTML =
    `<span>${window._vagas.length} vagas</span>`;
  showToast('Vaga encerrada.');
};

window.reabrirVaga = async function(id) {
  const { error } = await supaClient.from('vagas').update({ status: 'aberta' }).eq('id_vagas', id);
  if (error) {
    console.error('Erro ao reabrir vaga:', error.message);
    showToast('Erro ao reabrir vaga.');
    return;
  }
  await loadVagasForApp();
  window._renderVagasTabela();
  showToast('Vaga reaberta.');
};

window.deletarVaga = async function(id) {
  if (!confirm('Excluir esta vaga?')) return;
  const { error } = await supaClient.from('vagas').delete().eq('id_vagas', id);
  if (error) {
    console.error('Erro ao excluir vaga:', error.message);
    showToast('Erro ao excluir vaga.');
    return;
  }
  await loadVagasForApp();

window.ordenarCargosTabela = function(valor) {
  window._cargosOrdem = valor;
  renderCargosTabela();
};

window.renderCargosTabela = function renderCargosTabela() {
  const tbody = document.getElementById('cargos-tbody');
  if (!tbody) return;
  if (!window._cargosOrdem) window._cargosOrdem = 'cargo';

  const cargosArr = [...(Array.isArray(window._cargos) ? window._cargos : (window._cargos ? Object.values(window._cargos) : []))];
  const nomeDe = (cargo) => cargo[window._cargoNameField] || cargo.nome_cargo || cargo.nome || '';
  const salarioDe = (cargo) => (cargo.salario_base !== undefined && cargo.salario_base !== null && String(cargo.salario_base) !== '') ? parseFloat(cargo.salario_base) : null;

  cargosArr.sort((a, b) => {
    if (window._cargosOrdem === 'salario-desc' || window._cargosOrdem === 'salario-asc') {
      const sa = salarioDe(a), sb = salarioDe(b);
      if (sa === null && sb === null) return 0;
      if (sa === null) return 1;
      if (sb === null) return -1;
      return window._cargosOrdem === 'salario-desc' ? sb - sa : sa - sb;
    }
    return nomeDe(a).localeCompare(nomeDe(b));
  });

  tbody.innerHTML = cargosArr.map((cargo) => {
    const cid = cargo[window._cargoIdField] || cargo.id || cargo.id_cargo || '';
    const nome = nomeDe(cargo);
    const salarioNum = salarioDe(cargo);
    const salario = salarioNum !== null ? new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(salarioNum) : '';
    return `<tr data-cargo-id="${cid}"><td><strong>${nome}</strong></td><td style="font-weight:600">${salario}</td>
      <td>
        <button class="action-btn" title="Editar" onclick="editCargo('${cid}')">✎</button>
        <button class="action-btn btn-danger" title="Excluir" onclick="deleteCargo('${cid}')">✕</button>
      </td></tr>`;
  }).join('');
};

  window._editingCargoId = id;

  if(!window._cargos || window._cargos.length===0) await loadCargosForApp();

    const cargo = (window._cargos||[]).find(c=> String(c[window._cargoIdField]||c.id||c.id_cargo)===String(id));
    document.getElementById('cm-cargo').value = cargo ? (cargo[window._cargoNameField]||cargo.nome_cargo||cargo.nome||'') : '';

  } else {
    document.getElementById('cm-cargo').value='';

window.deleteCargo=async function(id){
  if(!confirm('Excluir este cargo?')) return;
  // deleta no Supabase
  try{
    const { error } = await supaClient.from('cargos').delete().eq(window._cargoIdField, id);
    if(error) throw error;
    showToast('Cargo excluído.');
    await loadCargosForApp();
    navigate('dep-tabela','Cargos e Salários Atual');
  } catch(e){
    console.error('Erro ao excluir cargo:', e);
    showToast('Erro ao excluir cargo.');
  }
};
window.saveCargo=async function(){
  const nome = document.getElementById('cm-cargo').value.trim();
  const salarioRaw = document.getElementById('cm-salario').value.trim();
  if(!nome) return alert('Preencha o nome do cargo.');
  // tenta converter salário para número
  const salarioNum = salarioRaw ? parseFloat(String(salarioRaw).replace(/\./g,'').replace(/,/g,'.').replace(/[^0-9.\-]/g,'')) : null;
  try{
    if(window._editingCargoId){
      const upd = { [window._cargoNameField]: nome };
      if(salarioNum !== null && !isNaN(salarioNum)) upd.salario_base = salarioNum;
      const { error } = await supaClient.from('cargos').update(upd).eq(window._cargoIdField, window._editingCargoId);
      if(error) throw error;
      showToast('Cargo atualizado.');
    } else {
      const insertObj = { [window._cargoNameField]: nome };
      if(salarioNum !== null && !isNaN(salarioNum)) insertObj.salario_base = salarioNum;
      const { error } = await supaClient.from('cargos').insert([insertObj]);
      if(error) throw error;
      showToast('Cargo criado.');
    }
    document.getElementById('cargo-modal').style.display='none';
    await loadCargosForApp();
    navigate('dep-tabela','Cargos e Salários Atual');
  } catch(e){
    console.error('Erro ao salvar cargo:', e);
    showToast('Erro ao salvar cargo.');
  }
};

function nomeColaboradorPorId(idColaborador) {
  const colab = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador || c.id || c.codigo) === String(idColaborador));
  return colab ? (colab.nome_colaborador || colab.nome || colab.name || '—') : '—';
}

// Busca a Foto de Perfil do colaborador em documentos (tipo_doc = 'Foto de Perfil'),
// já carregada/agrupada por id_colaborador em window._documentosPorColab.
function fotoPerfilUrl(idColaborador) {
  const docs = (window._documentosPorColab && window._documentosPorColab[idColaborador]) || [];
  const foto = docs.find(d => d.tipo === 'Foto de Perfil');
  return foto ? foto.url : null;
}

  if (!el) return;
