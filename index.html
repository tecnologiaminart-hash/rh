  el.innerHTML = url
    ? `<img src="${driveThumbnailUrl(url)}" alt="Foto de perfil" style="width:100%;height:100%;object-fit:cover;cursor:pointer" onclick="visualizarDocumento('${url}')">`
    : 'Sem foto de perfil';
};

// Envia a Foto de Perfil para o Drive (mesmo fluxo do "Enviar Documento") e grava
// em documentos com tipo_doc = 'Foto de Perfil', substituindo a anterior se houver.
window.uploadFotoPerfilDadosPessoais = async function(file) {
  const cid = document.getElementById('dp-colaborador').value;
  if (!cid) return showToast('Selecione o colaborador antes de enviar a foto.');
  if (!file) return;
  if (!supaClient) return showToast('Supabase não está configurado.');

  let driveFolderId;
  try {
    driveFolderId = await window.obterDriveFolderIdParaColaborador(cid);
  } catch (error) {
    console.error('Erro ao buscar pasta de documentos:', error);
    return showToast('Erro ao localizar pasta do colaborador.', 'danger');
  }
  if (!driveFolderId) return showToast('Pasta de documentos não encontrada para este colaborador.', 'danger');

  let urlArquivo;
  try {
    urlArquivo = await window.enviarArquivoParaDrive(file, { cid, tipo: 'Foto de Perfil', driveFolderId });
  } catch (error) {
    console.error('Erro ao enviar foto de perfil para o Drive via n8n:', error);
    return showToast('Falha ao enviar foto para o Drive.', 'danger');
  }
  if (!urlArquivo) return showToast('A foto foi enviada mas o Drive não retornou a URL.', 'danger');

  if (!window._documentosPorColab) window._documentosPorColab = {};
  const existente = (window._documentosPorColab[cid] || []).find(d => d.tipo === 'Foto de Perfil');
  if (existente?.id_doc) {
    await supaClient.from('documentos').delete().eq('id_doc', existente.id_doc);
    window._documentosPorColab[cid] = window._documentosPorColab[cid].filter(d => d !== existente);
  }

  const hoje = new Date().toISOString().slice(0, 10);
  const { data: insertedRows, error: insertError } = await supaClient
    .from('documentos')
    .insert([{ id_colaborador: cid, tipo_doc: 'Foto de Perfil', data_envio_doc: hoje, url_arquivo: urlArquivo }])
    .select();
  if (insertError) {
    console.error('Erro ao salvar foto de perfil:', insertError);
    return showToast('Erro ao salvar foto de perfil: ' + (insertError.message || 'verifique o console.'), 'danger');
  }

  const insertedDoc = insertedRows?.[0];
  if (!window._documentosPorColab[cid]) window._documentosPorColab[cid] = [];
  window._documentosPorColab[cid].push({ id_doc: insertedDoc?.id_doc, tipo: 'Foto de Perfil', data: new Date().toLocaleDateString('pt-BR'), url: urlArquivo });

  document.getElementById('dp-foto-upload-input').value = '';
  atualizarFotoGrandeDadosPessoais(cid);
  if (window._renderDadosPessoaisEpi) window._renderDadosPessoaisEpi();
  showToast('Foto de perfil enviada!');
};

window.excluirFotoPerfilDadosPessoais = async function() {
  const cid = document.getElementById('dp-colaborador').value;
  if (!cid) return showToast('Selecione o colaborador.');
  const existente = (window._documentosPorColab && window._documentosPorColab[cid] || []).find(d => d.tipo === 'Foto de Perfil');
  if (!existente) return showToast('Nenhuma foto de perfil cadastrada para este colaborador.');
  if (!confirm('Excluir a foto de perfil deste colaborador?')) return;

  try {
    const { error } = await supaClient.from('documentos').delete().eq('id_doc', existente.id_doc);
    if (error) throw error;
    window._documentosPorColab[cid] = window._documentosPorColab[cid].filter(d => d !== existente);
    atualizarFotoGrandeDadosPessoais(cid);
    if (window._renderDadosPessoaisEpi) window._renderDadosPessoaisEpi();
    showToast('Foto de perfil excluída.');
  } catch (e) {
    console.error('Erro ao excluir foto de perfil:', e);
    showToast('Erro ao excluir foto de perfil: ' + (e.message || e));
  }
};

// Cores dos selects de Status (Ficha e EPIs): Incompleto = amarelo, Completo = verde.
function corSelectStatus(status) {
  return status === 'Completo' ? 'background:#e8f5ec;color:#1a7a3c' : 'background:#fef5e0;color:#9a6800';
}
window.aplicarCorStatus = function(selectEl) {
  selectEl.style.cssText += ';' + corSelectStatus(selectEl.value);
};

async function loadDadosPessoaisEpiForApp() {
  if (!supaClient) {
    console.error('Supabase client não inicializado para dados_pessoais_epi.');
    window._dadosPessoaisEpi = [];
    return;
  }
  const { data, error } = await supaClient
    .from('dados_pessoais_epi')
    .select('*');
  if (error) {
    console.error('Erro ao carregar dados pessoais/EPIs:', error.message);
    window._dadosPessoaisEpi = [];
  } else {
    window._dadosPessoaisEpi = data;
  }
}

function pageDadosPessoais() {
  if (!window._dadosPessoaisEpi) window._dadosPessoaisEpi = [];

  document.getElementById('topbar-actions').innerHTML = '';

  if (!window._dpFiltros) window._dpFiltros = { status: 'ativos_pendentes' };
  if (!window._dpOrdem) window._dpOrdem = 'nome';

  const renderTabela = () => {
    const tbody = document.getElementById('dados-pessoais-tbody');
    if (!tbody) return;
    // Nome do colaborador não é mais gravado em dados_pessoais_epi (coluna removida,
    // era redundante com id_colaborador); resolvemos sempre via colaboradores, fonte única de verdade.
    let lista = [...(window._dadosPessoaisEpi || [])].filter(d => {
      const colab = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador) === String(d.id_colaborador));
      const statusColab = colab ? colab.status_colaborador : null;
      if (window._dpFiltros.status === 'ativos_pendentes') return statusColab === 'Ativo' || statusColab === 'Pendente Documentação';
      if (window._dpFiltros.status) return statusColab === window._dpFiltros.status;
      return true;
    });
    lista.sort((a, b) => {
      if (window._dpOrdem === 'cargo') {
        const colabA = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador) === String(a.id_colaborador));
        const colabB = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador) === String(b.id_colaborador));
        return (colabA && colabA.cargos ? colabA.cargos.nome_cargo : '').localeCompare(colabB && colabB.cargos ? colabB.cargos.nome_cargo : '');
      }
      return nomeColaboradorPorId(a.id_colaborador).localeCompare(nomeColaboradorPorId(b.id_colaborador));
    });
    tbody.innerHTML = lista.length === 0
      ? '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text3)">Nenhum registro cadastrado.</td></tr>'
      : lista.map(d => {
          // Salário sempre lido em tempo real de colaboradores.salario_base — fonte
          // única de verdade, evita ficar desatualizado em relação a Informações Contratuais.
          const colab = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador || c.id || c.codigo) === String(d.id_colaborador));
          const salario = colab && colab.salario_base !== undefined && colab.salario_base !== null && String(colab.salario_base) !== ''
            ? new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(parseFloat(colab.salario_base))
            : '—';
          const nomeColab = colab ? (colab.nome_colaborador || colab.nome || colab.name) : '—';
          const status = d.status_dados_pessoais || 'Incompleto';
          const fotoUrl = fotoPerfilUrl(d.id_colaborador);
          const foto = fotoUrl
            ? `<img src="${driveThumbnailUrl(fotoUrl)}" alt="Foto de perfil" style="width:40px;height:40px;object-fit:cover;border-radius:6px;cursor:pointer" onclick="visualizarDocumento('${fotoUrl}')">`
            : `<div style="width:40px;height:40px;border-radius:6px;background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:9px;text-align:center;line-height:1.2">Sem foto</div>`;
          return `
          <tr>
            <td>${foto}</td>
            <td><strong style="cursor:pointer;text-decoration:underline" onclick="openDadosPessoaisModal(${d.id})">${nomeColab}</strong></td>
            <td>${d.cpf || '—'}</td>
            <td>${d.funcao || '—'}</td>
            <td>${salario}</td>
            <td>
              <select class="form-select" style="width:auto;${corSelectStatus(status)}" onchange="aplicarCorStatus(this); alterarStatusDadosPessoais(${d.id}, this.value)">
                <option value="Incompleto" ${status === 'Incompleto' ? 'selected' : ''}>Incompleto</option>
                <option value="Completo" ${status === 'Completo' ? 'selected' : ''}>Completo</option>
              </select>
            </td>
            <td style="white-space:nowrap">
              <button class="action-btn" title="Editar" onclick="openDadosPessoaisModal(${d.id})">✎</button>
            </td>
          </tr>`;
        }).join('');
  };

  window._renderDadosPessoaisEpi = renderTabela;
  Promise.all([
    loadDadosPessoaisEpiForApp(),
    (!_colaboradoresSupabase || _colaboradoresSupabase.length === 0) ? loadColaboradoresFromSupabase() : Promise.resolve(),
    loadDocumentosFromSupabase()
  ]).then(renderTabela);

  return `
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Dados Pessoais e EPIs</span>
      <input class="search-input" placeholder="Buscar colaborador..." oninput="filtrarDadosPessoaisEpi(this.value)" style="margin-left:12px">
    </div>
    <div style="padding:12px 20px;border-bottom:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--bg2)">
      <span style="font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase">Status do Colaborador:</span>
      <select class="form-select" style="width:auto" onchange="filtrarStatusColabDadosPessoais(this.value)">
        <option value="ativos_pendentes" ${window._dpFiltros.status === 'ativos_pendentes' ? 'selected' : ''}>Ativos e Pendente Documentação</option>
        <option value="" ${window._dpFiltros.status === '' ? 'selected' : ''}>Todos os status</option>
        <option value="Ativo" ${window._dpFiltros.status === 'Ativo' ? 'selected' : ''}>Ativo</option>
        <option value="Inativo" ${window._dpFiltros.status === 'Inativo' ? 'selected' : ''}>Inativo</option>
        <option value="Pendente Documentação" ${window._dpFiltros.status === 'Pendente Documentação' ? 'selected' : ''}>Pendente Documentação</option>
      </select>
      <span style="font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;margin-left:12px">Ordenar:</span>
      <select class="form-select" style="width:auto" onchange="ordenarDadosPessoaisEpi(this.value)">
        <option value="nome" ${window._dpOrdem === 'nome' ? 'selected' : ''}>Nome (A-Z)</option>
        <option value="cargo" ${window._dpOrdem === 'cargo' ? 'selected' : ''}>Cargo (A-Z)</option>
      </select>
    </div>
    <table>
      <thead>
        <tr>
          <th>Foto</th>
          <th>Nome Colaborador</th>
          <th>CPF</th>
          <th>Função</th>
          <th>Salário R$</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="dados-pessoais-tbody">
        <tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text3)">Carregando...</td></tr>
      </tbody>
    </table>
  </div>`;
}

window.filtrarDadosPessoaisEpi = function(query) {
  const q = String(query || '').trim().toLowerCase();
  document.querySelectorAll('#dados-pessoais-tbody tr').forEach(row => {
    row.style.display = !q || row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
};

window.filtrarStatusColabDadosPessoais = function(valor) {
  if (!window._dpFiltros) window._dpFiltros = { status: 'ativos_pendentes' };

  if (window._renderDadosPessoaisEpi) window._renderDadosPessoaisEpi();
};

  window._dpOrdem = valor;

};

// Ao selecionar/trocar o colaborador no modal, busca o salario_base dele na tabela
// colaboradores (já carregada em _colaboradoresSupabase) e preenche o campo Salário.
window.preencherSalarioDadosPessoais = function(idColaborador) {
  const salarioEl = document.getElementById('dp-salario');
  if (!salarioEl) return;
  if (!idColaborador) { salarioEl.value = ''; return; }
  const colab = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador || c.id || c.codigo) === String(idColaborador));
  if (colab && colab.salario_base !== undefined && colab.salario_base !== null && String(colab.salario_base) !== '') {
    salarioEl.value = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(colab.salario_base);
  } else {
    salarioEl.value = '';
  }
};

window.salvarDadosPessoaisEpi = async function() {
  const idColaborador = document.getElementById('dp-colaborador').value;
  if (!idColaborador) return showToast('Selecione o colaborador.');

  // Salário não é mais gravado aqui: o campo é somente leitura e reflete sempre
  // colaboradores.salario_base (única fonte de verdade, editável em Informações Contratuais).
  const payload = {
    id_colaborador: idColaborador,
    cpf: document.getElementById('dp-cpf').value || null,
    rg: document.getElementById('dp-rg').value || null,
    data_nascimento: document.getElementById('dp-nascimento').value || null,
    telefone: document.getElementById('dp-telefone').value || null,
    email: document.getElementById('dp-email').value || null,
    endereco: document.getElementById('dp-endereco').value || null,
    telefone_emergencia: document.getElementById('dp-tel-emergencia').value || null,
    estado_civil: document.getElementById('dp-estado-civil').value || null,
    escolaridade: document.getElementById('dp-escolaridade').value || null,
    pix: document.getElementById('dp-pix').value || null,
    'vale-transporte': document.getElementById('dp-vale-transporte').value || null,
    funcao: document.getElementById('dp-funcao').value || null,
    epi_camisa: document.getElementById('dp-epi-camisa').value || null,
    epi_calca: document.getElementById('dp-epi-calca').value || null,
    epi_botina: document.getElementById('dp-epi-botina').value || null,
    epi_jaleco: document.getElementById('dp-epi-jaleco').value || null,
    epi_luva_raspa: document.getElementById('dp-epi-luva-raspa').value || null,
    epi_luva_lavagem: document.getElementById('dp-epi-luva-lavagem').value || null,
  };

  try {
    const id = window._editingDadosPessoaisId;
    const { error } = id
      ? await supaClient.from('dados_pessoais_epi').update(payload).eq('id', id)
      : await supaClient.from('dados_pessoais_epi').insert([payload]);
    if (error) throw error;
    await loadDadosPessoaisEpiForApp();
    if (window._renderDadosPessoaisEpi) window._renderDadosPessoaisEpi();
    document.getElementById('dados-pessoais-modal').style.display = 'none';
    showToast(id ? 'Registro atualizado!' : 'Registro criado!');
  } catch (e) {
    console.error('Erro ao salvar dados pessoais/EPIs:', e);
    showToast('Erro ao salvar registro: ' + (e.message || e));
  }
};

window.alterarStatusDadosPessoais = async function(id, novoStatus) {
  try {
    const { error } = await supaClient.from('dados_pessoais_epi').update({ status_dados_pessoais: novoStatus }).eq('id', id);
    if (error) throw error;
    const registro = (window._dadosPessoaisEpi || []).find(d => d.id === id);
    if (registro) registro.status_dados_pessoais = novoStatus;
    showToast('Status atualizado!');
  } catch (e) {
    console.error('Erro ao atualizar status:', e);
    showToast('Erro ao atualizar status: ' + (e.message || e));
  }
};

async function loadMapeamentoPerfilForApp() {
  if (!supaClient) {
    console.error('Supabase client não inicializado para mapeamento_perfil.');
    window._mapeamentoPerfil = [];
    return;
  }
  const { data, error } = await supaClient
    .from('mapeamento_perfil')
    .select('*');
  if (error) {
    console.error('Erro ao carregar mapeamento de perfil:', error.message);
    window._mapeamentoPerfil = [];
  } else {
    window._mapeamentoPerfil = data;
  }
}

function pageMapeamentoPerfil() {
  if (!window._mapeamentoPerfil) window._mapeamentoPerfil = [];

  document.getElementById('topbar-actions').innerHTML = '';

  if (!window._mpFiltros) window._mpFiltros = { status: 'ativos_pendentes' };
  if (!window._mpOrdem) window._mpOrdem = 'nome';

  const renderTabela = () => {
    const tbody = document.getElementById('mapeamento-perfil-tbody');
    if (!tbody) return;
    // Nome do colaborador não é mais gravado em mapeamento_perfil (coluna removida,
    // era redundante com id_colaborador); resolvemos sempre via colaboradores, fonte única de verdade.
    let lista = [...(window._mapeamentoPerfil || [])].filter(m => {
      const colab = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador) === String(m.id_colaborador));

      if (window._mpFiltros.status === 'ativos_pendentes') return statusColab === 'Ativo' || statusColab === 'Pendente Documentação';
      if (window._mpFiltros.status) return statusColab === window._mpFiltros.status;

      if (window._mpOrdem === 'cargo') {
        const colabA = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador) === String(a.id_colaborador));
        const colabB = (_colaboradoresSupabase || []).find(c => String(c.id_colaborador) === String(b.id_colaborador));

      }
      return nomeColaboradorPorId(a.id_colaborador).localeCompare(nomeColaboradorPorId(b.id_colaborador));

      ? '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text3)">Nenhum registro cadastrado.</td></tr>'

            </td>
            <td style="white-space:nowrap">
              <button class="action-btn" title="Editar" onclick="openMapeamentoPerfilModal(${m.id})">✎</button>
            </td>
          </tr>`;
        }).join('');
  };

  window._renderMapeamentoPerfil = renderTabela;
  Promise.all([
    loadMapeamentoPerfilForApp(),
    (!_colaboradoresSupabase || _colaboradoresSupabase.length === 0) ? loadColaboradoresFromSupabase() : Promise.resolve(),
  ]).then(renderTabela);

  return `
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Mapeamento de Perfil</span>
      <input class="search-input" placeholder="Buscar colaborador..." oninput="filtrarTabelaGenerica('mapeamento-perfil-tbody', this.value)" style="margin-left:12px">
    </div>
    <div style="padding:12px 20px;border-bottom:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--bg2)">

      <select class="form-select" style="width:auto" onchange="filtrarStatusColabMapeamentoPerfil(this.value)">
        <option value="ativos_pendentes" ${window._mpFiltros.status === 'ativos_pendentes' ? 'selected' : ''}>Ativos e Pendente Documentação</option>
        <option value="" ${window._mpFiltros.status === '' ? 'selected' : ''}>Todos os status</option>
        <option value="Ativo" ${window._mpFiltros.status === 'Ativo' ? 'selected' : ''}>Ativo</option>
        <option value="Inativo" ${window._mpFiltros.status === 'Inativo' ? 'selected' : ''}>Inativo</option>
        <option value="Pendente Documentação" ${window._mpFiltros.status === 'Pendente Documentação' ? 'selected' : ''}>Pendente Documentação</option>

      <select class="form-select" style="width:auto" onchange="ordenarMapeamentoPerfil(this.value)">

window.salvarMapeamentoPerfil = async function() {
  const idColaborador = document.getElementById('mp-colaborador').value;
  if (!idColaborador) return showToast('Selecione o colaborador.');

  const payload = {
    id_colaborador: idColaborador,
    como_gosta_ser_chamado: document.getElementById('mp-apelido').value || null,
    hobbies: document.getElementById('mp-hobbies').value || null,
    prato_doce_preferido: document.getElementById('mp-prato-doce').value || null,
    pretende_ter_filhos: document.getElementById('mp-filhos').value || null,
    grande_sonho_pessoal: document.getElementById('mp-sonho').value || null,
    metas_ano_vigente: document.getElementById('mp-metas').value || null,
    talentos_dons: document.getElementById('mp-talentos').value || null,
    desafios_pessoais: document.getElementById('mp-desafios').value || null,
    expectativa_empresa: document.getElementById('mp-expectativa').value || null,
    pontos_fortes: document.getElementById('mp-pontos-fortes').value || null,
    a_desenvolver: document.getElementById('mp-a-desenvolver').value || null,
    habilidades_profissionais: document.getElementById('mp-habilidades').value || null,
    perfil_disc_1: document.getElementById('mp-disc1').value || null,
    perfil_disc_2: document.getElementById('mp-disc2').value || null,
    comunicacao_ideal: document.getElementById('mp-comunicacao').value || null,
    valores_principais: document.getElementById('mp-valores').value || null,
  };

  try {
    const id = window._editingMapeamentoPerfilId;
    const { data, error } = id
      ? await supaClient.from('mapeamento_perfil').update(payload).eq('id', id).select()
      : await supaClient.from('mapeamento_perfil').insert([payload]).select();
    if (error) throw error;
    if (!data || data.length === 0) throw new Error('Nenhuma linha foi salva (verifique as policies da tabela mapeamento_perfil no Supabase).');
    await loadMapeamentoPerfilForApp();
    if (window._renderMapeamentoPerfil) window._renderMapeamentoPerfil();
    document.getElementById('mapeamento-perfil-modal').style.display = 'none';
    showToast(id ? 'Registro atualizado!' : 'Registro criado!');
  } catch (e) {
    console.error('Erro ao salvar mapeamento de perfil:', e);
    showToast('Erro ao salvar registro: ' + (e.message || e));
  }
};

window.alterarStatusMapeamentoPerfil = async function(id, novoStatus) {
  try {
    const { error } = await supaClient.from('mapeamento_perfil').update({ status_mapeamento: novoStatus }).eq('id', id);
    if (error) throw error;
    const registro = (window._mapeamentoPerfil || []).find(m => m.id === id);
    if (registro) registro.status_mapeamento = novoStatus;

async function loadCursosForApp() {
  if (!supaClient) {
    console.error('Supabase client não inicializado para cursos.');
    window._cursos = [];
    return;
  }
  const { data, error } = await supaClient.from('cursos').select('*').order('nome', { ascending: true });
  if (error) {
    console.error('Erro ao carregar cursos:', error.message);
    window._cursos = [];
  } else {
    window._cursos = data;
  }
}

async function loadCursoAulasForApp() {
  if (!supaClient) {
    console.error('Supabase client não inicializado para curso_aulas.');
    window._cursoAulas = [];
    return;
  }
  const { data, error } = await supaClient.from('curso_aulas').select('*').order('ordem', { ascending: true });
  if (error) {
    console.error('Erro ao carregar aulas dos cursos:', error.message);
    window._cursoAulas = [];
  } else {
    window._cursoAulas = data;
  }
}

// Formata segundos em "m:ss" (ou "h:mm:ss" acima de 1 hora) pra exibição na lista de aulas.
function formatarDuracaoSegundos(seg) {
  const n = parseInt(seg, 10);
  if (!n || n <= 0) return '—';
  const h = Math.floor(n / 3600);
  const m = Math.floor((n % 3600) / 60);
  const s = n % 60;
  const mm = String(m).padStart(2, '0');
  const ss = String(s).padStart(2, '0');
  return h > 0 ? `${h}:${mm}:${ss}` : `${m}:${ss}`;
}

// Formata segundos em "Xh Ymin" — usado na Carga Horária calculada do curso Interno.
function formatarHorasMinutos(segundosTotais) {
  const total = Math.max(0, parseInt(segundosTotais, 10) || 0);
  const h = Math.floor(total / 3600);
  const m = Math.round((total % 3600) / 60);
  return `${h}h ${m}min`;
}

// Soma a duração (segundos) de todas as aulas de um curso e salva o resultado
// (em horas) em cursos.carga_horaria — chamado sempre que uma aula é
// criada/editada/excluída, pra essa coluna não ficar desatualizada.
async function recalcularCargaHorariaCurso(idCurso) {
  const totalSegundos = (window._cursoAulas || [])
    .filter(a => a.id_curso === idCurso)
    .reduce((acc, a) => acc + (parseInt(a.duracao_segundos, 10) || 0), 0);
  const cargaHoraria = +(totalSegundos / 3600).toFixed(2);
  const { error } = await supaClient.from('cursos').update({ carga_horaria: cargaHoraria }).eq('id', idCurso);
  if (error) { console.error('Erro ao atualizar carga horária do curso:', error.message); return; }
  const curso = (window._cursos || []).find(c => c.id === idCurso);
  if (curso) curso.carga_horaria = cargaHoraria;
}

function pageCursos() {
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary" onclick="abrirCursoModal()">+ Novo Curso</button>`;

  if (!window._cursosFiltro) window._cursosFiltro = { tipo: '' };
  if (!window._cursosOrdem) window._cursosOrdem = 'nome';

  const renderTabela = () => {
    const tbody = document.getElementById('cursos-tbody');
    if (!tbody) return;

    let lista = [...(window._cursos || [])];
    if (window._cursosFiltro.tipo) lista = lista.filter(c => c.tipo === window._cursosFiltro.tipo);

    lista.sort((a, b) => {
      if (window._cursosOrdem === 'carga-desc' || window._cursosOrdem === 'carga-asc') {
        const ca = a.carga_horaria !== null && a.carga_horaria !== undefined ? parseFloat(a.carga_horaria) : null;
        const cb = b.carga_horaria !== null && b.carga_horaria !== undefined ? parseFloat(b.carga_horaria) : null;
        if (ca === null && cb === null) return 0;
        if (ca === null) return 1;
        if (cb === null) return -1;
        return window._cursosOrdem === 'carga-desc' ? cb - ca : ca - cb;
      }
      if (window._cursosOrdem === 'tipo') return (a.tipo || '').localeCompare(b.tipo || '');
      return (a.nome || '').localeCompare(b.nome || '');
    });

    tbody.innerHTML = lista.length === 0
      ? '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text3)">Nenhum curso encontrado.</td></tr>'
      : lista.map(c => {
          const qtdLiberados = (window._cursoLiberacoes || []).filter(l => l.id_curso === c.id && l.status === 'Liberado').length;
          return `
        <tr>
          <td><strong style="cursor:pointer" onclick="abrirCursoModal(${c.id})">${c.nome}</strong></td>
          <td><span class="badge ${c.tipo === 'Interno' ? 'badge-info' : 'badge-gray'}">${c.tipo}</span></td>
          <td>${c.carga_horaria !== null && c.carga_horaria !== undefined && c.carga_horaria !== '' ? (c.tipo === 'Interno' ? formatarHorasMinutos(Math.round(c.carga_horaria * 3600)) : `${c.carga_horaria}h`) : '—'}</td>
          <td style="white-space:normal;max-width:320px">${c.descricao || '—'}</td>
          <td>
            <span class="badge badge-info">${qtdLiberados}</span>
            <button class="action-btn" title="Ver lista de usuários liberados" onclick="abrirUsuariosLiberadosCursoModal(${c.id})">👥</button>
          </td>
          <td style="white-space:nowrap">
            ${c.tipo === 'Interno' ? `
              <button class="action-btn" title="Dashboard" onclick="abrirDashboardCursoModal(${c.id})">📊</button>
            ` : ''}
            <button class="action-btn" title="Editar" onclick="abrirCursoModal(${c.id})">✎</button>
          </td>
        </tr>`;
        }).join('');
  };

  window._renderCursos = renderTabela;
  Promise.all([loadCursosForApp(), loadCursoAulasForApp(), loadCursoLiberacoesForApp()]).then(renderTabela);

  return `
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Cursos</span>
      <input class="search-input" placeholder="Buscar curso..." oninput="filtrarTabelaGenerica('cursos-tbody', this.value)" style="margin-left:12px">
    </div>
    <div style="padding:12px 20px;border-bottom:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--bg2)">
      <span style="font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase">Tipo:</span>
      <select class="form-select" style="width:auto" onchange="filtrarTipoCursos(this.value)">
        <option value="" ${window._cursosFiltro.tipo === '' ? 'selected' : ''}>Todos os tipos</option>
        <option value="Interno" ${window._cursosFiltro.tipo === 'Interno' ? 'selected' : ''}>Interno</option>
        <option value="Externo" ${window._cursosFiltro.tipo === 'Externo' ? 'selected' : ''}>Externo</option>

// aulas, convertida de segundos para horas/minutos aqui no HTML) — Externo
// continua com o campo numérico livre, já que não tem aulas cadastradas.
window.toggleTipoCursoModal = function(tipo) {
  const inputEl = document.getElementById('cur-carga-horaria');
  const computadaEl = document.getElementById('cur-carga-horaria-computada');
  if (!inputEl || !computadaEl) return;
  if (tipo === 'Interno') {
    inputEl.style.display = 'none';
    computadaEl.style.display = '';
    const idCurso = window._editingCursoId;
    const totalSegundos = (window._cursoAulas || [])
      .filter(a => a.id_curso === idCurso)
      .reduce((acc, a) => acc + (parseInt(a.duracao_segundos, 10) || 0), 0);
    computadaEl.textContent = `Calculada a partir das aulas: ${formatarHorasMinutos(totalSegundos)}`;
  } else {
    inputEl.style.display = '';
    computadaEl.style.display = 'none';
  }
};

window.salvarCurso = async function() {
  const nome = document.getElementById('cur-nome').value.trim();
  const tipo = document.getElementById('cur-tipo').value;
  const descricao = document.getElementById('cur-descricao').value.trim();
  if (!nome) return showToast('Informe o nome do curso.');

  const payload = { nome, tipo, descricao: descricao || null };
  if (tipo === 'Externo') {
    // Externo não tem aulas: carga horária continua um número digitado à mão.
    const cargaRaw = document.getElementById('cur-carga-horaria').value;
    payload.carga_horaria = cargaRaw !== '' ? parseFloat(cargaRaw) : null;
  } else if (!window._editingCursoId) {
    // Interno recém-criado ainda não tem aulas cadastradas — recalcularCargaHorariaCurso()
    // atualiza esse valor sozinho conforme as aulas forem sendo salvas/excluídas.
    payload.carga_horaria = 0;
  }

  try {
    const id = window._editingCursoId;
    const { data, error } = id
      ? await supaClient.from('cursos').update(payload).eq('id', id).select()
      : await supaClient.from('cursos').insert([payload]).select();
    if (error) throw error;
    if (!data || data.length === 0) throw new Error('Nenhuma linha foi salva (verifique a policy da tabela cursos no Supabase).');
    await loadCursosForApp();
    if (window._renderCursos) window._renderCursos();
    document.getElementById('curso-modal').style.display = 'none';
    showToast(id ? 'Curso atualizado!' : 'Curso criado!');
  } catch (e) {
    console.error('Erro ao salvar curso:', e);
    showToast('Erro ao salvar curso: ' + (e.message || e), 'danger');
  }
};

window.moverAulaOrdem = async function(idAula, direcao) {
  const idCurso = window._dashboardCursoAtualId;
  const aulas = (window._cursoAulas || []).filter(a => a.id_curso === idCurso).sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
  const i = aulas.findIndex(a => a.id === idAula);
  const j = i + direcao;
  if (i === -1 || j < 0 || j >= aulas.length) return;

  const atual = aulas[i];
  const vizinha = aulas[j];
  const ordemAtual = atual.ordem;
  const ordemVizinha = vizinha.ordem;

  try {
    const { error: erro1 } = await supaClient.from('curso_aulas').update({ ordem: ordemVizinha }).eq('id', atual.id);
    if (erro1) throw erro1;
    const { error: erro2 } = await supaClient.from('curso_aulas').update({ ordem: ordemAtual }).eq('id', vizinha.id);
    if (erro2) throw erro2;

    atual.ordem = ordemVizinha;
    vizinha.ordem = ordemAtual;
    if (window._renderDashboardAulas) window._renderDashboardAulas();
  } catch (e) {
    console.error('Erro ao reordenar aula:', e);
    showToast('Erro ao reordenar aula: ' + (e.message || e), 'danger');
  }
};

// Arrastar e soltar como alternativa às setas: solta a aula arrastada bem
// onde estava a aula-alvo, empurrando as demais — persiste a ordem de todas
// de uma vez (diferente das setas, que só trocam duas).
window.dragAulaStart = function(event, idAula) {
  window._dragAulaId = idAula;
  event.dataTransfer.effectAllowed = 'move';
};

window.dragAulaOver = function(event) {
  event.preventDefault();
};

window.dragAulaDrop = function(event, idAulaAlvo) {
  event.preventDefault();
  const idCurso = window._dashboardCursoAtualId;
  const idOrigem = window._dragAulaId;
  window._dragAulaId = null;
  if (!idOrigem || idOrigem === idAulaAlvo) return;

  const aulas = (window._cursoAulas || []).filter(a => a.id_curso === idCurso).sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
  const aulaOrigem = aulas.find(a => a.id === idOrigem);
  const semOrigem = aulas.filter(a => a.id !== idOrigem);
  let indiceAlvo = semOrigem.findIndex(a => a.id === idAulaAlvo);
  if (!aulaOrigem || indiceAlvo === -1) return;

  // Solta na metade de baixo do card-alvo = entra depois dele; metade de
  // cima = antes. Sem isso, soltar sempre inserisse "antes do alvo" — dava
  // pra levar qualquer aula pro topo (soltando no 1º card), mas nunca pro
  // final de verdade (soltar no último card só deixava ela penúltima).
  const rect = event.currentTarget.getBoundingClientRect();
  const soltouNaMetadeDeBaixo = (event.clientY - rect.top) > rect.height / 2;
  if (soltouNaMetadeDeBaixo) indiceAlvo += 1;

  semOrigem.splice(indiceAlvo, 0, aulaOrigem);
  persistirNovaOrdemAulas(semOrigem);
};

async function persistirNovaOrdemAulas(aulasNaNovaOrdem) {
  try {
    const resultados = await Promise.all(
      aulasNaNovaOrdem.map((a, idx) => supaClient.from('curso_aulas').update({ ordem: idx + 1 }).eq('id', a.id))
    );
    const comErro = resultados.find(r => r.error);
    if (comErro) throw comErro.error;

    aulasNaNovaOrdem.forEach((a, idx) => { a.ordem = idx + 1; });
    if (window._renderDashboardAulas) window._renderDashboardAulas();
  } catch (e) {
    console.error('Erro ao reordenar aulas:', e);
    showToast('Erro ao reordenar aulas: ' + (e.message || e), 'danger');
  }
}

        </div>
      </div>`;
    document.body.appendChild(modal);
  }

  const aula = idAula ? (window._cursoAulas || []).find(a => a.id === idAula) : null;
  document.getElementById('aula-modal-title').textContent = idAula ? `Editar Aula — ${aula ? aula.titulo : ''}` : 'Nova Aula';
  document.getElementById('aul-titulo').value = aula?.titulo || '';
  document.getElementById('aul-descricao').value = aula?.descricao || '';
  document.getElementById('aul-video-link').value = (aula && aula.tipo_video === 'link') ? (aula.url_video || '') : '';
  document.getElementById('aul-video-upload').value = '';
  // Envio de vários vídeos de uma vez só faz sentido criando aulas novas —
  // ao editar uma aula existente, o seletor de arquivo volta a aceitar só um.
  document.getElementById('aul-video-upload').multiple = !idAula;

  // Volta os campos Título/Descrição/Material e o aviso de envio em lote ao

  // admin escolher vários arquivos de uma vez (ver onSelecionarArquivosVideoAula).

  document.getElementById('aul-descricao-wrap').style.display = '';
  document.getElementById('aul-material-wrap').style.display = '';

  // Duração: em segundos igual antes, só muda a forma de preencher — Link
  // usa os campos Horas/Minutos abaixo; Upload captura sozinho do arquivo
  // (guardado aqui, sem campo visível) e mantém o valor já salvo até que um
  // novo arquivo seja escolhido.
  const duracaoLinkAtual = (aula && aula.tipo_video === 'link') ? (aula.duracao_segundos || 0) : 0;
  document.getElementById('aul-duracao-horas').value = duracaoLinkAtual > 0 ? Math.floor(duracaoLinkAtual / 3600) : '';
  document.getElementById('aul-duracao-minutos').value = duracaoLinkAtual > 0 ? Math.round((duracaoLinkAtual % 3600) / 60) : '';
  window._aulaDuracaoSegundosUpload = (aula && aula.tipo_video === 'upload') ? (aula.duracao_segundos || null) : null;
  document.getElementById('aul-duracao-detectada').textContent = window._aulaDuracaoSegundosUpload ? `Duração atual: ${formatarHorasMinutos(window._aulaDuracaoSegundosUpload)}` : '';

  const tipoAtual = aula?.tipo_video || 'link';
  document.querySelectorAll('input[name="aul-tipo-video"]').forEach(r => { r.checked = r.value === tipoAtual; });
  toggleTipoVideoAula(tipoAtual);

  document.getElementById('aul-video-atual').textContent = (aula && aula.tipo_video === 'upload' && aula.url_video) ? `Vídeo atual: ${aula.url_video}` : '';
  document.getElementById('aul-material-atual').textContent = (aula && aula.url_material_pdf) ? `Material atual: ${aula.url_material_pdf}` : '';

  document.getElementById('aula-modal').style.display = 'flex';

window.toggleTipoVideoAula = function(tipo) {
  const linkEl = document.getElementById('aul-video-link');
  const uploadEl = document.getElementById('aul-video-upload');
  const duracaoLinkWrap = document.getElementById('aul-duracao-link-wrap');
  if (!linkEl || !uploadEl || !duracaoLinkWrap) return;
  linkEl.style.display = tipo === 'link' ? '' : 'none';
  uploadEl.style.display = tipo === 'upload' ? '' : 'none';
  // Duração só é preenchida à mão pra Link — no Upload ela é capturada
  // sozinha do arquivo (sem campo visível, só o texto de confirmação abaixo).
  duracaoLinkWrap.style.display = tipo === 'link' ? '' : 'none';
};

// Lê a duração de um arquivo de vídeo (metadata local, sem precisar subir o
// arquivo) — devolve segundos (inteiro) ou null se não conseguir detectar.
function lerDuracaoVideoArquivo(file) {
  return new Promise((resolve) => {
    const video = document.createElement('video');
    video.preload = 'metadata';
    video.onloadedmetadata = () => {
      window.URL.revokeObjectURL(video.src);
      const segundos = Math.round(video.duration);
      resolve(isFinite(segundos) && segundos > 0 ? segundos : null);
    };
    video.onerror = () => resolve(null);
    video.src = URL.createObjectURL(file);
  });
}

// Sugere um título a partir do nome do arquivo (sem extensão, com "_"/"-"
// virando espaço).
function tituloAPartirDoArquivo(file) {
  return file.name.replace(/\.[^.]+$/, '').replace(/[_-]+/g, ' ').trim();
}

// Único arquivo selecionado: detecta duração (guarda em
// window._aulaDuracaoSegundosUpload, sem campo visível) e sugere o Título —
// ambos continuam editáveis normalmente depois.
async function preencherDuracaoETituloDoArquivo(file) {
  const detectadaEl = document.getElementById('aul-duracao-detectada');
  const tituloEl = document.getElementById('aul-titulo');
  const segundos = await lerDuracaoVideoArquivo(file);
  if (segundos) {
    window._aulaDuracaoSegundosUpload = segundos;
    if (detectadaEl) detectadaEl.textContent = `Duração detectada: ${formatarHorasMinutos(segundos)}`;
  } else if (detectadaEl) {
    detectadaEl.textContent = 'Não foi possível detectar a duração deste arquivo.';
  }
  const nomeSemExtensao = tituloAPartirDoArquivo(file);
  if (tituloEl && nomeSemExtensao) tituloEl.value = nomeSemExtensao;
}

// Disparado ao escolher o(s) arquivo(s) de vídeo pra Upload. Com 1 arquivo,
// funciona como aula única (título/duração sugeridos, descrição e material
// disponíveis). Com vários, cada um vira uma aula separada só com
// título/vídeo/duração — não dá pra anexar descrição nem material
// individualmente nesse modo, então esses campos somem e um aviso aparece.
window.onSelecionarArquivosVideoAula = function(files) {
  const avisoEl = document.getElementById('aul-upload-multiplo-aviso');
  const tituloWrap = document.getElementById('aul-titulo-wrap');
  const descricaoWrap = document.getElementById('aul-descricao-wrap');
  const materialWrap = document.getElementById('aul-material-wrap');
  const detectadaEl = document.getElementById('aul-duracao-detectada');
  if (!files || files.length === 0) return;

  if (files.length > 1 && window._editingAulaId) {
    showToast('Ao editar uma aula existente, selecione apenas um arquivo de vídeo.');
    document.getElementById('aul-video-upload').value = '';
    return;
  }

  if (files.length > 1) {
    if (tituloWrap) tituloWrap.style.display = 'none';
    if (descricaoWrap) descricaoWrap.style.display = 'none';
    if (materialWrap) materialWrap.style.display = 'none';
    if (detectadaEl) detectadaEl.textContent = '';
    window._aulaDuracaoSegundosUpload = null;
    if (avisoEl) {
      avisoEl.style.display = '';
      avisoEl.textContent = `Você selecionou ${files.length} arquivos: cada um vai virar uma aula separada (título a partir do nome do arquivo, duração detectada automaticamente). Como são várias aulas de uma vez, não é possível anexar descrição nem material em PDF individual agora — edite depois, aula por aula, se precisar.`;
    }
  } else {
    if (tituloWrap) tituloWrap.style.display = '';
    if (descricaoWrap) descricaoWrap.style.display = '';
    if (materialWrap) materialWrap.style.display = '';
    if (avisoEl) avisoEl.style.display = 'none';
    preencherDuracaoETituloDoArquivo(files[0]);
  }
};

// Cria uma aula por arquivo (só título/vídeo/duração — sem descrição nem
// material), reaproveitando (ou criando, na primeira vez) a pasta do curso
// no Drive.
async function salvarAulasEmLote(files) {
  const idCurso = window._editingAulaCursoId;
  const btn = document.getElementById('aul-btn-salvar');
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }

  try {
    const curso = (window._cursos || []).find(c => c.id === idCurso);
    let driveFolderId = curso?.drive_folder_id || null;
    if (!driveFolderId) {
      driveFolderId = await window.criarPastaCursoNoDrive(curso?.nome || 'Curso');
      const { error: errorPasta } = await supaClient.from('cursos').update({ drive_folder_id: driveFolderId }).eq('id', idCurso);
      if (errorPasta) throw errorPasta;
      if (curso) curso.drive_folder_id = driveFolderId;
    }

    let maiorOrdem = Math.max(0, ...(window._cursoAulas || []).filter(a => a.id_curso === idCurso).map(a => a.ordem || 0));

    for (const file of Array.from(files)) {
      const duracaoSegundos = await lerDuracaoVideoArquivo(file);
      const urlVideo = await window.enviarArquivoAulaParaDrive(file, { driveFolderId });
      maiorOrdem += 1;
      const { error } = await supaClient.from('curso_aulas').insert([{
        id_curso: idCurso,
        titulo: tituloAPartirDoArquivo(file) || file.name,
        tipo_video: 'upload',
        url_video: urlVideo,
        descricao: null,
        duracao_segundos: duracaoSegundos,
        url_material_pdf: null,
        ordem: maiorOrdem,
      }]);
      if (error) throw error;
    }

    await loadCursoAulasForApp();
    await recalcularCargaHorariaCurso(idCurso);
    if (window._renderAulasCurso) window._renderAulasCurso();
    document.getElementById('aula-modal').style.display = 'none';
    showToast(`${files.length} aulas criadas!`);
  } catch (e) {
    console.error('Erro ao salvar aulas em lote:', e);
    showToast('Erro ao salvar aulas: ' + (e.message || e), 'danger');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Salvar'; }
  }
}

window.salvarAula = async function() {
  const tipoVideo = document.querySelector('input[name="aul-tipo-video"]:checked')?.value || 'link';
  const arquivosVideo = document.getElementById('aul-video-upload').files;
  if (tipoVideo === 'upload' && arquivosVideo.length > 1 && !window._editingAulaId) {
    return salvarAulasEmLote(arquivosVideo);
  }

  const titulo = document.getElementById('aul-titulo').value.trim();
  const linkVideo = document.getElementById('aul-video-link').value.trim();
  const arquivoVideo = arquivosVideo[0];
  const descricao = document.getElementById('aul-descricao').value.trim();
  const arquivoMaterial = document.getElementById('aul-material').files[0];

  if (!titulo) return showToast('Informe o título da aula.');
  if (tipoVideo === 'link' && !linkVideo) return showToast('Informe o link do vídeo.');

  const idAula = window._editingAulaId;
  const aulaExistente = idAula ? (window._cursoAulas || []).find(a => a.id === idAula) : null;

  if (tipoVideo === 'upload' && !arquivoVideo && !(aulaExistente && aulaExistente.tipo_video === 'upload' && aulaExistente.url_video)) {
    return showToast('Selecione o arquivo de vídeo para upload.');
  }

  const btn = document.getElementById('aul-btn-salvar');
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }

  try {
    // Resolve a pasta do curso no Drive só se algum arquivo for realmente
    // subir agora — cria na primeira vez (e salva em cursos.drive_folder_id)
    // e reaproveita nas próximas aulas do mesmo curso.
    let driveFolderId = null;
    if ((tipoVideo === 'upload' && arquivoVideo) || arquivoMaterial) {
      const curso = (window._cursos || []).find(c => c.id === window._editingAulaCursoId);
      driveFolderId = curso?.drive_folder_id || null;
      if (!driveFolderId) {
        driveFolderId = await window.criarPastaCursoNoDrive(curso?.nome || 'Curso');
        const { error: errorPasta } = await supaClient.from('cursos').update({ drive_folder_id: driveFolderId }).eq('id', window._editingAulaCursoId);
        if (errorPasta) throw errorPasta;
        if (curso) curso.drive_folder_id = driveFolderId;
      }
    }

    let urlVideo = tipoVideo === 'link' ? linkVideo : (aulaExistente?.url_video || null);
    if (tipoVideo === 'upload' && arquivoVideo) {
      urlVideo = await window.enviarArquivoAulaParaDrive(arquivoVideo, { driveFolderId });
    }

    let urlMaterial = aulaExistente?.url_material_pdf || null;
    if (arquivoMaterial) {
      urlMaterial = await window.enviarArquivoAulaParaDrive(arquivoMaterial, { driveFolderId });
    }

    // Duração: Link vem dos campos Horas/Minutos; Upload vem do que foi
    // detectado automaticamente do arquivo (ou do valor já salvo, se nenhum
    // arquivo novo foi escolhido nesta edição).
    let duracaoSegundos = null;
    if (tipoVideo === 'link') {
      const horas = parseInt(document.getElementById('aul-duracao-horas').value, 10) || 0;
      const minutos = parseInt(document.getElementById('aul-duracao-minutos').value, 10) || 0;
      duracaoSegundos = (horas * 3600 + minutos * 60) || null;
    } else {
      duracaoSegundos = window._aulaDuracaoSegundosUpload || null;
    }

    const payload = {
      id_curso: window._editingAulaCursoId,
      titulo,
      tipo_video: tipoVideo,
      url_video: urlVideo,
      descricao: descricao || null,
      duracao_segundos: duracaoSegundos,
      url_material_pdf: urlMaterial,
    };
    if (!idAula) {
      const maiorOrdem = Math.max(0, ...(window._cursoAulas || []).filter(a => a.id_curso === window._editingAulaCursoId).map(a => a.ordem || 0));
      payload.ordem = maiorOrdem + 1;
    }

    const { data, error } = idAula
      ? await supaClient.from('curso_aulas').update(payload).eq('id', idAula).select()
      : await supaClient.from('curso_aulas').insert([payload]).select();
    if (error) throw error;
    if (!data || data.length === 0) throw new Error('Nenhuma linha foi salva (verifique a policy da tabela curso_aulas no Supabase).');

    await loadCursoAulasForApp();
    await recalcularCargaHorariaCurso(window._editingAulaCursoId);
    if (window._renderAulasCurso) window._renderAulasCurso();
    document.getElementById('aula-modal').style.display = 'none';
    showToast(idAula ? 'Aula atualizada!' : 'Aula criada!');
  } catch (e) {
    console.error('Erro ao salvar aula:', e);
    showToast('Erro ao salvar aula: ' + (e.message || e), 'danger');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Salvar'; }
  }
};

window.excluirAula = async function(id) {
  if (!confirm('Excluir esta aula?')) return;
  try {
    // id_curso vem da própria aula (fonte confiável) — este botão agora
    // aparece tanto no modal de Aulas quanto na lista do Dashboard.
    const aula = (window._cursoAulas || []).find(a => a.id === id);
    const idCurso = aula ? aula.id_curso : (window._aulasCursoAtualId || window._dashboardCursoAtualId);

    const { error } = await supaClient.from('curso_aulas').delete().eq('id', id);
    if (error) throw error;
    await loadCursoAulasForApp();
    await recalcularCargaHorariaCurso(idCurso);
    if (window._renderAulasCurso) window._renderAulasCurso();
    if (window._renderDashboardAulas) window._renderDashboardAulas();
    showToast('Aula excluída!');
  } catch (e) {
    console.error('Erro ao excluir aula:', e);
    showToast('Erro ao excluir aula: ' + (e.message || e), 'danger');
  }
};

// --- Avaliação Final do curso (só Interno) — perguntas objetivas com
// alternativas em JSON (ver sql/criar-avaliacao-final-curso.sql). ---

async function loadCursoAvaliacaoPerguntasForApp() {
  if (!supaClient) {
    console.error('Supabase client não inicializado para curso_avaliacao_perguntas.');
    window._cursoAvaliacaoPerguntas = [];
    return;
  }
  const { data, error } = await supaClient.from('curso_avaliacao_perguntas').select('*').order('ordem', { ascending: true });
  if (error) {
    console.error('Erro ao carregar perguntas da avaliação final:', error.message);
    window._cursoAvaliacaoPerguntas = [];
  } else {
    window._cursoAvaliacaoPerguntas = data;
  }
}

window.abrirAvaliacaoFinalModal = async function(idCurso) {
  window._avaliacaoFinalCursoAtualId = idCurso;
  if (!window._cursoAvaliacaoPerguntas) await loadCursoAvaliacaoPerguntasForApp();

  if (!document.getElementById('avaliacao-final-modal')) {
    const modal = document.createElement('div');
    modal.id = 'avaliacao-final-modal';
    modal.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;';
    modal.innerHTML = `
      <div style="background:#fff;border-radius:6px;width:720px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)">
        <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:15px;font-weight:700" id="avaliacao-final-modal-title">Avaliação Final</div>
          <div style="display:flex;gap:8px">
            <button type="button" class="btn btn-sm btn-primary" onclick="abrirPerguntaAvaliacaoModal(window._avaliacaoFinalCursoAtualId)">+ Nova Pergunta</button>
            <button type="button" class="btn btn-sm" onclick="document.getElementById('avaliacao-final-modal').style.display='none'">✕ Fechar</button>
          </div>
        </div>
        <div style="padding:24px" id="avaliacao-final-body"></div>
      </div>`;
    document.body.appendChild(modal);
  }

  window._renderAvaliacaoFinal = renderAvaliacaoFinalModal;
  renderAvaliacaoFinalModal();
  document.getElementById('avaliacao-final-modal').style.display = 'flex';
};

function renderAvaliacaoFinalModal() {
  const idCurso = window._avaliacaoFinalCursoAtualId;
  const curso = (window._cursos || []).find(c => c.id === idCurso);
  const titleEl = document.getElementById('avaliacao-final-modal-title');
  if (titleEl) titleEl.textContent = `Avaliação Final — ${curso ? curso.nome : ''}`;
  const body = document.getElementById('avaliacao-final-body');
  if (!body) return;

  const perguntas = (window._cursoAvaliacaoPerguntas || []).filter(p => p.id_curso === idCurso).sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
  body.innerHTML = perguntas.length === 0
    ? '<div style="text-align:center;padding:24px;color:var(--text3)">Nenhuma pergunta cadastrada ainda.</div>'
    : perguntas.map((p, i) => `
      <div class="table-card" style="padding:14px 18px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
          <div style="font-weight:700;font-size:13px;flex:1">${i + 1}. ${p.enunciado}</div>
          <div style="white-space:nowrap">
            <button class="action-btn" title="Editar" onclick="abrirPerguntaAvaliacaoModal(${idCurso}, ${p.id})">✎</button>
            <button class="action-btn" title="Excluir" onclick="excluirPerguntaAvaliacao(${p.id})" style="color:var(--danger)">✕</button>
          </div>
        </div>
        <ul style="margin:8px 0 0 20px;padding:0;font-size:13px">
          ${(p.alternativas || []).map(a => `<li style="${a.correta ? 'font-weight:700;color:var(--success)' : ''}">${a.texto}${a.correta ? ' ✓' : ''}</li>`).join('')}
        </ul>
      </div>`).join('');
}

window.abrirPerguntaAvaliacaoModal = function(idCurso, idPergunta = null) {
  window._editingPerguntaId = idPergunta;
  window._editingPerguntaCursoId = idCurso;

  if (!document.getElementById('pergunta-avaliacao-modal')) {
    const modal = document.createElement('div');
    modal.id = 'pergunta-avaliacao-modal';
    modal.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1100;align-items:center;justify-content:center;';
    modal.innerHTML = `
      <div style="background:#fff;border-radius:6px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)">
        <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:15px;font-weight:700" id="pergunta-avaliacao-modal-title">Nova Pergunta</div>
          <button type="button" class="btn btn-sm" onclick="document.getElementById('pergunta-avaliacao-modal').style.display='none'">✕</button>
        </div>
        <div style="padding:24px">
          <div class="form-group form-full" style="margin-bottom:16px">
            <label class="form-label">Pergunta</label>
            <textarea class="form-input" id="pav-enunciado" rows="3"></textarea>
          </div>
          <div class="form-group form-full">
            <label class="form-label">Alternativas <span style="font-weight:400;text-transform:none;color:var(--text3)">(marque a correta)</span></label>
            <div id="pav-alternativas-lista" style="margin-top:6px"></div>
            <button type="button" class="btn btn-sm" style="margin-top:8px" onclick="adicionarAlternativaPergunta()">+ Adicionar alternativa</button>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn" onclick="document.getElementById('pergunta-avaliacao-modal').style.display='none'">Cancelar</button>
          <button type="button" class="btn btn-primary" onclick="salvarPerguntaAvaliacao()">Salvar</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  }

  const pergunta = idPergunta ? (window._cursoAvaliacaoPerguntas || []).find(p => p.id === idPergunta) : null;
  document.getElementById('pergunta-avaliacao-modal-title').textContent = idPergunta ? 'Editar Pergunta' : 'Nova Pergunta';
  document.getElementById('pav-enunciado').value = pergunta?.enunciado || '';

  // Constrói as linhas de alternativa direto no DOM (sem re-render a cada
  // tecla digitada) — evita o cursor "pular" pro fim do campo a cada input.
  window._pavProximoIdx = 0;
  document.getElementById('pav-alternativas-lista').innerHTML = '';
  const alternativasIniciais = (pergunta && pergunta.alternativas && pergunta.alternativas.length > 0)
    ? pergunta.alternativas
    : [{ texto: '', correta: true }, { texto: '', correta: false }];
  alternativasIniciais.forEach(alt => window.adicionarAlternativaPergunta(alt.texto, alt.correta));

  document.getElementById('pergunta-avaliacao-modal').style.display = 'flex';
};

window.adicionarAlternativaPergunta = function(texto = '', correta = false) {
  const idx = window._pavProximoIdx++;
  const listaEl = document.getElementById('pav-alternativas-lista');
  const row = document.createElement('div');
  row.className = 'pav-alt-row';
  row.id = `pav-alt-row-${idx}`;
  row.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px';
  row.innerHTML = `
    <input type="radio" name="pav-correta" value="${idx}" ${correta ? 'checked' : ''} title="Marcar como correta">
    <input class="form-input" style="flex:1" id="pav-alt-texto-${idx}" value="${String(texto || '').replace(/"/g, '&quot;')}" placeholder="Texto da alternativa">
    <button type="button" class="action-btn" onclick="document.getElementById('pav-alt-row-${idx}').remove()" style="color:var(--danger)">✕</button>
  `;
  listaEl.appendChild(row);
};

window.salvarPerguntaAvaliacao = async function() {
  const enunciado = document.getElementById('pav-enunciado').value.trim();
  if (!enunciado) return showToast('Informe o enunciado da pergunta.');

  const linhas = Array.from(document.querySelectorAll('#pav-alternativas-lista .pav-alt-row'));
  const alternativas = linhas.map(row => {
    const idx = row.id.replace('pav-alt-row-', '');
    const texto = document.getElementById(`pav-alt-texto-${idx}`)?.value.trim() || '';
    const radio = row.querySelector('input[type="radio"]');
    return { texto, correta: !!(radio && radio.checked) };
  }).filter(a => a.texto);

  if (alternativas.length < 2) return showToast('Cadastre pelo menos 2 alternativas com texto.');
  if (!alternativas.some(a => a.correta)) return showToast('Marque qual alternativa é a correta.');

  const idCurso = window._editingPerguntaCursoId;
  const idPergunta = window._editingPerguntaId;
  const payload = { id_curso: idCurso, enunciado, alternativas };
  if (!idPergunta) {
    const maiorOrdem = Math.max(0, ...(window._cursoAvaliacaoPerguntas || []).filter(p => p.id_curso === idCurso).map(p => p.ordem || 0));
    payload.ordem = maiorOrdem + 1;
  }

  try {
    const { data, error } = idPergunta
      ? await supaClient.from('curso_avaliacao_perguntas').update(payload).eq('id', idPergunta).select()
      : await supaClient.from('curso_avaliacao_perguntas').insert([payload]).select();
    if (error) throw error;
    if (!data || data.length === 0) throw new Error('Nenhuma linha foi salva (verifique a policy da tabela curso_avaliacao_perguntas no Supabase).');

    await loadCursoAvaliacaoPerguntasForApp();
    if (window._renderAvaliacaoFinal) window._renderAvaliacaoFinal();
    document.getElementById('pergunta-avaliacao-modal').style.display = 'none';
    showToast(idPergunta ? 'Pergunta atualizada!' : 'Pergunta criada!');
  } catch (e) {
    console.error('Erro ao salvar pergunta:', e);
    showToast('Erro ao salvar pergunta: ' + (e.message || e), 'danger');
  }
};

window.excluirPerguntaAvaliacao = async function(id) {
  if (!confirm('Excluir esta pergunta?')) return;
  try {
    const { error } = await supaClient.from('curso_avaliacao_perguntas').delete().eq('id', id);
    if (error) throw error;
    await loadCursoAvaliacaoPerguntasForApp();
    if (window._renderAvaliacaoFinal) window._renderAvaliacaoFinal();
    showToast('Pergunta excluída!');
  } catch (e) {
    console.error('Erro ao excluir pergunta:', e);
    showToast('Erro ao excluir pergunta: ' + (e.message || e), 'danger');
  }
};

// ------------------------------------------------------------
// PERFIL TREINAMENTO > CURSOS — cursos liberados (curso_liberacoes) pro
// colaborador logado, com player de aulas e avaliação final. Progresso vai
// pra curso_progresso (ver sql/criar-curso-progresso-treinamento.sql).
// ------------------------------------------------------------
const NOTA_MINIMA_APROVACAO_CURSO = 70; // % de acerto na avaliação final

// idColaborador OU idUsuario (nunca os dois) — idUsuario só é usado por login
// de teste/convidado sem colaborador vinculado (ver
// sql/adicionar-usuario-convidado-progresso.sql).
async function loadCursoProgressoForApp(idColaborador, idUsuario) {
  if (!supaClient) {
    console.error('Supabase client não inicializado para curso_progresso.');
    window._cursoProgresso = [];
    return;
  }
  const query = supaClient.from('curso_progresso').select('*');
  const { data, error } = idColaborador ? await query.eq('id_colaborador', idColaborador) : await query.eq('id_usuario', idUsuario);
  if (error) {
    console.error('Erro ao carregar progresso de cursos:', error.message);
    window._cursoProgresso = [];
  } else {
    window._cursoProgresso = data;
  }
}

// Identifica o "aluno" logado pra Meus Cursos/curso_liberacoes/curso_progresso:
// colaborador normal usa colaboradorId; login de teste/convidado (sem
// colaborador) usa usuarioId no lugar (ver sql/adicionar-usuario-convidado*.sql).
function identidadeAlunoAtual() {
  const idColaborador = currentUser?.colaboradorId || null;
  const idUsuario = !idColaborador ? (currentUser?.usuarioId || null) : null;
  return { idColaborador, idUsuario };
}

function pageMeusCursos() {
  document.getElementById('topbar-actions').innerHTML = '';

  const { idColaborador, idUsuario } = identidadeAlunoAtual();
  if (!idColaborador && !idUsuario) {
    return `<div class="empty-state"><div class="empty-state-icon">🔒</div><div class="empty-state-title">Colaborador não vinculado</div><div class="empty-state-desc">Seu usuário não está vinculado a um colaborador. Contate o administrador.</div></div>`;
  }

  // Enquanto o player estiver "aberto" (curso selecionado), a página mostra a
  // aula/avaliação/resultado em vez da lista — ver abrirPlayerCurso().
  if (window._playerCursoId) {
    return renderPlayerCursoHtml();
  }

  if (!window._meusCursosAba) window._meusCursosAba = 'andamento';

  window._renderMeusCursos = renderMeusCursosLista;
  Promise.all([
    loadCursosForApp(),
    loadCursoLiberacoesForApp(),
    loadCursoProgressoForApp(idColaborador, idUsuario),
  ]).then(renderMeusCursosLista);

  return `
  <div class="table-card">
    <div class="table-header" style="gap:8px">
      <button class="btn ${window._meusCursosAba === 'andamento' ? 'btn-primary' : ''}" onclick="mudarAbaMeusCursos('andamento')">Cursos em Andamento</button>
      <button class="btn ${window._meusCursosAba === 'concluidos' ? 'btn-primary' : ''}" onclick="mudarAbaMeusCursos('concluidos')">Cursos Concluídos</button>
    </div>
    <div id="meus-cursos-lista" style="padding:20px">
      <div style="text-align:center;color:var(--text3)">Carregando...</div>
    </div>
  </div>`;
}

window.mudarAbaMeusCursos = function(aba) {
  window._meusCursosAba = aba;
  navigate('meus-cursos', 'Cursos');
};

function renderMeusCursosLista() {
  const container = document.getElementById('meus-cursos-lista');
  if (!container) return;
  const { idColaborador, idUsuario } = identidadeAlunoAtual();

  const liberados = (window._cursoLiberacoes || []).filter(l =>
    l.status === 'Liberado' && (idColaborador ? l.id_colaborador === idColaborador : l.id_usuario === idUsuario));
  const itens = liberados
    .map(l => ({
      curso: (window._cursos || []).find(c => c.id === l.id_curso),
      progresso: (window._cursoProgresso || []).find(p => p.id_curso === l.id_curso),
    }))
    .filter(item => item.curso);

  const filtrados = itens.filter(({ progresso }) => {
    const concluido = progresso && progresso.status === 'concluido';
    return window._meusCursosAba === 'concluidos' ? concluido : !concluido;
  });

  if (filtrados.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🎓</div><div class="empty-state-title">${window._meusCursosAba === 'concluidos' ? 'Nenhum curso concluído ainda' : 'Nenhum curso liberado em andamento'}</div></div>`;
    return;
  }

  container.innerHTML = filtrados.map(({ curso, progresso }) => {
    const badge = progresso && progresso.status === 'concluido'
      ? `<span class="badge ${progresso.resultado_avaliacao === 'Reprovado' ? 'badge-inactive' : 'badge-active'}">${progresso.resultado_avaliacao || 'Concluído'}</span>`
      : (progresso ? '<span class="badge badge-pending">Em andamento</span>' : '<span class="badge badge-gray">Não iniciado</span>');
    return `
    <div class="table-card" style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;margin-bottom:10px;cursor:pointer" onclick="abrirPlayerCurso(${curso.id})">
      <div>
        <div style="font-weight:700;font-size:14px">${curso.nome}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px">${curso.descricao || ''}</div>
      </div>
      ${badge}
    </div>`;
  }).join('');
}

// --- Player: aula por aula, depois avaliação final ---

window.abrirPlayerCurso = async function(idCurso) {
  await Promise.all([
    (!window._cursoAulas) ? loadCursoAulasForApp() : Promise.resolve(),
    (!window._cursoAvaliacaoPerguntas) ? loadCursoAvaliacaoPerguntasForApp() : Promise.resolve(),
  ]);

  // Ao iniciar o curso pela 1ª vez, já cria a linha de progresso com status
  // "em_andamento" — não espera a 1ª aula ser concluída pra registrar isso.
  let progresso = (window._cursoProgresso || []).find(p => p.id_curso === idCurso);
  if (!progresso) {
    try {
      const { idColaborador, idUsuario } = identidadeAlunoAtual();
      const { data, error } = await supaClient.from('curso_progresso').insert([{
        id_curso: idCurso,
        id_colaborador: idColaborador,
        id_usuario: idUsuario,
        aulas_concluidas: [],
        status: 'em_andamento',
      }]).select();
      if (error) throw error;
      progresso = data[0];
      if (!window._cursoProgresso) window._cursoProgresso = [];
      window._cursoProgresso.push(progresso);
    } catch (e) {
      console.error('Erro ao iniciar progresso do curso:', e);
      showToast('Erro ao iniciar o curso: ' + (e.message || e), 'danger');
      return;
    }
  }

  const aulas = (window._cursoAulas || []).filter(a => a.id_curso === idCurso).sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
  window._playerCursoId = idCurso;

  const concluidas = progresso.aulas_concluidas || [];
  const indicePrimeiraPendente = aulas.findIndex(a => !concluidas.includes(a.id));
  const todasAulasConcluidas = aulas.length === 0 || indicePrimeiraPendente === -1;
  const perguntas = (window._cursoAvaliacaoPerguntas || []).filter(p => p.id_curso === idCurso);
  const podeFazerOuRefazerAvaliacao = progresso.resultado_avaliacao !== 'Aprovado' && perguntas.length > 0;

  // Todas as aulas já concluídas (aprovado, reprovado ou ainda sem avaliação
  // feita): abre em modo revisão, navegando livremente entre as aulas — sem
  // precisar "marcar concluído" de novo. Reprovado (ou nunca avaliado) ainda
  // ganha um botão pra ir/voltar pra avaliação; aprovado, não (ver
  // enviarAvaliacaoAluno, que também bloqueia reenvio nesse caso).
  if (todasAulasConcluidas) {
    window._playerReview = true;
    window._playerAulaIndex = 0;
    if (aulas.length > 0) {
      window._playerModo = 'aula';
    } else if (podeFazerOuRefazerAvaliacao) {
      window._playerModo = 'avaliacao';
      window._respostasAvaliacaoAluno = {};
    } else {
      window._playerModo = 'concluido-sem-conteudo';
    }
    navigate('meus-cursos', 'Cursos');
    return;
  }

  window._playerReview = false;
  window._playerAulaIndex = indicePrimeiraPendente;
  window._playerModo = 'aula';
  window._respostasAvaliacaoAluno = {};

  navigate('meus-cursos', 'Cursos');
};

window.sairDoPlayerCurso = function() {
  window._playerCursoId = null;
  window._playerAulaIndex = null;
  window._playerModo = null;
  window._playerReview = false;
  navigate('meus-cursos', 'Cursos');
};

function renderPlayerCursoHtml() {
  const idCurso = window._playerCursoId;
  const curso = (window._cursos || []).find(c => c.id === idCurso);

  const cabecalho = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <button class="btn btn-sm" onclick="sairDoPlayerCurso()">← Voltar aos Cursos</button>
      <div style="font-size:15px;font-weight:700">${curso ? curso.nome : ''}${window._playerReview ? ' <span class="badge badge-gray" style="font-weight:400">Revisão</span>' : ''}</div>
      <div style="width:130px"></div>
    </div>`;

  if (window._playerModo === 'avaliacao') return cabecalho + renderAvaliacaoAlunoHtml(idCurso);
  if (window._playerModo === 'resultado') return cabecalho + renderResultadoAvaliacaoHtml();
  if (window._playerModo === 'concluido-sem-conteudo') {
    return cabecalho + `<div class="empty-state"><div class="empty-state-icon">✅</div><div class="empty-state-title">Curso concluído</div></div>`;
  }

  const aulas = (window._cursoAulas || []).filter(a => a.id_curso === idCurso).sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
  const aula = aulas[window._playerAulaIndex];
  if (!aula) return cabecalho + `<div class="empty-state"><div class="empty-state-title">Este curso ainda não tem aulas cadastradas.</div></div>`;

  const progresso = (window._cursoProgresso || []).find(p => p.id_curso === idCurso);
  const concluidas = (progresso && progresso.aulas_concluidas) || [];
  const aulaConcluida = concluidas.includes(aula.id);
  const ultimaAula = window._playerAulaIndex === aulas.length - 1;

  // Em revisão, "concluído" só é verdade de fato se o status já virou
  // "concluido" (aprovado, ou sem avaliação). Reprovado/nunca avaliado ainda
  // está "em_andamento" — mostra um aviso diferente e libera o botão de
  // (re)fazer a avaliação.
  const emRevisaoConcluidoDeVerdade = window._playerReview && progresso && progresso.status === 'concluido';
  const perguntas = (window._cursoAvaliacaoPerguntas || []).filter(p => p.id_curso === idCurso);
  const podeFazerOuRefazerAvaliacao = window._playerReview && progresso && progresso.resultado_avaliacao !== 'Aprovado' && perguntas.length > 0;

  return cabecalho + `
    <div class="table-card" style="padding:20px">
      <div style="font-size:13px;color:var(--text3);margin-bottom:6px">Aula ${window._playerAulaIndex + 1} de ${aulas.length}</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:12px">${aula.titulo}</div>
      <div style="position:relative;padding-top:56.25%;background:#000;border-radius:6px;overflow:hidden;margin-bottom:16px">
        <div style="position:absolute;inset:0">${embedVideoAulaHtml(aula)}</div>
      </div>
      ${aula.descricao ? `<div style="font-size:13px;color:var(--text2);margin-bottom:12px;white-space:pre-wrap">${aula.descricao}</div>` : ''}
      ${aula.url_material_pdf ? `<button class="btn btn-sm" style="margin-bottom:16px" onclick="visualizarDocumento('${aula.url_material_pdf}')">📎 Material da aula</button>` : ''}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
        ${window._playerReview ? `
        <div>${emRevisaoConcluidoDeVerdade ? '<span class="badge badge-active">✓ Curso concluído</span>' : '<span class="badge badge-pending">Aulas concluídas — avaliação pendente</span>'}</div>
        <div style="display:flex;gap:8px">
          <button class="btn" ${window._playerAulaIndex === 0 ? 'disabled style="opacity:.4;cursor:not-allowed"' : ''} onclick="voltarAulaRevisao()">← Aula Anterior</button>
          <button class="btn" ${ultimaAula ? 'disabled style="opacity:.4;cursor:not-allowed"' : ''} onclick="avancarAulaRevisao()">Próxima Aula →</button>
          ${podeFazerOuRefazerAvaliacao ? `<button class="btn btn-primary" onclick="irParaAvaliacaoRevisao()">Fazer Avaliação</button>` : ''}
        </div>` : `
        <div>${aulaConcluida ? '<span class="badge badge-active">✓ Aula concluída</span>' : '<span class="badge badge-gray">Não concluída</span>'}</div>
        <div style="display:flex;gap:8px">
          ${!aulaConcluida ? `<button class="btn btn-primary" onclick="marcarAulaConcluida(${aula.id})">Marcar como concluído</button>` : ''}
          <button class="btn ${aulaConcluida ? 'btn-primary' : ''}" ${aulaConcluida ? '' : 'disabled style="opacity:.4;cursor:not-allowed"'} onclick="avancarAulaPlayer()">${ultimaAula ? 'Concluir Curso →' : 'Passar de Aula →'}</button>
        </div>`}
      </div>
    </div>`;
}

window.irParaAvaliacaoRevisao = function() {
  window._playerModo = 'avaliacao';
  window._respostasAvaliacaoAluno = {};
  navigate('meus-cursos', 'Cursos');
};

window.avancarAulaRevisao = function() {
  const idCurso = window._playerCursoId;
  const aulas = (window._cursoAulas || []).filter(a => a.id_curso === idCurso).sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
  if (window._playerAulaIndex < aulas.length - 1) {
    window._playerAulaIndex += 1;
    navigate('meus-cursos', 'Cursos');
  }
};

window.voltarAulaRevisao = function() {
  if (window._playerAulaIndex > 0) {
    window._playerAulaIndex -= 1;
    navigate('meus-cursos', 'Cursos');
  }
};

// Vídeo por Upload (Drive) usa o preview embutido do Drive; Link tenta
// reconhecer YouTube (iframe embed) e, se não for, cai pra uma tag <video>
// simples como melhor esforço (funciona pra link direto de arquivo de vídeo).
function embedVideoAulaHtml(aula) {
  if (!aula.url_video) return '<div style="color:#fff;display:flex;align-items:center;justify-content:center;height:100%">Vídeo não disponível</div>';
  if (aula.tipo_video === 'upload') {
    const id = extrairDriveFileId(aula.url_video);
    const src = id ? `https://drive.google.com/file/d/${id}/preview` : aula.url_video;
    return `<iframe src="${src}" style="position:absolute;inset:0;width:100%;height:100%;border:none" allow="autoplay"></iframe>`;
  }
  const youtubeId = extrairYoutubeId(aula.url_video);
  if (youtubeId) {
    // modestbranding+rel=0 reduzem a marca do YouTube e sugestões de outros
    // vídeos ao final — não dá pra remover o link "Assistir no YouTube" por
    // completo (exigência do próprio YouTube pra embeds).
    return `<iframe src="https://www.youtube.com/embed/${youtubeId}?modestbranding=1&rel=0" style="position:absolute;inset:0;width:100%;height:100%;border:none" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
  }
  // Link direto de arquivo de vídeo: sem interface do Google, então dá pra
  // tirar o menu de botão direito (que tem "Abrir vídeo em nova guia") e
  // esconder download/Picture-in-Picture dos controles nativos.
  return `<video src="${aula.url_video}" controls controlsList="nodownload noremoteplayback" disablePictureInPicture oncontextmenu="return false" style="position:absolute;inset:0;width:100%;height:100%"></video>`;
}

function extrairYoutubeId(url) {
  const m = String(url || '').match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{6,})/);
  return m ? m[1] : null;
}

window.marcarAulaConcluida = async function(idAula) {
  if (!confirm('Confirma que já assistiu essa aula e quer marcar como concluída? Só dá pra passar de aula depois disso.')) return;

  const idCurso = window._playerCursoId;
  const aulas = (window._cursoAulas || []).filter(a => a.id_curso === idCurso).sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
  const progresso = (window._cursoProgresso || []).find(p => p.id_curso === idCurso);
  if (!progresso) return; // não deveria acontecer — abrirPlayerCurso já garante essa linha antes de liberar o player

  try {
    const concluidasAtuais = progresso.aulas_concluidas || [];
    const novasConcluidas = concluidasAtuais.includes(idAula) ? concluidasAtuais : [...concluidasAtuais, idAula];
    const { error } = await supaClient.from('curso_progresso').update({ aulas_concluidas: novasConcluidas }).eq('id', progresso.id);
    if (error) throw error;
    progresso.aulas_concluidas = novasConcluidas;

    showToast('Aula marcada como concluída!');

    // Era a última aula: já cai direto na avaliação final (ou conclui o
    // curso, se não tiver avaliação cadastrada) — sem precisar de outro clique.
    if (window._playerAulaIndex >= aulas.length - 1) {
      avancarOuFinalizarCurso();
    } else {
      navigate('meus-cursos', 'Cursos');
    }
  } catch (e) {
    console.error('Erro ao marcar aula como concluída:', e);
    showToast('Erro ao marcar aula como concluída: ' + (e.message || e), 'danger');
  }
};

// Avança pra próxima aula ou, se já era a última, pra avaliação final (ou
// conclui direto, sem avaliação cadastrada) — reaproveitado tanto pelo botão
// "Passar de Aula"/"Concluir Curso" quanto pelo avanço automático acima.
function avancarOuFinalizarCurso() {
  const idCurso = window._playerCursoId;
  const aulas = (window._cursoAulas || []).filter(a => a.id_curso === idCurso).sort((a, b) => (a.ordem || 0) - (b.ordem || 0));

  if (window._playerAulaIndex < aulas.length - 1) {
    window._playerAulaIndex += 1;
    navigate('meus-cursos', 'Cursos');
    return;
  }

  const perguntas = (window._cursoAvaliacaoPerguntas || []).filter(p => p.id_curso === idCurso);
  if (perguntas.length === 0) {
    finalizarCursoSemAvaliacao();
  } else {
    window._playerModo = 'avaliacao';
    window._respostasAvaliacaoAluno = {};
    navigate('meus-cursos', 'Cursos');
  }
}

window.avancarAulaPlayer = function() {
  const idCurso = window._playerCursoId;
  const aulas = (window._cursoAulas || []).filter(a => a.id_curso === idCurso).sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
  const progresso = (window._cursoProgresso || []).find(p => p.id_curso === idCurso);
  const concluidas = (progresso && progresso.aulas_concluidas) || [];
  const aulaAtual = aulas[window._playerAulaIndex];
  if (!aulaAtual || !concluidas.includes(aulaAtual.id)) return; // trava de segurança — botão já vem desabilitado
  avancarOuFinalizarCurso();
};

// Curso sem nenhuma pergunta de avaliação final cadastrada: conclui direto
// ao terminar a última aula, sem bloquear o colaborador esperando uma
// avaliação que o admin ainda não montou.
async function finalizarCursoSemAvaliacao() {
  const idCurso = window._playerCursoId;
  try {
    const progresso = (window._cursoProgresso || []).find(p => p.id_curso === idCurso);
    if (!progresso) return; // não deveria acontecer — abrirPlayerCurso já garante essa linha
    const payload = {
      status: 'concluido',
      resultado_avaliacao: null,
      percentual_acerto: null,
      concluido_em: new Date().toISOString(),
    };
    const { error } = await supaClient.from('curso_progresso').update(payload).eq('id', progresso.id);
    if (error) throw error;
    Object.assign(progresso, payload);

    window._meusCursosAba = 'concluidos';
    showToast('Curso concluído!');
    window.sairDoPlayerCurso();
  } catch (e) {
    console.error('Erro ao concluir curso:', e);
    showToast('Erro ao concluir curso: ' + (e.message || e), 'danger');
  }
}

function renderAvaliacaoAlunoHtml(idCurso) {
  const perguntas = (window._cursoAvaliacaoPerguntas || []).filter(p => p.id_curso === idCurso).sort((a, b) => (a.ordem || 0) - (b.ordem || 0));

            <input type="radio" name="resp-pergunta-${p.id}" value="${altIdx}" onchange="responderPerguntaAluno(${p.id}, ${altIdx})">
